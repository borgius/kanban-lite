prd_id: prd-role-based-card-visibility
version: 0.1.0
status: final

user_stories:
  - as_a: authenticated user
    i_want: card visibility to follow my resolved roles across every interface
    so_that: I only see cards I am allowed to discover whether I use the SDK, REST API, CLI, MCP, or UI
  - as_a: policy author
    i_want: visibility rules to match roles only and merge by union when multiple rules apply
    so_that: multi-role users inherit the full card set granted by their matching roles without ambiguous precedence
  - as_a: policy author
    i_want: rule conditions to use AND semantics across fields and OR semantics within each field
    so_that: rule matching stays compact and predictable
  - as_a: policy author
    i_want: assignee conditions to support explicit assignee names and a special `@me` token
    so_that: I can target cards assigned to the current resolved user without hardcoding every subject-specific rule
  - as_a: security-conscious operator
    i_want: hidden cards to behave as not found for direct reads and mutations
    so_that: restricted users do not learn that hidden cards exist through targeted operations
  - as_a: platform maintainer
    i_want: card visibility filtering to ship as a standalone plugin package that consumes `kl-plugin-auth` identity and roles
    so_that: visibility remains composable and SDK-first without expanding `kl-plugin-auth` itself into a second responsibility

scope:
  in_scope:
    - Introduce a new standalone auth-related plugin package for card visibility filtering that consumes resolved identity and roles from `kl-plugin-auth`.
    - Enforce card visibility everywhere cards are listed, searched, opened, or mutated, with consistent behavior across SDK, REST, CLI, MCP, and UI.
    - Match visibility rules by resolved roles only.
    - Merge all cards granted by multiple matching rules using UNION semantics.
    - Return no visible cards when a user matches no visibility rule.
    - Apply the same rule resolution to every role, including `admin` and `manager`, with no implicit bypass.
    - Treat hidden cards as not found for direct card-targeted reads and mutations.
    - Evaluate rule conditions with AND semantics across different fields and OR semantics within each individual field.
    - Support assignee condition values as explicit assignee names plus a special current-user token `@me`.
    - Keep the SDK as the canonical enforcement seam while host surfaces render or return already-filtered results.
  out_of_scope:
    - Implicit admin, manager, or superuser visibility bypasses.
    - Rule selection by subject, email, group, token value, or any non-role identity attribute.
    - Partial redaction or placeholder card responses that reveal hidden-card existence.
    - Host-local visibility evaluators that diverge from SDK-owned enforcement.
    - Changes to how `kl-plugin-auth` resolves identity or roles.

acceptance_criteria:
  - criterion: The feature is delivered as a new standalone plugin package rather than as an expansion of `kl-plugin-auth` or a host-specific filter.
    verification: Review package boundaries and configuration shape to confirm visibility filtering is provided by a dedicated package that consumes `kl-plugin-auth` identity and roles.
  - criterion: Visibility rules are selected by resolved roles only.
    verification: Compare callers with the same resolved subject but different role sets and confirm only role membership changes which rules are applied.
  - criterion: When multiple visibility rules match a caller's roles, the final visible-card set is the UNION of cards granted by all matching rules.
    verification: Configure overlapping role matches with distinct visible card slices and confirm the caller sees the combined result without authoring an extra synthetic rule.
  - criterion: When no visibility rule matches a caller's roles, the caller sees no cards.
    verification: Use a caller whose roles do not match any rule and confirm list and search-style card discovery returns an empty result.
  - criterion: No role, including `admin` or `manager`, receives an implicit visibility bypass.
    verification: Use admin and manager callers with no matching rule and confirm they see no cards; add matching rules and confirm they still see only the explicitly granted cards.
  - criterion: Visibility enforcement is consistent across SDK, REST, CLI, MCP, and UI.
    verification: Exercise the same caller and workspace through each surface and confirm the visible-card set and hidden-card outcomes match everywhere.
  - criterion: Hidden cards behave as not found for direct read and mutation flows.
    verification: Attempt direct card reads and mutations against a hidden card and confirm each surface returns its standard not-found outcome rather than a permission-specific reveal.
  - criterion: Rule matching uses AND semantics across different fields and OR semantics within each field.
    verification: Configure rules with multiple fields and multi-value field lists, then confirm cards must satisfy every defined field while any listed value within the same field is sufficient.
  - criterion: Assignee conditions support explicit assignee names and the `@me` token.
    verification: Configure one rule with literal assignee names and another with `@me`, then confirm `@me` matches cards assigned to the current resolved user while literal names match exact assignee strings.
  - criterion: Host surfaces do not implement divergent visibility logic outside the SDK.
    verification: Review the cross-surface flow and confirm hosts surface SDK-filtered results and SDK-owned not-found semantics instead of re-evaluating rules locally.

needs_clarification: []

features:
  - name: Standalone role-based visibility plugin package
    overview: Provide card visibility filtering through a dedicated plugin package that consumes `kl-plugin-auth` identity and role output rather than expanding the base auth package or embedding filters in hosts.
    status: planned
  - name: Role-only rule selection
    overview: Choose visibility rules exclusively from resolved role membership, with no subject-specific selectors and no implicit elevated-role bypass.
    status: planned
  - name: Union-based multi-rule visibility
    overview: Merge all cards granted by matching rules so multi-role users inherit the union of their role-based visibility slices.
    status: planned
  - name: Deterministic condition semantics
    overview: Evaluate rule conditions with AND semantics across fields and OR semantics within each field so visibility behavior stays predictable.
    status: planned
  - name: Assignee-aware `@me` conditions
    overview: Allow assignee matching against explicit assignee names or the current resolved user via the special `@me` token.
    status: planned
  - name: Hidden-as-not-found enforcement
    overview: Remove hidden cards from discovery results and make direct access attempts return standard not-found behavior.
    status: planned
  - name: Cross-surface parity
    overview: Apply the same visibility outcomes in SDK, REST, CLI, MCP, and UI with SDK-owned enforcement as the source of truth.
    status: planned

decisions:
  - decision: Card visibility filtering ships as a separate standalone plugin package that consumes `kl-plugin-auth` identity and roles.
    rationale: Separating visibility from the base auth package keeps responsibilities narrow and lets deployments opt into visibility filtering without redefining identity resolution.
  - decision: Visibility rules match roles only.
    rationale: The approved scope intentionally limits rule selection to role membership and avoids a broader subject- or attribute-based policy language in the first release.
  - decision: Multiple matching rules merge by UNION.
    rationale: Multi-role users should receive every card slice granted by their matching roles without authors needing duplicate composite rules.
  - decision: No matching rule yields zero visible cards.
    rationale: The model is explicit allowlist visibility rather than fallback-open visibility.
  - decision: No admin or manager bypass exists.
    rationale: Elevated operational permissions must not silently expand card discoverability beyond configured visibility rules.
  - decision: Hidden cards behave as not found for direct reads and mutations.
    rationale: Not-found semantics prevent callers from inferring the existence of restricted cards through targeted operations.
  - decision: Rule conditions use AND semantics across fields and OR semantics within each field.
    rationale: This produces a compact and predictable rule language for policy authors.
  - decision: Assignee conditions support both explicit names and `@me`.
    rationale: Policies need a simple way to target cards assigned to the current resolved user without coupling rule selection to non-role identity fields.
  - decision: Enforcement scope is every interface, but enforcement logic remains SDK-first.
    rationale: Cross-surface parity requires one canonical evaluator so hosts do not drift or leak visibility differences.

changes:
  - version: 0.1.0
    change: Initial root PRD capturing the standalone role-based card visibility plugin package, union-based matching, hidden-as-not-found behavior, `@me` assignee conditions, and SDK-first parity across SDK, REST, CLI, MCP, and UI.