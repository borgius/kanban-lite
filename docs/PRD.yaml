prd_id: 20260329-plugin-options-tab
version: 0.1.2
status: final

user_stories:
  - as_a: workspace maintainer
    i_want: to manage installed plugin providers from the settings screen
    so_that: I can understand which providers are available and adjust configuration without hand-editing `.kanban.json` for routine changes
  - as_a: operator configuring capabilities
    i_want: to enable or disable providers by capability from a capability-grouped settings tab
    so_that: I can choose the active provider for each capability with clear feedback about what is selected
  - as_a: user adding functionality
    i_want: to install new `kl-*` packages from the settings experience
    so_that: I can add supported plugins without leaving the product workflow or guessing the next step after install failures
  - as_a: plugin user
    i_want: to edit provider options through JSON Forms driven by each provider's `optionsSchema`
    so_that: provider-specific configuration stays structured, validated, and discoverable
  - as_a: auth-enabled deployer
    i_want: to configure `kl-plugin-auth` through provider schemas in the same settings flow
    so_that: auth setup uses the same plugin-options workflow as other providers instead of a bespoke config path
  - as_a: product maintainer
    i_want: the plugin settings feature to include tests plus README and changelog updates required by repo rules
    so_that: the feature ships with parity coverage and accurate documentation
  - as_a: workspace maintainer
    i_want: to run first-party callback handlers inside the same runtime as core when Kanban events fire
    so_that: I can automate local side effects without deploying an external webhook receiver

scope:
  in_scope:
    - Discover available plugin providers from workspace resolution, local dependencies, and global installs.
    - Add a capability-grouped settings UI tab that renders provider rows under each capability.
    - Represent each provider row with provider identity, install/discovery source, enablement state, and access to provider options when available.
    - Treat provider enablement as capability selection in `.kanban.json`, where enabled means the provider is the selected provider for that capability.
    - Enforce single-provider auto-disable behavior so selecting one provider for a single-provider capability deselects the previously selected provider for that capability.
    - Add a plugin install form for `kl-*` packages with a global install option and actionable npm error tips.
    - Support provider option editing through per-provider `optionsSchema()` contracts rendered with JSON Forms.
    - Allow provider schemas to model secrets as editable values that are masked in the UI when displayed.
    - Refactor first-party `kl-plugin-auth` configuration to expose provider schemas compatible with the same options editing flow.
    - Add focused tests covering discovery, selection semantics, install behavior, options editing, masking behavior, and auth-plugin schema usage.
    - Update README, CHANGELOG, and any related plugin/auth docs required by repository rules when the feature is implemented.
    - Add a first-party `kl-plugin-callback` package for same-runtime event callbacks similar to the webhook plugin's event ownership model.
    - Support callback plugin options as one mixed `handlers` list where each handler can match one or more events.
    - Run matching inline JavaScript handlers with one argument shaped as `({ event, sdk })`.
    - Run matching process-based handlers by sending serialized event/context payloads over stdin only, without exposing a live SDK object.
    - Log handler failures and continue running other matching callback handlers for the same event.
    - Cover callback plugin behavior across SDK, API, CLI, MCP, plugin options, and required documentation updates when the feature is implemented.
  out_of_scope:
    - Publishing plugins to npm.
    - Marketplace-style browsing or marketplace UX.
    - Uninstalling packages or removing plugins from disk.
    - Editing env-only secrets outside provider schemas unless those secrets are explicitly modeled in the provider schema.
    - Broad redesign of non-settings UI surfaces.
    - Replacing `kl-plugin-webhook` HTTP delivery with in-process callbacks.
    - Passing a live SDK object or other in-memory runtime handles to spawned process handlers.
    - A bespoke code editor or callback-specific editor plumbing for inline JavaScript authoring in v1.

acceptance_criteria:
  - criterion: The settings experience exposes a dedicated plugin/options tab grouped by capability, and each capability section renders provider rows rather than a flat package list.
    verification: Open the settings UI in a workspace with multiple capabilities and confirm provider entries appear under their capability group with one row per discovered provider.
  - criterion: Plugin discovery includes providers resolvable from the workspace, local dependencies, and global installs.
    verification: Set up one provider from each discovery scope and confirm all three appear in the plugin/options tab with discovery-source metadata.
  - criterion: Provider enablement is stored as the selected provider in `.kanban.json`, not as a separate boolean flag.
    verification: Select a provider for a capability, inspect the resulting `.kanban.json`, and confirm the saved config identifies that provider as selected for the capability without introducing an independent `enabled` boolean.
  - criterion: Selecting a provider for a single-provider capability automatically disables the previously selected provider for that same capability.
    verification: Select provider A for a capability, then select provider B for the same capability and confirm the UI and saved config show only provider B as selected.
  - criterion: Provider rows clearly show whether a provider is currently selected for its capability.
    verification: With a mix of selected and unselected providers, confirm each row exposes the correct selected state and that the selected row matches `.kanban.json`.
  - criterion: The install flow accepts `kl-*` package names, supports an explicit global-install option, and surfaces actionable npm error tips when installation fails.
    verification: Submit a valid install through the form once with workspace install and once with global install, then trigger a failing install and confirm the UI shows npm-derived guidance instead of a generic failure message.
  - criterion: Provider option editing is driven by each provider's `optionsSchema()` contract and rendered through JSON Forms rather than hard-coded per-provider inputs.
    verification: Open options for at least two different providers with different schemas and confirm the rendered forms and saved payloads follow the provider-provided schema definitions.
  - criterion: Secrets modeled in provider schemas remain editable but are masked in the UI when displayed.
    verification: Configure a schema-defined secret field, reopen the options view, and confirm the value can be updated while the displayed field remains masked.
  - criterion: `kl-plugin-auth` configuration participates in the same schema-driven provider options flow as other providers.
    verification: Configure `kl-plugin-auth` from the plugin/options tab and confirm its options are rendered from schema metadata and saved through the same provider-options path.
  - criterion: Discovery, selection semantics, install behavior, provider schema rendering, secret masking, and auth-plugin schema behavior are covered by automated tests.
    verification: Run the targeted automated test suites added for this feature and confirm each behavior category is exercised.
  - criterion: User-facing documentation and changelog updates required by repository rules are identified as part of the feature contract.
    verification: Review implementation deliverables and confirm README, CHANGELOG, and any related plugin/auth docs are updated alongside the feature before release.
  - criterion: A first-party `kl-plugin-callback` package can be configured as a same-runtime callback plugin using provider options rather than bespoke per-host wiring.
    verification: Install or resolve `kl-plugin-callback`, configure it through the plugin provider path, and confirm the active runtime loads it without requiring separate callback registration code in each host surface.
  - criterion: Callback plugin options use one mixed `handlers` list, and multiple matching handlers can run for the same committed event.
    verification: Configure inline and process handlers in the same `handlers` list for one shared event mask, trigger that event once, and confirm every matching handler is invoked.
  - criterion: Inline JavaScript handlers receive exactly one argument shaped as `({ event, sdk })`.
    verification: Configure an inline handler that reads both `event` and `sdk` from its single parameter object and confirm it executes successfully without any additional injected arguments.
  - criterion: Process-based handlers receive serialized event/context input through stdin only and do not receive a live SDK object.
    verification: Configure a process handler that reads stdin, trigger a matching event, and confirm the child process receives the serialized payload while no live SDK handle is exposed to the process.
  - criterion: Callback handler failures are isolated so one failing handler does not prevent other matching handlers from running.
    verification: Configure two matching handlers where the first throws or exits non-zero and confirm the failure is logged while the second handler still executes.
  - criterion: Committed events from SDK, REST API, CLI, and MCP mutations all reach matching callback handlers through the same event lifecycle.
    verification: Trigger representative writes from SDK, standalone API, CLI, and MCP, then confirm the callback plugin observes the committed after-event once per mutation source.
  - criterion: Callback plugin implementation ships with automated tests and README/CHANGELOG/plugins documentation updates required by repository rules.
    verification: Review the implementation deliverable and confirm targeted tests plus README, CHANGELOG, `docs/plugins.md`, and package-specific docs are updated before release.

features:
  - name: Capability-grouped plugin settings tab
    overview: Add a settings tab that groups discovered providers by capability and shows provider rows with selection and configuration entry points.
    status: completed
  - name: Multi-scope plugin discovery
    overview: Discover plugin providers from workspace resolution, local dependencies, and global installs for display in settings.
    status: completed
  - name: Capability-based provider selection
    overview: Treat provider enablement as capability selection in `.kanban.json`, including single-provider auto-disable behavior.
    status: completed
  - name: In-app `kl-*` package install flow
    overview: Let users install supported `kl-*` packages from settings with a global-install option and npm error guidance.
    status: completed
  - name: Schema-driven provider options
    overview: Render provider configuration with JSON Forms driven by each provider's `optionsSchema()` contract.
    status: completed
  - name: Auth plugin schema parity
    overview: Refactor `kl-plugin-auth` so its configuration uses the same provider-schema options flow as other providers.
    status: completed
  - name: Verification and documentation parity
    overview: Cover the feature with automated tests and the README/CHANGELOG/doc updates required by repository rules.
    status: completed
  - name: First-party callback plugin
    overview: Add `kl-plugin-callback` as a same-runtime event callback plugin with mixed inline/process handlers, failure isolation, and parity across host surfaces.
    status: completed

decisions:
  - decision: The settings UI will present capability/provider rows instead of a flat plugin list.
    rationale: Capability-first organization matches how providers are actually selected and configured in `.kanban.json`.
  - decision: Discovery scope includes workspace, local dependency, and global install resolution.
    rationale: Users need one management surface that reflects the providers they can actually select in real deployments.
  - decision: Enabled means selected in `.kanban.json`.
    rationale: A separate enablement boolean would drift from the existing provider-selection model and create ambiguous state.
  - decision: Single-provider capabilities auto-disable the previously selected provider when a new provider is selected.
    rationale: The UI should enforce the one-active-provider rule instead of leaving conflicting selections for the user to untangle manually.
  - decision: Provider options are defined per provider through `optionsSchema()` and rendered with JSON Forms.
    rationale: Schema-driven configuration scales across first-party and external providers without bespoke UI for every package.
  - decision: Schema-defined secrets are editable in the settings flow but masked when displayed.
    rationale: Users must be able to manage secret values from the same workflow without exposing them in plain text during normal editing.
  - decision: `kl-plugin-auth` will be refactored to participate in the same schema-driven provider-options contract.
    rationale: Auth configuration should follow the same plugin-management model as other capabilities instead of remaining a special-case path.
  - decision: The in-product installer only accepts exact unscoped `kl-*` package names and always runs with lifecycle scripts disabled.
    rationale: The settings flow must stay a constrained provider installer rather than becoming a general-purpose npm command wrapper.
  - decision: Plugin settings reads, lists, install output, and surfaced errors all reuse one shared redaction policy.
    rationale: Secret masking must be enforced once at the shared contract layer so every surface inherits the same safety guarantees.
  - decision: Plugin options forms reuse the shared `.card-jsonforms` wrapper and styling hooks.
    rationale: Reusing the existing JSON Forms styling contract keeps provider options visually consistent without adding a second form theme.
  - decision: `kl-plugin-callback` will run in the same runtime as core rather than delivering to an external receiver.
    rationale: The goal is local event-driven automation with plugin ownership similar to webhooks but without leaving the current process boundary.
  - decision: Callback plugin options will use one mixed `handlers` list.
    rationale: A single list keeps inline and process-based handlers in one ordered configuration model while still allowing multiple handlers per event.
  - decision: Inline JavaScript handlers receive one argument shaped as `({ event, sdk })`.
    rationale: Inline callbacks need both the event envelope and the public SDK surface, but the contract should stay narrow and explicit.
  - decision: v1 inline JavaScript authoring uses the existing schema-driven plain text/textarea path in shared plugin settings.
    rationale: Reusing the current schema-driven settings flow keeps callback configuration aligned with other providers while deferring bespoke code-editor investment until a later release proves it necessary.
  - decision: Process-based handlers receive serialized event/context data over stdin only.
    rationale: Child processes should get a portable serialized payload, not a live in-memory SDK object that only exists inside the host runtime.
  - decision: Handler failures are logged and isolated from other matching handlers.
    rationale: Callback execution should be best-effort so one bad handler does not block unrelated automation for the same event.

changes:
  - version: 0.1.2
    change: Resolved the callback inline-authoring clarification by locking v1 to the existing schema-driven plain text/textarea settings path and marking bespoke code-editor plumbing out of scope.
  - version: 0.1.1
    change: Added a planned `kl-plugin-callback` feature entry covering same-runtime callback execution, a mixed handler list, SDK/API/CLI/MCP parity expectations, failure isolation, and an unresolved inline-code editor question.
  - version: 0.1.0
    change: Initial draft PRD for a capability-grouped plugin options tab with multi-scope discovery, schema-driven provider configuration, install flow support, and auth-plugin schema parity.
  - version: 0.1.0
    change: Finalized after implementation with capability-grouped provider inventory, selected-provider persistence in `.kanban.json`, schema-driven options editing, and `kl-plugin-auth` parity across SDK, API, CLI, MCP, and settings UI.
  - version: 0.1.0
    change: Validation confirmed multi-scope discovery, exact unscoped `kl-*` install guardrails with `--ignore-scripts`, shared redaction across surfaced reads/errors/install output, and reuse of the shared `.card-jsonforms` styling hook.
