prd_id: prd-card-tasks
version: 0.1.0
status: final

user_stories:
  - as_a: card collaborator
    i_want: a dedicated `Tasks X/N` tab on card details
    so_that: I can track checklist progress directly on the card
  - as_a: card collaborator
    i_want: to add, edit, delete, check, and uncheck tasks inline
    so_that: card work can be managed as a classic todo list without extra entities or navigation
  - as_a: policy author
    i_want: task visibility and task actions to be authorized separately
    so_that: users can be allowed to open a card without automatically seeing or mutating its tasks
  - as_a: platform maintainer
    i_want: tasks to behave the same across SDK, REST API, CLI, MCP, default markdown storage, and all first-party storage plugins
    so_that: card task workflows stay portable across every supported interface and backend

scope:
  in_scope:
    - Add an optional shared card field `card.tasks: string[]`.
    - Represent each task item as a single-line markdown task string such as `- [ ] text` or `- [x] **done**`.
    - Add a fixed card-detail tab labeled `Tasks X/N`, where X is the completed count and N is the total count.
    - Support classic todo-list interactions: add, delete, check, uncheck, and inline text editing.
    - Support simple inline markdown in task text while editing and rendering: bold, italic, code, and links.
    - Let the auth plugin authorize `show`, `add`, `edit`, `delete`, `check`, and `uncheck` task actions independently.
    - Protect task visibility separately from general card visibility even though tasks live on the shared card object.
    - Omit the `tasks` field entirely from card payloads when the caller lacks task-show permission.
    - Keep SDK-owned task auth and redaction as the canonical behavior, with hosts rendering already-scoped data.
    - Support tasks across SDK, REST API, CLI, MCP, default markdown storage, and all first-party storage plugins.
    - Preserve backward compatibility so cards without tasks remain valid.
  out_of_scope:
    - Nested subtasks, task-level assignees, due dates, priorities, attachments, or comments.
    - Rich markdown blocks, HTML, embeds, or other formatting beyond simple inline markdown.
    - Separate standalone task entities, task IDs, or task metadata outside the stored markdown task line.
    - Host-local task auth or redaction rules that diverge from SDK behavior.
    - Breaking schema changes or mandatory migration for cards that do not use tasks.

acceptance_criteria:
  - criterion: Cards may include an optional `tasks` array and cards without tasks remain valid everywhere.
    verification: Create, read, and update cards with and without `tasks` across supported surfaces and backends and confirm both shapes work without migration requirements.
  - criterion: Each task is stored as a single-line markdown task string in `card.tasks`.
    verification: Persist tasks and confirm stored values use strings like `- [ ] text` and `- [x] **done**` rather than a task-object schema.
  - criterion: The card-detail UI includes a fixed `Tasks X/N` tab for callers allowed to view tasks.
    verification: Open cards with zero, incomplete, and completed tasks and confirm the tab label reflects completed versus total counts.
  - criterion: Users can add, edit inline, delete, check, and uncheck tasks.
    verification: Exercise each task action and confirm the resulting `card.tasks` entries update correctly.
  - criterion: Task text supports simple inline markdown while editing and rendering.
    verification: Author tasks containing bold, italic, code, and links and confirm raw markdown is preserved while rendered views display the supported inline formatting.
  - criterion: The auth plugin authorizes `show`, `add`, `edit`, `delete`, `check`, and `uncheck` independently.
    verification: Configure distinct allow and deny cases per action and confirm each surface enforces the same action-specific outcomes.
  - criterion: Task visibility is protected separately from general card visibility.
    verification: Use a caller who can view a card but lacks task-show permission and confirm the card remains visible while the `tasks` field is omitted rather than returned as an empty array.
  - criterion: The SDK owns task auth and redaction behavior and hosts do not re-scope task data locally.
    verification: Review the cross-surface flow and confirm hosts consume SDK-scoped payloads instead of applying their own task-visibility logic.
  - criterion: Tasks are supported consistently across SDK, REST API, CLI, MCP, default markdown storage, and all first-party storage plugins.
    verification: Persist and retrieve task-bearing cards through each supported interface and backend and confirm parity of stored values, counts, and omission semantics.

needs_clarification: []

features:
  - name: Shared card task field
    overview: Add optional `card.tasks: string[]` to store checklist items on cards.
    status: planned
  - name: Markdown task-line storage
    overview: Store each task as a single-line markdown task string that carries both completion state and lightweight inline formatting.
    status: planned
  - name: Fixed `Tasks X/N` card-detail tab
    overview: Show a dedicated card-detail tab with completed and total task counts.
    status: planned
  - name: Classic todo-list interactions
    overview: Support add, delete, check, uncheck, and inline task-text editing.
    status: planned
  - name: Simple inline markdown task text
    overview: Support bold, italic, code, and links in task text during editing and rendering.
    status: planned
  - name: Separate task auth and redaction
    overview: Authorize `show`, `add`, `edit`, `delete`, `check`, and `uncheck` independently and omit `tasks` entirely when `show` is denied.
    status: planned
  - name: Cross-surface and cross-storage parity
    overview: Keep task behavior consistent across SDK, REST API, CLI, MCP, default markdown storage, and all first-party storage plugins.
    status: planned

decisions:
  - decision: Task data is stored on the shared card as `card.tasks: string[]`.
    rationale: Tasks are part of shared card content and must stay portable across interfaces and storage backends.
  - decision: Each task item is represented as a single-line markdown task string.
    rationale: Markdown task-line syntax keeps storage human-readable while encoding completion state and simple inline formatting in one value.
  - decision: The UI exposes tasks in a fixed `Tasks X/N` card-detail tab.
    rationale: A fixed tab makes checklist state discoverable and provides a stable home for card task management.
  - decision: Task text supports only simple inline markdown.
    rationale: Bold, italic, code, and links cover common task authoring needs without expanding into rich-text or block-markdown editing.
  - decision: Task permissions are authorized separately for `show`, `add`, `edit`, `delete`, `check`, and `uncheck`.
    rationale: Operators need fine-grained control over who can view tasks at all and which task mutations each caller may perform.
  - decision: When task-show permission is denied, card payloads omit the `tasks` field entirely rather than returning an empty array.
    rationale: Omission preserves separate visibility semantics and avoids conflating hidden tasks with visible-but-empty tasks.
  - decision: The SDK owns task auth and redaction behavior.
    rationale: Centralizing scoping in the SDK keeps REST API, CLI, MCP, UI, and storage integrations consistent and prevents host-specific leaks or drift.
  - decision: The feature is additive and backward-compatible.
    rationale: Existing cards remain valid without migration because `tasks` is optional and absent unless used.

changes:
  - version: 0.1.0
    change: Replace the active PRD with the initial card-tasks PRD covering shared `card.tasks` storage, fixed `Tasks X/N` UI, classic todo-list interactions, simple inline markdown, separate task auth and redaction, SDK-owned scoping, backward compatibility, and parity across SDK, REST API, CLI, MCP, default markdown storage, and all first-party storage plugins.
