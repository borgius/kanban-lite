				mitigation: "Keep the integration test scoped to the server-side handshake contract; validate auto-reconnect in frontend unit tests."
		tech_stack:
			- Vitest
			- jsdom per-file test environment for TSX UI coverage
			- ws test client for backend integration assertions
		test_coverage: "Targeted regression coverage for reconnect transport, reconnect UI, and backend handshake assumptions."

