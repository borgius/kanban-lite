recommended_minimal_implementation_approach:
	approach: |
		1. Keep the change centered in `src/webview/standalone-shim.ts` plus a very small message/UI addition in `src/shared/types.ts` and `src/webview/App.tsx`.
		2. Replace the module-level one-shot socket with a small reconnecting wrapper that:
			 - recreates the `WebSocket` on `close`/`error`,
			 - replays `pendingMessages`,
			 - re-sends `{ type: 'ready' }` after reconnect, and
			 - emits a frontend-visible message such as `{ type: 'connectionStatus', connected, reconnecting, fatal, reason? }`.
		3. In `App.tsx`, reuse the existing toast/banner styling conventions (`UndoToast` + notification tokens) to show:
			 - transient reconnecting state while retrying,
			 - terminal error notification when retries are exhausted or a health probe confirms backend loss.
		4. If a version-aware failure mode must be detected, the smallest backend addition is a lightweight endpoint or init field exposing backend/app version; `workspace.configVersion` already exists but reflects config schema, not server build version.
	risks:
		- "If reconnect retries are added only in the shim, VS Code-hosted panel behavior must remain untouched because it uses the native webview API, not `/ws`."
		- "Blindly replaying all queued messages after reconnect could repeat non-idempotent actions (for example create/move/delete) if those messages were already accepted before disconnect."
		- "Using only `workspace.configVersion` to detect restart/version change is insufficient for binary/app version changes; it tracks config schema."
		- "Port changes after backend restart are only detectable in browser mode if the page can discover the new port; current standalone browser URL and Vite proxy assume a stable host/port."

