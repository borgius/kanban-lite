plan_id: "20260318-backend-reconnect"
objective: "Research frontend/backend reconnect behavior when the standalone backend restarts or config/version changes."
focus_area: "connectivity_reconnect"
created_at: "2026-03-18"
created_by: "GitHub Copilot (GPT-5.4)"
status: "completed"

tldr: |
	- Standalone browser mode depends on a single WebSocket created in `src/webview/standalone-shim.ts`; it queues outbound messages before the first open, but has no reconnect, retry, or lost-connection UI.
	- The app shell in `src/webview/App.tsx` assumes an eventual `init` message after posting `{ type: 'ready' }`; if the socket dies later, UI state remains mounted but no longer receives backend updates.
	- The backend exposes `/ws`, `GET /api/workspace`, and `GET /api/storage`; there is no dedicated health/version endpoint, heartbeat, or server-issued disconnect reason.
	- Reusable UI patterns already exist for inline/browser-side notifications (`UndoToast`, notification CSS tokens) and for extension-hosted errors (`vscode.window.showErrorMessage`).
	- Test coverage is strong for initial WS init/broadcast behavior, but missing for socket close/reconnect, backend restart, version mismatch detection, and lost-connection notification rendering.

