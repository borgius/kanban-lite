plan_id: 20260318-column-visibility-controls
objective: |
  Implement two client-side column visibility controls in the webview/standalone UI:
  (1) minimize a column into a narrow vertical rail that stays rendered, droppable, and reorderable;
  (2) add a toolbar columns submenu with checkbox hide/show controls. Keep scope UI-only unless a
  stronger reason emerges.
created_at: "2026-03-18"
created_by: gem-planner
status: completed
research_confidence: high

tldr: |
  Completed as a client-side webview/standalone UI change: Zustand now stores board-scoped hidden/minimized
  column IDs, App hydrates/persists that UI state, KanbanBoard/KanbanColumn preserve minimized columns in
  render order for DnD, and Toolbar exposes checkbox hide/show controls. Targeted validation completed on
  the standalone app, including the minimized-drop follow-up fix, and README.md plus CHANGELOG.md were updated.

open_questions: []

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: Hidden-column filtering causes the existing reorder callback to send only visible IDs, which would drop hidden columns from optimistic state and persisted order.
      likelihood: high
      impact: critical
      mitigation: |
        Keep the canonical column array untouched in store and have KanbanBoard translate visible drag positions
        back into a full ordered column ID list before calling the existing onReorderColumns handler. Add a focused
        test covering reorder with at least one hidden column.
    - scenario: Minimizing a column removes or bypasses the live drop zone, so cards can no longer be dropped into the minimized column.
      likelihood: medium
      impact: high
      mitigation: |
        Keep minimized columns mounted in the board loop, preserve the outer drop handlers on the rail container,
        and limit minimization to the inner content/body rendering only.
    - scenario: Persisted hidden/minimized IDs become stale after switching boards, deleting columns, or receiving fresh init payloads.
      likelihood: medium
      impact: medium
      mitigation: |
        Sanitize board-scoped visibility state against the current board's column IDs whenever init/currentBoard/columns
        change, and persist only the sanitized payload through getState/setState.
  assumptions:
    - Existing column reorder support in App.tsx and the extension path remains the canonical persisted order flow.
    - Hidden columns do not need server persistence and can safely live in board-scoped webview state.
    - Deleted-column visibility remains controlled by existing card settings and is out of scope for the new toolbar submenu.
    - No new npm dependencies are permitted.

implementation_specification:
  code_structure: |
    Restrict changes to webview client files only. Store owns board-scoped visibility state and actions;
    App owns optional hydrate/persist glue through acquireVsCodeApi(); KanbanBoard/KanbanColumn implement
    minimized rendering and hidden-safe DnD/reorder translation; Toolbar exposes the recovery controls.
  affected_areas:
    - src/webview/store/index.ts
    - src/webview/App.tsx
    - src/webview/components/KanbanBoard.tsx
    - src/webview/components/KanbanColumn.tsx
    - src/webview/components/Toolbar.tsx
    - src/webview/store/index.test.ts
    - src/webview/App.test.tsx
  component_details:
    - component: webview store visibility state
      responsibility: Track board-scoped hidden/minimized column IDs and expose actions/selectors that keep state canonical and sanitizable.
      interfaces:
        - "columnVisibilityByBoard[currentBoard] -> { hiddenColumnIds: string[]; minimizedColumnIds: string[] }"
        - "setColumnHidden(boardId, columnId, hidden)"
        - "toggleColumnMinimized(boardId, columnId)"
        - "sanitizeColumnVisibility(boardId, validColumnIds)"
    - component: App.tsx visibility persistence glue
      responsibility: Hydrate optional board-scoped UI state from acquireVsCodeApi().getState() and persist sanitized updates with setState().
      interfaces:
        - "vscode.getState()/setState() payload containing only board-scoped column visibility UI state"
    - component: KanbanBoard minimized/hidden render pipeline
      responsibility: Render visible columns only, keep minimized columns mounted as rails, and translate visible-column reorders into full ordered ID arrays.
      interfaces:
        - "visibleColumns = columns filtered by hiddenColumnIds"
        - "onReorderColumns(fullOrderedColumnIds: string[])"
    - component: KanbanColumn minimized rail UI
      responsibility: Add Minimize/Expand affordance and render a narrow vertical rail showing column name and card count while preserving drag/drop hooks.
      interfaces:
        - "isMinimized prop"
        - "onToggleMinimized(columnId)"
    - component: Toolbar columns submenu
      responsibility: Provide hide/show checkbox controls for non-deleted columns using the existing dropdown checkbox interaction pattern.
      interfaces:
        - "Columns submenu listing board columns with checked = visible"
  dependencies:
    - component: App.tsx persistence
      relationship: Depends on store visibility schema and sanitization helpers.
    - component: KanbanBoard/KanbanColumn
      relationship: Depends on store visibility selectors/actions to decide hidden vs minimized rendering.
    - component: Toolbar submenu
      relationship: Depends on store visibility selectors/actions and existing board menu dropdown state.
    - component: Focused tests
      relationship: Depend on finalized store schema and App/UI wiring contracts.
  integration_points:
    - App.tsx existing init/currentBoard message flow
    - App.tsx existing onReorderColumns optimistic update path
    - Toolbar board `...` menu and dropdown interaction pattern
    - KanbanBoard existing HTML5 card + column drag-and-drop handlers

