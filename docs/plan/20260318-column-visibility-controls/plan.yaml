    interface: Persisted UI payload contains only board-scoped visibility state and round-trips through getState/setState.
    format: "Serialized webview state object in App.tsx"

tasks:
  - id: T1
    title: Add board-scoped column visibility state to the webview store
    description: |
      Extend src/webview/store/index.ts with a client-only visibility model keyed by board ID.
      The store should distinguish hidden columns from minimized columns, expose small mutation
      helpers, and provide a sanitization path so stale IDs are removed when boards or columns change.
      Keep this entirely in the webview store; do not touch shared types, SDK, API, CLI, or MCP.
    wave: 1
    agent: gem-implementer
    priority: high
    status: completed
    dependencies: []
    context_files:
      src/webview/store/index.ts: Existing Zustand state, currentBoard, and columns setters.
      src/webview/store/index.test.ts: Existing focused store-unit pattern.
    estimated_effort: small
    estimated_files: 2
    estimated_lines: 80
    focus_area: Board-scoped UI state only
    verification:
      - Store tests cover hide/show, minimize/expand, and sanitization behavior.
      - No shared or backend files are changed.
    acceptance_criteria:
      - Hidden and minimized column IDs are stored separately per board.
      - Store exposes enough selectors/actions for Toolbar and KanbanBoard to read/update visibility without local duplicate state.
      - Sanitization removes IDs for columns that no longer exist on the active board.
    failure_modes:
      - scenario: Hidden and minimized sets drift or overlap in invalid ways.
        likelihood: medium
        impact: medium
        mitigation: Enforce deterministic action rules (e.g. hiding a column also clears its minimized flag).
    tech_stack:
      - TypeScript
      - React
      - Zustand
    test_coverage: src/webview/store/index.test.ts

  - id: T2
    title: Hydrate and persist board-scoped column visibility through webview state
    description: |
      Wire App.tsx to read optional persisted visibility state from acquireVsCodeApi().getState(),
      apply it through the store after init/currentBoard data becomes available, sanitize it against
      live columns, and write it back with setState() when relevant visibility state changes.
      Keep the payload limited to board-scoped UI state only.
    wave: 2
    agent: gem-implementer
    priority: medium
    status: completed
    dependencies:
      - T1
    context_files:
      src/webview/App.tsx: Existing init message handling and acquireVsCodeApi singleton usage.
      src/webview/vsCodeApi.ts: API shape includes getState/setState.
      src/webview/standalone-shim.ts: Standalone sessionStorage-backed getState/setState implementation.
    estimated_effort: small
    estimated_files: 2
    estimated_lines: 60
    focus_area: Optional board-scoped persistence
    verification:
      - App test proves persisted visibility is hydrated and persisted using mocked VS Code API methods.
      - State remains board-scoped when switching currentBoard.
    acceptance_criteria:
      - No new extension/server/shared message types are introduced.
      - Persisted payload is sanitized before being written.
      - Fresh init payloads do not clobber unrelated board UI visibility state.
    failure_modes:
      - scenario: Persist happens before init and writes an empty payload over valid saved state.
        likelihood: medium
        impact: medium
        mitigation: Gate first write behind successful hydration/init or compare against sanitized current state before writing.
    tech_stack:
      - TypeScript
      - React
    test_coverage: src/webview/App.test.tsx

  - id: T3
    title: Keep minimized columns rendered and hidden columns reorder-safe in the board UI
    description: |
      Update KanbanBoard.tsx and KanbanColumn.tsx so hidden columns are filtered out of the visible
      board loop, minimized columns remain in that loop as narrow rails, and minimized rails keep the
      existing outer card drop handlers plus column drag handles. Add a Minimize action in the column
      menu and an Expand affordance on the minimized rail. Preserve existing reorder behavior by translating
      visible-column drag results back into a full ordered ID list before calling App's existing reorder callback.
    wave: 2
    agent: gem-implementer
    priority: high
    status: completed
    dependencies:
      - T1
    context_files:
      src/webview/components/KanbanBoard.tsx: Existing visible column map and column/card DnD handlers.
      src/webview/components/KanbanColumn.tsx: Existing column menu and draggable header.
      src/webview/App.tsx: Existing optimistic handleReorderColumns expects full ordered IDs.
    estimated_effort: medium
    estimated_files: 2
    estimated_lines: 180
    focus_area: Render-order preservation and DnD safety
    verification:
      - Minimized columns still accept card drops.
      - Reordering visible columns with hidden columns present still sends a full ordered ID list.
      - Deleted column behavior remains unchanged.
    acceptance_criteria:
      - Minimized columns stay rendered in board order as narrow rails showing only column name and card count.
      - Minimized rails remain valid card drop targets and column drag sources/targets.
      - Hidden columns are absent from the board surface but reappear at their canonical position when shown again.
      - Minimized columns can be restored without using the toolbar hide/show menu.
    failure_modes:
      - scenario: Minimized header/rail loses access to column actions, trapping the column in minimized state.
        likelihood: medium
        impact: high
        mitigation: Keep an explicit Expand affordance or a compact options control on the rail.
      - scenario: Visible-index drag math ignores hidden columns and produces partial reorder arrays.
