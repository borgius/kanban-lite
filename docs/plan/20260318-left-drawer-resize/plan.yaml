plan_id: 20260318-left-drawer-resize
objective: |
	Add draggable left-edge resizing for every drawer-mode panel rendered in the shared webview UI,
	while keeping scope limited to the existing right-side drawer experience and making board spacing
	respect the configured drawer width instead of a hardcoded 50vw path.
created_at: "2026-03-18"
created_by: gem-planner
status: pending_approval
research_confidence: high

tldr: |
	Implement a small shared drawer-resize interaction for the webview drawer shells, reuse the
	existing `cardSettings.drawerWidth` percentage model (20-80), update drawer-mode panels to show
	a draggable left-edge handle, and make KanbanBoard consume the active width so board content is
	never hidden behind a resized drawer. Keep persistence minimal by previewing width locally or in
	optimistic UI state during drag and committing `saveSettings` only once on pointer release.

open_questions: []

pre_mortem:
	overall_risk_level: medium
	critical_failure_modes:
		- scenario: Persisting `saveSettings` on every pointer move floods the extension/standalone message channel and causes noisy state churn.
			likelihood: high
			impact: high
			mitigation: |
				Use optimistic in-memory width updates for live dragging and defer the persisted `saveSettings`
				call until pointer release/cancel, with one final clamped width commit.
		- scenario: The resize handle steals pointer events from drawer content or makes popup-mode panels behave like drawers.
			likelihood: medium
			impact: high
			mitigation: |
				Render a dedicated narrow left-edge handle only when `panelMode === 'drawer'`, keep it outside
				the content flow, and leave centered popup markup and behavior unchanged.
		- scenario: Kanban board padding/scroll math continues to assume `50vw`, leaving selected cards partially obscured after a resize.
			likelihood: medium
			impact: high
			mitigation: |
				Route board overlap calculations through the same effective drawer width source used by the
				resize interaction and add focused regression coverage for non-default widths.
	assumptions:
		- Scope is limited to shared webview drawer-mode panels, not VS Code native sidebars or dropdown menus.
		- The existing `drawerWidth` percentage setting and its 20-80 clamp remain the canonical width model.
		- No SDK, API, CLI, MCP, or storage-schema changes are required for this UI-only enhancement.
		- Minimal edits are preferred over broader component refactors unless a tiny shared helper clearly reduces duplication.

implementation_specification:
	code_structure: |
		Keep the change inside `src/webview/` and reuse the current drawer shell markup wherever possible.
		Introduce at most a tiny shared resize helper/hook for pointer math and commit semantics; otherwise
		make surgical edits in the existing drawer render sites. Persist final width through the existing
		settings save path, not a new message type.
	affected_areas:
		- src/webview/App.tsx
		- src/webview/components/SettingsPanel.tsx
		- src/webview/components/CreateCardDialog.tsx
		- src/webview/components/KanbanBoard.tsx
		- src/webview/store/index.ts
		- src/webview/App.test.tsx
		- src/webview/components/KanbanBoard.test.tsx
	component_details:
		- component: shared drawer resize interaction
			responsibility: Convert left-edge pointer drag into a clamped drawer width percentage and separate live preview updates from persisted saves.
			interfaces:
				- "start resize from the left edge of a drawer shell"
				- "preview width updates constrained to 20-80 percent"
				- "commit final width once on pointer release/cancel"
		- component: drawer shell integrations
			responsibility: Apply the resize affordance to board logs, card editor, settings, and create-card drawers without changing popup-mode behavior.
			interfaces:
				- "drawer-mode panels render a left-edge resize handle"
				- "final width writes continue through existing `onSave`/`saveSettings` flows"
		- component: board layout width awareness
			responsibility: Replace hardcoded drawer overlap assumptions with calculations based on the active drawer width so selected cards and board padding remain visible.
			interfaces:
				- "KanbanBoard reads the effective drawer width for scroll-into-view logic"
				- "KanbanBoard computes drawer-mode padding from configured width instead of `50vw`"
		- component: focused regression coverage
			responsibility: Prove resize clamping, deferred persistence, and width-aware board layout behavior with targeted tests.
			interfaces:
				- "App-level tests for preview vs commit timing"
				- "KanbanBoard tests for non-default drawer overlap calculations"
	dependencies:
		- component: drawer shell integrations
			relationship: Depend on the shared resize interaction contract to avoid duplicating pointer math and commit behavior.
		- component: board layout width awareness
			relationship: Depends on the same effective width source used by drawer resizing.
		- component: regression coverage
			relationship: Depends on finalized resize handle behavior and width-aware layout calculations.
	integration_points:
		- Existing `cardSettings.drawerWidth` state and `setCardSettings` optimistic update path
		- Existing `saveSettings` message in `App.tsx`
		- Existing drawer-mode shell markup identified by `data-panel-drawer`
		- Existing `KanbanBoard` drawer overlap and selected-card scroll logic

contracts:
	- from_task: T1
		to_task: T2
		interface: Shared preview/commit resize contract with clamped width percentage output.
		format: "TypeScript helper or local utility API returning preview width updates and a release commit callback"
	- from_task: T1
		to_task: T3
		interface: Effective drawer width source used during an active drag and after commit.
		format: "number percentage in the existing 20-80 width range"
	- from_task: T2
		to_task: T4
		interface: Drawer shells expose a handle only in drawer mode and persist the final width once per resize interaction.
		format: "React UI behavior verified through focused tests"
	- from_task: T3
		to_task: T4
		interface: Board padding and selected-card visibility calculations honor the active drawer width.
		format: "React layout behavior verified through focused tests"

tasks:
	- id: T1
		title: Define a minimal shared drawer resize interaction for the webview
		description: |
			Add a small webview-local resize contract that turns left-edge drag gestures into clamped
			width percentages using the existing `drawerWidth` model. The interaction must support live
			preview updates without persisting on every pointer move, clean up listeners reliably, and
			remain scoped to drawer-mode panels only.
		wave: 1
		agent: gem-implementer
		priority: high
		status: completed
		dependencies: []
		context_files:
			src/webview/App.tsx: Existing optimistic settings updates and `saveSettings` message flow.
			src/webview/store/index.ts: Existing `cardSettings.drawerWidth` state and setters.
		estimated_effort: small
		estimated_files: 3
		estimated_lines: 120
		focus_area: Shared pointer math and persistence boundaries
		verification:
			- Drag calculations clamp widths to the existing 20-80 percent range.
			- Pointer listeners or capture are cleaned up on release and unmount.
			- No persistence message is required during pointermove.
		acceptance_criteria:
			- A single shared interaction contract exists for drawer resizing.
			- Live resize preview can update UI immediately without changing persisted settings on every move.
			- Popup-mode panels are not affected by the new interaction.
		failure_modes:
			- scenario: Window-level listeners remain attached after a cancelled drag and keep mutating width.
				likelihood: medium
				impact: high
				mitigation: Centralize registration/cleanup in one helper path and cover cancel/release behavior in tests.
		tech_stack:
			- TypeScript
			- React
		test_coverage: App.test.tsx and/or a small helper-focused test

