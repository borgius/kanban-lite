      Update `package.json` and `pnpm-lock.yaml` to add `fuse.js` as the only new dependency for this feature.
      This task is intentionally isolated so the dependency decision is explicit and reviewable. The plan does
      not choose MiniSearch, SQLite FTS5, or semantic/vector search for the initial rollout because the feature
      must work identically in markdown and SQLite storage modes and inside the webview's already-hydrated card set.
    wave: 1
    agent: gem-implementer
    priority: medium
    status: pending
    dependencies: []
    context_files:
      package.json: "Dependencies list; no fuzzy-search library is currently installed."
      pnpm-lock.yaml: "Lockfile must be updated atomically with package.json."
    estimated_effort: small
    estimated_files: 2
    estimated_lines: 6
    focus_area: Runtime dependency selection
    verification:
      - Dependency list contains exactly one new fuzzy-search library entry (`fuse.js`) and no unrelated package churn.
      - Build tooling still resolves after install/lockfile refresh.
    acceptance_criteria:
      - `fuse.js` is added and locked.
      - No other dependency or script changes are introduced in this step.
    failure_modes:
      - scenario: The added dependency causes bundling or typing issues in either Node or Vite builds.
        likelihood: low
        impact: medium
        mitigation: Keep the addition isolated so it can be reverted cleanly before any interface-layer work begins.
    tech_stack:
