plan_id: 20260318-metadata-fuzzy-search
objective: |
  Add metadata-driven filtering affordances to the card UI and introduce an optional fuzzy-search mode
  that works across normal text search and metadata fields. Implement the search semantics for parity
  across SDK, REST API, CLI, MCP, and the webview, while keeping the solution storage-agnostic for
  both markdown and SQLite workspaces.
created_at: "2026-03-18"
created_by: gem-planner
status: pending_approval
research_confidence: high

tldr: |
  This plan explicitly chooses parity over a webview-only shortcut: fuzzy search will be implemented
  in shared SDK business logic first, then exposed through REST API, CLI, and MCP before the webview
  toggle and metadata filter icons are wired up. The recommended implementation is a single small
  cross-storage JavaScript fuzzy-search dependency (`fuse.js`), not SQLite FTS5 and not semantic/vector
  search; SQLite FTS5 can be a later accelerator, but it cannot be the primary solution because markdown
  mode must behave the same way. The fuzzy toggle will be treated as transient filter state (saved views
  + standalone URL sync), not as a persisted workspace setting in `.kanban.json`, while README,
  CHANGELOG, and generated SDK/API docs are updated as part of the rollout. No `docs/prd.yaml` exists
  today, so there is no PRD conflict to resolve before planning.

open_questions: []

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: Webview search semantics diverge from SDK/API/CLI/MCP semantics, causing exact and fuzzy modes to return different cards for the same query.
      likelihood: medium
      impact: high
      mitigation: |
        Centralize token parsing and search matching in SDK-owned pure helpers and have the webview consume
        the same helper instead of maintaining a second implementation in the Zustand store.
    - scenario: Fuzzy matching becomes too permissive for metadata tokens (for example `meta.team: be` matching unrelated values), making the filter icon feel unreliable.
      likelihood: medium
      impact: medium
      mitigation: |
        Keep field-scoped metadata queries as field-constrained matches even in fuzzy mode, document the
        behavior clearly, and add regression tests for exact mode, fuzzy mode, and mixed text + metadata queries.
    - scenario: Adding a new dependency increases bundle or build complexity without enough user value.
      likelihood: low
      impact: medium
      mitigation: |
        Limit the change to one dependency (`fuse.js`), use it only in pure search helpers, and avoid any
        storage/index migration. If the dependency proves problematic during implementation, fall back before
        touching interface layers.
    - scenario: Filter state persistence leaks into workspace config and creates noisy `.kanban.json` churn for a purely UI-level toggle.
      likelihood: low
      impact: medium
      mitigation: |
        Keep the fuzzy flag in webview filter state, saved views, and standalone URL params only; do not add
        it to `CardDisplaySettings` or `.kanban.json` unless a later requirement explicitly demands persistence.
  assumptions:
    - `src/webview/store/index.ts` is currently the only place implementing toolbar search semantics in the UI, so replacing its local matcher is sufficient for webview parity.
    - `src/sdk/metaUtils.ts` and `src/sdk/modules/cards.ts` are the correct SDK-first home for metadata-aware matching logic.
    - The existing `list_cards` MCP tool and `kl list` CLI command are the right parity surfaces for new search parameters; no separate search-only endpoint/tool is needed.
    - README and CHANGELOG must be updated for this user-facing feature, and generated docs will be refreshed via `npm run docs` rather than hand-editing `docs/api.md` or `docs/sdk.md`.
    - There is no `docs/prd.yaml` in the repo at planning time.

implementation_specification:
  code_structure: |
    Keep the rollout surgical and ordered by AGENTS.md: introduce the fuzzy-search dependency and SDK-owned
    search helpers first, then expose the same behavior through REST API, CLI, and MCP, and only then replace
    the webview's local search logic and add the metadata filter affordances in the UI. Reuse the existing
    `searchQuery` / `meta.field: value` model instead of inventing a second filter system, and prefer adding
    a small shared helper path over scattering duplicate fuzzy logic across layers.
  affected_areas:
    - package.json and pnpm-lock.yaml (single dependency addition if approved)
    - src/sdk/metaUtils.ts
    - src/sdk/modules/cards.ts
    - src/sdk/modules/context.ts
    - src/sdk/KanbanSDK.ts
    - src/standalone/server.ts
    - src/standalone/__tests__/server.integration.test.ts
    - scripts/generate-api-docs.ts
    - src/cli/index.ts
    - src/mcp-server/index.ts
    - src/webview/store/index.ts
    - src/webview/router.tsx
    - src/webview/components/Toolbar.tsx
    - src/webview/components/CardItem.tsx
    - src/webview/components/CardEditor.tsx
    - src/sdk/__tests__/metaUtils.test.ts
    - src/sdk/__tests__/metadata.test.ts
    - README.md
    - CHANGELOG.md
  component_details:
    - component: SDK fuzzy-search core
      responsibility: Own exact/fuzzy token parsing and matching for plain text and metadata in a storage-agnostic way.
      interfaces:
        - "Shared pure helper(s) for: free-text query parsing, metadata token extraction, exact matching, fuzzy matching, and searchable-card text assembly"
        - "listCards(..., options?) or equivalent SDK contract extended to accept search query + fuzzy flag without breaking existing callers"
    - component: REST list endpoints
      responsibility: Accept query/fuzzy parameters and pass them into SDK search without changing endpoint shape.
      interfaces:
        - "GET /api/tasks?q=<text>&fuzzy=true&meta.field=value"
        - "GET /api/boards/:boardId/tasks?q=<text>&fuzzy=true&meta.field=value"
    - component: CLI list command
      responsibility: Expose exact/fuzzy search on the same list surface that already supports metadata filters.
      interfaces:
        - "kl list --search <text> [--fuzzy] [--meta key=value ...]"
    - component: MCP list_cards tool
      responsibility: Add fuzzy-search inputs to the existing card-listing tool for agent parity.
      interfaces:
        - "list_cards({ searchQuery?: string, fuzzy?: boolean, metaFilter?: Record<string, string>, ... })"
    - component: Webview filter state
      responsibility: Hold the fuzzy toggle alongside searchQuery, saved views, and standalone URL params without persisting to workspace settings.
      interfaces:
        - "searchQuery: string"
        - "fuzzySearch: boolean"
        - "setFuzzySearch(enabled: boolean)"
        - "applyMetadataFilterToken(path: string, value: string): void"
    - component: Card metadata filter affordance
      responsibility: Add a filter icon to rendered metadata fields so users can inject the correct `meta.field: value` token without manual typing.
      interfaces:
        - "Per-field icon/button on displayed metadata rows or chips"
        - "Click action appends or replaces the appropriate metadata token in the shared search state"
  dependencies:
    - component: SDK fuzzy-search core
      relationship: Blocks every interface layer because parity is an explicit requirement and AGENTS.md requires SDK-first business logic.
    - component: REST API / CLI / MCP parity layers
      relationship: Depend on the finalized SDK search contract and descriptions before their public flags/schemas can be updated.
    - component: Webview search state
      relationship: Depends on the SDK helper contract to avoid keeping a second matcher implementation in the store.
    - component: Metadata filter icon UI
      relationship: Depends on webview search state exposing a reliable helper for token insertion/toggle behavior.
    - component: Docs and tests
      relationship: Depend on all public contracts being stable so examples, help text, and regression cases describe the final UX.
  integration_points:
    - `src/sdk/modules/cards.ts` remains the storage-agnostic search execution point for both markdown and SQLite cards.
    - `src/standalone/server.ts` continues to parse `meta.*` query params, now also forwarding `q` and `fuzzy`.
    - `src/cli/index.ts` continues to use `sdk.listCards(...)` as the source of truth rather than re-implementing fuzzy matching locally.
    - `src/mcp-server/index.ts` extends the existing `list_cards` schema instead of creating a second search tool.
    - `src/webview/store/index.ts` stops owning bespoke search semantics and delegates matching to the SDK-owned helper.
    - Generated docs continue to be produced by `npm run docs` from JSDoc and `scripts/generate-api-docs.ts` metadata.

