      - Fuse.js
    test_coverage: null

  - id: T2
    title: Implement SDK-owned exact and fuzzy search helpers
    description: |
      Extend the SDK internals so search semantics live in one place. In `src/sdk/metaUtils.ts`, add pure helpers for:
      tokenizing `meta.field: value` fragments from a search string, extracting searchable card text (including metadata
      values), exact substring matching, and Fuse-powered fuzzy matching that still respects field-scoped metadata tokens.
      In `src/sdk/modules/cards.ts`, wire those helpers into the card listing path so the search remains storage-agnostic.
      In `src/sdk/modules/context.ts`, update the SDKContext signature as needed so downstream module callers share the same contract.
      Exact mode must preserve current behavior by default; fuzzy mode is opt-in and must include metadata values.
    wave: 2
    agent: gem-implementer
    priority: high
    status: pending
    dependencies:
      - T1
    context_files:
      src/sdk/metaUtils.ts: "Current metadata-only helpers (`getNestedValue`, `matchesMetaFilter`) and the best home for shared search primitives."
      src/sdk/modules/cards.ts: "Current listCards implementation that applies metadata filtering before sort."
      src/sdk/modules/context.ts: "SDKContext interface currently mirrors the old listCards signature."
    estimated_effort: medium
    estimated_files: 3
    estimated_lines: 160
    focus_area: Shared search semantics
    verification:
      - Exact mode still matches current substring behavior for existing metadata filters.
      - Fuzzy mode can match text and metadata without requiring storage-engine-specific code paths.
      - `src/sdk/modules/context.ts` and `src/sdk/modules/cards.ts` compile against the same method signature.
    acceptance_criteria:
      - Search parsing/matching exists as reusable pure helpers owned by the SDK layer.
      - Metadata tokens remain AND-based and field-scoped.
      - Fuzzy mode applies to metadata values as well as free text.
      - Markdown and SQLite paths continue to use the same code path.
    failure_modes:
      - scenario: Helper logic duplicates or conflicts with the existing webview token parser, leaving two sources of truth.
        likelihood: medium
        impact: high
        mitigation: Replace the webview's local matcher in a later task rather than preserving both implementations.
      - scenario: Fuzzy search changes default exact matching behavior for existing callers.
        likelihood: low
        impact: high
        mitigation: Keep fuzzy matching behind an explicit boolean flag and add regression coverage for the default path.
    tech_stack:
