open_questions:
  - question: Should metadata fields shown on card tiles be driven by existing board-level `metadata` keys, or by a new card-display setting?
    context: The editor already consumes `BoardInfo.metadata`, but `CardItem` does not; the desired source of truth for on-card metadata display was not specified in code.
  - question: Should the proposed `Fuzzy` checkbox change only webview search semantics, or must it also affect SDK/REST/CLI/MCP metadata filtering for parity?
    context: `AGENTS.md` requires SDK-first changes when business logic changes, but current fuzzy behavior does not exist anywhere.
  - question: Should the fuzzy toggle persist across refresh/navigation/saved views/settings?
    context: Search state currently spans store, URL sync, and saved views; scope changes materially depending on whether the flag is ephemeral or persisted.
  - question: How should “highlighted or regular” metadata fields be distinguished on cards?
    context: No existing card-tile implementation differentiates metadata display states; only the editor has pinned-vs-advanced metadata.

gaps:
  - area: Webview test coverage
    description: No dedicated webview tests were found for `Toolbar` search behavior, `CardItem` metadata rendering, or a checkbox control near search.
    impact: UI changes will likely require adding new tests from scratch or relying on manual verification.
  - area: Server/API test coverage for metadata query params
    description: No standalone integration tests were found covering `meta.*` query param handling for `/api/boards/:boardId/tasks`.
    impact: If fuzzy matching/parity expands beyond the webview, server regression coverage appears thin.
  - area: Board metadata editing flow
    description: This pass confirmed board metadata persistence and consumption, but did not locate a dedicated existing UI for editing board metadata arrays.
    impact: If showing metadata on cards also requires changing how board metadata keys are configured, additional discovery will be needed.

