related_conventions:
  naming_patterns_in_domain: >-
    UI state uses `searchQuery`, `setSearchQuery`, `*Filter`, `set*Filter`, and `SavedView`.
    Metadata path filters use the `meta.<path>: value` token format in the toolbar/store and
    `meta.*` query parameters in the standalone API.
  structure_of_domain: >-
    Toolbar and card rendering remain in `src/webview/components`; shared filter logic is kept
    in the Zustand store rather than colocated in components. Persistent cross-layer config types
    live under `src/shared/`, and SDK filtering logic lives under `src/sdk/`.
  error_handling_in_domain: >-
    UI filtering is fail-closed for metadata lookups (`!f.metadata => false`). SDK/server layers
    similarly omit cards when metadata paths do not resolve.
  testing_in_domain: >-
    Automated coverage exists for SDK metadata filter helpers and `sdk.listCards` metadata filtering.
    No direct webview tests were found for toolbar search or card metadata rendering.
  documentation_in_domain: >-
    Public SDK documentation for metadata filtering is driven by JSDoc on `KanbanSDK.listCards`.
    Board metadata persistence is documented in shared config/types comments.

