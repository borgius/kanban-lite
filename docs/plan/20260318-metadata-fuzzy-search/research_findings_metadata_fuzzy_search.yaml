plan_id: 20260318-metadata-fuzzy-search
objective: >-
  Identify all files, symbols, state stores, and tests relevant to showing metadata
  fields in cards and adding a filter icon/action for each displayed metadata
  field (highlighted or regular). Also identify where top toolbar search UI lives,
  how search currently works, and which files would likely need changes for
  adding a Fuzzy checkbox next to search.
focus_area: webview-card-metadata-and-search
created_at: 2026-03-18
created_by: GitHub Copilot (GPT-5.4)
status: completed

tldr: |
  - `src/webview/components/Toolbar.tsx` owns the top toolbar search input; search state lives in the Zustand store at `src/webview/store/index.ts` and is mirrored into standalone URLs by `src/webview/router.tsx`.
  - Card metadata is currently only surfaced on cards as a count badge in `src/webview/components/CardItem.tsx`; board-pinned metadata keys already exist and are rendered in the card detail panel by `src/webview/components/CardEditor.tsx` from `BoardInfo.metadata` / `BoardConfig.metadata`.
  - Existing metadata filtering already exists in two places: UI-only parsing/filtering in `src/webview/store/index.ts` (`parseMetaTokens`, `getFilteredCardsByStatus`) and SDK-level substring matching in `src/sdk/metaUtils.ts` + `src/sdk/modules/cards.ts`.
  - If “Fuzzy” is only a toolbar/UI concern, the minimal scope is webview store + toolbar + router/saved-view persistence; if fuzzy matching must affect API/CLI/MCP parity, the SDK/filter helpers and interface layers become in-scope per `AGENTS.md`.
  - Test coverage exists for SDK metadata filtering (`src/sdk/__tests__/metadata.test.ts`, `src/sdk/__tests__/metaUtils.test.ts`), but no direct webview tests were found for toolbar search or card metadata rendering.

