  | `src/webview/components/LogsSection.tsx` | Compact checkbox row pattern (`CheckboxItem`) usable for a `Fuzzy` toggle |
  | `src/webview/store/index.ts` | `parseMetaTokens` + `getFilteredCardsByStatus` search semantics |
  | `src/sdk/metaUtils.ts` | Canonical nested metadata lookup + case-insensitive substring matching |

  ### Risks
  - If fuzzy is treated as business logic rather than UI sugar, `AGENTS.md` pushes the change into SDK -> API -> CLI -> MCP order, expanding scope.
  - Search state already fans out into store, saved views, and standalone URL sync; a new fuzzy flag can become inconsistent if only one of those layers changes.
  - Metadata matching logic currently exists in both the webview store and SDK helper paths; changing only one may create UI/API behavior drift.
  - `CardItem` currently has no per-metadata rendering abstraction, so adding per-field actions may grow local complexity unless it reuses an existing metadata display helper.
