    Hybrid retrieval using semantic_search for conceptual discovery, grep_search for
    exact symbol/pattern lookup, and targeted read_file passes for the minimum
    relevant sections. Relationships traced from UI components -> Zustand store ->
    router URL sync -> shared config/types -> SDK metadata filtering.
  scope: >-
    Focused only on card metadata display, toolbar search/filter state, board metadata
    definitions, and existing metadata filter logic/tests. No full-repo scan.
  confidence: high
  coverage: 86

