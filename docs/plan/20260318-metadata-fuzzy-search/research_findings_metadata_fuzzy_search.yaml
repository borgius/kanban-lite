patterns_found:
  - category: structure
    pattern: Toolbar search is store-driven, not locally owned
    description: Search input writes directly into a shared Zustand field, and all visible card filtering derives from store selectors.
    examples:
      - file: src/webview/components/Toolbar.tsx
        location: "44-45, 320-323"
        snippet: "const searchQuery = useStore(s => s.searchQuery); const setSearchQuery = useStore(s => s.setSearchQuery); <input value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />"
      - file: src/webview/store/index.ts
        location: "222, 250-347"
        snippet: "setSearchQuery: (query) => set({ searchQuery: query }); getFilteredCardsByStatus(...)"
    prevalence: common

  - category: architecture
    pattern: Metadata search is duplicated in UI and SDK layers
    description: The webview store parses `meta.*` tokens itself, while SDK filtering uses `matchesMetaFilter`; semantics are currently similar substring matching but implemented separately.
    examples:
      - file: src/webview/store/index.ts
        location: "138-144, 315-333"
        snippet: "parseMetaTokens(...); Object.entries(metaFilter).every(([path, needle]) => ... String(val).toLowerCase().includes(...) )"
      - file: src/sdk/metaUtils.ts
        location: "41-52"
        snippet: "matchesMetaFilter(metadata, filter)"
    prevalence: occasional

  - category: structure
    pattern: Board metadata keys already drive focused metadata rendering
    description: Board-configured metadata keys are already surfaced in the card editor before the advanced section.
    examples:
      - file: src/shared/types.ts
        location: "121-122"
        snippet: "metadata?: string[]"
      - file: src/webview/components/CardEditor.tsx
        location: "725, 1018-1035"
        snippet: "const pinnedMetadataKeys = boards.find(b => b.id === currentBoard)?.metadata ?? []; pinnedMetadataKeys.map(key => ...)"
    prevalence: occasional

  - category: naming
    pattern: Persisted UI filter state is grouped into SavedView and URL query params
    description: Filter-related state is saved/restored together, so a new fuzzy flag likely belongs wherever searchQuery persistence currently lives.
    examples:
      - file: src/webview/store/index.ts
        location: "9-16, 193-204"
        snippet: "interface SavedView { ... searchQuery: string ... }"
      - file: src/webview/router.tsx
        location: "42-58, 114-139, 160-201"
        snippet: "RouteSearch.q; setSearchQuery(decodeURIComponent(search.q)); if (searchQuery) searchObj.q = searchQuery"
    prevalence: common

  - category: structure
    pattern: Compact checkbox/toggle UI is implemented as a button row
    description: Existing checkbox pattern in LogsSection can be reused for a small 'Fuzzy' control beside search.
    examples:
      - file: src/webview/components/LogsSection.tsx
        location: "166-192"
        snippet: "function CheckboxItem({ label, checked, onChange }) { ... }"
    prevalence: rare

