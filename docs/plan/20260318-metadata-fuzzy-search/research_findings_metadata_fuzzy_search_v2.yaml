patterns_found:
  - category: architecture
    pattern: Webview search is store-driven and local after initial hydration
    description: Search input updates only Zustand state and URL params; the actual card filtering happens in `getFilteredCardsByStatus()` against already-hydrated cards.
    examples:
      - file: /Users/admin/dev/kanban-light/src/webview/components/Toolbar.tsx
        location: src/webview/components/Toolbar.tsx:320
        snippet: "<input value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} ... />"
      - file: /Users/admin/dev/kanban-light/src/webview/router.tsx
        location: src/webview/router.tsx:138
        snippet: "if (search.q) { setSearchQuery(decodeURIComponent(search.q)) }"
      - file: /Users/admin/dev/kanban-light/src/webview/store/index.ts
        location: src/webview/store/index.ts:315
        snippet: "const { metaFilter, plainText } = parseMetaTokens(searchQuery)"
      - file: /Users/admin/dev/kanban-light/src/standalone/server.ts
        location: src/standalone/server.ts:187
        snippet: "return { type: 'init', cards, columns: sdk.listColumns(currentBoardId), settings, ... }"
    prevalence: common

  - category: search_behavior
    pattern: Metadata search uses case-insensitive substring matching with dot-notation paths and AND semantics
    description: Both the SDK helper and the webview store treat metadata filters as substring checks on stringified values; multiple fields must all match.
    examples:
      - file: /Users/admin/dev/kanban-light/src/sdk/metaUtils.ts
        location: src/sdk/metaUtils.ts:41
        snippet: "if (!String(value).toLowerCase().includes(needle.toLowerCase())) return false"
      - file: /Users/admin/dev/kanban-light/src/webview/store/index.ts
        location: src/webview/store/index.ts:319
        snippet: "Object.entries(metaFilter).every(([path, needle]) => { ... String(val).toLowerCase().includes(needle.toLowerCase()) })"
      - file: /Users/admin/dev/kanban-light/src/sdk/__tests__/metadata.test.ts
        location: src/sdk/__tests__/metadata.test.ts:361
        snippet: "const result = await sdk.listCards(undefined, undefined, { sprint: 'Q1', team: 'backend' })"
    prevalence: common

  - category: structure
    pattern: Interface layers reuse SDK metadata filtering but keep non-metadata filtering in the interface layer
    description: Server, CLI, and MCP pass `metaFilter` into `sdk.listCards()` first, then apply status/priority/assignee/label filters outside the SDK.
    examples:
      - file: /Users/admin/dev/kanban-light/src/standalone/server.ts
        location: src/standalone/server.ts:1029
        snippet: "const boardTasks = await sdk.listCards(..., Object.keys(metaFilter).length > 0 ? metaFilter : undefined, sortParam || undefined)"
      - file: /Users/admin/dev/kanban-light/src/cli/index.ts
        location: src/cli/index.ts:193
        snippet: "let cards = await sdk.listCards(undefined, boardId, metaFilter, sortOpt)"
      - file: /Users/admin/dev/kanban-light/src/mcp-server/index.ts
        location: src/mcp-server/index.ts:134
        snippet: "let cards = await sdk.listCards(undefined, boardId, metaFilter && Object.keys(metaFilter).length > 0 ? metaFilter : undefined, sort || undefined)"
    prevalence: common

  - category: settings_persistence
    pattern: Global UI settings persist through CardDisplaySettings mapped into .kanban.json
    description: Existing persisted settings are centralized in `CardDisplaySettings` and serialized explicitly via shared config conversion helpers, then exposed through webview messages, REST settings endpoints, and CLI settings commands.
    examples:
      - file: /Users/admin/dev/kanban-light/src/shared/types.ts
        location: src/shared/types.ts:251
        snippet: "export interface CardDisplaySettings { ... logsFilter?: { ... } }"
      - file: /Users/admin/dev/kanban-light/src/shared/config.ts
        location: src/shared/config.ts:426
        snippet: "export function configToSettings(config: KanbanConfig): CardDisplaySettings { ... }"
      - file: /Users/admin/dev/kanban-light/src/shared/config.ts
        location: src/shared/config.ts:460
        snippet: "export function settingsToConfig(config: KanbanConfig, settings: CardDisplaySettings): KanbanConfig { ... }"
      - file: /Users/admin/dev/kanban-light/src/webview/App.tsx
        location: src/webview/App.tsx:816
        snippet: "const next = { ...cardSettings, logsFilter: filter }; vscode.postMessage({ type: 'saveSettings', settings: next })"
    prevalence: common

  - category: naming
    pattern: Metadata query naming differs by interface
    description: Webview uses inline `meta.field: value` syntax embedded in `searchQuery`, while CLI/MCP/REST expose structured `metaFilter`/`meta.*` inputs.
    examples:
      - file: /Users/admin/dev/kanban-light/src/webview/components/Toolbar.tsx
        location: src/webview/components/Toolbar.tsx:323
        snippet: "title=\"Search cards by text. Advanced metadata search also works with meta.field: value\""
      - file: /Users/admin/dev/kanban-light/src/cli/index.ts
        location: src/cli/index.ts:1507
        snippet: "--meta key=value"
      - file: /Users/admin/dev/kanban-light/src/standalone/server.ts
        location: src/standalone/server.ts:1026
        snippet: "if (param.startsWith('meta.')) metaFilter[param.slice(5)] = value"
      - file: /Users/admin/dev/kanban-light/src/mcp-server/index.ts
        location: src/mcp-server/index.ts:130
        snippet: "metaFilter: z.record(z.string(), z.string()).optional()"
    prevalence: common

