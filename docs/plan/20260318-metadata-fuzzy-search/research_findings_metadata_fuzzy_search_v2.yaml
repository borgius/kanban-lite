related_conventions:
  naming_patterns_in_domain: Webview uses `searchQuery`/`q` for the free-text search string, SDK-backed interfaces use `metaFilter` or `meta.*`, and settings persistence flows through `CardDisplaySettings`/`saveSettings` naming.
  structure_of_domain: Search behavior is split by interface: webview/store owns local free-text filtering, while SDK helper modules own structured metadata filtering used by REST/CLI/MCP.
  error_handling_in_domain: CLI validates malformed `--meta` values and exits; server wraps route handlers in `try/catch` and returns HTTP 400/404 JSON errors; MCP returns `{ isError: true }` responses for failures.
  testing_in_domain: Tests are concentrated in SDK unit/integration suites for metadata filter semantics; no dedicated webview search tests were identified in the inspected scope.
  documentation_in_domain: CLI help text documents `--meta`; MCP schema descriptions document metadata substring behavior; webview search tooltip documents `meta.field: value` syntax inline.

