plan_id: 20260318-metadata-fuzzy-search
objective: inspect current search implementation across webview/store/sdk/server/cli/mcp and determine how metadata fields are searched today, whether search is client-side or SDK-backed, and what config/settings mechanisms already exist that could hold a fuzzy-search toggle or parameters
focus_area: metadata_fuzzy_search
created_at: 2026-03-18T00:00:00Z
created_by: GitHub Copilot (GPT-5.4)
status: completed

tldr: |
  - Webview card search is client-side after initial hydration: `Toolbar` updates `searchQuery`, `router` syncs it into `?q=`, and `useStore.getFilteredCardsByStatus()` applies both plain-text and `meta.field: value` filtering locally.
  - SDK/API/CLI/MCP metadata search is exact in shape but substring-based in matching: `sdk.listCards(..., metaFilter)` delegates to `matchesMetaFilter()`, which performs case-insensitive `String(value).includes(needle)` checks with dot-notation traversal and AND semantics.
  - No fuzzy-search implementation or search-specific config object exists today; the only existing persisted global settings path is `CardDisplaySettings` ↔ `KanbanConfig` via `configToSettings()` / `settingsToConfig()` and `/api/settings` / `saveSettings`.
  - `BoardConfig.metadata` / `BoardInfo.metadata` already provide a board-scoped metadata-related config slot, but they are currently used for metadata field display ordering/visibility in card detail, not search behavior.
  - Strong SDK-level tests exist for metadata filtering (`src/sdk/__tests__/metadata.test.ts`, `src/sdk/__tests__/metaUtils.test.ts`); no dedicated webview search tests were found in the inspected scope.

research_metadata:
  methodology: hybrid retrieval using semantic_search, grep_search, targeted read_file passes, and sandboxed line-count collection; relationship tracing followed search state from webview UI to Zustand store, SDK filter helpers, server routes, CLI commands, MCP tools, and settings serialization
  scope: focused on `src/webview`, `src/sdk`, `src/standalone`, `src/cli`, `src/mcp-server`, and shared config/types relevant to search and settings persistence
  confidence: high
  coverage: 92

