open_questions:
  - question: Should future fuzzy behavior apply only to the standalone/webview free-text query, or also to SDK-backed `metaFilter` consumers (REST/CLI/MCP)?
    context: The current architecture intentionally splits local free-text search from structured SDK metadata filtering, so there is no single existing hook that spans both behaviors.
  - question: Should a future search setting be global workspace state or board-scoped state?
    context: Both a global settings pipeline (`CardDisplaySettings`/`KanbanConfig`) and a board-scoped metadata-related schema (`BoardConfig.metadata`) exist, but they serve different purposes today.
  - question: Should metadata fuzzy behavior affect only metadata matching, or also the plain-text fields searched in the webview (`content`, `id`, `assignee`, `labels`)?
    context: `getFilteredCardsByStatus()` currently mixes metadata token handling and plain-text matching in one function, while SDK-backed interfaces only understand metadata filters.

gaps:
  - area: webview automated coverage
    description: No dedicated tests for `parseMetaTokens()` / `getFilteredCardsByStatus()` were identified in the inspected scope.
    impact: Client-side search behavior changes in the standalone/webview path would have less direct regression protection than SDK metadata matching changes.
  - area: extension-host parity outside inspected scope
    description: The extension host message handling was not traced in detail because the objective focused on webview/store/sdk/server/cli/mcp.
    impact: Low for the stated objective; the shared `saveSettings` / `showSettings` message shapes indicate the same settings contract is reused.
