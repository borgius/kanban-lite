    context_files:
      - src/mcp-server/index.ts: "Existing create/update/trigger tool schemas and SDK delegation patterns."
      - src/sdk/KanbanSDK.ts: "Public form-aware SDK methods exposed to MCP."
    estimated_effort: medium
