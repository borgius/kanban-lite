tasks:
  - id: T1
    title: Add the minimal JSON Forms dependency set for the webview
    description: |
      Add only the package set needed to render JSON Forms with React renderers/cells and AJV-backed
      validation in the webview build. Keep this isolated so the dependency decision is explicit,
      reviewable, and limited to the feature's stated requirement.
    wave: 1
    agent: gem-implementer
    priority: medium
    status: completed
    dependencies: []
    context_files:
      - package.json: "Current runtime dependency inventory; JSON Forms packages are not present."
      - pnpm-lock.yaml: "Lockfile must be updated atomically with package.json."
    estimated_effort: small
    estimated_files: 2
    estimated_lines: 12
    focus_area: JSON Forms runtime enablement
    verification:
      - Webview build resolves JSON Forms imports without adding unrelated dependencies.
      - Lockfile change is limited to the approved JSON Forms/AJV package family.
    acceptance_criteria:
      - `package.json` contains the minimal JSON Forms dependency set required by the chosen renderer approach.
      - Dependency additions do not change non-form feature behavior or build scripts.
    failure_modes:
      - scenario: Too many renderer/helper packages are added, increasing bundle surface and review risk.
        likelihood: medium
        impact: medium
        mitigation: Keep the addition limited to JSON Forms React + renderer/cell support and AJV only if required.
    tech_stack:
      - TypeScript
      - React 18
      - JSON Forms
      - AJV
    test_coverage: "Build-time verification via the existing webview bundle and follow-up UI integration tests."

  - id: T2
    title: Establish shared form definitions, card attachments, and form-data contracts
    description: |
      Define the canonical forms model in shared and SDK-adjacent types: reusable config forms,
      card-local form attachments, normalized resolved form descriptors, a dedicated per-card form-data
      map, and the `form.submit` event/input contract. This task also locks the documented merge order
      for initial values as `config default data -> card form data -> card metadata`.
    wave: 1
    agent: gem-implementer
    priority: high
    status: completed
    dependencies: []
    context_files:
      - src/shared/config.ts: "Workspace config root where reusable named forms should live."
      - src/shared/types.ts: "Card, board, frontmatter, and transport-facing shared types."
      - src/sdk/types.ts: "SDK event and input contracts that must gain `form.submit`."
    estimated_effort: medium
    estimated_files: 3
    estimated_lines: 180
    focus_area: SDK-first contract design
    verification:
      - Shared types compile without widening unrelated public APIs.
      - Merge precedence and event contract are documented in code comments/JSDoc where applicable.
    acceptance_criteria:
      - Reusable forms can be declared in workspace config under a typed `forms` map.
      - Cards have a typed way to reference inline and/or named forms plus persisted per-form data.
      - `form.submit` exists as a first-class SDK event/input contract.
    failure_modes:
      - scenario: Card form data is modeled as a flat object, causing collisions when multiple forms share field names.
        likelihood: medium
        impact: high
        mitigation: Use a form-keyed storage map in the contract so each tab has isolated persisted data.
      - scenario: Shared types only model config-defined forms and forget card-local forms, making the feature half-implemented before persistence begins.
        likelihood: medium
        impact: high
        mitigation: Define a single normalized descriptor that can represent both config-backed and inline card forms from the start.
    tech_stack:
      - TypeScript
      - SDK shared contracts
    test_coverage: "Compile-time coverage plus downstream SDK/storage tests for merge order and event typing."

  - id: T3
    title: Persist form attachments and per-card form data in markdown and SQLite
    description: |
      Extend the SDK persistence layer so card form attachments and per-card form data round-trip in both
      markdown and SQLite storage modes. Expose reusable form declarations through existing board/card info
      resolution paths so later interface layers read the same normalized state.
    wave: 2
    agent: gem-implementer
    priority: high
    status: completed
    dependencies:
      - T2
    context_files:
      - src/sdk/parser.ts: "Markdown frontmatter parse/serialize path for new card fields."
      - src/sdk/storage/sqlite.ts: "SQLite schema, write path, and row-to-card mapping."
      - src/sdk/modules/boards.ts: "Board info exposure path for config-backed forms."
    estimated_effort: medium
    estimated_files: 3
    estimated_lines: 220
    focus_area: Cross-storage persistence parity
    verification:
      - Markdown cards round-trip attached forms and form data without losing existing metadata/actions fields.
      - SQLite rows round-trip the same fields without schema drift at read/write time.
      - Board/card listing surfaces can resolve available forms from config and card state.
    acceptance_criteria:
      - Attached forms and form data persist identically in markdown and SQLite modes.
      - Existing cards without forms remain backward compatible.
      - Resolved board/card info exposes enough data for later submit/UI steps.
    failure_modes:
      - scenario: SQLite migration adds fields but markdown serialization does not, causing storage-mode divergence.
        likelihood: medium
        impact: critical
        mitigation: Implement and test both adapters in the same task before any higher-level integration.
      - scenario: Board exposure paths surface raw config and raw card forms separately, forcing later layers to duplicate normalization logic.
        likelihood: medium
        impact: medium
        mitigation: Normalize to a single runtime descriptor list in SDK-owned helpers before interface work starts.
    tech_stack:
      - TypeScript
      - Markdown frontmatter parser
      - better-sqlite3
    test_coverage: "Regression tests in SDK/storage suites will cover round-trip parity and backward compatibility."

  - id: T4
    title: Implement the SDK submit-form workflow and webhook event emission
    description: |
      Add the SDK-owned submit-form entrypoint that resolves the target form, composes initial data using the
      documented merge order, validates the submitted payload, persists the updated per-card form data, and
      emits `form.submit` through the existing webhook pipeline. Keep this separate from `actionWebhookUrl`
      so form submission remains a first-class event with normal webhook filtering and docs generation.
    wave: 3
    agent: gem-implementer
    priority: high
    status: completed
    dependencies:
      - T2
      - T3
    context_files:
      - src/sdk/modules/cards.ts: "Current card business logic and action trigger precedent."
      - src/sdk/KanbanSDK.ts: "Public SDK facade and JSDoc source for generated docs."
      - src/sdk/types.ts: "Submit payload and event typing established in T2."
    estimated_effort: medium
    estimated_files: 2
    estimated_lines: 220
    focus_area: Validation and webhook boundaries
    verification:
      - Invalid form submissions are rejected before any webhook is emitted.
      - Valid submissions persist updated form data and emit a `form.submit` event with the canonical payload.
      - Public SDK docs/JSDoc reflect the final submit method and merge semantics.
    acceptance_criteria:
      - There is a single SDK method to submit a card form programmatically.
      - `form.submit` uses the normal SDK webhook path and not a new ad-hoc HTTP shortcut.
      - The submit payload includes board/card/form context and the validated data that was persisted.
    failure_modes:
      - scenario: Validation happens only in the UI, allowing invalid submissions through CLI/API/MCP.
        likelihood: medium
        impact: high
        mitigation: Perform authoritative validation in the SDK submit method and let the UI use it as a convenience layer, not the source of truth.
      - scenario: The form submit payload omits enough form metadata that downstream webhooks cannot identify which form was submitted.
        likelihood: medium
        impact: high
        mitigation: Include a stable resolved form identifier and source metadata in the SDK event payload contract.
    tech_stack:
      - TypeScript
      - SDK modules
      - Webhook pipeline
    test_coverage: "Unit/integration coverage for merge order, validation failure, persistence, and webhook emission."

  - id: T5
    title: Add REST and webview transport parity for form-aware cards and submit actions
    description: |
      Extend standalone REST handlers plus the standalone/extension webview transport bridge so form-aware
      card payloads and form submission requests flow through the same SDK contract. This task covers shared
      message handling, callback/error propagation, and any REST endpoint additions needed for parity.
    wave: 4
    agent: gem-implementer
    priority: high
    status: completed
    dependencies:
      - T2
      - T4
    context_files:
      - src/standalone/server.ts: "REST API and standalone WebSocket handler surface."
      - src/extension/KanbanPanel.ts: "VS Code webview message mirror for standalone behavior."
      - src/shared/types.ts: "Shared transport message unions established in T2."
    estimated_effort: medium
    estimated_files: 2
    estimated_lines: 260
    focus_area: API and transport parity
    verification:
      - REST can create/update cards with forms and submit a form payload through the SDK.
      - Standalone and VS Code transports return consistent success/error callbacks for submit.
      - No business-rule duplication is introduced outside the SDK.
    acceptance_criteria:
      - Transport handlers mirror the same form submit operation and payload shape.
      - API responses/errors are stable enough for README examples and test coverage.
      - Extension and standalone paths stay in lockstep for message names and result handling.
    failure_modes:
      - scenario: Standalone REST and extension message paths diverge on error handling, producing different UI behavior for the same invalid form.
        likelihood: medium
        impact: high
        mitigation: Reuse one shared transport message contract and map all errors from SDK exceptions/results rather than bespoke strings.
      - scenario: REST endpoint design exposes a second submit payload shape separate from the webview message contract.
        likelihood: medium
        impact: medium
        mitigation: Base both on the SDK submit method inputs and keep endpoint bodies thin adapters only.
    tech_stack:
      - TypeScript
      - REST API
      - VS Code webview bridge
      - WebSocket transport
    test_coverage: "Server integration tests plus browser-level transport validation."

  - id: T6
    title: Add CLI parity for form-aware card workflows and submission
    description: |
      Extend the CLI so users can create/update cards with form attachments and submit form payloads via the
      same SDK submit method. Keep the surface minimal and scriptable, favoring JSON input over bespoke flag
      sprawl while preserving existing card commands.
    wave: 4
    agent: gem-implementer
    priority: medium
    status: completed
    dependencies:
      - T2
      - T4
    context_files:
      - src/cli/index.ts: "Existing card create/edit/action commands and help text patterns."
      - src/cli/index.test.ts: "CLI regression coverage for public command behavior."
    estimated_effort: medium
    estimated_files: 2
    estimated_lines: 180
    focus_area: CLI parity
    verification:
      - CLI can attach forms during create/update flows without breaking existing options.
      - CLI can submit form payload JSON and surfaces SDK validation errors clearly.
    acceptance_criteria:
      - Users can attach or update card forms from the CLI.
      - Users can submit a named form for a card from the CLI using a JSON payload.
      - CLI help/examples remain aligned with README documentation.
    failure_modes:
