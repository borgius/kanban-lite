  - id: T11
    title: Validate interactive standalone and VS Code form-tab behavior end to end
    description: |
      Run end-to-end browser validation against the standalone webview and spot-check the VS Code webview bridge
      to ensure dynamic tabs, JSON Forms validation, reconnect-sensitive submit behavior, and success/error UI
      states behave as planned. This complements automated coverage with real interaction checks.
    wave: 7
    agent: gem-browser-tester
    priority: medium
    status: pending
    dependencies:
      - T5
      - T8
      - T9
    context_files:
      - src/webview/App.tsx: "Standalone card-editor shell and active card lifecycle."
      - src/webview/components/CardEditor.tsx: "Rendered form tabs and submit UI."
      - src/webview/standalone-shim.ts: "Reconnect-sensitive transport behavior."
    estimated_effort: medium
    estimated_files: 0
    estimated_lines: 0
    focus_area: Interactive validation
    verification:
      - Manual/browser checks confirm dynamic tabs, validation gating, and submit callbacks in standalone mode.
      - VS Code bridge spot-check confirms the same success/error flow as standalone.
    acceptance_criteria:
      - Users can open a card, switch among multiple form tabs, submit valid data, and see expected feedback.
      - Invalid submissions do not leave the UI in an ambiguous state.
      - Disconnect/reconnect scenarios do not silently lose or double-submit form data.
    failure_modes:
      - scenario: The standalone shim drops a submit during reconnect and the UI appears successful anyway.
        likelihood: medium
        impact: high
        mitigation: Validate explicit offline/disconnect scenarios and ensure the UI only reports success on confirmed callbacks.
    validation_matrix:
      - scenario: Config-defined form tab renders with seeded data
        steps:
          - Open a card that references a named config form.
          - Navigate to the corresponding form tab.
          - Confirm the rendered values reflect config defaults overlaid by persisted card form data and metadata.
        expected_result: The form renders on the correct tab with the documented merge order visible in field values.
      - scenario: Invalid form submit is blocked
        steps:
          - Edit required fields into an invalid state.
          - Attempt to submit from the form tab.
        expected_result: Submission is blocked, validation errors are visible, and no success callback is shown.
      - scenario: Valid form submit succeeds and updates state
        steps:
          - Enter valid data on a form tab.
          - Submit the form and wait for completion.
          - Reopen the card or switch tabs away and back.
        expected_result: The submit succeeds, state persists, and the edited values remain visible.
      - scenario: Reconnect-sensitive submit handling
        steps:
          - Start a submit, interrupt connectivity in standalone mode, then restore connectivity.
          - Observe UI state and server outcome.
        expected_result: The UI does not report a false success, and the final state matches the confirmed server result.

