plan_id: 20260319-form-actions
objective: |
  Add support for forms attached directly to cards or declared in workspace config under
  `forms.<name> = { schema, ui, data }`, render each attached form as an additional card tab,
  seed initial form state from config defaults then card-scoped data then card metadata, validate
  submissions with JSON Forms/AJV, and emit a `form.submit` webhook event through the existing
  SDK-first parity surfaces (SDK, REST API, CLI, MCP, webview, README, CHANGELOG).
created_at: "2026-03-19"
created_by: gem-planner
status: in_progress
research_confidence: high

tldr: |
  This plan treats card forms as a first-class cross-surface feature, not a webview-only shortcut:
  form definitions and card bindings are introduced in shared/SDK contracts first, persisted in both
  markdown and SQLite storage, then exposed through REST API, CLI, and MCP before the webview renders
  dynamic JSON Forms tabs. The plan normalizes both config-defined forms and card-local forms into a
  single resolved form descriptor model, stores per-card submitted payloads in a dedicated form-keyed
  map so multiple tabs do not collide, and routes `form.submit` through the normal SDK webhook event
  pipeline instead of creating a second ad-hoc callback path. JSON Forms is the only justified new UI
  dependency family for this feature, and README, CHANGELOG, and generated docs refresh remain mandatory
  per `AGENTS.md`. No `docs/prd.yaml` exists today, so there is no PRD conflict to resolve before planning.

open_questions: []

pre_mortem:
  overall_risk_level: high
  critical_failure_modes:
    - scenario: Markdown and SQLite store different card-form payloads or attachment metadata, causing tabs to appear or submit differently depending on storage mode.
      likelihood: medium
      impact: critical
      mitigation: |
        Keep the canonical form/card contracts in shared SDK types, implement persistence in both markdown
        parser and SQLite adapter before any interface work, and add storage-specific regression coverage
        before wiring the UI.
    - scenario: The webview submits directly to a dedicated endpoint while SDK/REST/CLI/MCP use a different payload or validation path, breaking parity and webhook expectations.
      likelihood: medium
      impact: high
      mitigation: |
        Introduce a single SDK-owned submit-form entrypoint and payload composition helper, then have REST,
        extension, CLI, and MCP delegate to that contract instead of duplicating validation or webhook logic.
    - scenario: Form state merge precedence is implemented inconsistently, so config defaults, persisted card form data, and card metadata overwrite one another unpredictably.
      likelihood: medium
      impact: high
      mitigation: |
        Lock the merge order in shared/SDK contracts as `config default data -> card form data -> card metadata`,
        document it in SDK JSDoc/README, and add targeted tests for collision cases before UI integration.
    - scenario: Dynamic tabs are added only in the card editor component without updating global tab state and router handling, causing broken deep links or incorrect tab reset behavior.
      likelihood: medium
      impact: medium
      mitigation: |
        Extend the tab model, router whitelist, and close/reset behavior before rendering form content, and
        keep dynamic tab IDs normalized so routing and standalone URLs remain stable.
  assumptions:
    - Root workspace config is the correct home for reusable named forms (`KanbanConfig.forms`), mirroring how other global features are declared today.
    - Cards need both form attachments (`forms[]`) and a dedicated persisted form-data map keyed by resolved form id/name so multiple forms can coexist without field collisions.
    - `form.submit` should be a first-class SDK event delivered through the existing webhook registration pipeline rather than the separate `actionWebhookUrl` shortcut.
    - Non-UI parity means at minimum REST API, CLI, and MCP can create/update cards with forms, inspect resolved form state, and submit form payloads programmatically.
    - Generated docs will be refreshed from JSDoc and route metadata via `npm run docs`; `docs/api.md`, `docs/sdk.md`, and `docs/webhooks.md` will not be edited by hand.

implementation_specification:
  code_structure: |
    Keep the rollout surgical and ordered by `AGENTS.md`: first establish shared form definition, card binding,
    and submit payload contracts in SDK-adjacent files; next persist those contracts in markdown and SQLite; then
    expose the same behavior through REST API, CLI, and MCP; finally render dynamic JSON Forms tabs in the webview.
    Normalize config-defined and card-local forms into one resolved descriptor model so the UI consumes a single
    shape regardless of source. Validation and webhook delivery stay SDK-owned, while the webview is responsible
    only for rendering, editing, and invoking the shared submit command.
  affected_areas:
    - package.json and pnpm-lock.yaml
    - src/shared/config.ts
    - src/shared/types.ts
    - src/sdk/types.ts
    - src/sdk/parser.ts
    - src/sdk/storage/sqlite.ts
    - src/sdk/modules/boards.ts
    - src/sdk/modules/cards.ts
    - src/sdk/KanbanSDK.ts
    - src/standalone/server.ts
    - src/extension/KanbanPanel.ts
    - src/cli/index.ts
    - src/mcp-server/index.ts
    - src/webview/store/index.ts
    - src/webview/router.tsx
    - src/webview/App.tsx
    - src/webview/components/CardEditor.tsx
    - src/webview/components/MarkdownEditor.tsx
    - src/webview/components/CardFormTab.tsx
    - src/sdk/__tests__/KanbanSDK.test.ts
    - src/sdk/__tests__/storage-sqlite.test.ts
    - src/standalone/__tests__/server.integration.test.ts
    - src/cli/index.test.ts
    - README.md
    - CHANGELOG.md
  component_details:
    - component: Shared form contracts
      responsibility: Define reusable form definition, card attachment, resolved form descriptor, and form-data storage shapes shared across SDK and UI layers.
      interfaces:
        - "Workspace config form map: `forms.<name> = { schema, ui, data }`"
        - "Card form attachments: named references and/or card-local inline form definitions"
        - "Card-scoped form data map keyed by normalized form id/name"
        - "Resolved submit payload contract including merged initial data and validation result surface"
    - component: SDK persistence and resolution
      responsibility: Persist card form bindings and form data in markdown and SQLite, expose named forms via board/card info, and resolve config + card-local definitions into a stable runtime descriptor list.
      interfaces:
        - "Parser + serializer support for form attachments and form data"
        - "SQLite schema and row mapping for form attachments and form data"
        - "SDK helpers to resolve attached forms for a given card/board"
    - component: SDK submit workflow
      responsibility: Validate submitted form data, merge defaults/card data/metadata in the documented order, persist the new form data, and emit `form.submit` through the webhook pipeline.
      interfaces:
        - "Public SDK method for submitting a card form"
        - "`form.submit` added to SDK event contract"
        - "Webhook payload containing board, card, form descriptor, submitted data, and validation context"
    - component: Interface parity layer
      responsibility: Mirror the SDK form contract and submit operation through REST API, CLI, MCP, and extension/standalone transport handlers without re-implementing business logic.
      interfaces:
        - "REST endpoints/request payloads for form-aware card create/update and form submit"
        - "CLI flags/commands for attaching forms and submitting JSON payloads"
        - "MCP schema/tool updates for forms and submit flow"
        - "Shared webview message contracts for form submit callbacks"
    - component: Webview JSON Forms renderer
      responsibility: Add dynamic card tabs for attached forms, render them with JSON Forms renderers/cells, surface validation errors, and invoke the shared submit command.
      interfaces:
        - "Dynamic form tab ids derived from resolved form identifiers"
        - "JSON Forms `onChange({ data, errors })` integration with local editor state"
        - "Submit action gated by validation mode / AJV result"
  dependencies:
    - component: Shared form contracts
      relationship: Blocks all persistence, interface, and UI work because every later layer needs a stable shape for forms, form data, and submit payloads.
    - component: SDK persistence and resolution
      relationship: Must land before submit flow and UI rendering so every surface reads the same normalized form descriptors in both storage modes.
    - component: SDK submit workflow
      relationship: Blocks REST, CLI, MCP, and webview submit actions because validation and webhook behavior must remain centralized.
    - component: Interface parity layer
      relationship: Depends on finalized SDK contracts and in turn blocks final README examples and cross-surface verification.
    - component: Webview JSON Forms renderer
      relationship: Depends on dependency installation, normalized form descriptors, dynamic tab plumbing, and shared submit transport.
    - component: Docs and tests
      relationship: Depend on the public contracts and UX labels being stable across SDK, API, CLI, MCP, and webview.
  integration_points:
    - `src/shared/config.ts` remains the source of truth for workspace-level reusable form declarations.
    - `src/shared/types.ts` and `src/sdk/types.ts` remain the shared cross-layer contract for card fields, transport messages, and SDK events.
    - `src/sdk/parser.ts` and `src/sdk/storage/sqlite.ts` remain the only persistence adapters for markdown and SQLite card state.
    - `src/sdk/modules/cards.ts` remains the owner of card submit business logic and webhook emission.
    - `src/standalone/server.ts`, `src/cli/index.ts`, and `src/mcp-server/index.ts` continue to delegate into SDK methods rather than implementing their own form logic.
    - `src/webview/store/index.ts`, `src/webview/router.tsx`, and `src/webview/components/*` remain the card-editor state and rendering path for tabs.
    - `README.md`, `CHANGELOG.md`, and generated docs remain mandatory completion surfaces for any user-visible feature rollout.

