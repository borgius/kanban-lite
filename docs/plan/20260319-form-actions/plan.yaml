      - Successful submit updates the card form state without breaking markdown preview/comments/logs.
    acceptance_criteria:
      - Cards with `forms[]` show one extra tab per resolved form.
      - Initial data respects the documented merge order before user edits begin.
      - Submit triggers the shared transport callback and reflects success/error state in the UI.
    failure_modes:
      - scenario: JSON Forms state is recreated on every render, causing users to lose unsaved edits while switching tabs.
        likelihood: medium
        impact: high
        mitigation: Keep per-tab local state stable and key components by normalized form id rather than transient array index.
      - scenario: Form tabs render only config-defined forms and skip inline card-local forms.
        likelihood: medium
        impact: medium
        mitigation: Consume the normalized resolved descriptor list from SDK-backed state instead of branching in the component tree.
    tech_stack:
      - React
      - JSON Forms
      - AJV
      - TypeScript
    test_coverage: "Component-level and browser-level coverage for render, validation, and submit flows."

