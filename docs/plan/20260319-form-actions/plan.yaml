  - id: T7
    title: Add MCP parity for form-aware card workflows and submission
    description: |
      Extend MCP schemas/tools so agents can create or update cards with forms and submit form payloads using
      the same SDK-owned contract. Keep the change surgical by reusing existing card tool patterns where possible
