  - question: "What is the intended persisted shape for 'form actions' — an extension of `actions`, a new sibling field, or runtime-only UI metadata?"
    context: "Current code already supports two action shapes in some layers, but not a richer form schema; the parity/doc scope depends on the canonical data model."
  - question: "Should form-backed action inputs be triggerable from non-UI interfaces (CLI/API/MCP), or is the feature intentionally interactive/UI-only?"
    context: "AGENTS.md pushes toward parity, but the answer affects whether CLI/API/MCP need creation/update/trigger support or only README notes."
  - question: "Does the action webhook payload contract change, or is form input consumed only client-side before existing trigger calls?"
    context: "A payload change would expand README webhook docs and may justify webhook documentation source updates."
  - question: "Should existing object-form actions (`Record<string,string>`) remain backward-compatible and auto-upgradeable if a richer form schema is introduced?"
    context: "There is explicit CHANGELOG/README precedent for backwards compatibility around prior action shape expansion."

