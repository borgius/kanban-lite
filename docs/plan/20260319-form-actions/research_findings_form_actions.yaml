plan_id: "20260319-form-actions"
objective: "understand whether this feature requires changes outside the webview, especially docs, README, CHANGELOG, and potential CLI/API/MCP parity per AGENTS.md"
focus_area: "form_actions"
created_at: "2026-03-19T00:00:00Z"
created_by: "gem-researcher"
status: "completed"

tldr: |
  - Existing card actions already span SDK, webview, VS Code extension bridge, standalone REST API, CLI, MCP, README, and CHANGELOG; this domain is not currently webview-only.
  - The shared contract already allows `actions: string[] | Record<string,string>`, but several interface-local input types still narrow to `string[]`, creating parity risk for any richer action model such as form-backed actions.
  - AGENTS.md makes README and CHANGELOG mandatory for any user-facing feature, and requires SDK-first implementation followed by API, CLI, and MCP when behavior is not UI-only.
  - Generated docs are source-driven: SDK behavior flows into `docs/sdk.md` via JSDoc, REST docs flow from `scripts/generate-api-docs.ts`, and webhook docs flow from `scripts/generate-webhooks-docs.ts` only if webhook event contracts change.
  - Current tests are strongest at SDK level for card actions; standalone/API and CLI/MCP coverage for richer action shapes appears thinner from the examined files.

research_metadata:
  methodology: "Hybrid retrieval with semantic_search and grep_search, followed by targeted read_file inspection of parity layers, docs sources, and tests. Relationship discovery focused on SDK -> extension/webview -> standalone/API -> CLI -> MCP -> docs/test surfaces."
  scope: "Minimum relevant files for card-action/form-action feature scoping, parity obligations, docs generation, and bridge types."
  confidence: "high"
  coverage: 86

