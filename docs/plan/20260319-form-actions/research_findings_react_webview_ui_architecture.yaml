plan_id: 20260319-form-actions
objective: render additional card tabs for forms using https://jsonforms.io/
focus_area: react_webview_ui_architecture
created_at: 2026-03-19T00:00:00Z
created_by: gem-researcher
status: completed

tldr: |
  - Card detail UI is centered on `src/webview/components/CardEditor.tsx`, which delegates tab rendering/content switching to `src/webview/components/MarkdownEditor.tsx`.
  - Card tab state is global and URL-addressable today via `CardTab` in Zustand plus TanStack Router; current allowed tabs are only `write | preview | comments | logs`.
  - Config already supports board-scoped `metadata` and `actions`, but no form schema, UI schema, or JSON Forms dependency exists in the repository today.
  - Existing drawer/popup dialog shells in `CreateCardDialog` and `SettingsPanel` are strong reference patterns for any form-hosting panel or configuration UI.
  - Main open boundary is where form definitions should live: board config, card metadata, or both.

