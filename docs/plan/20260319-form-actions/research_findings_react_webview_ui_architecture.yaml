related_conventions:
  naming_patterns_in_domain: UI components are PascalCase, store state uses explicit `active*`/`set*` pairs, and route constants use ALL_CAPS whitelists like `VALID_TABS`.
  structure_of_domain: App owns overlay shells, CardEditor owns card details, MarkdownEditor owns inner tabbed body, and shared types/config define persisted contracts.
  error_handling_in_domain: Minimal runtime guards; invalid tabs are blocked by `VALID_TABS`/route validation rather than error boundaries.
  testing_in_domain: Vitest component tests focus on shallow integration and store behavior, with many child-component mocks.
  documentation_in_domain: Inline comments in router/store explain source-of-truth and synchronization behavior.

related_dependencies:
  internal:
    - component: src/webview/App.tsx
      relationship_to_domain: mounts and closes the editor surface
      direction: inbound
    - component: src/shared/config.ts
      relationship_to_domain: supplies persisted board/workspace config shape
      direction: outbound
    - component: src/shared/types.ts
      relationship_to_domain: supplies shared UI/data contracts
      direction: outbound
  external:
    - name: react
      purpose_for_domain: component rendering
    - name: zustand
      purpose_for_domain: UI state
    - name: @tanstack/react-router
      purpose_for_domain: standalone tab routing
    - name: marked
      purpose_for_domain: markdown preview

open_questions:
  - question: Where should form definitions live: board config, card frontmatter metadata, or a separate workspace-level registry?
    context: Existing config supports pinned metadata keys and action maps, but no analogous schema container exists.
  - question: Should additional form tabs be deep-linkable in standalone mode?
    context: Current router hard-whitelists tabs, so every new tab changes URL/state compatibility.
  - question: Should forms edit `frontmatter.metadata`, top-level frontmatter fields, or detached data blobs?
    context: CardEditor today only exposes primitive top-level fields plus read-only pinned metadata previews.

gaps:
  - area: schema-driven form infrastructure
    description: No JSON Forms dependency, JSON Schema types, UI schema conventions, or renderer registry were found.
    impact: Introducing jsonforms is net-new architecture, not a small extension of existing form code.
  - area: direct CardEditor test coverage
    description: No dedicated `CardEditor` test file was found.
    impact: Tab-expansion work will likely rely on adding new tests rather than extending an existing focused suite.

status_summary:
  status: completed
  relevant_files:
    - src/webview/components/CardEditor.tsx
    - src/webview/components/MarkdownEditor.tsx
    - src/webview/store/index.ts
    - src/webview/router.tsx
    - src/webview/App.tsx
    - src/shared/config.ts
    - src/shared/types.ts
    - src/webview/components/CreateCardDialog.tsx
    - src/webview/components/SettingsPanel.tsx
    - package.json
  existing_patterns:
    - Global card tabs are hard-coded across store, router, and MarkdownEditor.
    - Card detail properties are config-influenced via board `metadata` and `actions`.
    - Drawer/popup shells and tab bars already exist as reusable UI patterns.
    - Create mode uses local tabs; edit mode uses store-backed tabs.
    - Tests currently mock many heavy child components.
  risks:
    - Extending tabs requires synchronized changes in type unions, router validation, and rendering logic.
    - Adding jsonforms introduces new runtime/dependency surface absent from current bundle.
    - Form persistence target is unresolved and may force shared type/config changes.
    - Standalone URL compatibility may be affected if new tabs become routable.
    - Limited focused tests around CardEditor increase regression risk in the detail panel.
  recommended_task_slices:
    - slice: card-tab contract expansion
      scope: store CardTab union, router VALID_TABS, default-tab/reset behavior, standalone deep-link semantics
    - slice: form-definition contract
      scope: shared config/types for board or workspace form declarations and how they map to card data
    - slice: form-tab host UI
      scope: CardEditor/MarkdownEditor composition for rendering additional non-markdown tabs
    - slice: jsonforms integration layer
      scope: dependency addition, renderer setup, schema/uiSchema mapping, and metadata/frontmatter binding
    - slice: test coverage
      scope: focused tests for tab rendering, route sync, and form-host behavior
