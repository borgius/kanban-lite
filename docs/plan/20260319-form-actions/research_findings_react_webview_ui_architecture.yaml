patterns_found:
  - category: architecture
    pattern: Card detail panel composes fixed property rows above a single tabbed content region
    description: CardEditor owns header/details and delegates all lower-panel tab behavior to MarkdownEditor.
    examples:
      - file: src/webview/components/CardEditor.tsx
        location: src/webview/components/CardEditor.tsx:805-1137
        snippet: "Property rows render first, then `<MarkdownEditor ... mode=\"edit\" />` fills the remaining panel."
    prevalence: common
  - category: architecture
    pattern: Card tab state is centralized in Zustand and mirrored into route state
    description: New card tabs must be added consistently in the store union, router whitelist, and UI tab renderer.
    examples:
      - file: src/webview/store/index.ts
        location: src/webview/store/index.ts:9
        snippet: "export type CardTab = 'write' | 'preview' | 'comments' | 'logs'"
      - file: src/webview/router.tsx
        location: src/webview/router.tsx:44
        snippet: "const VALID_TABS: TabId[] = ['write', 'preview', 'comments', 'logs']"
      - file: src/webview/components/MarkdownEditor.tsx
        location: src/webview/components/MarkdownEditor.tsx:108-243
        snippet: "tab buttons and conditional rendering are hard-coded per tab"
    prevalence: common
  - category: structure
    pattern: Config-driven UI currently means board metadata pinning and action maps, not schema-rendered forms
    description: Existing config influences which metadata keys/actions are shown, but not full component generation.
    examples:
      - file: src/shared/config.ts
        location: src/shared/config.ts:50-52
        snippet: "actions?: Record<string, string>; metadata?: string[]"
      - file: src/webview/components/CardEditor.tsx
        location: src/webview/components/CardEditor.tsx:771,1069-1098
        snippet: "board metadata keys are mapped into property rows"
    prevalence: occasional
  - category: structure
    pattern: Dialogs use shared drawer/popup shell conventions with auto-save and keyboard escape handling
    description: CreateCardDialog and SettingsPanel provide reference shells for any new form-management or configuration UI.
    examples:
      - file: src/webview/components/CreateCardDialog.tsx
        location: src/webview/components/CreateCardDialog.tsx:368-700
