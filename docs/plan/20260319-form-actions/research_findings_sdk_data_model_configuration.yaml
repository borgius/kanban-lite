open_questions:
  - question: Should `card.forms[]` store only form identifiers, or per-card submitted form state/results as well?
    context: >-
      Current evidence only establishes how optional fields are persisted; storage shape
      and migration cost depend heavily on whether `card.forms[]` is identifiers-only or
      contains richer objects.

  - question: Is `config.forms.<name>.data` intended as immutable form definition defaults or mutable workspace state?
    context: >-
      Root config currently stores durable workspace configuration, not per-card runtime
      state. This affects whether `.kanban.json` is the right persistence target.

  - question: Do forms need outward-facing board/list payload exposure similar to `BoardInfo.actions`?
    context: >-
      Existing board config fields exposed to UI/interfaces are selectively mirrored;
      there is no generic auto-exposure mechanism.

gaps:
