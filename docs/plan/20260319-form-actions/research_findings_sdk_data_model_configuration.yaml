existing_patterns:
  - pattern: Root workspace config with board sub-records
    evidence:
      - "`KanbanConfig.boards: Record<string, BoardConfig>` in `src/shared/config.ts`."
      - "Board-specific optional features (`actions`, `metadata`, `minimizedColumnIds`) live on `BoardConfig`, while global features (`labels`, `webhooks`, `actionWebhookUrl`) live on `KanbanConfig`."
    implication_for_forms: >-
      A root `config.forms` map fits the existing workspace-level configuration pattern;
      board-scoped forms would instead parallel `BoardConfig.actions`.

  - pattern: Optional card fields are explicitly modeled in three places
    evidence:
      - "Domain type in `src/shared/types.ts` (`Card`, `CardFrontmatter`)"
      - "SDK input type in `src/sdk/types.ts` (`CreateCardInput`)"
      - "Persistence adapters in `src/sdk/parser.ts` and `src/sdk/storage/sqlite.ts`"
    implication_for_forms: >-
      `card.forms[]` would require coordinated updates across all of those layers;
      changing only `Card` would not persist anything.

  - pattern: Markdown persistence is schema-by-code, not generic passthrough
    evidence:
      - "`parseCardFile()` manually extracts `actions` and `metadata`."
      - "`serializeCard()` manually emits `actions` and `metadata`."
    implication_for_forms: >-
      A new `forms` field will be ignored in markdown mode until parser logic is
      explicitly extended.

  - pattern: SQLite persistence uses explicit columns for optional card features
    evidence:
      - "`cards` table has `metadata TEXT` and `actions TEXT` columns, not a generic JSON blob for the whole card."
      - "`writeCard()`/`_rowToCard()` serialize/parse those columns individually."
    implication_for_forms: >-
      Supporting `card.forms[]` as first-class data likely requires a schema migration
      and explicit column handling, unless the feature is intentionally embedded into
      existing `metadata` instead of modeled separately.

  - pattern: Config-backed named object helpers for boards
    evidence:
      - "Board actions use dedicated helpers in `src/sdk/modules/boards.ts` plus tests in `src/sdk/__tests__/board-actions.test.ts`."
      - "`listBoards()` mirrors selected board config into outward-facing `BoardInfo`."
    implication_for_forms: >-
      If forms need SDK helpers beyond raw `getBoard()`/`updateBoard()`, board-actions
      is the closest implementation pattern already present.

  - pattern: Config merging is shallow and selective
    evidence:
      - "`readConfig()` does `{ ...defaults, ...raw }` rather than a deep merge."
      - "`updateBoard()` only copies a fixed whitelist of board fields."
      - "`settingsToConfig()` only merges display settings fields."
    implication_for_forms: >-
      New nested config such as `config.forms.<name>.ui` or board-level form settings
      will need explicit defaulting/mutation handling; there is no generic nested merge.

risks:
  - risk: Type drift between shared card model and SDK input model
    detail: >-
      `Card.actions` already supports `string[] | Record<string, string>`, while
      `CreateCardInput.actions` is only `string[]`. A new forms feature could repeat
      or worsen this mismatch unless all public types are aligned deliberately.

  - risk: Partial config/default handling for nested form definitions
    detail: >-
      Because config merging is shallow, adding `config.forms` without explicit
      defaulting/migration can produce inconsistent shapes across older workspaces
      and partially defined form objects.

  - risk: Dual persistence paths
    detail: >-
      Markdown and SQLite persist optional card fields differently. A feature that
      lands in parser/frontmatter only will fail in SQLite mode, and vice versa.

  - risk: Schema migration cost in SQLite
    detail: >-
      If `card.forms[]` is stored as a first-class field rather than under existing
      `metadata`, SQLite needs a schema version bump plus migration logic.

  - risk: External payload shape changes
    detail: >-
      `triggerAction()` posts sanitized card payloads. Adding `card.forms` changes
      the webhook payload shape seen by downstream integrations.

  - risk: Interface parity/documentation debt
    detail: >-
      `AGENTS.md` requires SDK first and then interface layers; user-facing features
      also require README and CHANGELOG updates, and generated docs are sourced from
      code/JSDoc rather than edited directly.

