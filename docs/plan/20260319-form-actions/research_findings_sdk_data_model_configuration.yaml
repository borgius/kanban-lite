plan_id: 20260319-form-actions
objective: >-
  Support form actions attached to kanban cards and config-defined forms, focusing
  on SDK/data model/configuration. Determine where board config is defined, how
  card fields are modeled and persisted, how metadata/config are merged, and what
  changes are likely needed for `config.forms.<name> = { schema, ui, data }` and
  `card.forms[]`.
focus_area: sdk-data-model-configuration
created_at: 2026-03-19
created_by: GitHub Copilot (GPT-5.4)
status: completed

tldr: |
  - Workspace/board configuration is defined in `src/shared/config.ts`; board-scoped fields already include `actions` and `metadata`, while workspace config is persisted in `.kanban.json` and shallow-merged with defaults.
  - Card shape is defined in `src/shared/types.ts`; current extensible card fields are `metadata` and `actions`, with markdown persistence handled by `src/sdk/parser.ts` and SQLite persistence handled independently in `src/sdk/storage/sqlite.ts`.
  - The closest existing pattern to config-defined forms is board actions: `BoardConfig.actions`, `BoardInfo.actions`, SDK wrappers in `KanbanSDK`, mutations in `src/sdk/modules/boards.ts`, and dedicated tests in `src/sdk/__tests__/board-actions.test.ts`.
  - Card creation/update flows assemble a `Card` in `src/sdk/modules/cards.ts` and persist via the storage engine interface, so `card.forms[]` would need coordinated type + parser + markdown + SQLite changes.
  - `AGENTS.md` constraints are aligned with the current architecture: SDK/domain changes first, then API/CLI/MCP and other interface layers.

research_metadata:
