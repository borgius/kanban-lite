plan_id: 20260319-form-actions
objective: on valid form submit, send webhook event form.submit with merged initial data from config, card data, and metadata
focus_area: webhook/event flow and validation boundaries
created_at: 2026-03-19T00:00:00Z
created_by: gem-researcher
status: completed

tldr: |
  - Existing mutation webhooks are SDK-owned: modules emit typed `SDKEventType` events, then `KanbanSDK.emitEvent()` forwards them either to a registered handler or directly to `fireWebhooks()`.
  - Card action submission is currently a separate path from normal webhooks: `triggerAction()` POSTs directly to `actionWebhookUrl` and does not emit an SDK event.
  - Standalone and VS Code webview transports are kept in lockstep through shared `WebviewMessage`/`ExtensionMessage` unions and mirrored switch handlers.
  - Validation is boundary-local and lightweight: UI components trim/disable for obvious empty input, REST endpoints do imperative required-field checks, but WebSocket/webview message handlers largely trust payload shape.
  - No existing `form.submit` event, generic form schema, or merge utility for config + card + metadata was found in the examined surface.

research_metadata:
  methodology: hybrid retrieval using semantic_search, targeted grep_search, and focused read_file passes over SDK event definitions, webhook delivery, transport message unions, backend handlers, UI submit components, and existing tests
  scope: minimum relevant files for webhook event flow, standalone/webview communication, and validation boundaries
  confidence: high
  coverage: 88

