existing_patterns:
  - name: sdk_event_first_webhooks
    description: Domain mutations emit a typed SDK event from module code; webhook delivery is downstream of the SDK, not implemented in UI/API layers.
    evidence:
      - src/sdk/modules/cards.ts:223 `ctx.emitEvent('task.created', sanitizeCard(card))`
      - src/sdk/modules/cards.ts:270 `ctx.emitEvent('task.updated', sanitizeCard(card))`
      - src/sdk/KanbanSDK.ts:189-197 `emitEvent()` calls registered `onEvent` or falls back to `fireWebhooks()`
  - name: canonical_webhook_envelope
    description: Registered webhooks receive JSON shaped as `{ event, timestamp, data }`; event matching is exact or wildcard via config-stored registrations.
    evidence:
      - src/sdk/webhooks.ts:23-37
      - src/standalone/__tests__/webhooks.test.ts:191-206
  - name: direct_action_webhook_is_separate
    description: Card actions bypass `SDKEventType` and send a direct POST to `actionWebhookUrl` with payload `{ action, board, list, card }`.
    evidence:
      - src/sdk/modules/cards.ts:280-322
      - src/sdk/__tests__/KanbanSDK.test.ts:768-799
  - name: mirrored_transport_contracts
    description: Frontend sends discriminated `WebviewMessage` objects; standalone WebSocket server and VS Code extension each implement matching `switch` cases and completion callbacks.
    evidence:
      - src/shared/types.ts:381-422
      - src/standalone/server.ts:846-862
      - src/extension/KanbanPanel.ts:367-387
      - src/webview/App.tsx:747-765
  - name: boundary_local_validation
    description: Validation is not centralized. UI components trim and sometimes disable submit buttons; REST routes perform explicit required-field checks; message-based handlers do little/no structural validation beyond TypeScript casts.
    evidence:
      - src/webview/components/CommentEditor.tsx:49-79
      - src/webview/components/CreateCardDialog.tsx:406-412
      - src/standalone/server.ts:114-126
      - src/standalone/server.ts:1257, 1486-1502, 1703-1705
  - name: standalone_message_reliability_is_stateful
    description: Before first connection, standalone queues outgoing messages; after at least one connection, messages are dropped while disconnected.
    evidence:
      - src/webview/standalone-shim.ts:260-279
      - src/webview/standalone-shim.test.ts:116-156

risks:
  - risk: event_namespace_gap
    details: `SDKEventType` does not include `form.submit`; if omitted from the union and downstream docs/tests, registered webhook filtering cannot treat it as a first-class event.
    impact: medium
  - risk: split_delivery_path
    details: existing external callback precedent (`triggerAction`) is not part of SDK event emission, so a new submit feature could accidentally create a second ad-hoc webhook path instead of using the normal webhook pipeline.
    impact: high
  - risk: ambiguous_merge_precedence
    details: no helper or convention was found for merging config-derived initial data with card fields and metadata; precedence/order is currently undefined in the examined code.
    impact: high
  - risk: validation_inconsistency
    details: UI, WebSocket, and REST paths enforce validity differently; a “valid form submit” rule implemented in only one boundary would behave differently across standalone vs extension or REST-triggered paths.
    impact: high
  - risk: standalone_disconnect_loss
    details: standalone shim drops non-ready messages after the first successful connection if the socket is down.
    impact: medium
  - risk: parity_surface
    details: AGENTS guidance in this repo establishes SDK-first behavior and parity across API/CLI/MCP; a submit feature added only to the webview path would diverge from existing architecture.
    impact: medium

recommended_task_slices:
  - slice: event_contract
    scope: define whether `form.submit` is a normal SDK event or a separate direct webhook path; if normal, specify payload envelope inside SDK event flow
    touched_surfaces:
      - src/sdk/types.ts
      - src/sdk/KanbanSDK.ts
      - src/sdk/webhooks.ts
  - slice: payload_composition
    scope: define the exact merge inputs and precedence for config initial data, sanitized card data, and metadata; identify whether payload lives under `data` only or nested fields
    touched_surfaces:
      - src/shared/config.ts
      - src/sdk/modules/cards.ts
      - any new SDK helper adjacent to submit logic
  - slice: client_transport
    scope: add a shared webview message and result callback pattern for submit requests so extension and standalone remain symmetrical
    touched_surfaces:
      - src/shared/types.ts
      - src/webview/App.tsx
      - src/extension/KanbanPanel.ts
      - src/standalone/server.ts
      - src/webview/standalone-shim.ts
  - slice: validation_boundary
    scope: define what “valid form submit” means at UI level vs backend enforcement level, and ensure both websocket and REST-equivalent paths reject invalid payloads consistently
    touched_surfaces:
      - src/webview/components/*submit-related*
      - src/standalone/server.ts
      - any SDK submit entrypoint
  - slice: verification
    scope: extend tests for event delivery, callback/error handling, merge semantics, and standalone reconnect-sensitive submission behavior
    touched_surfaces:
      - src/sdk/__tests__/KanbanSDK.test.ts
      - src/standalone/__tests__/webhooks.test.ts
      - src/webview/standalone-shim.test.ts
      - transport-specific integration tests if a REST endpoint is added

