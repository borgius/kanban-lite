plan_id: 20260319-form-style-refresh
objective: |
  Refresh the attached card form UI so it looks polished while continuing to use the
  current React + JSON Forms vanilla renderer path shared by standalone and VS Code webview.
created_at: "2026-03-19"
created_by: gem-planner
status: pending_approval
research_confidence: high

tldr: |
  The likely defect is not renderer logic but missing theme-aware CSS for JSON Forms vanilla
  class names in `src/webview/assets/main.css`, which is already loaded by the shared webview
  entrypoint. The plan keeps the fix surgical: add scoped styling hooks around `CardFormTab`,
  add focused test coverage that no longer hides renderer markup behind a full mock, then update
  the user-facing docs/changelog and validate the shared stylesheet behavior in both runtimes.

open_questions: []

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: Global JSON Forms CSS leaks into unrelated controls and regresses existing editor layouts.
      likelihood: medium
      impact: high
      mitigation: |
        Scope all new selectors under a dedicated `CardFormTab` wrapper class and avoid broad element-only rules.
    - scenario: Tests still mock `JsonForms`, so the styling regression can reappear without detection.
      likelihood: medium
      impact: medium
      mitigation: |
        Replace or supplement the current mock with one focused test that renders real vanilla markup and asserts the style hook path.
    - scenario: Standalone looks correct but VS Code webview does not, despite sharing the same bundle.
      likelihood: low
      impact: medium
      mitigation: |
        Validate both entry paths explicitly and use only theme variables already supported in the shared stylesheet.
  assumptions:
    - `src/webview/components/CardFormTab.tsx` remains the only component that needs a styling hook for the JSON Forms renderer surface.
    - `src/webview/assets/main.css` is the correct shared stylesheet for both standalone and VS Code webview runtimes.
    - No renderer swap, dependency addition, or architectural change is required; this is a presentation-layer refresh only.
    - A short README and CHANGELOG update is required because the fix changes visible product behavior.

implementation_specification:
  code_structure: |
    Keep the renderer stack intact and constrain the change to the webview presentation layer.
    Introduce a narrowly scoped wrapper or hook class in `CardFormTab.tsx` only if needed to target
    JSON Forms vanilla renderer markup safely, then define theme-aware rules in `main.css`. Follow
    with a focused test update and minimal documentation/changelog edits.
  affected_areas:
    - src/webview/components/CardFormTab.tsx
    - src/webview/assets/main.css
    - src/webview/components/CardFormTab.test.tsx
    - README.md
    - CHANGELOG.md
  component_details:
    - component: Card form renderer shell
      responsibility: Expose a stable, narrowly scoped container around the JSON Forms output without changing submit or validation behavior.
      interfaces:
        - "`CardFormTab` wrapper class or data attribute for scoped styling"
    - component: Shared form stylesheet
      responsibility: Provide theme-aware spacing, borders, typography, inputs, labels, arrays, and validation-state styles for JSON Forms vanilla renderer markup.
      interfaces:
        - "Scoped CSS selectors in `src/webview/assets/main.css` using existing VS Code theme variables"
    - component: Form renderer regression coverage
      responsibility: Assert the real renderer path is exercised enough to catch missing-style-hook regressions.
      interfaces:
        - "Focused test coverage in `CardFormTab.test.tsx` that does not fully mock away `JsonForms`"
    - component: User-facing release notes
      responsibility: Document the refreshed form presentation in the README and Unreleased changelog.
      interfaces:
        - "README feature note"
        - "CHANGELOG Unreleased entry"
  dependencies:
    - component: Card form renderer shell
      relationship: Must land before CSS and tests can target a stable, scoped selector surface.
    - component: Shared form stylesheet
      relationship: Depends on the chosen wrapper/scope and blocks visual validation.
    - component: Form renderer regression coverage
      relationship: Depends on the final styling hook and renderer surface chosen in implementation.
    - component: User-facing release notes
      relationship: Depends on the shipped behavior and wording being finalized.
  integration_points:
    - src/webview/standalone-main.tsx imports `src/webview/assets/main.css` for the standalone path.
    - The VS Code webview consumes the same built stylesheet bundle, so CSS changes propagate cross-surface.
    - `CardFormTab.tsx` remains the only JSON Forms vanilla renderer host in the card editor flow.

contracts:
  - from_task: T1
    to_task: T2
    interface: Stable scoped selector/hook for styling the JSON Forms renderer output.
    format: TypeScript markup contract in `CardFormTab.tsx` plus the corresponding CSS selector namespace.
  - from_task: T1
    to_task: T4
    interface: Final expected visual states for labels, inputs, sections, and validation messages.
    format: Shared CSS rules in `src/webview/assets/main.css` rendered through the existing standalone and webview bundles.
  - from_task: T2
    to_task: T5
    interface: Proof that the real renderer path is covered well enough to catch future missing-style regressions.
    format: Passing targeted test(s) for `CardFormTab.test.tsx`.
  - from_task: T3
    to_task: T5
    interface: Final user-facing wording for the polish change.
    format: README + CHANGELOG diff.

