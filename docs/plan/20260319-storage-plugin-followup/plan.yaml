plan_id: 20260319-storage-plugin-followup
objective: |
  Rework the pending storage-plugin follow-up into a stricter refactor that removes engine
  ownership from `src/sdk/storage/markdown.ts` and `src/sdk/storage/sqlite.ts`, moves the
  built-in markdown/sqlite engines fully into plugin-owned modules under `src/sdk/plugins/`,
  removes wrapper/shim compatibility where practical, and preserves working app behavior without
  optimizing for backward-compatible import paths.
created_at: "2026-03-19"
created_by: gem-planner
status: pending_approval
research_confidence: high

tldr: |
  Update the existing follow-up plan in place rather than creating a second successor plan.
  The current code still treats `src/sdk/storage/*` as the real home of the markdown/sqlite
  engines, while `src/sdk/plugins/*` mostly acts as a provider shell and `src/sdk/plugins/index.ts`
  still synthesizes attachment behavior through `wrapEngineAsAttachment(...)`. The strict refactor
  should invert that ownership: plugin modules become the only engine home, legacy storage wrappers
  are deleted or reduced to non-owning surfaces, and resolver logic uses explicit plugin-owned
  attachment providers instead of generic engine wrappers.

open_questions: []

current_state: |
  - `src/sdk/plugins/markdown.ts` imports `MarkdownStorageEngine` from `src/sdk/storage/markdown.ts`.
  - `src/sdk/plugins/sqlite.ts` imports `SqliteStorageEngine` from `src/sdk/storage/sqlite.ts`.
  - `src/sdk/plugins/index.ts` still owns `wrapEngineAsAttachment(...)`, so built-in attachment
    behavior is partly synthesized in the registry instead of living in plugin-owned modules.
  - `src/sdk/storage/index.ts` still exposes `createStorageEngine(...)`, which preserves a parallel
    engine-selection path outside the plugin registry.
  - Tests and SDK exports still point at `src/sdk/storage/markdown.ts` and `src/sdk/storage/sqlite.ts`.

target_state: |
  - `src/sdk/plugins/markdown.ts` owns the markdown engine implementation and markdown card-storage plugin.
  - `src/sdk/plugins/sqlite.ts` owns the sqlite engine implementation, sqlite card-storage plugin,
    and sqlite attachment-provider logic.
  - Built-in attachment behavior is represented by explicit plugin-owned providers; the registry no
    longer fabricates built-in attachment support through `wrapEngineAsAttachment(...)`.
  - `src/sdk/storage/markdown.ts` and `src/sdk/storage/sqlite.ts` no longer own engine classes.
    Preferred end state is deletion, unless one of them must temporarily remain as a non-owning
    surface during the same change set.
  - Internal imports, tests, and SDK exports point at plugin-owned modules or shared interfaces,
    not legacy engine files.

affected_files:
  - path: src/sdk/plugins/markdown.ts
    change_type: modify
    reason: Move markdown engine implementation into the plugin-owned module.
  - path: src/sdk/plugins/sqlite.ts
    change_type: modify
    reason: Move sqlite engine implementation and sqlite attachment-provider logic into the plugin-owned module.
  - path: src/sdk/plugins/index.ts
    change_type: modify
    reason: Remove built-in wrapper-based attachment synthesis and resolve explicit plugin-owned providers.
  - path: src/sdk/plugins/localfs.ts
    change_type: create
    reason: Optional but likely minimal home for explicit built-in local filesystem attachment behavior if needed after removing registry wrappers.
  - path: src/sdk/storage/markdown.ts
    change_type: delete_or_reduce
    reason: Remove markdown engine ownership from legacy storage path.
  - path: src/sdk/storage/sqlite.ts
    change_type: delete_or_reduce
    reason: Remove sqlite engine ownership from legacy storage path.
  - path: src/sdk/storage/index.ts
    change_type: delete_or_reduce
    reason: Remove or demote the parallel engine factory path that bypasses plugin ownership.
  - path: src/sdk/types.ts
    change_type: modify
    reason: Stop exporting plugin-owned engines from legacy storage paths.
  - path: src/sdk/__tests__/storage-markdown.test.ts
    change_type: modify
    reason: Repoint markdown engine tests to the plugin-owned module.
  - path: src/sdk/__tests__/storage-sqlite.test.ts
    change_type: modify
    reason: Repoint sqlite engine tests to the plugin-owned module.
  - path: src/sdk/__tests__/plugin-registry.test.ts
    change_type: modify
    reason: Update plugin-registry assertions/imports to the new plugin-owned engine surfaces.

phased_execution_plan:
  - phase: Phase 1
    goal: Move markdown and sqlite engine ownership into `src/sdk/plugins/`.
  - phase: Phase 2
    goal: Replace registry wrappers with explicit plugin-owned attachment providers and remove the parallel storage factory path.
  - phase: Phase 3
    goal: Update imports/tests and delete or demote legacy storage-layer surfaces that no longer own engines.

verification_steps:
  - Confirm `src/sdk/plugins/markdown.ts` and `src/sdk/plugins/sqlite.ts` contain the actual engine classes after the refactor.
  - Confirm `src/sdk/plugins/index.ts` no longer contains `wrapEngineAsAttachment(...)` or equivalent built-in wrapper fallback for markdown/sqlite.
  - Confirm no production code imports `MarkdownStorageEngine` or `SqliteStorageEngine` from `src/sdk/storage/*`.
  - Run targeted SDK tests covering markdown engine behavior, sqlite engine behavior, and plugin resolution.
  - Run the build task to verify imports and public exports still compile.

risks:
  - risk: Deleting or shrinking `src/sdk/storage/*` may break residual imports or tests that still assume legacy paths.
    mitigation: Update all in-repo imports in the same change set and treat broken legacy imports as intentional cleanup unless they block app behavior.
  - risk: Moving large engine classes can accidentally change runtime behavior while preserving type compatibility.
    mitigation: Keep the move surgical, preserve constructor/method signatures, and run existing markdown/sqlite regression tests immediately after each engine relocation.
  - risk: Removing `wrapEngineAsAttachment(...)` could subtly change attachment resolution defaults.
    mitigation: Replace it with explicit plugin-owned providers and verify both the default markdown path and explicit sqlite attachment path before cleanup is finalized.

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: Engine classes are moved into plugin files, but a hidden import path still instantiates a deleted legacy storage class.
      likelihood: medium
      impact: high
      mitigation: Grep for all `storage/markdown`, `storage/sqlite`, `MarkdownStorageEngine`, and `SqliteStorageEngine` references before deleting legacy files.
    - scenario: Resolver cleanup removes the wrapper path but leaves no explicit built-in provider for the default attachment flow.
      likelihood: medium
      impact: high
      mitigation: Land the explicit localfs/sqlite attachment-provider path before deleting wrapper-based logic.
  assumptions:
    - The existing follow-up plan has not been implemented yet, so updating it in place is lower-noise than creating a new successor plan.
    - Backward-compatible import paths are not a requirement for this pass.
    - Preserving working app behavior means preserving runtime behavior for default markdown and configured sqlite flows inside this repository, not preserving every historical export path.

implementation_specification:
  code_structure: |
    Treat `src/sdk/plugins/` as the sole ownership boundary for built-in engines and built-in
    storage providers. Leave `src/sdk/storage/types.ts` as the shared interface home if useful,
    but remove engine constructors/factories from `src/sdk/storage/*`. Keep the refactor surgical:
    move existing class bodies rather than rewriting behavior, introduce only the minimal new
    plugin file(s) needed to replace wrapper-based attachment resolution, and update the SDK export
    surface only where required to stop pointing at legacy engine files.
  affected_areas:
    - src/sdk/plugins/
    - src/sdk/storage/
    - src/sdk/types.ts
    - src/sdk/__tests__/
  component_details:
    - component: Markdown plugin-owned engine
      responsibility: Own the markdown engine class and the built-in markdown card-storage plugin.
      interfaces:
        - "`MarkdownStorageEngine` exported from `src/sdk/plugins/markdown.ts`"
        - "`MARKDOWN_PLUGIN` exported from `src/sdk/plugins/markdown.ts`"
    - component: Sqlite plugin-owned engine
      responsibility: Own the sqlite engine class, sqlite card-storage plugin, and sqlite attachment-provider logic.
      interfaces:
        - "`SqliteStorageEngine` exported from `src/sdk/plugins/sqlite.ts`"
        - "`SQLITE_PLUGIN` exported from `src/sdk/plugins/sqlite.ts`"
        - "Explicit sqlite attachment plugin/factory in `src/sdk/plugins/sqlite.ts`"
    - component: Built-in attachment provider registry
      responsibility: Resolve explicit built-in attachment providers without synthesizing them from generic engine wrappers.
      interfaces:
        - "Built-in attachment provider resolution in `src/sdk/plugins/index.ts`"
        - "Optional `src/sdk/plugins/localfs.ts` module if localfs needs its own explicit provider"
    - component: Legacy storage cleanup
      responsibility: Remove or demote old storage-layer engine/factory files so they no longer own built-in engines.
      interfaces:
        - "Reduced or deleted `src/sdk/storage/markdown.ts`"
        - "Reduced or deleted `src/sdk/storage/sqlite.ts`"
        - "Reduced or deleted `src/sdk/storage/index.ts`"
  dependencies:
    - component: Markdown plugin-owned engine
      relationship: Must land before markdown tests/imports can stop referencing `src/sdk/storage/markdown.ts`.
    - component: Sqlite plugin-owned engine
      relationship: Must land before registry cleanup can stop depending on legacy sqlite engine imports.
    - component: Built-in attachment provider registry
      relationship: Depends on the plugin-owned engines/providers so wrapper-based fallback can be removed safely.
    - component: Legacy storage cleanup
      relationship: Depends on relocated imports and updated tests so deleted/demoted files are no longer referenced.
  integration_points:
    - `src/sdk/plugins/index.ts` remains the single resolver entry point.
    - `src/sdk/types.ts` is the main SDK public surface that must stop pointing at legacy engine files.
    - `src/sdk/__tests__/plugin-registry.test.ts` is the best regression point for provider ownership and resolution behavior.

