plan_id: 20260319-storage-plugin-system
objective: |
	Implement a plugin system for storage engines so users can install an engine as an npm package
	and select it in `.kanban.json`; move file/existence concerns behind capability abstractions;
	add a built-in MySQL engine/plugin; and support attachment storage either from the same plugin
	or from a separate plugin, while preserving backward compatibility and SDK/API/CLI/MCP parity.
created_at: "2026-03-19"
created_by: gem-planner
status: completed
research_confidence: high

tldr: |
	The lowest-risk path is to keep the current SDK as the single orchestrator, but replace the hard-coded
	`StorageEngine` selection with a capability-based plugin registry that resolves `card.storage`,
	`attachment.storage`, and optional node-only capabilities such as local file access and watch roots.
	Legacy `storageEngine` / `sqlitePath` config must continue to work by normalizing into the new internal
	capability map, while built-in markdown/sqlite implementations are wrapped as first-party plugins.
	MySQL should ship as a built-in first-party plugin module with lazy optional driver loading, and all host
	layers must consume capability metadata instead of assuming markdown files or local attachment paths.

open_questions:
	- "Should the built-in MySQL plugin bundle a driver dependency in the package, or treat `mysql2` as a soft runtime requirement loaded lazily with a clear install error?"
	- "Should plugin package resolution search only the app package plus workspace `node_modules`, or also support absolute/local file references for development plugins?"
	- "Do we want the first release to include a generic plugin-to-plugin migration command, or is fresh-config support plus retained sqlite/markdown migration aliases sufficient?"
	- "For non-file-backed card storage, should the editing flow materialize temporary files only, or should a new host-side editor contract be introduced immediately for richer remote editing?"

pre_mortem:
	overall_risk_level: high
	critical_failure_modes:
		- scenario: Legacy workspaces silently switch behavior because new config parsing no longer treats missing storage settings as markdown defaults.
			likelihood: medium
			impact: critical
			mitigation: |
				Normalize legacy config first, keep markdown as the default when no capability is configured,
				and add regression coverage proving old `.kanban.json` files still resolve to the same runtime
				behavior as before.
		- scenario: Node host layers continue to assume local markdown files and break when a plugin is remote-backed or does not expose direct filesystem paths.
			likelihood: high
			impact: high
			mitigation: |
				Introduce explicit node-only capabilities for file access/watch roots/materialized edit buffers,
				migrate host code to those capabilities before enabling MySQL/non-file-backed plugins by default,
				and preserve `card.filePath` only as a transitional compatibility field.
		- scenario: External plugin loading expands the attack surface or destabilizes the extension/server via eager imports or version mismatches.
			likelihood: medium
			impact: high
			mitigation: |
				Restrict plugin loading to node-hosted layers, load lazily, validate manifest shape before use,
				surface deterministic errors, and keep the built-in registry path independent from third-party
				package resolution.
		- scenario: MySQL support forces a hard dependency or bundling change that bloats existing installs or breaks current build scripts.
			likelihood: medium
			impact: high
			mitigation: |
				Keep the MySQL driver optional and lazily loaded, mark it external in node builds if needed,
				and verify markdown/sqlite workflows still build and run without the MySQL driver installed.
	assumptions:
		- Existing markdown and sqlite implementations should remain the reference behavior and be adapted rather than rewritten.
		- Webview code will not load plugins directly; all plugin resolution happens in node-hosted SDK consumers.
		- Backward compatibility is a release requirement for `.kanban.json`, CLI commands, MCP tools, and server responses.
		- Attachment metadata can remain filename-based initially, provided storage/path resolution moves behind capability contracts.
		- There is no existing `docs/prd.yaml`, so this plan does not need to reconcile against a prior PRD.

implementation_specification:
	code_structure: |
		Add a new SDK plugin layer under `src/sdk/plugins/` that owns plugin manifests, capability types,
		built-in registrations, and node-only package loading. The SDK should resolve a typed capability bag
		during construction or init, then delegate card storage, attachment storage, file access, and watch-root
		discovery through those capabilities instead of directly branching on `'markdown' | 'sqlite'`. Keep
		`src/shared/config.ts` as the single config normalization point: legacy fields are still read/written,
		but the SDK consumes an internal normalized capability selection structure. Existing markdown/sqlite engine
		code should be wrapped behind adapter plugins first; MySQL then plugs into the same contracts.
	affected_areas:
		- src/shared/config.ts
		- src/sdk/types.ts
		- src/sdk/KanbanSDK.ts
		- src/sdk/storage/types.ts
		- src/sdk/storage/index.ts
		- src/sdk/modules/attachments.ts
		- src/sdk/modules/cards.ts
		- src/sdk/modules/migration.ts
		- src/sdk/plugins/
		- src/standalone/server.ts
		- src/extension/KanbanPanel.ts
		- src/extension/index.ts
		- src/cli/index.ts
		- src/mcp-server/index.ts
		- src/sdk/__tests__/
		- src/standalone/__tests__/server.integration.test.ts
		- README.md
		- CHANGELOG.md
	component_details:
		- component: Capability config normalization
			responsibility: Translate legacy and new `.kanban.json` storage settings into a single normalized capability-selection model while preserving backward-compatible defaults and writes.
			interfaces:
				- "Normalized config reader/writer in `src/shared/config.ts`"
				- "Internal capability selection shape for `card.storage`, `attachment.storage`, and future namespaces"
		- component: SDK plugin registry and loader
			responsibility: Resolve built-in and external plugin packages, validate plugin manifests, and expose a typed capability bag to the SDK without involving the webview.
			interfaces:
				- "Plugin manifest / capability interfaces in `src/sdk/plugins` and `src/sdk/storage/types.ts`"
				- "Registry/loader entry point consumed by `KanbanSDK`"
		- component: Built-in plugin adapters
			responsibility: Adapt existing markdown/sqlite implementations plus local-filesystem attachment handling into first-party plugins that satisfy the new capability contracts.
			interfaces:
				- "Built-in markdown card storage plugin"
				- "Built-in sqlite card storage plugin"
				- "Built-in local-filesystem attachment storage plugin"
		- component: MySQL plugin
			responsibility: Provide first-party `card.storage` support for MySQL, optionally co-providing `attachment.storage` later but initially interoperating with the filesystem attachment plugin.
			interfaces:
				- "Built-in MySQL plugin manifest"
				- "Lazy Node-only driver loading and connection configuration"
		- component: Host capability consumers
			responsibility: Replace direct file-path and watcher assumptions in extension/standalone/CLI/MCP layers with capability-aware flows and expose active plugin/capability info for supportability.
			interfaces:
				- "Host-side file access / temporary materialization helpers"
				- "Workspace info/status responses that report active capability providers"
	dependencies:
		- component: Capability config normalization
			relationship: Must land before loader and host changes so both legacy and new config shapes resolve consistently.
		- component: SDK plugin registry and loader
			relationship: Depends on normalized config and provides the capability bag consumed by adapters, MySQL, and host layers.
		- component: Built-in plugin adapters
			relationship: Depend on the registry/loader contracts and provide backward-compatible runtime behavior for existing workspaces.
		- component: MySQL plugin
			relationship: Depends on registry/loader contracts and on the migration/status surface exposed by the SDK.
		- component: Host capability consumers
			relationship: Depend on the resolved capability bag and optional file-access/watch capabilities to avoid raw storage branching.
	integration_points:
		- `src/shared/config.ts` is the only safe place to normalize legacy `storageEngine` / `sqlitePath` into capability selections.
		- `KanbanSDK` constructor/init is the seam where plugins should be resolved and attached; interface layers should not duplicate resolution logic.
		- `src/standalone/server.ts` and `src/extension/KanbanPanel.ts` currently branch on file-backed assumptions and must be migrated to capability-driven paths/watchers.
		- `src/cli/index.ts` and `src/mcp-server/index.ts` already expose storage status/migration surfaces and must remain parity-aligned with the SDK changes.
		- README, CHANGELOG, and autogenerated docs must reflect the final config shape and legacy compatibility story.

