			capability namespaces, and compatibility normalization from legacy `storageEngine` / `sqlitePath`
			fields. This task should also define the minimum node-only abstractions needed to remove raw
			file/existence assumptions from host layers later, while preserving default markdown behavior for
			existing workspaces.
		wave: 1
		agent: gem-implementer
		priority: high
		status: completed
		dependencies: []
		context_files:
			src/shared/config.ts: "Current permissive `.kanban.json` reader/writer and the safest place to normalize old and new config shapes."
			src/sdk/storage/types.ts: "Current narrow storage abstraction that must evolve into capability-oriented contracts."
			src/sdk/types.ts: "Public SDK options surface that currently exposes only storageEngine/sqlitePath overrides."
		estimated_effort: medium
		estimated_files: 3
		estimated_lines: 220
		focus_area: plugin contracts and backward compatibility
		verification:
			- "Legacy configs with no storage keys still resolve to markdown via the normalized model."
			- "Legacy sqlite configs normalize to a provider selection without changing runtime behavior."
			- "TypeScript surfaces remain backward-compatible for existing SDK callers."
		acceptance_criteria:
			- "A normalized capability selection model exists for `card.storage`, `attachment.storage`, and future namespaces."
			- "Legacy `storageEngine` / `sqlitePath` inputs map deterministically into the new model."
			- "The config layer can still round-trip old workspaces without forcing immediate migration."
		failure_modes:
			- scenario: The normalized model is too storage-specific and blocks future capabilities.
				likelihood: medium
				impact: high
				mitigation: "Keep provider selection generic and capability-keyed; avoid hard-coding engine-specific fields into the core schema."
			- scenario: Config writes drop unknown fields from permissive user configs.
				likelihood: medium
				impact: high
				mitigation: "Retain permissive merge behavior and add regression tests for unknown-field preservation where currently supported."
		tech_stack:
			- TypeScript
			- Existing shared config utilities
		test_coverage: "Add/extend config normalization and SDK option tests before loader work begins."

	- id: T2
		title: Build the SDK plugin registry, loader, and built-in markdown/sqlite/localfs adapters
		description: |
			Add a node-hosted plugin registry/loader that can resolve built-in providers first and lazily load
			external npm packages when configured. Adapt the existing markdown and sqlite implementations into
			first-party `card.storage` plugins, and split the local attachment behavior into a first-party
			`attachment.storage` plugin that can either be selected explicitly or inherited from the card plugin
			when the provider exposes both capabilities.
		wave: 2
		agent: gem-implementer
		priority: high
		status: completed
		dependencies:
			- T1
		context_files:
			src/sdk/storage/index.ts: "Current factory that hard-codes markdown/sqlite selection and bootstrap parsing."
			src/sdk/KanbanSDK.ts: "Constructor/init path where capability resolution should become the single runtime entry point."
			src/sdk/storage/markdown.ts: "Reference behavior to preserve via an adapter plugin rather than a rewrite."
		estimated_effort: large
		estimated_files: 3
		estimated_lines: 380
		focus_area: runtime plugin loading and built-in adaptation
		verification:
			- "SDK init resolves markdown/sqlite through the registry using both legacy and new config shapes."
			- "External plugin loading fails with deterministic validation/install errors instead of crashes."
			- "Attachment storage can come from the same provider or a separate provider without branching in callers."
		acceptance_criteria:
			- "Built-in markdown and sqlite behavior is available via the plugin registry."
			- "A built-in local-filesystem attachment plugin exists and can be selected independently."
			- "The SDK receives a resolved capability bag rather than branching directly on storage type."
		failure_modes:
			- scenario: Loader behavior differs between extension/server/CLI entry points.
				likelihood: medium
				impact: high
				mitigation: "Keep plugin resolution inside shared SDK code and forbid host-specific resolution logic."
			- scenario: Attachment provider fallback rules are ambiguous.
				likelihood: medium
				impact: medium
				mitigation: "Define explicit precedence: configured attachment provider → same card plugin if it implements attachment.storage → built-in localfs provider."
		tech_stack:
			- TypeScript
			- Node module resolution
			- Existing markdown/sqlite storage implementations
		test_coverage: "Add registry/loader tests plus adapter parity tests for built-in providers."

	- id: T3
		title: Migrate SDK host seams from raw file paths to capability-based file and watch abstractions
		description: |
			Remove direct file/existence assumptions from attachment handling, open-in-editor flows, and watcher
			setup. Introduce optional node-only capabilities for resolving a local attachment path, materializing
			an editable card buffer, and declaring watch roots or watchability. Update extension and standalone
			server flows to consume those capabilities first, while keeping `card.filePath` and markdown/sqlite
			behavior available as transitional fallbacks.
		wave: 3
		agent: gem-implementer
		priority: high
		status: completed
