plan_id: 20260320-auth-authz-plugin-architecture
objective: |
  Introduce a concrete auth/authz plugin architecture that supports both identity
  and policy capabilities, ships with token-based authentication and action-level
  authorization in v1, keeps all enforcement SDK-first, and preserves parity
  across the standalone server, VS Code extension, CLI, and MCP surfaces.
created_at: "2026-03-20"
created_by: gem-documentation-writer
status: pending_approval
research_confidence: high

tldr: |
  The safest rollout is to extend the existing capability/plugin direction with two
  new Node-hosted namespaces: `auth.identity` for token validation and principal
  resolution, and `auth.policy` for action authorization decisions. v1 should stop
  at pre-action authorization only—no row/card filtering, no browser-hosted plugins,
  and no host-specific business logic forks. Hosts own token acquisition/storage,
  but the SDK remains the single orchestrator for identity resolution, policy checks,
  error semantics, and parity across API, CLI, MCP, extension, and standalone flows.

open_questions:
  - Should the standalone server persist bearer tokens in config only when explicitly enabled, with in-memory tokens as the default safety posture?
  - Which read-side actions should be included in the initial authorization matrix beyond mutating operations (for example `card.get`, `card.list`, `attachment.open`)?

pre_mortem:
  overall_risk_level: high
  critical_failure_modes:
    - scenario: Interface layers add direct permission checks or bypass checks entirely, causing authorization drift between SDK, REST, CLI, MCP, and extension flows.
      likelihood: medium
      impact: critical
      mitigation: |
        Keep authorization SDK-first. Every host must translate inbound request state into
        one shared auth context and delegate the check to SDK-owned identity/policy hooks
        before privileged operations execute.
    - scenario: Tokens are logged, written to insecure workspace files, or leaked back to the webview.
      likelihood: medium
      impact: critical
      mitigation: |
        Keep secret storage adapter-specific and outside `.kanban.json`. VS Code uses
        SecretStorage, standalone defaults to memory/config with explicit opt-in, and CLI/MCP
        use env/config sources. Sanitize logs/errors so tokens never appear in payloads.
    - scenario: Browser or webview code tries to execute plugins directly, creating packaging and security problems.
      likelihood: low
      impact: high
      mitigation: |
        Restrict v1 plugin execution to Node-hosted surfaces only. The webview only renders
        auth state and forwards user actions; it never loads or invokes auth/authz plugins.
    - scenario: Policy plugins begin assuming row/card filtering in v1 and force list/query changes across storage providers.
      likelihood: medium
      impact: high
      mitigation: |
        Freeze v1 scope to action-level authorization checks only. Defer row/card filtering,
        scoped query rewriting, and partial-result semantics to stage 2+ architecture work.
  assumptions:
    - The existing SDK/plugin direction is the reference model for new capability namespaces and provider loading.
    - `src/sdk/KanbanSDK.ts` remains the single orchestration seam for cross-surface auth/authz behavior.
    - Host layers can supply enough request context (token source, transport, board/card target, action name) without embedding authorization logic.
    - Token-based identity is sufficient for the first release; interactive OAuth/browser-based login flows are not required in v1.
    - This plan establishes stage-1 architecture and stage-2 requirements only; implementation work lands afterward.

implementation_specification:
  code_structure: |
    Add auth/authz plugin contracts beside the existing SDK capability/plugin system so the
    SDK resolves `auth.identity` and `auth.policy` providers during initialization. Keep
    host-specific logic narrow: extension, standalone, CLI, and MCP adapters only acquire,
    store, and attach tokens/context. All principal resolution, authorization decisions,
    denial/error mapping, and parity behavior remain SDK-owned. Public surfaces should expose
    stable auth status diagnostics, but they must not duplicate policy logic.
  affected_areas:
    - src/shared/config.ts
    - src/shared/types.ts
    - src/sdk/types.ts
    - src/sdk/KanbanSDK.ts
    - src/sdk/plugins/
    - src/sdk/modules/
    - src/standalone/server.ts
    - src/extension/KanbanPanel.ts
    - src/extension/index.ts
    - src/cli/index.ts
    - src/mcp-server/index.ts
    - README.md
    - CHANGELOG.md
  component_details:
    - component: capability contracts and config normalization
      responsibility: Define provider references and normalized config for `auth.identity` and `auth.policy` without storing bearer tokens in `.kanban.json`.
      interfaces:
        - "Capability selections in `src/shared/config.ts`"
        - "Shared auth context and authorization result types in `src/shared/types.ts` / `src/sdk/types.ts`"
    - component: identity plugin capability
      responsibility: Validate or interpret token-based credentials and return a normalized principal/claims object to the SDK.
      interfaces:
        - "`auth.identity` capability contract"
        - "Principal/result shape returned to `KanbanSDK`"
    - component: policy plugin capability
      responsibility: Decide whether a named action is allowed for the resolved principal and request context.
      interfaces:
        - "`auth.policy` capability contract"
        - "Action authorization decision contract with allow/deny and reason codes"
    - component: SDK authorization runtime
      responsibility: Resolve auth providers, build auth context, run pre-action checks, and convert denials into stable SDK/API/CLI/MCP/extension errors.
      interfaces:
        - "`KanbanSDK` auth runtime/context helpers"
        - "Pre-action authorization hooks around privileged SDK methods"
    - component: host adapters and token storage
      responsibility: Acquire tokens from host-specific sources and map them into the shared SDK auth context without embedding policy logic.
      interfaces:
        - "VS Code SecretStorage adapter"
        - "Standalone memory/config adapter"
        - "CLI/MCP env/config adapter"
  dependencies:
    - component: capability contracts and config normalization
      relationship: Must land first so SDK and host layers share one provider and context vocabulary.
    - component: identity plugin capability
      relationship: Depends on normalized capability loading and feeds principal data into policy checks.
    - component: policy plugin capability
      relationship: Depends on the identity result shape and defines the decision contract consumed by SDK methods.
    - component: SDK authorization runtime
      relationship: Depends on identity and policy contracts and blocks all interface-layer parity work.
    - component: host adapters and token storage
      relationship: Depend on the shared auth context contract and unblock end-to-end flows in standalone, extension, CLI, and MCP.
  integration_points:
    - `src/shared/config.ts` is the normalization seam for provider selection, but must not become a secret store.
    - `src/sdk/KanbanSDK.ts` is the only safe place to orchestrate identity resolution and policy enforcement across interfaces.
    - `src/standalone/server.ts` should attach bearer-token/request metadata to SDK calls, not make authorization decisions itself.
    - `src/cli/index.ts` and `src/mcp-server/index.ts` should read token sources from env/config and delegate enforcement to SDK methods.
    - `src/extension/KanbanPanel.ts` and `src/extension/index.ts` should use SecretStorage-backed adapters and keep the webview free of plugin execution.
    - README and CHANGELOG remain mandatory completion surfaces once implementation begins.

contracts:
  - from_task: T1
    to_task: T2
    interface: Stable capability/config vocabulary for auth providers
    format: "Typed provider-selection model for `auth.identity` and `auth.policy` plus host-owned token-source metadata"
  - from_task: T2
    to_task: T3
    interface: Identity resolution result
    format: "Principal object + claims + token metadata + authentication status/error shape"
  - from_task: T3
    to_task: T4
    interface: Policy decision contract
    format: "Action authorization result with allow/deny, reason code, and optional audit metadata"
  - from_task: T4
    to_task: T5
    interface: Host adapter input shape
    format: "Shared auth context passed from standalone/extension/CLI/MCP into SDK methods"
  - from_task: T5
    to_task: T6
    interface: Public parity and diagnostics contract
    format: "Stable error/status surface for API responses, CLI output, MCP tool errors, and extension UX"

tasks:
