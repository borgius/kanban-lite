    description: |
      Extend the plugin/capability model with `auth.identity` and `auth.policy`, define
      the shared provider reference/config contract, and document that bearer tokens are not
      persisted in `.kanban.json`. This task should also define the shared auth context shape
      that every host surface passes into SDK operations.
    wave: 1
    agent: gem-implementer
    priority: high
    status: pending
    dependencies: []
    context_files:
      src/shared/config.ts: "Current capability/provider normalization seam and the right place to define provider selection without storing secrets."
      src/shared/types.ts: "Shared cross-surface types that will carry principal/auth context diagnostics."
      src/sdk/types.ts: "SDK request/response contracts that need auth-aware context and denial semantics."
    estimated_effort: medium
    estimated_files: 3
    estimated_lines: 220
    focus_area: auth_contracts_and_config
    verification:
      - "Provider selection supports both `auth.identity` and `auth.policy` without requiring tokens in workspace config."
      - "All host surfaces can construct the same auth context shape."
      - "Backward compatibility is preserved when no auth plugins are configured."
    acceptance_criteria:
      - "Capability namespaces for identity and policy are defined and documented."
      - "Config normalization clearly separates provider selection from secret/token storage."
      - "An unauthenticated/no-plugin path remains valid for current workspaces."
    failure_modes:
      - scenario: Secret/token fields are added to `.kanban.json`, creating an insecure baseline.
        likelihood: medium
        impact: critical
        mitigation: "Keep token storage outside workspace config and document allowed host adapters explicitly."
    tech_stack:
      - TypeScript
      - Node.js
    test_coverage: null

