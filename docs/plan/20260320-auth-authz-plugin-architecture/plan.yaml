    description: |
      Add the auth runtime scaffold in `KanbanSDK` so SDK methods can accept a shared auth context,
      resolve the configured identity provider, and return a normalized principal/claims result.
      The first implementation should include a safe no-op/default identity path so current users are
      unaffected until providers are configured.
    wave: 2
    agent: gem-implementer
    priority: high
    status: pending
    dependencies:
      - T1
    context_files:
      src/sdk/KanbanSDK.ts: "Primary orchestration seam for capability loading and cross-surface behavior."
      src/sdk/plugins/: "Existing plugin/capability loading pattern to extend for auth providers."
      src/sdk/types.ts: "SDK method/context contracts and stable error/result types."
    estimated_effort: medium
    estimated_files: 4
    estimated_lines: 260
    focus_area: sdk_identity_runtime
    verification:
      - "Current workspaces still function when no auth plugins are configured."
      - "Identity resolution normalizes token metadata without exposing raw secrets in logs/errors."
      - "Standalone, extension, CLI, and MCP can all pass auth context into the same SDK seam."
    acceptance_criteria:
      - "`KanbanSDK` owns identity resolution."
      - "A normalized principal/authentication result shape exists."
      - "The default/no-op path is deterministic and backward compatible."
    failure_modes:
      - scenario: Host layers start resolving principals independently and drift from SDK behavior.
        likelihood: medium
        impact: high
        mitigation: "Keep principal resolution inside SDK and treat host adapters as token/context suppliers only."
    tech_stack:
      - TypeScript
      - Node.js
    test_coverage: null

  - id: T3
    title: Add policy authorization contracts and pre-action SDK enforcement
    description: |
      Introduce `auth.policy` contracts and wire pre-action authorization checks around the SDK
      operations that mutate state or expose privileged side effects. v1 scope stops at named action
      checks only; list filtering, partial card visibility, and query rewriting are explicitly deferred.
    wave: 3
    agent: gem-implementer
    priority: high
    status: pending
    dependencies:
      - T2
    context_files:
      src/sdk/KanbanSDK.ts: "Place to wrap privileged methods with one enforcement path."
      src/sdk/modules/: "Mutation and side-effect seams where action names should be standardized."
      src/shared/types.ts: "Shared action names and auth decision diagnostics exposed to hosts."
    estimated_effort: large
    estimated_files: 5
    estimated_lines: 320
    focus_area: pre_action_authorization
    verification:
