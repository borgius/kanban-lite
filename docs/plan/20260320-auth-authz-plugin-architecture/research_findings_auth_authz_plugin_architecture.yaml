planning_convention_findings:
  - Existing `docs/plan/*/plan.yaml` files use a repo-native structure with `objective`, `tldr`, `pre_mortem`, `implementation_specification`, `contracts`, and wave-based `tasks`.
  - Research artifacts under `docs/plan/*/research_findings_*.yaml` favor concrete file references, confidence/coverage metadata, and explicit implications for the next planning or implementation stage.
  - Planning docs consistently reinforce the AGENTS guidance that business logic belongs in the SDK first and that API/CLI/MCP parity follows from the SDK contract.

architecture_findings:
  capability_model:
    observation: >-
      The repo already normalizes provider-based capabilities for storage. Reusing that
      mechanism for auth/authz reduces architectural novelty and keeps host-layer loading
      behavior consistent.
    implication: >-
      The auth architecture should introduce two new namespaces rather than a standalone
      auth-plugin subsystem.

  sdk_as_enforcement_seam:
    observation: >-
      All major host surfaces construct or depend on `KanbanSDK`, while interface layers are
      expected to delegate business logic rather than duplicate it.
    implication: >-
      Identity resolution and authorization checks should be SDK-owned if parity is required.

  host_specific_secret_boundaries:
    observation: >-
      The extension host can rely on VS Code APIs, the standalone server owns HTTP request state,
      and CLI/MCP already use env/config style initialization.
    implication: >-
      Token acquisition/storage should stay adapter-specific, while the SDK consumes a normalized
      auth context and never depends on a single secret-storage mechanism.

  browser_execution_limits:
    observation: >-
      The extension webview loads a compiled standalone webview bundle and forwards actions back
      to the Node host; it is not a privileged runtime for workspace/plugin execution.
    implication: >-
      v1 auth/authz plugins should be Node-hosted only.

  authorization_scope_boundary:
    observation: >-
      Current repository contracts and planning patterns do not define row-level visibility,
      partial list responses, or storage-provider-specific filtering behavior.
    implication: >-
      v1 should stay at action-level authorization. Row/card filtering needs a later stage with
      dedicated storage/query contract work.

decisions_confirmed:
  - "Support both identity and policy plugin capabilities."
  - "v1 authorization scope is action-level only; row/card filtering is deferred."
  - "v1 authentication mode is token-based."
  - "Host storage decisions are adapter-specific: extension SecretStorage, standalone memory/config, CLI/MCP env/config."
  - "Plugins are Node-hosted only in v1."
  - "Stage-1 architecture docs and a stage-2 architecture requirements document are required before implementation."

recommended_contract_baseline:
  capability_namespaces:
    - auth.identity
    - auth.policy
  auth_context_shape:
    - token_source
    - token_present
    - raw_token (write-only at host boundary; never logged or surfaced)
    - transport
    - actor_hint
    - board_id
    - card_id
    - action
  principal_shape:
    - principal_id
    - display_name
    - claims
    - provider_id
    - authenticated
  policy_decision_shape:
    - allowed
    - reason_code
    - message
    - audit

gaps:
  - No existing auth/authz capability namespaces or provider contracts are defined today.
  - No shared request-auth context is threaded through SDK methods yet.
  - No stable authorization error/status vocabulary exists across standalone, extension, CLI, and MCP.
  - No read-side filtering contract exists, which is why action-level authorization is the appropriate v1 boundary.
