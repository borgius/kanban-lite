plan_id: 20260320-auth-authz-plugin-architecture
objective: >-
  Investigate the repository seams, plugin/capability patterns, and host constraints
  relevant to introducing auth/authz plugins with SDK-first parity across standalone,
  extension, CLI, and MCP.
focus_area: auth-authz-plugin-architecture
created_at: "2026-03-20"
created_by: gem-documentation-writer
status: completed

tldr: |
  - The repository already has a capability/plugin vocabulary in `src/shared/config.ts` and `src/sdk/KanbanSDK.ts`, making it practical to introduce auth capabilities as additional Node-hosted namespaces instead of inventing a second extension point.
  - `KanbanSDK` is the only cross-surface seam shared by standalone, extension, CLI, and MCP, so identity resolution and policy enforcement belong there if parity is a hard requirement.
  - Each host surface has a natural token-ingestion/storage boundary: VS Code can use SecretStorage, the standalone server can bind request/config state, and CLI/MCP already rely on environment/config patterns.
  - The webview is not a viable plugin host; the extension panel is wired to `dist/standalone-webview`, while Node-hosted code handles workspace access and privileged operations.
  - The cleanest v1 boundary is pre-action authorization only. Row/card filtering would force storage/list/query semantics that do not exist in the current contracts.

