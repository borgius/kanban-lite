plan_id: 20260320-card-formdata-partial-template-interpolation
objective: |
  Support partial `Card.formData` entries and add template-literal-style form/template preparation
  that can interpolate against full card context (`id`, `boardId`, `status`, `priority`, `assignee`,
  `dueDate`, `metadata`, and related card fields) while preserving existing public submit/create APIs.
created_at: "2026-03-20"
created_by: gem-planner
status: completed
research_confidence: high

tldr: |
  The smallest safe rollout is SDK-first and dependency-free: introduce one local, browser-safe
  interpolation/preparation helper, wire it into SDK form resolution first, then reuse the same
  preparation contract in the webview resolver so rendered prefills and submit-time behavior stay in
  sync. Interface layers should not need behavioral code changes because REST, CLI, MCP, and the
  extension already delegate form submission to the SDK; the main non-code follow-up is targeted
  regression coverage plus README/forms/changelog updates.

open_questions:
  - Should unresolved placeholders remain literal text or resolve to an empty string during preparation? The implementation should pick one rule and lock it in tests/docs.

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: Interpolation is implemented with arbitrary JavaScript evaluation (`new Function`-style) and turns card/config data into code execution input.
      likelihood: medium
      impact: critical
      mitigation: |
        Treat "template-literal-style" as `${path}` placeholder syntax only, backed by explicit path lookup
        over card context. Keep the helper dependency-free and expression-free unless requirements are revised.
    - scenario: SDK and webview preparation drift, causing the form tab to show different prefills than the SDK validates/persists.
      likelihood: medium
      impact: high
      mitigation: |
        Reuse one shared pure helper or one shared preparation contract, and add paired SDK/webview tests for
        the same card/form fixture.
    - scenario: Partial stored `formData` accidentally changes canonical submit semantics, causing missing defaults/metadata after save.
      likelihood: medium
      impact: high
      mitigation: |
        Keep the current canonical submit contract: prepared `initialData` plus submitted delta still produces
        the validated full payload persisted to `card.formData[form.id]`.
  assumptions:
    - The existing `CardFormDataMap` shape can stay structurally compatible; the change is primarily semantic/JSDoc plus preparation behavior, not a breaking transport redesign.
    - REST, CLI, MCP, and extension submit paths do not require code changes unless tests reveal contract leakage, because they already call `sdk.submitForm(...)`.
    - A browser-safe pure helper can live in a shared module without pulling Node-only SDK dependencies into the webview bundle.
    - Metadata overlay precedence must remain intact after interpolation is introduced.
    - No `docs/prd.yaml` exists at planning time, so there is no PRD conflict to resolve before approval.

implementation_specification:
  code_structure: |
    Keep the rollout surgical and SDK-first. Define a small local preparation helper that builds a card-context
    lookup model and interpolates string leaves within nested form-data objects, then apply it in SDK form
    resolution before touching the webview duplicate. Preserve the current public API surface and submit/result
    shapes; only clarify semantics in JSDoc/comments where `formData` can now be partial at rest but prepared
    form data remains canonical at runtime.
  affected_areas:
    - src/shared/types.ts
    - src/shared/formDataPreparation.ts
    - src/sdk/modules/cards.ts
    - src/sdk/KanbanSDK.ts
    - src/webview/components/CardFormTab.tsx
    - src/webview/components/MarkdownEditor.tsx
    - src/sdk/__tests__/submit-form.test.ts
    - src/webview/components/CardFormTab.test.tsx
    - src/standalone/__tests__/server.integration.test.ts
    - README.md
    - docs/forms.md
    - CHANGELOG.md
  component_details:
    - component: form-data preparation helper
      responsibility: Build the full card interpolation context and prepare nested form data by replacing string placeholders without evaluating arbitrary code.
      interfaces:
        - "prepareFormData(value: Record<string, unknown>, cardContext: {...}): Record<string, unknown>"
        - "resolveTemplateString(template: string, cardContext: {...}): string"
    - component: SDK resolved-form preparation
      responsibility: Apply the helper to config defaults, attachment defaults, and persisted per-form data before metadata overlay and submit-time merge/validation.
      interfaces:
        - "resolveCardForms(ctx, card): ResolvedFormDescriptor[]"
        - "submitForm(input): SubmitFormResult"
    - component: webview resolved-form preparation
      responsibility: Reuse the same preparation semantics for the card form tab so UI-prefilled data matches SDK behavior.
      interfaces:
        - "resolveCardFormDescriptors(frontmatter, board?): ResolvedFormDescriptor[]"
    - component: regression/documentation layer
      responsibility: Lock the new semantics with focused tests and document supported placeholder examples plus safety boundaries.
      interfaces:
        - "Vitest coverage for SDK/webview/transport parity"
        - "README/docs/forms/CHANGELOG entries"
  dependencies:
    - component: form-data preparation helper
      relationship: Blocks SDK and webview implementation because both consumers need the same placeholder-resolution contract.
    - component: SDK resolved-form preparation
      relationship: Blocks tests and documentation because it defines the canonical runtime behavior seen across submit surfaces.
    - component: webview resolved-form preparation
      relationship: Depends on the helper and SDK contract to avoid introducing a second behavior definition.
    - component: regression/documentation layer
      relationship: Depends on finalized SDK + webview behavior so examples and assertions match the shipped semantics.
  integration_points:
    - `src/sdk/modules/cards.ts` remains the authoritative form-resolution and submit path for SDK/API/CLI/MCP/extension submission.
    - `src/webview/components/CardFormTab.tsx` remains the only UI-side duplicate resolver that needs parity work.
    - `src/webview/components/MarkdownEditor.tsx` is the likely call-site ripple if the webview resolver needs broader card context than `forms/formData/metadata`.
    - `README.md` and `docs/forms.md` are the user-facing documentation sources for merge order and form authoring examples.
    - `CHANGELOG.md` must record the behavior change under `## [Unreleased]`.

