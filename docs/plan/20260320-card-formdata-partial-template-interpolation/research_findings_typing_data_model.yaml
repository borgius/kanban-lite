domain_security_considerations:
	sensitive_areas:
		- area: template/interpolation evaluation boundary
			location: would affect current preparation code in src/sdk/modules/cards.ts and src/webview/components/CardFormTab.tsx
			concern: >-
				There is no current code execution step. If “JavaScript template literals” is implemented via real
				expression evaluation, workspace config/card data could become code-execution input.
		- area: card context exposure
			location: prepared form data generation
			concern: >-
				Expanding preparation from metadata-only overlays to full card context exposes additional fields
				(`id`, `boardId`, timestamps, actions, etc.) into rendered/persisted payloads.
	authentication_patterns_in_domain: No authentication logic exists in this domain slice.
	authorization_patterns_in_domain: No authorization logic exists in this domain slice.
	data_validation_in_domain: >-
		Validation currently happens only after preparation/merge via AJV against the resolved schema;
		parser and create/update inputs do not enforce schema completeness for `formData`.

