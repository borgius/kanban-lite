plan_id: 20260320-card-formdata-partial-template-interpolation
objective: >-
	Investigate the typing/data-model impact of changing `Card.formData` to allow
	partial form data and adding form/template preparation support for JavaScript
	template-literal-style interpolation across full card context (`id`, `boardId`,
	`status`, `metadata`, and related fields).
focus_area: typing-data-model
created_at: 2026-03-20
created_by: GitHub Copilot (GPT-5.4)
status: completed

tldr: |
	- `formData` is typed consistently as `Record<string, Record<string, unknown>>` across shared, SDK, transport, and MCP layers; the type itself already permits sparse field sets, but submit-time behavior currently canonicalizes submissions into full merged objects.
	- Form preparation logic is duplicated in `src/sdk/modules/cards.ts` and `src/webview/components/CardFormTab.tsx`; both currently merge plain objects only and only overlay schema-matching `card.metadata` keys—there is no existing interpolation/template-evaluation helper.
	- The strongest “complete object” assumption lives in `submitForm()` and its tests: persisted `card.formData[formId]` and returned `result.data` are expected to equal the full resolved payload, not just the submitted delta.
	- Parser/storage/API boundaries round-trip arbitrary nested `formData` records without requiring schema completeness, so the behavior change is more semantic than storage-structure-driven.
	- The main edge cases are parity drift between SDK/UI preparation paths, ambiguity about whether interpolation applies only to strings or to nested structures, and security/escaping concerns if “JavaScript template literals” implies actual expression evaluation.

research_metadata:
	methodology: >-
		Hybrid retrieval using semantic_search for conceptual entry points, grep_search
		for exact symbols/merge points/tests, targeted read_file examination of type,
		SDK, parser, UI, MCP, docs, and tests, plus wc -l file metadata collection.
	scope: >-
		Focused on typing + data-model boundaries for forms: shared types, SDK form
		resolution/submission, parser/persistence round-trips, webview mirror logic,
		MCP schema typing, and direct tests/docs that lock current behavior.
	confidence: high
	coverage: 88

