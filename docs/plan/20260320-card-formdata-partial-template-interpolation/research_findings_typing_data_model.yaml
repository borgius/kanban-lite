patterns_found:
	- category: typing
		pattern: formData is modeled as a two-level record map, not a schema-derived or strongly typed payload.
		description: >-
			Every boundary uses the same broad shape (`Record<string, Record<string, unknown>>`),
			which permits sparse/nested objects at runtime but does not express “full canonical form data” versus “partial delta” in the type system.
		examples:
			- file: src/shared/types.ts
				location: src/shared/types.ts:348
				snippet: "export type CardFormDataMap = Record<string, Record<string, unknown>>"
			- file: src/mcp-server/index.ts
				location: src/mcp-server/index.ts:20
				snippet: "const cardFormDataMapSchema = z.record(z.string(), z.record(z.string(), z.unknown()))"
		prevalence: common

	- category: structure
		pattern: form preparation logic is duplicated between SDK and webview.
		description: >-
			Both code paths compute `initialData` independently using almost identical helper sets,
			which means any change to partial-data semantics or interpolation support must be kept in sync manually unless centralized.
		examples:
			- file: src/sdk/modules/cards.ts
				location: src/sdk/modules/cards.ts:77
				snippet: "const initialData = { ...cloneRecord(configForm?.data), ...cloneRecord(isRecord(attachment.data) ? attachment.data : undefined), ...cloneRecord(card.formData?.[formId]), ...getMetadataOverlay(card, schema) }"
			- file: src/webview/components/CardFormTab.tsx
				location: src/webview/components/CardFormTab.tsx:96
				snippet: "initialData: { ...cloneRecord(configForm?.data), ...cloneRecord(isRecord(attachment.data) ? attachment.data : undefined), ...cloneRecord(frontmatter.formData?.[formId]), ...getMetadataOverlay(frontmatter, schema) }"
		prevalence: common

	- category: architecture
		pattern: preparation currently overlays only schema-matching metadata, not full card context.
		description: >-
			The current helper surface has no concept of `id`, `boardId`, `status`, `priority`, or nested card objects during preparation; it selectively copies metadata keys that exist in schema properties.
		examples:
			- file: src/sdk/modules/cards.ts
				location: src/sdk/modules/cards.ts:40
				snippet: "Object.entries(card.metadata).filter(([key]) => properties.has(key))"
			- file: src/webview/components/CardFormTab.tsx
				location: src/webview/components/CardFormTab.tsx:26
				snippet: "function getMetadataOverlay(frontmatter: Pick<CardFrontmatter, 'metadata'>, schema: Record<string, unknown>)"
		prevalence: common

	- category: behavior
		pattern: submit-time persistence canonicalizes to a full resolved object.
		description: >-
			Although storage types are permissive, the authoritative SDK submit path merges defaults into the submitted delta and overwrites persisted `formData[formId]` with the whole validated object.
		examples:
			- file: src/sdk/modules/cards.ts
				location: src/sdk/modules/cards.ts:451
				snippet: "const submittedData = { ...cloneRecord(form.initialData), ...cloneRecord(input.data) }"
			- file: src/sdk/modules/cards.ts
				location: src/sdk/modules/cards.ts:461
				snippet: "card.formData = { ...(card.formData ?? {}), [form.id]: submittedData }"
		prevalence: common

	- category: testing
		pattern: tests lock in full-object semantics rather than delta semantics.
		description: >-
			Existing SDK/webview/integration tests assert that prepared and persisted form data includes merged defaults/metadata, which will fail if persistence changes to store partial-only deltas without an equivalent reconstruction layer.
		examples:
			- file: src/sdk/__tests__/submit-form.test.ts
				location: src/sdk/__tests__/submit-form.test.ts:76
				snippet: "expect(result.form.initialData).toEqual({ title: 'Config Title', severity: 'high', reporter: 'Alice' })"
			- file: src/sdk/__tests__/submit-form.test.ts
				location: src/sdk/__tests__/submit-form.test.ts:88
				snippet: "expect(reloaded?.formData?.['bug-report']).toEqual(result.data)"
			- file: src/webview/components/CardFormTab.test.tsx
				location: src/webview/components/CardFormTab.test.tsx:77
				snippet: "expect(form.initialData).toEqual({ title: 'Metadata title', severity: 'critical', configOnly: 'base', attachmentOnly: 'yes', persistedOnly: true })"
		prevalence: common

