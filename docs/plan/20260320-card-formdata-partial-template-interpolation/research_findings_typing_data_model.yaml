related_conventions:
	naming_patterns_in_domain: >-
		`formData` names persisted per-form records; `initialData` names prepared prefill state;
		`resolveCardForms`/`resolveCardFormDescriptors` mirror one another across SDK/UI.
	structure_of_domain: >-
		Shared types define the contract, SDK modules own behavior, parser/storage own round-trip persistence,
		and UI duplicates preparation logic for render parity rather than consuming a shared helper.
	error_handling_in_domain: >-
		Invalid submit payloads fail in SDK `submitForm()` after AJV validation; parser silently drops
		malformed `formData` entries that are not nested objects rather than throwing.
	testing_in_domain: >-
		Tests are split by concern: SDK submit semantics, parser round-trip, storage round-trip, webview parity,
		CLI passthrough, and standalone REST parity.
	documentation_in_domain: >-
		`docs/forms.md` explicitly documents current merge order and submit semantics; shared type comments also
		describe the merge contract, though type docs omit the attachment-data layer in one place.

