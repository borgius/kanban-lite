	data_flow_involving_domain: >-
		`formData` enters via create/update payloads, persists unchanged through parser/storage layers,
		is read during form resolution to build `ResolvedFormDescriptor.initialData`, then `submitForm()`
		merges submitted values on top and rewrites `card.formData[formId]` with the merged payload; the
		webview independently reconstructs equivalent prepared data for display.
