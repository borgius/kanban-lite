		- interface: ResolvedFormDescriptor
			location: src/shared/types.ts:358
			usage_pattern: Prepared form runtime object consumed by SDK submit path and webview rendering.
		- interface: CreateCardInput
			location: src/sdk/types.ts:12
			usage_pattern: Initial create-card boundary that accepts `formData` without normalization.
		- interface: SubmitFormInput
			location: src/sdk/types.ts:122
