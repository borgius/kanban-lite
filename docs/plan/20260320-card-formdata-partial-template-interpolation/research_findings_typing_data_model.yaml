open_questions:
	- question: Should "partial form data" mean only stored `card.formData[formId]` may be sparse, while prepared `initialData` and submit results remain canonical full objects?
		context: Current types use one broad alias for both persisted maps and prepared result objects, but submit behavior distinguishes them semantically.
	- question: Should interpolation run only for string values in `FormDefinition.data` / `attachment.data`, or also within persisted `card.formData` and submitted payloads?
		context: Current preparation is plain object spreading; there is no existing transformation stage.
	- question: Does "JavaScript template literals / interpolation" imply simple placeholder substitution against card context or full expression evaluation?
		context: The security and implementation surface changes materially depending on whether arbitrary expressions are allowed.
	- question: What should happen when an interpolated expression references missing nested fields or non-string values?
		context: Current code silently omits unrelated metadata rather than failing preparation.

gaps:
	- area: exact desired interpolation semantics
		description: The repository has no existing interpolation helper or docs for template evaluation in form data.
		impact: Prevents determining from code alone whether the future change should be type-only, string-only, or execution-capable.
	- area: non-MCP API body validation
		description: REST create/update handlers largely cast request bodies to shared payload types instead of validating a detailed formData schema in this focus slice.
		impact: Important if the change later distinguishes persisted partial maps from prepared canonical objects at transport boundaries.
	- area: extension/editor frontmatter editing behavior
		description: This research did not deeply inspect manual frontmatter editing flows beyond shared type usage.
		impact: Low for core typing/data-model analysis, but relevant if new semantics must tolerate hand-authored interpolated values.
