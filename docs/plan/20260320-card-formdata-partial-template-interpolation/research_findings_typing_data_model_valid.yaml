related_conventions:
  naming_patterns_in_domain: >-
    `formData` means stored per-form values; `initialData` means prepared prefill values;
    SDK/UI preparation functions intentionally mirror one another.
  structure_of_domain: >-
    Shared types define contracts, SDK modules own authoritative behavior, parser/storage own
    round-trip persistence, and the webview duplicates preparation logic for parity.
  error_handling_in_domain: >-
    Invalid submit payloads fail in SDK `submitForm()` after AJV validation; parser silently
    drops malformed non-record `formData` entries.
  testing_in_domain: >-
    Coverage is split across SDK, parser, storage, webview, CLI, and standalone REST tests.
  documentation_in_domain: >-
    `docs/forms.md` documents the current merge order and submit semantics; it does not describe
    interpolation or full-card-context preparation.

