patterns_found:
  - category: typing
    pattern: One broad nested-record type is shared for stored form data, payload inputs, and some transport surfaces.
    description: >-
      The type system does not distinguish partial persisted deltas from fully prepared/canonical form objects.
    examples:
      - file: src/shared/types.ts
        location: src/shared/types.ts:348
        snippet: "export type CardFormDataMap = Record<string, Record<string, unknown>>"
      - file: src/sdk/types.ts
        location: src/sdk/types.ts:140
        snippet: "Final validated payload that was persisted to `card.formData[form.id]`."
    prevalence: common

  - category: structure
    pattern: Preparation logic is duplicated across SDK and UI.
    description: >-
      Both the SDK and the webview independently construct `initialData`, so any partial-data or interpolation change has two direct behavioral touchpoints.
    examples:
      - file: src/sdk/modules/cards.ts
        location: src/sdk/modules/cards.ts:77
        snippet: "const initialData = { ...cloneRecord(configForm?.data), ...cloneRecord(isRecord(attachment.data) ? attachment.data : undefined), ...cloneRecord(card.formData?.[formId]), ...getMetadataOverlay(card, schema) }"
      - file: src/webview/components/CardFormTab.tsx
        location: src/webview/components/CardFormTab.tsx:96
        snippet: "initialData: { ...cloneRecord(configForm?.data), ...cloneRecord(isRecord(attachment.data) ? attachment.data : undefined), ...cloneRecord(frontmatter.formData?.[formId]), ...getMetadataOverlay(frontmatter, schema) }"
    prevalence: common

  - category: behavior
    pattern: Submit-time persistence assumes canonical full-object semantics.
    description: >-
      `submitForm()` materializes a full merged object before validation and persists that full object back into `card.formData[form.id]`.
    examples:
      - file: src/sdk/modules/cards.ts
        location: src/sdk/modules/cards.ts:451
        snippet: "const submittedData = { ...cloneRecord(form.initialData), ...cloneRecord(input.data) }"
      - file: src/sdk/modules/cards.ts
        location: src/sdk/modules/cards.ts:461
        snippet: "card.formData = { ...(card.formData ?? {}), [form.id]: submittedData }"
    prevalence: common

  - category: architecture
    pattern: Preparation currently knows about metadata only, not full card context.
    description: >-
      No current helper exposes `id`, `boardId`, `status`, `priority`, timestamps, or nested card fields to form/template preparation; only schema-matching metadata keys are copied in.
    examples:
      - file: src/sdk/modules/cards.ts
        location: src/sdk/modules/cards.ts:40
        snippet: "Object.entries(card.metadata).filter(([key]) => properties.has(key))"
      - file: src/webview/components/CardFormTab.tsx
        location: src/webview/components/CardFormTab.tsx:26
        snippet: "function getMetadataOverlay(frontmatter: Pick<CardFrontmatter, 'metadata'>, schema: Record<string, unknown>)"
    prevalence: common

