plan_id: 20260320-card-formdata-partial-template-interpolation
objective: >-
  Investigate the typing/data-model impact of making `Card.formData` partial-friendly
  and adding template-literal-style interpolation across full card context during
  form/template preparation.
focus_area: typing-data-model
created_at: 2026-03-20
created_by: GitHub Copilot (GPT-5.4)
status: completed

tldr: |
  - `formData` is broadly typed as `Record<string, Record<string, unknown>>` everywhere; the type already allows sparse objects, but current submit behavior persists canonical full merged payloads.
  - Form preparation is duplicated in SDK and webview, and both paths currently merge plain objects plus schema-matching metadata only; there is no existing interpolation helper or full-card-context overlay.
  - Storage/parser layers round-trip nested `formData` as-is, so the main behavioral assumptions live in `submitForm()`, `ResolvedFormDescriptor.initialData`, and tests that expect full objects after merge.

research_metadata:
  methodology: >-
    semantic_search for entry points, grep_search for exact symbols and callers,
    targeted read_file review of shared types, SDK modules, parser, webview,
    MCP schema, docs, and direct tests, plus wc -l for file metadata.
  scope: >-
    Typing + data-model surfaces only: shared contracts, authoritative SDK behavior,
    UI parity logic, parser/storage boundaries, transport schemas, and tests/docs
    that lock current semantics.
  confidence: high
  coverage: 88

