open_questions:
  - question: Should “partial form data” apply only to stored `card.formData[formId]`, while prepared `initialData` and submit results remain canonical full objects?
    context: Current types blur these concepts, but `submitForm()` behavior distinguishes them semantically.
  - question: Should interpolation run only for string values in config/attachment defaults, or also for persisted formData and submit payloads?
    context: There is currently no transformation stage beyond plain object merges.
  - question: Does “JavaScript template literals / interpolation” mean placeholder substitution only, or real expression evaluation?
    context: Security and implementation scope change substantially depending on that answer.
  - question: What should happen when interpolation references missing nested fields or non-string values?
    context: Current preparation silently skips unrelated metadata rather than failing.

gaps:
  - area: exact interpolation semantics
    description: The repository has no existing interpolation helper or docs describing template evaluation in form data.
    impact: Prevents determining from code alone whether the change should be type-only, string-only, or execution-capable.
  - area: non-MCP REST body validation
    description: REST create/update handlers mostly cast request bodies to shared payload types instead of validating a detailed formData schema in this slice.
    impact: Relevant if the change distinguishes partial stored maps from canonical prepared objects at transport boundaries.
  - area: extension/editor manual frontmatter editing
    description: This investigation did not deeply inspect editor-only manual frontmatter authoring flows.
    impact: Low for typing/data-model analysis, but relevant if interpolated values are expected in hand-authored card files.
