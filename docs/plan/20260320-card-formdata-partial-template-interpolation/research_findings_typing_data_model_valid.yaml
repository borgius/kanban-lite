domain_security_considerations:
  sensitive_areas:
    - area: interpolation evaluation boundary
      location: current preparation logic in src/sdk/modules/cards.ts and src/webview/components/CardFormTab.tsx
      concern: >-
        There is no current evaluation step. If “JavaScript template literals” means executing expressions,
        config/card data would become code-execution input.
    - area: expanded card-context exposure
      location: prepared form data generation
      concern: >-
        Moving from metadata-only overlays to full-card-context preparation exposes additional card fields
        (`id`, `boardId`, status, timestamps, actions, metadata, etc.) into prepared/persisted payloads.
  authentication_patterns_in_domain: No authentication logic exists in this domain slice.
  authorization_patterns_in_domain: No authorization logic exists in this domain slice.
  data_validation_in_domain: >-
    Validation currently happens after preparation/merge via AJV; create/update parsing does not
    require schema completeness for `formData`.

