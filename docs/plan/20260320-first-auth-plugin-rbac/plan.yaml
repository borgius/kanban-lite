plan_id: 20260320-first-auth-plugin-rbac
objective: |
	Implement the first real auth plugin as an SDK-first, token-driven RBAC rollout
	with three authorization levels (`admin`, `manager`, `user`), keeping the first
	release limited to action-level authorization only. The implementation must preserve
	noop backward compatibility when no auth providers are configured, keep tokens out of
	`.kanban.json`, follow the AGENTS order of SDK → API → CLI → MCP, and update
	README/CHANGELOG for user-facing behavior.
created_at: "2026-03-20"
created_by: gem-planner
status: completed
research_confidence: high

tldr: |
	The repository already has the right seams for a first auth implementation: provider
	selection lives in `src/shared/config.ts`, provider resolution lives in
	`src/sdk/plugins/index.ts`, and enforcement already centralizes in
	`KanbanSDK._authorizeAction()`. The failed T7 release gate identified four focused
	blockers, and the remediation set closed them without widening scope: the built-in
	`rbac` provider now validates opaque runtime-managed tokens instead of trusting token
	format, standalone websocket auth denials map async `AuthError` rejections into stable
	responses, `docs/auth.md`/README/CHANGELOG now match shipped behavior, and MCP plus
	extension denial paths have focused automated coverage. The final remediation review
	passed, so the rollout is complete with the original narrow scope intact: action-level
	RBAC only, Node-hosted validation only, no secrets in `.kanban.json`, no login flow,
	and no row filtering.

open_questions: []

pre_mortem:
	overall_risk_level: high
	critical_failure_modes:
		- scenario: Uncovered SDK methods such as board/config/webhook/migration mutations remain outside `_authorizeAction`, leaving admin paths effectively open even after the RBAC plugin exists.
			likelihood: medium
			impact: critical
			mitigation: |
				Treat the canonical action catalog and the uncovered-method sweep as part of the
				same rollout. Do not mark the feature complete until every required admin/config
				mutator in `KanbanSDK` threads `AuthContext` and calls `_authorizeAction` before
				side effects.
		- scenario: Host surfaces keep calling newly protected SDK methods without an auth context, causing parity drift or accidental allow-all behavior on some transports.
			likelihood: medium
			impact: high
			mitigation: |
				Add host parity work explicitly after the SDK changes. Reuse existing auth-context
				helpers where they already exist, extend the remaining standalone/CLI/MCP/extension
				call sites for the newly auth-aware methods, and verify denial semantics per host.
		- scenario: The first provider overreaches into row filtering, browser execution, or login UX, bloating the change and destabilizing the SDK contract.
			likelihood: low
			impact: high
			mitigation: |
				Freeze v1 to action-level RBAC only. Keep providers Node-hosted, rely on host-supplied
				tokens only, and defer row filtering, browser plugin execution, and interactive login
				to a later plan.
		- scenario: Token material leaks into workspace config, logs, CLI output, webview messages, or API error bodies.
			likelihood: medium
			impact: critical
			mitigation: |
				Keep raw tokens write-only at the host boundary and provider seam. Provider selection
				may live in `.kanban.json`, but token values and token-to-role mappings must remain in
				host/runtime configuration only and never be echoed in diagnostics.
		- scenario: The built-in `rbac` provider continues to derive roles from token text (for example `subject:role`) instead of validating opaque tokens against host-owned runtime material.
			likelihood: medium
			impact: critical
			mitigation: |
				Require explicit validation semantics for the first shipped provider: unknown tokens deny,
				roles come from runtime-owned principal data rather than token parsing, and any starter
				validation registry stays outside `.kanban.json`.
		- scenario: Standalone websocket handlers still allow async `AuthError` rejections to escape the transport boundary, producing inconsistent denial payloads or broken client state.
			likelihood: medium
			impact: high
			mitigation: |
				Wrap awaited websocket mutation handling in one stable denial mapper that converts auth
				rejections into predictable response frames without closing the connection or emitting
				transport-specific surprises.
	assumptions:
		- The accepted auth architecture ADR under `docs/plan/20260320-auth-authz-plugin-architecture/` remains the governing direction for this rollout.
		- The first built-in provider can resolve one of `admin`, `manager`, or `user` from host-supplied token input without introducing a login flow.
		- `AuthIdentity.subject` and `AuthIdentity.roles` are sufficient for the first RBAC provider; no row-level or claims-heavy filtering is required.
		- Existing noop auth defaults must keep current workspaces working when no auth providers are configured.
		- The extension webview continues to be a non-plugin host; all auth logic stays in Node-hosted code.

implementation_specification:
	code_structure: |
		Keep the rollout SDK-first and minimal. Reuse the existing auth namespaces and plugin
		registry instead of inventing a new auth subsystem. The first concrete provider should
		be built in beside the current noop providers in `src/sdk/plugins/index.ts`, expose a
		stable provider id such as `rbac`, validate opaque host-supplied tokens against host-owned
		runtime principal material, and enforce one fixed action matrix across all Node-hosted
		surfaces. The provider must not infer roles from token text. `KanbanSDK` remains the sole
		enforcement seam: privileged SDK methods must construct resource hints via `_withAuthContext()`,
		call `_authorizeAction()`, then delegate into existing modules. Host layers remain thin
		adapters that attach auth context, supply runtime validation material where required, and map
		denial semantics; they must not perform policy decisions locally.
	affected_areas:
		- src/shared/config.ts
		- src/sdk/types.ts
		- src/sdk/plugins/index.ts
		- src/sdk/KanbanSDK.ts
		- src/sdk/modules/
		- src/sdk/webhooks.ts
		- src/standalone/internal/routes/
		- src/standalone/messageHandlers.ts
		- src/cli/index.ts
		- src/mcp-server/index.ts
		- src/extension/KanbanPanel.ts
		- src/extension/auth.ts
		- docs/auth.md
		- README.md
		- CHANGELOG.md
	component_details:
		- component: SDK RBAC contracts and action catalog
			responsibility: |
				Finalize the first implementation contract for a built-in RBAC provider, including
				the canonical action names for the newly protected admin/config operations and the
				fixed `user`/`manager`/`admin` matrix that the provider enforces.
			interfaces:
				- "Auth capability selections in `src/shared/config.ts` remain provider-only and secret-free"
				- "Auth decision semantics continue to use `AuthDecision` / `AuthError` in `src/sdk/types.ts`"
				- "Canonical action names are owned by `KanbanSDK` and consumed by policy checks"
		- component: built-in RBAC identity and policy providers
			responsibility: |
				Add the first real provider pair for `auth.identity` and `auth.policy`, preserving
				noop defaults but enabling a concrete `rbac` path that validates opaque tokens against
				host-owned runtime principal data, resolves subject/role data only after validation,
				and enforces the first-cut action matrix.
			interfaces:
				- "`auth.identity` provider id `rbac` returning `AuthIdentity` with `subject` and `roles`"
				- "`auth.policy` provider id `rbac` returning allow/deny decisions for canonical SDK action names"
				- "Provider resolution stays inside `src/sdk/plugins/index.ts` and must deny unknown/invalid tokens rather than parse roles from token text"
		- component: standalone denial mapping
			responsibility: |
				Normalize standalone websocket auth denials so awaited SDK or mutation-service rejections
				produce stable transport responses instead of escaping as unhandled async failures.
			interfaces:
				- "`handleMessage()` and its caller agree on one websocket denial payload contract for `AuthError` outcomes"
				- "REST denial mapping remains unchanged and continues to reuse existing auth utilities"
		- component: SDK auth coverage for admin/config actions
			responsibility: |
				Bring the currently uncovered mutating methods under `_authorizeAction()` and thread
				`AuthContext` into their public signatures and delegate modules with minimal API churn.
			interfaces:
				- "`KanbanSDK` methods gain optional `auth?: AuthContext` where missing"
				- "Delegates in `src/sdk/modules/` accept auth-aware signatures where needed"
				- "Webhook and migration entry points adopt canonical action names before side effects"
		- component: host parity adapters
			responsibility: |
				Extend standalone, CLI, MCP, and extension call sites for the newly auth-aware SDK
				methods so each surface passes the shared auth context and reports denials consistently.
			interfaces:
				- "Standalone request/websocket adapters use `extractAuthContext()` on new admin/config paths"
				- "CLI and MCP reuse existing env-based auth helpers for newly protected operations"
				- "Extension host reuses SecretStorage-backed auth context for newly protected operations"
		- component: validation and release sync
			responsibility: |
				Prove backward compatibility, RBAC enforcement, websocket denial stability, and minimal
				host parity with focused tests, then document configuration and behavior in
				`docs/auth.md`, README, and CHANGELOG.
			interfaces:
				- "SDK auth tests cover noop + RBAC allow/deny behavior"
				- "Host tests cover denial mapping for standalone websocket handling plus the minimal MCP/extension denial paths"
				- "`docs/auth.md`, README, and CHANGELOG describe provider selection, role levels, validation semantics, and scope limits"
	dependencies:
		- component: SDK RBAC contracts and action catalog
			relationship: Must land first so the provider, SDK seam sweep, and host parity work all share one stable vocabulary.
		- component: built-in RBAC identity and policy providers
			relationship: Depends on the contract task and supplies the concrete auth behavior consumed by SDK methods.
		- component: standalone denial mapping
			relationship: Depends on the concrete provider behavior and the expanded SDK auth seam so websocket transport semantics reflect the real denial outcomes.
		- component: SDK auth coverage for admin/config actions
			relationship: Depends on the contract task and must complete before any host parity work can be correct.
		- component: host parity adapters
			relationship: Depend on both the concrete RBAC provider and the expanded SDK auth signatures.
		- component: validation and release sync
			relationship: Depends on the provider hardening, SDK seam coverage, websocket denial behavior, and host parity behavior being in place.
	integration_points:
		- `src/shared/config.ts` already owns auth capability normalization and should stay free of token values.
		- `src/sdk/plugins/index.ts` is the preferred insertion point for the first real provider implementation.
		- `KanbanSDK._authorizeAction()` remains the only authoritative allow/deny seam.
		- `src/sdk/modules/boards.ts`, `columns.ts`, `labels.ts`, `settings.ts`, `migration.ts`, and `src/sdk/webhooks.ts` are the likely delegates affected by new auth-aware method signatures.
		- Standalone websocket handling needs to keep threading per-connection auth context for newly protected mutations, per repository memory.
		- Standalone websocket handling also needs a stable async denial mapper around `handleMessage()` so `AuthError` rejections become predictable client responses.
		- `docs/auth.md`, README, and CHANGELOG are mandatory completion surfaces because the first real auth provider changes user-visible behavior.

