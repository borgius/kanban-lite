	- id: T8
		title: Replace trust-by-format RBAC parsing with runtime-validated starter provider semantics
		description: |
			Remediate the critical security blocker in the built-in `rbac` provider without rolling
			back the feature. The shipped provider must stop granting roles based on arbitrary
			`subject:role` token text and instead validate opaque tokens against host-owned runtime
			principal material before resolving `subject` and `roles`. Keep the first provider small
			and practical: it only needs to satisfy `admin` / `manager` / `user`, remain Node-hosted,
			and keep tokens plus token-to-role data out of `.kanban.json`. Unknown or invalid tokens
			must deny rather than degrade into inferred access.
		wave: 3
		agent: gem-implementer
		priority: high
		status: completed
		dependencies:
			- T2
		context_files:
			src/sdk/plugins/index.ts: "Built-in auth provider implementation that currently needs secure validation semantics instead of trust-by-format parsing."
			src/shared/config.ts: "Auth capability selection must remain secret-free even after runtime validation semantics are added."
			src/sdk/__tests__/auth-enforcement.test.ts: "Nearest SDK auth suite to prove unknown-token denial, role resolution, and noop compatibility."
		estimated_effort: small
		estimated_files: 3
		estimated_lines: 220
		focus_area: secure_rbac_provider_semantics
		verification:
			- "The built-in `rbac` provider no longer derives roles from token text such as `subject:role`."
			- "Opaque tokens are validated against runtime-only principal material and unknown tokens deny cleanly."
			- "No token values or role maps are added to `.kanban.json`, config normalization output, or log-safe diagnostics."
		acceptance_criteria:
			- "The first shipped provider has actual validation semantics for `admin` / `manager` / `user` rather than format-based trust."
			- "Backward-compatible noop behavior remains unchanged when no auth providers are configured."
			- "Provider diagnostics and docs describe the provider as runtime-validated starter RBAC, not an arbitrary token parser."
		failure_modes:
			- scenario: Validation material is stored in workspace config for convenience, reintroducing secret leakage risk.
				likelihood: medium
				impact: critical
				mitigation: "Keep selection in `.kanban.json` only; require runtime-only validation data in host config, env, or SecretStorage-backed inputs."
		tech_stack:
			- TypeScript
			- Node.js
		test_coverage: "Focused SDK auth tests for unknown-token denial, validated role resolution, and noop fallback."

