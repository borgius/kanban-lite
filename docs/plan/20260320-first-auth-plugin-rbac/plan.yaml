tasks:
	- id: T1
		title: Lock the first RBAC contract and canonical action matrix in the SDK layer
		description: |
			Finalize the first implementation contract for the built-in auth provider without
			widening scope. This task should define the canonical action names for the uncovered
			admin/config mutators, codify the fixed authorization matrix for `user`, `manager`,
			and `admin`, and keep provider selection/config secret-free. The matrix should follow
			the requested first cut:
			- `user`: `form.submit`, `comment.create`, `comment.update`, `comment.delete`,
				`attachment.add`, `attachment.remove`, `card.action.trigger`, `log.add`
			- `manager`: user + `card.create`, `card.update`, `card.move`, `card.transfer`,
				`card.delete`, `board.action.trigger`, `log.clear`, `board.log.add`
			- `admin`: manager + destructive/config actions such as `board.create`, `board.update`,
				`board.delete`, `settings.update`, webhook CRUD, `label.set`, `label.rename`,
				`label.delete`, column mutations/cleanup, board-action config edits, log purge/clear,
				migrations, and default-board changes.
		wave: 1
		agent: gem-implementer
		priority: high
		status: completed
		dependencies: []
		context_files:
			src/shared/config.ts: "Existing auth capability normalization seam; keep provider selection here but never token material."
			src/sdk/types.ts: "Shared `AuthContext`, `AuthDecision`, and `AuthError` contracts that all hosts consume."
			src/sdk/plugins/index.ts: "Current noop auth contracts and the insertion point for the first concrete provider id."
		estimated_effort: small
		estimated_files: 3
		estimated_lines: 220
		focus_area: sdk_auth_contracts
		verification:
			- "A stable action catalog exists for every newly protected admin/config mutator before implementation starts."
			- "The fixed `user`/`manager`/`admin` matrix is documented in code-facing contracts or tests, not only in docs."
			- "No token values or token maps are added to `.kanban.json` or config normalization types."
		acceptance_criteria:
			- "The first RBAC provider contract is explicit enough for implementation without inventing host-specific policy logic."
			- "Canonical action names exist for the currently uncovered methods in `KanbanSDK`."
			- "Backward-compatible noop behavior remains the documented default when no auth providers are configured."
		failure_modes:
			- scenario: Action names are invented ad hoc during implementation, causing tests and host handlers to drift.
				likelihood: medium
				impact: high
				mitigation: "Define the catalog once in the SDK layer and reuse it everywhere else."
		tech_stack:
			- TypeScript
			- Node.js
		test_coverage: "Contract-level assertions for auth defaults and canonical action names."

