plan_id: 20260320-form-interface-contract-coverage
objective: "Investigate whether partial form data plus interpolation with full card context can be supported across SDK/API/CLI/MCP/webview while preserving AGENTS.md parity expectations."
focus_area: interface_and_contract_coverage
created_at: "2026-03-20"
created_by: gem-researcher
status: completed

tldr: |
	- The authoritative submit contract is SDK-owned: `SubmitFormInput` / `SubmitFormResult` in `src/sdk/types.ts` and `submitForm()` in `src/sdk/modules/cards.ts`.
	- REST, CLI, MCP, VS Code extension transport, and standalone websocket/http submit flows all delegate to `sdk.submitForm(...)`, so submit-time merge/validation/persistence changes propagate automatically to those layers.
	- The webview does not consume a resolved-form API from the SDK; it locally re-implements form resolution in `src/webview/components/CardFormTab.tsx`, including merge order and inline-id generation, so any new interpolation/full-card-context resolution needs an explicit UI touchpoint unless that logic is centralized.
	- Likely non-code impact areas are `README.md`, `CHANGELOG.md`, SDK JSDoc (`src/sdk/KanbanSDK.ts` / `src/sdk/types.ts`), API docs metadata (`scripts/generate-api-docs.ts`), webhook docs metadata (`scripts/generate-webhooks-docs.ts`), manual form guide (`docs/forms.md`), and regression tests in SDK/standalone/CLI/webview.

research_metadata:
	methodology: "Hybrid retrieval using semantic_search and grep_search, followed by targeted read_file inspection of SDK contracts, interface handlers, shared transport types, tests, and documentation sources. Relationship discovery focused on callers of sdk.submitForm and duplicated form-resolution code paths."
	scope: "Focused on interface and contract coverage for form resolution/submission across SDK, REST/standalone, CLI, MCP, extension transport, and webview; excluded unrelated kanban features."
	confidence: high
	coverage: 88

