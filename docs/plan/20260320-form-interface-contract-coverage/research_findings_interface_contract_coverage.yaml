patterns_found:
	- category: architecture
		pattern: Single SDK-owned submit entrypoint
		description: Every inspected programmatic submit surface ultimately calls `sdk.submitForm(...)` and uses its return value as the external contract.
		examples:
			- file: /Users/admin/dev/kanban-light/src/standalone/server.ts
				location: src/standalone/server.ts:377
				snippet: "const result = await sdk.submitForm({ ...input, boardId: input.boardId ?? currentBoardId })"
			- file: /Users/admin/dev/kanban-light/src/cli/index.ts
				location: src/cli/index.ts:499
				snippet: "const result = await sdk.submitForm({ cardId: resolvedId, formId, data, boardId })"
			- file: /Users/admin/dev/kanban-light/src/mcp-server/index.ts
				location: src/mcp-server/index.ts:372
				snippet: "const result = await sdk.submitForm({ boardId, cardId: resolvedId, formId, data })"
			- file: /Users/admin/dev/kanban-light/src/extension/KanbanPanel.ts
				location: src/extension/KanbanPanel.ts:393
				snippet: "const result = await submitSdk.submitForm({ cardId, formId, data: ..., boardId: ... })"
		prevalence: common

	- category: structure
		pattern: Shared request/response types for transport surfaces
		description: Webview and REST-oriented layers use shared message/result types so the SDK submit result shape can cross process/runtime boundaries without redefinition.
		examples:
			- file: /Users/admin/dev/kanban-light/src/shared/types.ts
				location: src/shared/types.ts:467
				snippet: "export interface SubmitFormMessage { type: 'submitForm'; cardId: string; formId: string; data: Record<string, unknown>; ... }"
			- file: /Users/admin/dev/kanban-light/src/shared/types.ts
				location: src/shared/types.ts:479
				snippet: "export interface SubmitFormTransportResult { boardId: string; card: Omit<Card, 'filePath'>; form: ResolvedFormDescriptor; data: Record<string, unknown> }"
		prevalence: common

	- category: architecture
		pattern: Resolved-form derivation is duplicated in SDK and webview
		description: The SDK resolves forms for authoritative submit-time behavior, but the webview separately resolves forms to render tabs and prefills before submit.
		examples:
			- file: /Users/admin/dev/kanban-light/src/sdk/modules/cards.ts
				location: src/sdk/modules/cards.ts:77
				snippet: "function resolveCardForms(ctx: SDKContext, card: Card): ResolvedFormDescriptor[] { ... }"
			- file: /Users/admin/dev/kanban-light/src/webview/components/CardFormTab.tsx
				location: src/webview/components/CardFormTab.tsx:71
				snippet: "export function resolveCardFormDescriptors(frontmatter, board?): ResolvedFormDescriptor[] { ... }"
			- file: /Users/admin/dev/kanban-light/src/webview/components/MarkdownEditor.tsx
				location: src/webview/components/MarkdownEditor.tsx:51
				snippet: "const resolvedForms = useMemo(() => (isEditMode && frontmatter ? resolveCardFormDescriptors(frontmatter, activeBoard) : []), ...)"
		prevalence: common

	- category: error_handling
		pattern: Validation authority lives in the SDK; interface layers mostly translate errors
		description: Invalid submit payloads are rejected inside SDK submit logic and callers adapt the failure for their transport (HTTP status, CLI thrown error, MCP error response, callback error string).
		examples:
			- file: /Users/admin/dev/kanban-light/src/sdk/modules/cards.ts
				location: src/sdk/modules/cards.ts:455
				snippet: "if (!valid) { throw new Error(`Invalid form submission for ${form.id}: ...`) }"
			- file: /Users/admin/dev/kanban-light/src/standalone/server.ts
				location: src/standalone/server.ts:242
				snippet: "function getSubmitErrorStatus(err: unknown): number { ... }"
			- file: /Users/admin/dev/kanban-light/src/mcp-server/index.ts
				location: src/mcp-server/index.ts:384
				snippet: "return { content: [{ type: 'text', text: String(err) }], isError: true }"
		prevalence: common

	- category: documentation
		pattern: Public docs are split between generated sources and hand-maintained form guides
		description: SDK/API/webhook docs are generated from source metadata or JSDoc, while `README.md` and `docs/forms.md` carry user-facing workflow explanations.
		examples:
			- file: /Users/admin/dev/kanban-light/scripts/generate-api-docs.ts
				location: scripts/generate-api-docs.ts:45
