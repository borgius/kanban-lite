	data_flow_involving_domain: "Form tabs in the webview are derived locally from card frontmatter plus board config. On submit, the webview sends a `SubmitFormMessage` to either the extension host or standalone server. That host delegates to `sdk.submitForm`, which resolves form state again, merges partial input over the resolved base payload, validates, persists `card.formData`, emits `form.submit`, and returns a canonical `SubmitFormResult`/transport mirror back to the caller. REST, CLI, and MCP skip the UI resolver and call the SDK submit contract directly."
	key_relationships_to_domain:
