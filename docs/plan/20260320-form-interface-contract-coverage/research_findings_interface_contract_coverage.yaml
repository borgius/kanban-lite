related_conventions:
	naming_patterns_in_domain: "Submit surfaces consistently use `submitForm` / `submit_card_form` naming and keep request fields as `cardId`, `formId`, `data`, `boardId?`."
	structure_of_domain: "Business logic lives in SDK modules first; REST, CLI, MCP, and extension/webview layers are mostly thin adapters, except for the webview-local form-resolution helper."
	error_handling_in_domain: "SDK throws typed-by-message `Error`s; REST maps submit errors to 400/404-ish responses via helper logic, CLI lets errors reject, MCP returns `isError: true`, and webview transport reports callback `error` strings."
	testing_in_domain: "Coverage is split by layer: SDK unit tests for merge/validation semantics, standalone integration tests for HTTP/websocket parity, CLI unit tests for JSON parsing/delegation, and webview tests for resolver behavior and offline transport."
	documentation_in_domain: "SDK/API/webhook generated docs originate from JSDoc/metadata sources; user-facing form semantics are duplicated in `README.md` and `docs/forms.md`; AGENTS.md requires updating README and CHANGELOG plus regenerating docs when user-facing contracts change."

