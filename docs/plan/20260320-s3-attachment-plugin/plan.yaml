plan_id: 20260320-s3-attachment-plugin
objective: |
  Create a real installable npm package (kl-s3-attachment-storage) that implements
  an external S3 attachment storage plugin for kanban-lite. The package should live
  under tmp/kl-s3-attachment-storage, conform to the attachment.storage plugin
  contract, support AWS default credential chain plus KL_S3_* env vars for
  bucket/region/endpoint/prefix configuration, and produce a require-compatible
  CommonJS bundle at dist/index.cjs.
created_at: "2026-03-20"
created_by: gem-implementer
status: completed

tldr: |
  Scaffold a standalone TypeScript package that exports `attachmentStoragePlugin`
  conforming to the kanban-lite attachment.storage plugin contract. The plugin
  uploads attachments to S3 via copyAttachment, downloads them to a deterministic
  temp-file path via materializeAttachment, and reads all configuration from
  KL_S3_* / AWS_* environment variables (no local getCardDir since S3 is not
  file-backed).

