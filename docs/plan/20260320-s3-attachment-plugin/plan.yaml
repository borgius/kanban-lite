defaults_used:
  - package name / provider id = kl-s3-attachment-storage
  - capability = attachment.storage only (no card.storage)
  - language = TypeScript
  - output = dist/index.cjs (esbuild CJS bundle) + dist/index.d.ts (tsc declarations)
  - named export = attachmentStoragePlugin
  - no getCardDir (S3 is not file-backed)
  - materializeAttachment downloads to os.tmpdir()/kl-s3/{boardId}/{cardId}/{filename}
  - attachment name validation rejects control chars and path separators
  - key pattern = {prefix}boards/{boardId}/{cardId}/{filename}
  - config via KL_S3_BUCKET, KL_S3_REGION, KL_S3_ENDPOINT, KL_S3_PREFIX, KL_S3_FORCE_PATH_STYLE
  - AWS default credential chain for auth

