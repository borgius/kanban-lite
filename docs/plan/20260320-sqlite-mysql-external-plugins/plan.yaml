plan_id: 20260320-sqlite-mysql-external-plugins
objective: |
  Create real external npm packages for sqlite and mysql storage providers, modeled after
  `/Users/admin/dev/kl-s3-attachment-storage`, add real integration tests in those plugin
  packages, and move provider-specific tests out of the main repo while keeping host/plugin
  contract coverage in `/Users/admin/dev/kanban-light`.
created_at: "2026-03-20"
created_by: gem-planner
status: completed
research_confidence: high

tldr: |
  The lowest-risk execution path is to externalize SQLite and MySQL into standalone sibling npm
  packages (`/Users/admin/dev/kl-sqlite-storage` and `/Users/admin/dev/kl-mysql-storage`) while
  keeping `markdown` and `localfs` as the only true built-ins in the core repo. Core should retain
  shape-based contract coverage, compatibility aliases, migration/status behavior, and same-package
  attachment fallback; provider-specific CRUD/schema/live-backend tests should live with the package
  that owns the provider.

open_questions: []

