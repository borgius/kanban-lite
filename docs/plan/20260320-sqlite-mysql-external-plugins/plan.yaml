pre_mortem:
  overall_risk_level: high
  critical_failure_modes:
    - scenario: Existing workspaces configured with provider ids `sqlite` / `mysql` break once the implementations are moved out of the built-in registry.
      likelihood: high
      impact: critical
      mitigation: |
        Preserve short provider ids as compatibility aliases in core (`sqlite` -> `kl-sqlite-storage`,
        `mysql` -> `kl-mysql-storage`), keep legacy `storageEngine` normalization intact, and add
        regression tests that verify resolution/install errors remain actionable.
    - scenario: Provider-specific tests move out of core, but host-level migration and capability coverage is accidentally lost.
      likelihood: medium
      impact: high
      mitigation: |
        Keep `plugin-registry`, capability normalization, config cleanup, migration contract, and
        same-package attachment fallback tests in core; move only provider-owned CRUD/schema/live DB
        behavior into package-local test suites.
    - scenario: MySQL package ships without a reproducible live integration harness, so the repo still lacks real database confidence.
      likelihood: high
      impact: high
      mitigation: |
        Add package-local Docker Compose or CI service wiring plus a dedicated integration test script
        that runs against a real MySQL server and is invoked in verification before core refactor is
        considered complete.
    - scenario: External-package attachment behavior diverges from current sqlite/mysql semantics and breaks logs or attachment materialization.
      likelihood: medium
      impact: high
      mitigation: |
        Require both external packages to export `cardStoragePlugin` and `attachmentStoragePlugin`,
        and keep core contract tests for explicit `attachment.storage` selection plus implicit
        same-package fallback when `attachment.storage` remains `localfs`.
  assumptions:
    - Real external packages should not live under `tmp/`; they should be standalone sibling package directories so they can be versioned and published independently.
    - The core repo remains the host/orchestrator and should not own sqlite/mysql CRUD logic after the move.
    - Package-local integration tests may use `kanban-lite` as a dev-only local file dependency during development, while keeping `kanban-lite` as a peer dependency for consumers.
    - `storage-migration.test.ts` remains in core, but only for SDK migration/config-contract behavior rather than low-level provider CRUD details.

implementation_specification:
  code_structure: |
    Keep the plugin loader and compatibility logic in `src/sdk/plugins/index.ts`, but shrink the set
    of true built-ins to `markdown` and `localfs`. Replace sqlite/mysql implementation ownership in
    core with compatibility alias metadata and shape-based external loading. Create two sibling npm
    packages — `/Users/admin/dev/kl-sqlite-storage` and `/Users/admin/dev/kl-mysql-storage` — each
    with CommonJS output (`dist/index.cjs`), TypeScript declarations, package-local integration tests,
    and README/config docs. Each package should export both `cardStoragePlugin` and
    `attachmentStoragePlugin` so current explicit attachment-provider behavior and same-package fallback
    remain intact.
  affected_areas:
    - src/sdk/plugins/index.ts
    - src/sdk/plugins/sqlite.ts
    - src/sdk/plugins/mysql.ts
    - src/sdk/__tests__/plugin-registry.test.ts
    - src/sdk/__tests__/storage-sqlite.test.ts
    - src/sdk/__tests__/storage-migration.test.ts
    - README.md
    - docs/plugins.md
    - CHANGELOG.md
    - /Users/admin/dev/kl-sqlite-storage/
    - /Users/admin/dev/kl-mysql-storage/
  component_details:
    - component: Core compatibility and plugin resolution layer
      responsibility: Keep backward-compatible provider ids and host-side plugin loading behavior after sqlite/mysql implementation ownership moves out of core.
      interfaces:
        - "Alias map for `sqlite` -> `kl-sqlite-storage` and `mysql` -> `kl-mysql-storage`"
        - "Shape-based validation for external `cardStoragePlugin` / `attachmentStoragePlugin` exports"
        - "Same-package attachment fallback when card provider is external and attachment provider stays `localfs`"
    - component: SQLite external package
      responsibility: Own SQLite engine implementation, filesystem attachment behavior, provider README, and provider-specific CRUD/schema/integration tests.
      interfaces:
        - "Named export `cardStoragePlugin`"
        - "Named export `attachmentStoragePlugin`"
        - "Provider id `sqlite` with package install target `kl-sqlite-storage`"
    - component: MySQL external package
      responsibility: Own MySQL engine implementation, lazy `mysql2` loading, local attachment behavior, and real live-DB integration coverage.
      interfaces:
        - "Named export `cardStoragePlugin`"
        - "Named export `attachmentStoragePlugin`"
        - "Provider id `mysql` with package install target `kl-mysql-storage`"
    - component: Core host-contract test suite
      responsibility: Verify that the host still resolves plugins, preserves migration/config semantics, and exposes actionable errors without re-owning provider internals.
      interfaces:
        - "Core regression tests for capability normalization, alias resolution, migration config cleanup, and manifest/contract validation"
  dependencies:
    - component: Core compatibility and plugin resolution layer
      relationship: Must define alias and export expectations before package implementation and test relocation can proceed safely.
    - component: SQLite external package
      relationship: Depends on the compatibility decision so its provider id, package name, and exported shapes match core expectations.
    - component: MySQL external package
      relationship: Depends on the compatibility decision and on a reproducible live-backend test harness.
    - component: Core host-contract test suite
      relationship: Depends on both package exports existing so core can replace internal implementation tests with external-resolution contract tests.
  integration_points:
    - Legacy `storageEngine: sqlite` and modern `plugins['card.storage'].provider = 'sqlite'` configs must continue to resolve successfully through aliasing.
    - `resolveCapabilityBag()` must keep explicit attachment-provider selection and same-package external attachment fallback working after the move.
    - `storage-migration.test.ts` should keep verifying SDK migration/config cleanup behavior using the externally loaded sqlite provider path.
    - Package-local test suites should prove provider behavior directly, while core tests only prove host/plugin contracts.
    - README, `docs/plugins.md`, and `CHANGELOG.md` must explain install steps, provider ids, compatibility aliases, and where provider-specific tests now live.

