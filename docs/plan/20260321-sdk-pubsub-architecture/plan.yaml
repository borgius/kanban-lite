plan_id: "20260321-sdk-pubsub-architecture"
objective: |
  Re-architect KanbanSDK to use a pub/sub event-driven architecture based on EventEmitter2.
  Replace the single-callback event system with a multi-subscriber event bus. Transform webhooks
  from a built-in SDK function into an event-driven plugin subscribing to the same bus.
  Auth plugin emits its own events (auth.denied, auth.allowed) observable by other plugins.
created_at: "2026-03-21"
created_by: "gem-planner"
status: pending_approval
research_confidence: high

tldr: |
  Six-wave plan to introduce EventEmitter2 event bus into KanbanSDK:
  (1) Install dep + create typed EventBus wrapper with SDKEvent<T> payloads,
  (2) Integrate bus into KanbanSDK replacing single-callback dispatch while preserving backward compat,
  (3) Define EventListenerPlugin interface + implement WebhookListenerPlugin using existing delivery logic,
  (4) Wire webhook plugin into capability resolution and update host layers (standalone/CLI/MCP),
  (5) Add auth event emissions from _authorizeAction + comprehensive test coverage,
  (6) Review + documentation updates.

open_questions:
  - "Should pre-mutation (before) events be supported now or deferred to a follow-up? Plan defers to follow-up to keep scope tight."
  - "Should the WebSocket broadcast in standalone also become an event listener plugin, or remain orthogonal? Plan keeps it orthogonal since it broadcasts full state, not individual events."

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: "EventEmitter2 listener errors kill the event pipeline for subsequent listeners"
      likelihood: medium
      impact: high
      mitigation: "Wrap each listener invocation in try/catch inside the EventBus.emit() method. Mirror the existing error-swallowing pattern. Set ignoreErrors:false on EE2 but catch at our wrapper layer."
    - scenario: "Backward incompatibility — existing onEvent consumers stop receiving events"
      likelihood: low
      impact: critical
      mitigation: "Wire onEvent callback as a first-class listener on the bus during construction. Keep SDKEventHandler type and SDKOptions.onEvent field unchanged. Add integration test verifying onEvent still fires."
    - scenario: "Module emitEvent call sites break because signature changes"
      likelihood: low
      impact: high
      mitigation: "Keep ctx.emitEvent(event, data) signature identical. Internally it delegates to the bus. All 28+ call sites in modules remain unchanged."
    - scenario: "Circular dependency between event bus and plugins"
      likelihood: low
      impact: medium
      mitigation: "EventBus is a standalone module with no SDK imports. Plugins receive the bus instance via init(), not via import."
    - scenario: "Memory leak from plugins not unsubscribing listeners"
      likelihood: medium
      impact: medium
      mitigation: "EventBus.destroy() calls removeAllListeners(). Plugin lifecycle requires destroy(). SDK.close() triggers plugin teardown."
  assumptions:
    - "EventEmitter2 is a stable, well-maintained package with no security vulnerabilities"
    - "All existing emitEvent call sites use the same (event, data) two-arg signature"
    - "Wildcard support with '.' delimiter maps directly to existing event naming convention"
    - "The standalone WebSocket broadcast layer remains outside the SDK event bus"
    - "No existing external consumers rely on fireWebhooks() being called as a direct fallback inside emitEvent()"

implementation_specification:
  code_structure: |
    New file src/sdk/eventBus.ts contains the EventBus class wrapping EventEmitter2.
    New file src/sdk/plugins/webhookListener.ts contains the webhook event listener plugin.
    Types are added to src/sdk/types.ts (SDKEvent, EventListenerPlugin).
    Plugin resolution in src/sdk/plugins/index.ts gains a new event.listener capability namespace.
    KanbanSDK gains a private _eventBus field and exposes a public eventBus getter.
    SDKContext.emitEvent signature stays the same — bus is an internal impl detail from the modules' perspective.
  affected_areas:
    - "src/sdk/ — core SDK types, event bus, KanbanSDK class"
    - "src/sdk/plugins/ — plugin interfaces, webhook listener, capability resolution"
    - "src/sdk/modules/context.ts — no signature change but internal routing changes"
    - "src/standalone/internal/runtime.ts — onEvent wiring simplification"
    - "src/sdk/__tests__/ — new event bus tests"
    - "CHANGELOG.md, README.md, docs/sdk.md"
  component_details:
    - component: EventBus
      responsibility: |
        Thin typed wrapper around EventEmitter2. Manages listener registration, wildcard subscriptions,
        event emission with SDKEvent<T> payloads, and listener cleanup. Provides emit(), on(), off(),
        onAny(), removeAllListeners(), destroy() methods.
      interfaces:
        - "emit(event: string, payload: SDKEvent): void"
        - "on(event: string, listener: SDKEventListener): () => void — returns unsubscribe fn"
        - "onAny(listener: (event: string, payload: SDKEvent) => void): () => void"
        - "destroy(): void"
    - component: SDKEvent<T>
      responsibility: "Typed event payload envelope carrying type, data, timestamp, optional actor and boardId"
      interfaces:
        - "{ type: string; data: T; timestamp: string; actor?: string; boardId?: string }"
    - component: EventListenerPlugin
      responsibility: "Plugin contract for event subscribers. init() receives the bus, destroy() unsubscribes."
      interfaces:
        - "manifest: PluginManifest"
        - "init(bus: EventBus, workspaceRoot: string): void"
        - "destroy(): void"
    - component: WebhookListenerPlugin
      responsibility: |
        Built-in EventListenerPlugin that subscribes to all SDK events via onAny(), filters by
        webhook event subscriptions from .kanban.json, and delivers HTTP POST payloads using
        the existing fireWebhooks delivery logic.
      interfaces:
        - "Implements EventListenerPlugin"
        - "Uses existing deliverWebhook() for HTTP POST delivery"
  dependencies:
    - component: EventBus
      relationship: "Wraps EventEmitter2 (npm dependency)"
    - component: KanbanSDK
      relationship: "Owns an EventBus instance, wires it in constructor, delegates emitEvent to it"
    - component: WebhookListenerPlugin
      relationship: "Subscribes to EventBus via onAny(), uses deliverWebhook from webhooks.ts"
    - component: SDKContext.emitEvent
      relationship: "Internally routes to EventBus.emit() — signature unchanged for modules"
  integration_points:
    - "KanbanSDK constructor: create EventBus, register onEvent callback as listener, init webhook plugin"
    - "KanbanSDK.emitEvent: delegate to EventBus.emit() instead of single callback"
    - "KanbanSDK._authorizeAction: emit auth.allowed/auth.denied events on the bus"
    - "resolveCapabilityBag: resolve event.listener plugins from config"
    - "standalone runtime: simplify onEvent callback (webhooks handled by plugin)"

