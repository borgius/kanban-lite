  # ========== WAVE 5: Auth Events + Tests ==========
  - id: "T6-auth-events"
    title: "Add auth event emissions from _authorizeAction"
    description: |
      Enhance _authorizeAction in src/sdk/KanbanSDK.ts to emit auth events on the bus:

      1. After successful authorization (decision.allowed === true):
         emit 'auth.allowed' with SDKEvent payload:
         { type: 'auth.allowed', data: { action, actor: decision.actor, boardId: context?.boardId }, timestamp }

      2. On authorization failure (before throwing AuthError):
         emit 'auth.denied' with SDKEvent payload:
         { type: 'auth.denied', data: { action, actor: identity?.subject, reason: decision.reason, boardId: context?.boardId }, timestamp }

      3. Add 'auth.allowed' and 'auth.denied' to the SDKEventType union in src/sdk/types.ts.

      These events allow webhook plugins and future audit-log plugins to observe auth decisions.
      Auth remains a pre-action gate — these events are informational side-effects, not blocking.
