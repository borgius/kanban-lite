      - SDKEvent<T = unknown> interface: { type: string; data: T; timestamp: string; actor?: string; boardId?: string; meta?: Record<string,unknown> }
      - SDKEventListener type: (payload: SDKEvent) => void
      - EventListenerPlugin interface: { manifest: PluginManifest; init(bus: EventBus, workspaceRoot: string): void; destroy(): void }
      Export the new types from src/sdk/index.ts barrel.
    wave: 1
    agent: gem-implementer
    priority: high
    status: pending
    dependencies: []
    context_files:
      - "src/sdk/types.ts": "Add SDKEvent, SDKEventListener, EventListenerPlugin types"
      - "src/sdk/index.ts": "Add exports for new types"
      - "package.json": "Add eventemitter2 dependency"
    estimated_effort: small
    estimated_files: 3
    estimated_lines: 50
