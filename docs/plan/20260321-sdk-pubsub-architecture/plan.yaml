  - id: "T2-event-bus-module"
    title: "Create EventBus wrapper module"
    description: |
      Create src/sdk/eventBus.ts with an EventBus class wrapping EventEmitter2:
      - Constructor takes optional config: { maxListeners?: number }
      - Internally creates EventEmitter2 with { wildcard: true, delimiter: '.', maxListeners: 50, ignoreErrors: false }
      - emit(event: string, payload: SDKEvent): void — emits with try/catch per listener error isolation
      - on(event: string, listener: SDKEventListener): () => void — returns unsubscribe function
      - onAny(listener: (event: string, payload: SDKEvent) => void): () => void
      - off(event: string, listener: SDKEventListener): void
      - destroy(): void — calls emitter.removeAllListeners()
      - listenerCount(event?: string): number — for diagnostics
      Export EventBus from src/sdk/index.ts barrel.
    wave: 1
    agent: gem-implementer
    priority: high
    status: pending
    dependencies:
      - "T1-event-bus-types"
    context_files:
      - "src/sdk/eventBus.ts": "New file — EventBus class"
      - "src/sdk/index.ts": "Add EventBus export"
    estimated_effort: medium
    estimated_files: 2
    estimated_lines: 80
    focus_area: "event-bus-core"
    verification:
      - "TypeScript compilation passes"
      - "EventBus class instantiable with wildcard support"
      - "on() returns working unsubscribe function"
      - "destroy() removes all listeners"
    acceptance_criteria:
      - "EventBus wraps EventEmitter2 with wildcard:true, delimiter:'.'"
      - "emit() wraps each listener in try/catch — one failing listener does not prevent others"
      - "on() returns a callable unsubscribe function"
      - "onAny() subscribes to all events including wildcarded"
      - "destroy() cleans up all listeners"
      - "listenerCount() returns accurate count"
    failure_modes:
      - scenario: "EventEmitter2 wildcard matching doesn't match existing event names"
        likelihood: low
        impact: high
        mitigation: "Existing events already use dot-separated format (task.created, board.deleted). EE2 delimiter '.' matches exactly."
    tech_stack:
      - TypeScript
      - eventemitter2
    test_coverage: "Unit tests in Wave 5"
    requires_review: false
    review_depth: null
    security_sensitive: false

  # ========== WAVE 2: SDK Integration ==========
  - id: "T3-integrate-bus-into-sdk"
    title: "Integrate EventBus into KanbanSDK"
    description: |
      Modify src/sdk/KanbanSDK.ts to use the EventBus internally:

      1. Add private field: `private _eventBus: EventBus`
      2. Add public getter: `get eventBus(): EventBus { return this._eventBus }`
      3. In constructor: create `this._eventBus = new EventBus()`
      4. In constructor: if options.onEvent is provided, register it as a listener:
         `this._eventBus.onAny((event, payload) => options.onEvent!(event as SDKEventType, payload.data))`
         This preserves backward compatibility — existing onEvent consumers get the same (event, data) args.
      5. Refactor emitEvent(event, data) to:
         ```
         emitEvent(event: SDKEventType, data: unknown): void {
           this._eventBus.emit(event, { type: event, data, timestamp: new Date().toISOString() })
         }
         ```
         Remove the if/else branch and the direct fireWebhooks() fallback.
      6. Add a close() or destroy() method that calls this._eventBus.destroy() for cleanup.

      SDKContext.emitEvent signature in src/sdk/modules/context.ts stays UNCHANGED.
      All 28+ ctx.emitEvent() call sites in modules remain untouched.
    wave: 2
    agent: gem-implementer
    priority: high
    status: pending
    dependencies:
      - "T2-event-bus-module"
    context_files:
      - "src/sdk/KanbanSDK.ts": "Add _eventBus field, refactor emitEvent, add eventBus getter, add destroy()"
      - "src/sdk/modules/context.ts": "No changes — verify emitEvent signature compatibility"
    estimated_effort: medium
    estimated_files: 1
    estimated_lines: 40
    focus_area: "sdk-integration"
    verification:
      - "TypeScript compilation passes"
      - "Existing tests still pass (event handler compatibility)"
      - "SDK emitEvent routes through EventBus"
      - "onEvent callback receives same (event, data) as before"
    acceptance_criteria:
      - "KanbanSDK has a private _eventBus field initialized in constructor"
      - "Public eventBus getter exposes the bus for plugin registration"
      - "onEvent callback from SDKOptions is wired as a listener on the bus"
      - "emitEvent no longer has if/else branch — always publishes to bus"
      - "No direct fireWebhooks() fallback in emitEvent (webhooks handled by plugin in Wave 3-4)"
      - "SDKContext.emitEvent signature unchanged — modules unaffected"
      - "destroy() method added to tear down the bus"
    failure_modes:
      - scenario: "Removing the fireWebhooks fallback breaks workspaces not using onEvent"
        likelihood: medium
        impact: high
        mitigation: "The webhook listener plugin (Wave 3-4) will be auto-registered. Until then, the standalone server and CLI already provide onEvent. For the interim between T3 and T5, add a temporary default webhook listener in the constructor that calls fireWebhooks. T5 replaces it with the proper plugin."
    tech_stack:
      - TypeScript
    test_coverage: "Integration tests in Wave 5"
    requires_review: false
    review_depth: null
    security_sensitive: false

