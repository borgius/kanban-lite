      3. src/standalone/internal/runtime.ts — Simplify the onEvent callback:
         - Remove the fireWebhooks() call from the onEvent handler (now handled by the plugin)
         - Keep only the log.added → WebSocket broadcast logic in onEvent
         - The onEvent callback becomes a thin WebSocket-only bridge

      4. src/sdk/index.ts — Export WebhookListenerPlugin and createWebhookListenerPlugin.
