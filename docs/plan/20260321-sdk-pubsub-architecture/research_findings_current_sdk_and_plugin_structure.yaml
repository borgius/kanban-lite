plan_id: "20260321-sdk-pubsub-architecture"
objective: "Analyze current SDK structure, plugin system, and operation flow to understand what needs to change for pub/sub event-driven architecture"
focus_area: "current_sdk_and_plugin_structure"
created_at: "2026-03-21"
created_by: "researcher"
status: completed

tldr: |
  - KanbanSDK is a monolithic facade class (~2100 lines) that delegates ALL business logic to 9 stateless module files via an SDKContext interface.
  - Events are fired via a simple single-callback `onEvent(event, data)` pattern — one handler, no subscription, no filtering, no async/await support. The handler is set once at construction time.
  - The plugin system supports 4 capability namespaces (card.storage, attachment.storage, auth.identity, auth.policy) resolved at construction time into a ResolvedCapabilityBag. Plugins are NOT event-aware.
  - 24 distinct SDKEventType values exist, emitted from modules after every mutation via `ctx.emitEvent()`. The emitEvent method catches and swallows handler errors.
  - External event consumers (webhooks, WebSocket broadcast) are wired at the host layer by providing the onEvent callback at SDK construction. There is no internal pub/sub bus.

research_metadata:
  methodology: "Hybrid retrieval: read_file for all SDK core files, grep_search for emitEvent usage across modules, directory listing for structural mapping"
  scope: "Complete read of KanbanSDK.ts, types.ts, index.ts, plugins/ directory (6 files), modules/context.ts, webhooks.ts, and targeted grep across all modules"
  confidence: high
  coverage: 95

