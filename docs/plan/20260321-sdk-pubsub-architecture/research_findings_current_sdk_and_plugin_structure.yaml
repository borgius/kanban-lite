patterns_found:
  - category: architecture
    pattern: "Facade + stateless module delegation"
    description: "KanbanSDK is a thin facade. All business logic lives in stateless module files (boards.ts, cards.ts, columns.ts, etc.) that receive an SDKContext as their first parameter."
    examples:
      - file: src/sdk/KanbanSDK.ts
        location: "lines 580-640"
        snippet: |
          listBoards(): BoardInfo[] { return Boards.listBoards(this) }
          async createBoard(...) { return Boards.createBoard(this, id, name, options) }
    prevalence: common

  - category: architecture
    pattern: "Single-callback event dispatch"
    description: "SDK emits events through a single optional callback (onEvent). No event bus, no multiple subscribers, no filtering. When no callback, falls through directly to fireWebhooks()."
    examples:
      - file: src/sdk/KanbanSDK.ts
        location: "line 540"
        snippet: |
          emitEvent(event: SDKEventType, data: unknown): void {
            if (this._onEvent) {
              try { this._onEvent(event, data) } catch (err) { console.error(...) }
            } else {
              fireWebhooks(this.workspaceRoot, event, data)
            }
          }
    prevalence: common

  - category: architecture
    pattern: "Post-mutation event emission in modules"
    description: "Every module emits events AFTER the mutation succeeds, using ctx.emitEvent(). Events are fire-and-forget with no pre-event hooks."
    examples:
      - file: src/sdk/modules/cards.ts
        location: "line 368"
        snippet: "ctx.emitEvent('task.created', sanitizeCard(card))"
      - file: src/sdk/modules/columns.ts
        location: "line 39"
        snippet: "ctx.emitEvent('column.created', column)"
    prevalence: common

  - category: architecture
    pattern: "Pre-action authorization seam"
    description: "All mutating KanbanSDK methods call _authorizeAction() before delegating to the module. Auth is resolved at the facade layer, not inside modules."
    examples:
      - file: src/sdk/KanbanSDK.ts
        location: "line 616"
        snippet: |
          async createBoard(id, name, options, auth?) {
            await this._authorizeAction('board.create', this._withAuthContext(auth, { boardId: id }))
            return Boards.createBoard(this, id, name, options)
          }
    prevalence: common

  - category: architecture
    pattern: "Construction-time plugin resolution"
    description: "All plugins (storage, attachment, auth) are resolved once at SDK construction time via resolveCapabilityBag(). No hot-reloading or runtime plugin changes."
    examples:
      - file: src/sdk/KanbanSDK.ts
        location: "line 260-270"
        snippet: |
          this._capabilities = resolveCapabilityBag(
            resolveConfiguredCapabilities(this.kanbanDir, options),
            this.kanbanDir,
            resolveConfiguredAuthCapabilities(this.kanbanDir),
          )
          this._storage = this._capabilities.cardStorage
    prevalence: common

  - category: architecture
    pattern: "External plugin loading via createRequire"
    description: "Non-builtin plugins are loaded from npm packages using Node's createRequire, with sibling package fallback. Deterministic error messages guide users to install."
    examples:
      - file: src/sdk/plugins/index.ts
        location: "line ~500"
        snippet: "const mod = loadExternalModule(providerName)"
    prevalence: occasional

  - category: architecture
    pattern: "Capability namespace organization"
    description: "4 capability namespaces: card.storage (StorageEngine), attachment.storage (AttachmentStoragePlugin), auth.identity (AuthIdentityPlugin), auth.policy (AuthPolicyPlugin). Each has a manifest with id and provides array."
    examples:
      - file: src/sdk/plugins/index.ts
        location: "PluginManifest interface"
        snippet: |
          interface PluginManifest {
            readonly id: string
            readonly provides: readonly CapabilityNamespace[]
          }
    prevalence: common

  - category: naming
    pattern: "SDK event names use dot-separated domain.action format"
    description: "Event types follow 'domain.action' pattern: task.created, comment.updated, board.deleted, etc."
    examples:
      - file: src/sdk/types.ts
        location: "line 46-73"
        snippet: "'task.created' | 'task.updated' | 'task.moved' | 'task.deleted' | 'comment.created' | ..."
    prevalence: common

  - category: error_handling
    pattern: "Event handler errors swallowed silently"
    description: "emitEvent wraps the handler in try/catch and only logs to console.error. No retry, no dead-letter queue."
    examples:
      - file: src/sdk/KanbanSDK.ts
        location: "line 542"
        snippet: "catch (err) { console.error(`SDK event handler error for ${event}:`, err) }"
    prevalence: common

related_architecture:
  components_relevant_to_domain:
    - component: KanbanSDK (facade)
      responsibility: "Single public API entry point. Holds storage, capabilities, event handler. Delegates to modules."
      location: src/sdk/KanbanSDK.ts
      relationship_to_domain: "Primary target for pub/sub integration"
    - component: "Module files (boards, cards, columns, comments, logs, attachments, labels, settings, migration)"
      responsibility: "Stateless business logic. All mutations. All event emissions."
      location: src/sdk/modules/
      relationship_to_domain: "Event emission points — every emitEvent() call is a potential pub/sub publish point"
    - component: SDKContext interface
      responsibility: "Dependency injection seam between facade and modules"
      location: src/sdk/modules/context.ts
      relationship_to_domain: "Would need to expose event bus if modules publish directly"
    - component: Plugin resolver
      responsibility: "Resolves capability namespaces to concrete implementations at construction time"
      location: src/sdk/plugins/index.ts
      relationship_to_domain: "May need extension for event-aware plugins or a new event.bus capability"
    - component: Webhook system
      responsibility: "HTTP POST delivery of events to external endpoints"
      location: src/sdk/webhooks.ts
      relationship_to_domain: "Currently a side-effect of emitEvent — would become a subscriber in pub/sub model"
    - component: Standalone runtime
      responsibility: "Host layer that wires SDK onEvent to webhooks + WebSocket broadcast"
      location: src/standalone/internal/runtime.ts
      relationship_to_domain: "Would become a subscriber instead of providing a callback"

  interfaces_used_by_domain:
    - interface: StorageEngine
      location: src/sdk/plugins/types.ts
      usage_pattern: "SDK._storage — all persistence delegated here"
    - interface: SDKEventHandler
      location: src/sdk/types.ts
      usage_pattern: "Single callback: (event, data) => void — set once at construction"
    - interface: SDKContext
      location: src/sdk/modules/context.ts
      usage_pattern: "First param of all module functions — provides access to storage, config, and emitEvent"
    - interface: ResolvedCapabilityBag
      location: src/sdk/plugins/index.ts
      usage_pattern: "SDK._capabilities — resolved bag of all active plugins"

  data_flow_involving_domain: |
    1. Host (server/CLI/MCP) creates SDK with optional onEvent handler
    2. Host calls SDK public method (e.g. createCard)
    3. SDK runs _authorizeAction() → auth plugins resolve identity + check policy
    4. SDK delegates to module function (e.g. Cards.createCard(this, data))
    5. Module performs business logic using ctx._storage (StorageEngine)
    6. Module calls ctx.emitEvent('task.created', sanitizedData) — FIRE AND FORGET
    7. emitEvent invokes the single onEvent callback OR falls back to fireWebhooks()
    8. Host's onEvent callback typically: (a) forwards to fireWebhooks(), (b) broadcasts via WebSocket

  key_relationships_to_domain:
    - from: KanbanSDK
      to: Module files
      relationship: "delegates (passes `this` as SDKContext)"
    - from: Module files
      to: SDKContext.emitEvent
      relationship: "calls after every mutation"
    - from: KanbanSDK.emitEvent
      to: SDKEventHandler (onEvent callback)
      relationship: "invokes single registered handler"
    - from: KanbanSDK.emitEvent
      to: fireWebhooks
      relationship: "fallback when no onEvent handler"
    - from: Host layers
      to: KanbanSDK constructor
      relationship: "provide onEvent callback for event routing"
    - from: Standalone runtime
      to: fireWebhooks + WebSocket broadcast
      relationship: "consumes events in onEvent callback"

related_conventions:
  naming_patterns_in_domain: "Events: 'domain.action' (task.created, comment.deleted). Plugins: manifest.id + provides array. Modules: lowercase plural nouns (boards, cards, columns)."
  structure_of_domain: "Facade pattern — KanbanSDK class wraps modules + plugins. Modules are stateless function collections. Plugins are capability-scoped interfaces."
  error_handling_in_domain: "Auth errors throw AuthError. Event handler errors caught and swallowed. Plugin load errors throw descriptive Error with install hints."
  testing_in_domain: "Tests in src/sdk/__tests__/. Module functions testable via SDKContext mock."
  documentation_in_domain: "Extensive JSDoc on all public methods. Auto-generated docs/sdk.md from JSDoc."

