open_questions:
  - question: "Should the pub/sub bus live inside KanbanSDK or be a separate injectable dependency?"
    context: "Currently events go through a single callback on the class. A separate EventBus could be injected via SDKOptions, but that changes the constructor API."
  - question: "Should plugins be able to subscribe to events?"
    context: "Current plugins (storage, auth) have no event awareness. Storage plugins might want to react to events (e.g., invalidate caches). Auth plugins might want audit logging."
  - question: "Should pre-mutation (before) events be supported alongside post-mutation (after) events?"
    context: "Current pattern is post-mutation only. Pre-events would enable validation plugins, cancellation, or transformation pipelines."
  - question: "Should the event handler support async/await?"
    context: "Current SDKEventHandler is sync (void return). Async subscribers would require await-ing emitEvent(), changing the contract for all 27+ call sites in modules."
  - question: "How should the fallback from onEvent to fireWebhooks be handled in a pub/sub model?"
    context: "Currently emitEvent has a branching fallback. In pub/sub, webhooks would just be another subscriber, eliminating the branch."
  - question: "Should SDKContext.emitEvent be replaced with a publish method on an injected bus?"
    context: "All 27 module emitEvent call sites would need updating if the signature changes."

gaps:
  - area: "No event typing per event type"
    description: "All events use `data: unknown`. There are no typed event payload interfaces per SDKEventType. E.g., task.created payload shape is not enforced."
    impact: "Subscribers cannot get type-safe payloads without runtime checks or casting."
  - area: "No event ordering guarantees"
    description: "Events are emitted synchronously inline. No queue, no ordering, no deduplication."
    impact: "A pub/sub system would need to decide on ordering semantics (FIFO per board? per card? global?)."
  - area: "No event metadata"
    description: "Events carry only type + data. No event ID, no timestamp, no correlation ID, no actor/auth context."
    impact: "Pub/sub consumers often need metadata for idempotency, ordering, and audit trails."
  - area: "Host-specific WebSocket broadcast not in SDK"
    description: "WebSocket broadcasting of events is wired in standalone/internal/runtime.ts — outside the SDK. The extension (VS Code) has its own separate event handling."
    impact: "Multiple host layers duplicate event routing logic that could be unified in a pub/sub bus."

