patterns_found:
  - category: architecture
    pattern: "Single-callback event dispatch"
    description: "The SDK uses a single optional callback (_onEvent) for event dispatch. If set, all events route through it. If not, events fall back to direct fireWebhooks() calls. There is no multi-subscriber pub/sub mechanism."
    examples:
      - file: KanbanSDK.ts
        location: "src/sdk/KanbanSDK.ts:513-522"
        snippet: |
          emitEvent(event: SDKEventType, data: unknown): void {
            if (this._onEvent) {
              try { this._onEvent(event, data) }
              catch (err) { console.error(...) }
            } else {
              fireWebhooks(this.workspaceRoot, event, data)
            }
          }
    prevalence: common

  - category: architecture
    pattern: "Inline post-mutation event emission"
    description: "Every SDK module function emits events inline immediately after successful mutation. Events are emitted at the module level (cards.ts, boards.ts, etc.), not centralized."
    examples:
      - file: cards.ts
        location: "src/sdk/modules/cards.ts:368"
        snippet: "ctx.emitEvent('task.created', sanitizeCard(card))"
      - file: boards.ts
        location: "src/sdk/modules/boards.ts:75"
        snippet: "ctx.emitEvent('board.created', boardInfo)"
      - file: columns.ts
        location: "src/sdk/modules/columns.ts:39"
        snippet: "ctx.emitEvent('column.created', column)"
    prevalence: common

  - category: architecture
    pattern: "Pre-action authorization gate"
    description: "Every mutating SDK method calls _authorizeAction(actionName, context) before executing any side effects. This is a synchronous-style gate (async but awaited). It either returns an AuthDecision or throws AuthError."
    examples:
      - file: KanbanSDK.ts
        location: "src/sdk/KanbanSDK.ts:1013"
        snippet: "await this._authorizeAction('card.create', this._withAuthContext(auth, { boardId: data.boardId }))"
      - file: KanbanSDK.ts
        location: "src/sdk/KanbanSDK.ts:1158"
        snippet: "await this._authorizeAction('card.move', this._withAuthContext(auth, { cardId, boardId, columnId: newStatus }))"
    prevalence: common

  - category: architecture
    pattern: "Mutation service wrapper pattern"
    description: "The standalone server wraps each SDK mutation in a doXxx function that: (1) sets ctx.migrating=true, (2) calls SDK method, (3) suppresses file watcher, (4) reloads cards, (5) broadcasts full state via WebSocket, (6) finally resets migrating. This is separate from webhook dispatch."
    examples:
      - file: mutationService.ts
        location: "src/standalone/mutationService.ts:13-32"
        snippet: |
          async function doCreateCard(ctx, data, auth) {
            ctx.migrating = true
            try {
              const card = await ctx.sdk.createCard(data, auth)
              ctx.suppressWatcherEventsUntil = Date.now() + 500
              await loadCards(ctx)
              broadcast(ctx, buildInitMessage(ctx))
              return card
            } finally { ctx.migrating = false }
          }
    prevalence: common

  - category: architecture
    pattern: "Dual event delivery: webhooks + WebSocket broadcast"
    description: "Mutations trigger TWO independent notification mechanisms: (1) SDK emitEvent → onEvent callback → fireWebhooks (HTTP POST), (2) mutationService broadcast → all WS clients get full board state. These run in parallel but are wired at different layers."
    examples:
      - file: runtime.ts
        location: "src/standalone/internal/runtime.ts:44-45"
        snippet: |
          onEvent: (event, data) => {
            fireWebhooks(workspaceRoot, event, data)
          }
      - file: mutationService.ts
        location: "src/standalone/mutationService.ts:26-27"
        snippet: |
          await loadCards(ctx)
          broadcast(ctx, buildInitMessage(ctx))
    prevalence: common

  - category: architecture
    pattern: "Capability bag immutable at construction"
    description: "Auth plugins (and storage plugins) are resolved once during SDK construction via resolveCapabilityBag() and stored in _capabilities. They cannot be changed at runtime."
    examples:
      - file: plugins/index.ts
        location: "src/sdk/plugins/index.ts:615-690"
        snippet: "resolveCapabilityBag(capabilities, kanbanDir, authCapabilities) → ResolvedCapabilityBag (immutable)"
    prevalence: common

  - category: naming
    pattern: "Canonical action names for auth"
    description: "Auth actions use dot-separated namespace names matching RBAC_ROLE_MATRIX: card.create, card.update, card.move, card.delete, board.create, column.create, settings.update, webhook.create, etc."
    examples:
      - file: plugins/index.ts
        location: "src/sdk/plugins/index.ts:230-289"
        snippet: "RBAC_ADMIN_ACTIONS includes card.*, board.*, column.*, settings.update, webhook.*, label.*, storage.migrate, etc."
    prevalence: common

  - category: error_handling
    pattern: "Fire-and-forget webhook delivery"
    description: "Webhook delivery is completely async and error-swallowing. deliverWebhook is called in a fire-and-forget loop; failures are caught and logged but never propagated, retried, or acknowledged."
    examples:
      - file: webhooks.ts
        location: "src/sdk/webhooks.ts:39-43"
        snippet: |
          for (const webhook of matching) {
            deliverWebhook(webhook, event, payload).catch(err => {
              console.error(`Webhook delivery failed...`, err.message || err)
            })
          }
    prevalence: common

related_architecture:
  components_relevant_to_domain:
    - component: KanbanSDK
      responsibility: "Central SDK class orchestrating all business logic, auth gating, and event emission"
      location: "src/sdk/KanbanSDK.ts"
      relationship_to_domain: "Owns the emitEvent() dispatch point and _authorizeAction() gate"
    - component: SDK Modules
      responsibility: "Domain-specific mutation logic (cards, boards, columns, comments, logs, settings, attachments, migration)"
      location: "src/sdk/modules/"
      relationship_to_domain: "Each module calls ctx.emitEvent() after mutations — these are the event source points"
    - component: Plugin Registry
      responsibility: "Resolves and wires storage + auth plugins at SDK construction"
      location: "src/sdk/plugins/index.ts"
      relationship_to_domain: "Owns AuthIdentityPlugin, AuthPolicyPlugin interfaces, RBAC implementations, and ResolvedCapabilityBag"
    - component: Standalone Server
      responsibility: "HTTP/WS server layer with Fastify, routes, and mutation orchestration"
      location: "src/standalone/"
      relationship_to_domain: "Wires onEvent callback to fireWebhooks, manages dual broadcast (webhooks + WS)"
    - component: Mutation Service
      responsibility: "Orchestrates SDK mutations with watcher suppression and WS broadcast"
      location: "src/standalone/mutationService.ts"
      relationship_to_domain: "Post-mutation broadcast layer, orthogonal to SDK event emission"
    - component: Runtime Factory
      responsibility: "Creates KanbanSDK with onEvent hook for webhook dispatch"
      location: "src/standalone/internal/runtime.ts"
      relationship_to_domain: "The binding point where onEvent → fireWebhooks is wired"

  interfaces_used_by_domain:
    - interface: SDKEventHandler
      location: "src/sdk/types.ts:84"
      usage_pattern: "Single callback: (event: SDKEventType, data: unknown) => void. Set once at construction via SDKOptions.onEvent"
    - interface: AuthIdentityPlugin
      location: "src/sdk/plugins/index.ts:52"
      usage_pattern: "resolveIdentity(context) → AuthIdentity | null. Resolved once at construction."
    - interface: AuthPolicyPlugin
      location: "src/sdk/plugins/index.ts:68"
      usage_pattern: "checkPolicy(identity, action, context) → AuthDecision. Resolved once at construction."
    - interface: Webhook (config type)
      location: "src/shared/config.ts"
      usage_pattern: "Persisted in .kanban.json as webhooks array. Fields: id, url, events, secret?, active."

  data_flow_involving_domain: |
    MUTATION FLOW:
    1. Host surface (HTTP route / WS message / CLI / MCP) extracts AuthContext
    2. Calls SDK method (e.g., sdk.createCard(data, auth))
    3. SDK method calls _authorizeAction(actionName, authContext) → resolves identity → checks policy → throws AuthError or returns
    4. SDK method executes business logic via module function (e.g., modules/cards.ts createCard())
    5. Module function calls ctx.emitEvent(eventType, sanitizedData)
    6. KanbanSDK.emitEvent() → if _onEvent is set, calls _onEvent(event, data); else calls fireWebhooks() directly
    7. In standalone: _onEvent → fireWebhooks(workspaceRoot, event, data) → HTTP POST to all matching webhook URLs
    8. Back in mutationService: loadCards() → broadcast(ctx, buildInitMessage(ctx)) → WS broadcast to all clients

    AUTH FLOW:
    1. Host extracts token from transport (HTTP Authorization header / env var / etc.)
    2. Constructs AuthContext { token, tokenSource, transport, ...contextualIds }
    3. SDK._authorizeAction() → capabilities.authIdentity.resolveIdentity(context) → AuthIdentity | null
    4. SDK._authorizeAction() → capabilities.authPolicy.checkPolicy(identity, action, context) → AuthDecision
    5. If denied: throw AuthError(category, message, actor)
    6. Host catches AuthError and maps to transport-specific error (HTTP 401/403, WS authDenied, CLI exit code)

  key_relationships_to_domain:
    - from: "SDK modules (cards, boards, columns, etc.)"
      to: "KanbanSDK.emitEvent()"
      relationship: "calls (via ctx.emitEvent)"
    - from: "KanbanSDK.emitEvent()"
      to: "SDKEventHandler (_onEvent callback)"
      relationship: "calls (when handler registered)"
    - from: "KanbanSDK.emitEvent()"
      to: "fireWebhooks()"
      relationship: "calls (direct fallback when no handler)"
    - from: "createStandaloneRuntime()"
      to: "KanbanSDK constructor"
      relationship: "injects onEvent callback wiring"
    - from: "KanbanSDK methods"
      to: "_authorizeAction()"
      relationship: "calls (pre-action gate)"
    - from: "_authorizeAction()"
      to: "AuthIdentityPlugin.resolveIdentity()"
      relationship: "calls"
    - from: "_authorizeAction()"
      to: "AuthPolicyPlugin.checkPolicy()"
      relationship: "calls"
    - from: "mutationService.doXxx()"
      to: "broadcast()"
      relationship: "calls (additional WS broadcast after SDK mutation)"

related_conventions:
  naming_patterns_in_domain: |
    - Event types: domain.verb (e.g., task.created, board.deleted, attachment.added)
    - Auth actions: domain.verb (e.g., card.create, column.update, settings.update)
    - Webhook IDs: 'wh_' + random hex
    - Plugin providers: string identifiers ('noop', 'rbac', 'markdown', 'localfs')
  structure_of_domain: |
    - Webhooks are a flat module (src/sdk/webhooks.ts) not inside plugins/
    - Auth plugins live in src/sdk/plugins/index.ts alongside storage plugins
    - Standalone re-exports webhooks from SDK (thin passthrough layer)
    - SDK modules live in src/sdk/modules/ with SDKContext as their dependency injection surface
  error_handling_in_domain: |
    - Webhook delivery: catch + console.error (fire-and-forget)
    - Auth denial: throw AuthError → caught by host surface → mapped to transport error
    - SDK event handler errors: catch + console.error (never propagated)
  testing_in_domain: |
    - Webhook tests: src/standalone/__tests__/webhooks.test.ts (CRUD + fireWebhooks with HTTP mock)
    - Auth enforcement tests: src/sdk/__tests__/auth-enforcement.test.ts (per-action denial)
    - Plugin registry tests: src/sdk/__tests__/plugin-registry.test.ts (_authorizeAction unit tests)
  documentation_in_domain: |
    - docs/auth.md: comprehensive auth architecture docs
    - docs/webhooks.md: auto-generated webhooks docs
    - docs/sdk.md: auto-generated SDK docs including emitEvent

