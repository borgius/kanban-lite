  external:
    - name: "crypto (node:crypto)"
      purpose_for_domain: "HMAC-SHA256 webhook signature generation and webhook ID generation"
    - name: "http / https (node builtins)"
      purpose_for_domain: "HTTP/HTTPS transport for webhook delivery"

testing_patterns:
  framework: "vitest"
  coverage_areas:
    - "Webhook CRUD operations (create, load, save, delete, update)"
    - "Webhook delivery with HTTP mock server"
    - "HMAC-SHA256 signature verification"
    - "Webhook filtering by event type and wildcard"
    - "Auth enforcement per SDK action (deny/allow for each role)"
    - "_authorizeAction unit tests (noop, rbac identity, rbac policy)"
  test_organization: |
    - src/standalone/__tests__/webhooks.test.ts: integration tests for webhook delivery
    - src/sdk/__tests__/auth-enforcement.test.ts: per-action auth enforcement tests
    - src/sdk/__tests__/plugin-registry.test.ts: plugin resolution and _authorizeAction unit tests
  mock_patterns:
    - "HTTP test server for webhook delivery verification"
    - "Custom AuthIdentityPlugin / AuthPolicyPlugin for deny/allow testing"

open_questions:
  - question: "Should webhook CRUD operations become an event plugin themselves, or remain as configuration in .kanban.json?"
    context: "Currently webhooks are stored as config entries with their own CRUD. In a pub/sub model, webhooks could be one subscriber type among many."
  - question: "How should the dual broadcast (webhooks + WebSocket) be unified in a pub/sub model?"
    context: "Currently webhooks fire from SDK via onEvent callback, while WS broadcast happens at the mutationService layer. These are two independent notification paths."
  - question: "Should auth remain a pre-action gate pattern or become a pre-event interceptor in the pub/sub pipeline?"
    context: "Currently auth is a synchronous gate (_authorizeAction) called before mutation logic. In pub/sub, it could be a 'before' event interceptor."
  - question: "How to handle the SDKContext.emitEvent() pattern when module functions need to emit events — should modules emit to a bus directly?"
    context: "Currently modules depend on SDKContext which includes emitEvent(). In pub/sub, modules would need access to the event bus."
  - question: "What about events that currently have no emitEvent call (e.g., column reorder)?"
    context: "Not all mutations currently emit events. A pub/sub redesign should audit and add missing events."

gaps:
  - area: "Missing event emissions"
    description: "Some mutations don't emit events: reorderColumns, setMinimizedColumns, setDefaultBoard, renameLabel, deleteLabel, and setLabel do not all have corresponding emitEvent calls in their module functions."
    impact: "A pub/sub redesign must audit all mutations to ensure complete event coverage."
  - area: "No event acknowledgment or retry for webhooks"
    description: "Webhook delivery is completely fire-and-forget with no retry, no dead letter queue, no delivery status tracking."
    impact: "A pub/sub architecture should define delivery guarantees for different subscriber types."
  - area: "Single-subscriber limitation"
    description: "The current _onEvent is a single callback. Only one listener can be registered. The standalone server uses it for fireWebhooks, but if another host surface needed the same events, there's no way to add it."
    impact: "This is the primary architectural limitation that pub/sub addresses."
  - area: "No event metadata beyond data payload"
    description: "Events carry only (eventType, data). No correlation ID, no auth actor information, no timestamp at the emission point, no causation chain."
    impact: "A pub/sub system should enrich events with metadata for audit trails and debugging."
  - area: "Auth decision not available to event subscribers"
    description: "The auth decision (actor, roles) is resolved in _authorizeAction but not passed to emitEvent. Webhook payloads don't include who performed the action."
    impact: "Event-driven plugins that need actor context (audit logging, notifications) can't get it from the current event payload."
