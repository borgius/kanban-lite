plan_id: "20260321-sdk-pubsub-architecture"
objective: "Understand how webhooks and auth plugins currently work to redesign them as event-driven plugins in a pub/sub architecture"
focus_area: "webhooks_and_auth_plugin"
created_at: "2026-03-21"
created_by: "gem-researcher"
status: completed

tldr: |
  - Webhooks are a two-layer system: SDK emits events via `emitEvent()` → if an `onEvent` handler is registered it receives events (standalone server uses this to call `fireWebhooks()`), otherwise `fireWebhooks()` is called directly as a fallback inside the SDK.
  - Auth is a capability-based plugin system with two namespaces (`auth.identity` and `auth.policy`), resolved at SDK construction time via `resolveCapabilityBag()`. Every mutating SDK method calls `_authorizeAction()` as a pre-action gate before executing logic.
  - The event emission is tightly coupled: each SDK module (cards, boards, columns, comments, logs, etc.) calls `ctx.emitEvent()` inline after successful mutations. There is no pub/sub bus — it's a single callback.
  - The standalone server adds a second broadcast layer (WebSocket `broadcast()` → all connected clients) that is orthogonal to webhooks but triggered at the same mutation points in `mutationService.ts`.
  - Key coupling points: `emitEvent()` is a synchronous single-callback, auth plugins are resolved once at construction and immutable, and webhook delivery is fire-and-forget HTTP POST with no retry or acknowledgment.

research_metadata:
  methodology: "Hybrid retrieval: semantic_search + grep_search + file_search for discovery, read_file for detailed examination across 7 focus areas"
  scope: "Complete examination of webhook SDK, standalone webhook layer, auth plugins, server routes, mutation service, broadcast service, message handlers, SDK modules, and SDK context"
  confidence: high
  coverage: 95

