plan_id: 20260321-webhooks-external-plugin
objective: |
	Move webhook registry CRUD and runtime listener/delivery out of kanban-light core into
	an external npm plugin package loaded like storage plugins; remove built-in webhook
	implementation from core as much as safely possible; preserve SDK/API/CLI/MCP/standalone
	behavior parity; support local sibling-repo development/linking modeled on
	`/Users/admin/dev/kl-sqlite-storage`; compile successfully; and verify linked-plugin
	behavior before final cleanup.
created_at: "2026-03-21"
created_by: gem-planner
status: pending_approval
research_confidence: high

tldr: |
	The lowest-risk path is a compatibility-first extraction: introduce one dedicated
	webhook provider capability in core, keep the existing SDK event bus and public webhook
	methods, and delegate both webhook CRUD and runtime event delivery to an external package
	instead of finishing a broader generic event-listener framework now. The external package
	should preserve the current `.kanban.json` `webhooks` array shape, delivery headers,
	HMAC signing, timeout, and fire-and-forget semantics so CLI/API/MCP/standalone behavior
	stays the same after the plugin is linked. Core should remove the always-on built-in
	`WebhookListenerPlugin` path and direct `fireWebhooks()` fallback, leaving at most thin,
	temporary compatibility shims while the new provider contract settles.

open_questions:
	- "Assume package name `kl-webhooks-plugin` and provider id `webhooks`; rename is mechanical if maintainers prefer a different public name."

pre_mortem:
	overall_risk_level: high
	critical_failure_modes:
		- scenario: Core and the external plugin both subscribe to SDK events, causing duplicate webhook delivery.
			likelihood: high
			impact: critical
			mitigation: |
				Make the external provider the only runtime webhook subscriber, remove the built-in
				`WebhookListenerPlugin` initialization from `KanbanSDK`, and add regression coverage
				that proves exactly one outbound request per emitted SDK event.
		- scenario: Existing workspaces lose webhook CRUD/runtime behavior because the new provider is not resolved automatically from legacy config.
			likelihood: medium
			impact: high
			mitigation: |
				Normalize legacy webhook behavior to a default `webhooks` provider contract, keep the
				persisted `.kanban.json` shape unchanged, and emit deterministic install guidance when
				the external package is absent instead of silently disabling webhooks.
		- scenario: The plugin package exports/build shape does not match the runtime loader expectations, breaking sibling fallback or npm linking.
			likelihood: medium
			impact: high
			mitigation: |
				Mirror the `kl-sqlite-storage` package structure (CommonJS bundle, `exports`, `types`,
				peer dependency on `kanban-lite`), verify both sibling fallback and `npm link`, and add
				a focused loader test for alias resolution.
		- scenario: Removing `src/sdk/webhooks.ts` too early breaks direct internal imports, tests, or generated docs before parity is proven.
			likelihood: medium
			impact: high
			mitigation: |
				Convert core webhook files to thin delegating shims first, switch all primary callers to
				the provider contract, and only delete or hard-deprecate old entrypoints after build and
				focused parity checks pass.
	assumptions:
		- The current SDK event bus is the right dispatch seam and does not need a broader pub/sub redesign in this task.
		- Backward-compatible SDK/API/CLI/MCP behavior is more important than fully deleting every legacy symbol in the first pass.
		- The external plugin may continue persisting the webhook registry in `.kanban.json` for parity, even though ownership moves out of core.
		- No `docs/prd.yaml` exists today, so there is no existing PRD conflict to reconcile.

implementation_specification:
	code_structure: |
		Keep `KanbanSDK` as the single orchestrator. Add one new webhook-provider contract to the
		SDK plugin resolver layer, alongside provider alias mapping and sibling-package fallback
		already used for storage plugins. The resolved capability bag should expose an optional
		webhook provider object that owns CRUD plus creation/lifecycle of a bus subscriber built on
		the existing `EventListenerPlugin` type. The external package should mirror the
		`kl-sqlite-storage` packaging/build pattern and preserve the current webhook config and
		delivery semantics. Interface layers (API, CLI, MCP) should remain thin SDK delegates.
	affected_areas:
		- src/shared/config.ts
		- src/sdk/types.ts
		- src/sdk/plugins/index.ts
		- src/sdk/KanbanSDK.ts
		- src/sdk/webhooks.ts
		- src/sdk/plugins/webhookListener.ts
		- src/sdk/index.ts
		- src/standalone/internal/routes/system.ts
		- src/standalone/server.ts
		- src/cli/index.ts
		- src/mcp-server/index.ts
		- src/sdk/__tests__/
		- src/cli/index.test.ts
		- src/mcp-server/index.test.ts
		- scripts/generate-api-docs.ts
		- scripts/generate-sdk-docs.ts
		- scripts/generate-webhooks-docs.ts
		- README.md
		- CHANGELOG.md
		- /Users/admin/dev/kl-webhooks-plugin/
	component_details:
		- component: Webhook provider contract in core
			responsibility: Define the single plugin-facing interface that owns webhook registry CRUD, provider metadata, and creation of the runtime event listener used by `KanbanSDK`.
			interfaces:
				- "New webhook capability namespace and provider ref normalization in `src/shared/config.ts`"
				- "`WebhookProviderPlugin` contract exposed from the SDK plugin layer"
				- "Resolved capability bag entry used by `KanbanSDK` and diagnostics"
		- component: External webhook plugin package
			responsibility: Implement current webhook behavior outside core, including loading/saving the registry, event filtering, HMAC signing, POST delivery, and listener lifecycle.
			interfaces:
				- "CommonJS package export compatible with runtime `createRequire` loading"
				- "Provider manifest using id `webhooks` and the webhook capability namespace"
				- "Optional thin compatibility helpers for migration/testing"
		- component: SDK delegation and cleanup
			responsibility: Replace built-in webhook logic with provider delegation while preserving public SDK methods and auth checks.
			interfaces:
				- "`KanbanSDK.listWebhooks/createWebhook/updateWebhook/deleteWebhook` delegating through the resolved provider"
				- "Single event-bus subscription path for outbound webhook delivery"
		- component: Host parity surfaces
			responsibility: Keep REST, CLI, and MCP webhook behavior stable while surfacing deterministic install/configuration errors and provider status.
			interfaces:
				- "Standalone `/api/webhooks` routes"
				- "CLI webhook commands"
				- "MCP webhook tools"
		- component: Documentation and generated references
			responsibility: Update user-facing install/migration guidance and regenerate API/SDK/webhook docs from source metadata.
			interfaces:
				- "README and CHANGELOG"
				- "Generated docs from scripts under `scripts/`"
	dependencies:
		- component: Webhook provider contract in core
			relationship: Must land first so the sibling package and all host surfaces target a stable interface.
		- component: External webhook plugin package
			relationship: Depends on the core contract and provides the runtime implementation consumed by the SDK.
		- component: SDK delegation and cleanup
			relationship: Depends on both the contract and the external package so built-in webhook code can be removed without behavior drift.
		- component: Host parity surfaces
			relationship: Depend on SDK delegation; they should not implement webhook logic directly.
		- component: Documentation and generated references
			relationship: Depend on final CLI/API/MCP behavior and linked-plugin workflow.
	integration_points:
		- `src/shared/config.ts` is the safest place to normalize legacy webhook behavior into provider resolution without changing the persisted config schema.
		- `src/sdk/plugins/index.ts` already owns provider alias mapping, `createRequire`, and sibling fallback, so webhook plugin loading should reuse that machinery.
		- `KanbanSDK` constructor/init is the single place where event listener lifecycle should be attached and detached.
		- `src/standalone/internal/routes/system.ts`, `src/cli/index.ts`, and `src/mcp-server/index.ts` should continue delegating webhook CRUD through the SDK only.
		- Docs generation must remain source-driven; do not hand-edit generated docs.

