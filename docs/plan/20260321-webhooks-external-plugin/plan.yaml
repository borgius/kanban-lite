rollback_notes:
	- "Keep `src/sdk/webhooks.ts` and `src/sdk/plugins/webhookListener.ts` as temporary delegating shims until the linked-plugin build and parity tests pass."
	- "If plugin resolution is unstable, revert the new webhook provider alias/contract wiring, restore the built-in `WebhookListenerPlugin` initialization in `KanbanSDK`, and leave docs unchanged."
	- "If sibling linking breaks local development, unlink/remove the external package, fall back to sibling-package resolution only, and postpone deletion of legacy webhook files."
	- "Do not delete legacy tests until provider-backed replacements prove SDK/API/CLI/MCP parity and single-delivery behavior."

