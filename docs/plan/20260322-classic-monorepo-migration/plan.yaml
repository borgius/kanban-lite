plan_id: 20260322-classic-monorepo-migration
objective: |
  Transform `/Users/admin/dev/kanban-light` into a classic pnpm monorepo with a private root
  workspace and `packages/*`; move the main product into `packages/kanban-lite`; move sibling
  plugin repos from `/Users/admin/dev/kl-*` into `packages/*`; preserve current imports,
  aliases, and runtime behavior while the migration lands; add plugin-level tests proving each
  plugin works with core; and add Playwright end-to-end coverage for the standalone UI.
created_at: "2026-03-22"
created_by: gem-planner
status: completed
completed_at: "2026-03-22"
research_confidence: high

summary: >-
  Completed the classic pnpm monorepo migration with a private root workspace, the main product
  relocated to `packages/kanban-lite`, all five plugin packages living under `packages/*`, and
  staged compatibility shims/documentation aligned to the landed layout.

verification:
  - "`pnpm build` passes from the repository root."
  - "`pnpm test:plugins:integration` passes for all five plugin packages."
  - "`pnpm test:e2e` passes for the standalone UI against the migrated monorepo layout."

tldr: |
  The safest migration is a compatibility-first, two-layer move: first establish a private pnpm
  workspace root with shared config and filtered scripts, then relocate the existing single-package
  product intact into `packages/kanban-lite` before importing the sibling plugin repos into
  `packages/`. Keep the main published package name `kanban-lite`, preserve plugin package names
  (`kl-auth-plugin`, `kl-mysql-storage`, `kl-s3-attachment-storage`, `kl-sqlite-storage`,
  `kl-webhooks-plugin`), and use temporary compatibility shims for import paths, root scripts, and
  plugin resolution so current CLI/MCP/standalone/extension behavior keeps working while tests and
  docs catch up.

open_questions:
  - "Should the root keep temporary delegating `bin/` wrappers and filtered release scripts for one release cycle, or can all publishing/release entrypoints switch directly to `packages/kanban-lite` in the same change?"
  - "Should the plugin repositories be copied into `packages/*` with history preserved later, or is a content move without git history preservation acceptable for this migration?"
  - "Should Playwright run only against the standalone app in CI, or also be runnable locally via a seeded demo workspace fixture and filtered workspace command?"

pre_mortem:
  overall_risk_level: high
  critical_failure_modes:
    - scenario: The move to `packages/kanban-lite` breaks published entrypoints (`exports`, CLI bins, VS Code extension main, SDK import path), causing the product to build but not run.
      likelihood: high
      impact: critical
      mitigation: |
        Keep the package name `kanban-lite` unchanged inside `packages/kanban-lite`, preserve the
        current `exports`/`bin` contract, and add temporary root-level script and wrapper shims that
        forward to the package until build, test, and packaging checks pass from the workspace root.
    - scenario: Plugin loading loses compatibility because the loader only knows the old sibling paths (`../kl-*`) or only knows installed npm packages, breaking local development during the transition.
      likelihood: high
      impact: critical
      mitigation: |
        Update plugin resolution to support installed package names, workspace-local `packages/kl-*`
        paths, and the current sibling fallback paths during the staged migration. Add focused tests
        for alias resolution and package export shape before deleting any old fallback path.
    - scenario: Rooted build/test configs silently stop covering code after files move under `packages/`, creating a false-green migration.
      likelihood: medium
      impact: high
      mitigation: |
        Convert the root into the single orchestration layer for pnpm filters, TypeScript project
        references/shared config, Vitest workspace coverage, and Playwright startup commands.
        Require at least one verification command per package plus root smoke checks.
    - scenario: Plugin packages move into the monorepo, but auth and S3 still ship without package-local tests and MySQL loses its live backend coverage.
      likelihood: medium
      impact: high
      mitigation: |
        Keep mature plugin tests in place, add missing package-local tests for auth and S3, and make
        MySQL docker/service-backed integration coverage a first-class verification gate inside the
        workspace.
    - scenario: New Playwright coverage is flaky because the standalone app has no existing test harness, deterministic fixture workspace, or stable startup contract.
      likelihood: medium
      impact: high
      mitigation: |
        Target only the standalone app, seed a deterministic fixture board/workspace, expose a
        stable workspace command for starting the server/UI under test, and keep the first E2E scope
        focused on core happy paths instead of broad visual regression.
  assumptions:
    - The root can become a private workspace orchestrator without changing the public package name of the main product.
    - The main product may remain a mixed package (extension + CLI + MCP + standalone + SDK) inside `packages/kanban-lite` for this migration to minimize risk.
    - "`pnpm-workspace.yaml` should own package discovery for all workspace packages under `packages/*`."
    - Docs and changelog updates should remain in the root repository, while generated outputs continue to be source-driven.
    - No `docs/prd.yaml` currently exists, so there is no existing PRD contract to reconcile before planning.

implementation_specification:
  code_structure: |
    Recommended package layout:

      /Users/admin/dev/kanban-light/
        package.json                # private workspace orchestrator only
        pnpm-workspace.yaml         # includes packages/*
        tsconfig.json / shared configs
        docs/
        scripts/
        packages/
          kanban-lite/             # keeps package name `kanban-lite`
            src/
            bin/
            package.json
            vite/tsconfig/vitest configs (or package-local wrappers around shared root config)
          kl-auth-plugin/
          kl-mysql-storage/
          kl-s3-attachment-storage/
          kl-sqlite-storage/
          kl-webhooks-plugin/

    For this migration, do not prematurely split the main product into multiple packages. Move the
    current mixed app intact into `packages/kanban-lite`, then re-point root orchestration,
    references, and tests to the new location. Temporary compatibility shims should include:
    (1) root scripts forwarding to `pnpm --filter kanban-lite ...`,
    (2) optional root `bin/` wrappers or release-task wrappers while packaging changes settle,
    (3) plugin-loader support for both workspace-local `packages/kl-*` and old sibling `../kl-*`
    fallback paths,
    (4) temporary import/barrel shims only where host surfaces or generators cannot be switched in
    one pass.
  affected_areas:
    - root workspace config (`package.json`, `pnpm-workspace.yaml`, tsconfig/vitest/eslint/build tooling)
    - "`packages/kanban-lite/` housing the current main product sources, entrypoints, and package metadata"
    - "`packages/kl-*/` housing all current sibling plugin repos"
    - plugin loader / alias resolution / package discovery
    - tests (unit, integration, package-local plugin tests, Playwright E2E)
    - docs and changelog (`README.md`, `CHANGELOG.md`, `docs/plugins.md`, generated-doc sources)
  component_details:
    - component: Root workspace orchestrator
      responsibility: Keep the repository root private, discover `packages/*`, host shared configs,
        and provide filtered build/test/dev/docs commands spanning the monorepo.
      interfaces:
        - "Root `package.json` marked `private: true` with filtered scripts targeting `packages/kanban-lite` and plugin packages"
        - "`pnpm-workspace.yaml` package globs for `packages/*`"
        - "Shared TypeScript/Vitest/Playwright orchestration contract"
    - component: Main product package (`packages/kanban-lite`)
      responsibility: Own the existing product codebase, package metadata, SDK export, CLI bins,
        extension entrypoint, standalone server, MCP server, and docs generator consumption points.
      interfaces:
        - "Published package name remains `kanban-lite`"
        - "Existing SDK import target `kanban-lite/sdk` remains valid"
        - "Existing CLI bin names and extension entrypoint remain valid after relocation"
    - component: Workspace plugin packages
      responsibility: Own each plugin implementation inside the monorepo without changing package
        names or public provider ids.
      interfaces:
        - "`packages/kl-auth-plugin`"
        - "`packages/kl-mysql-storage`"
        - "`packages/kl-s3-attachment-storage`"
        - "`packages/kl-sqlite-storage`"
        - "`packages/kl-webhooks-plugin`"
    - component: Compatibility shim layer
      responsibility: Preserve behavior while paths move by bridging old root/sibling assumptions to
        the new workspace topology.
      interfaces:
        - "Root script/bin forwarding into workspace packages"
        - "Plugin loader fallback chain: installed package -> workspace package -> legacy sibling path"
        - "Temporary re-export/barrel shims only where import rewrites cannot land atomically"
    - component: Verification harness
      responsibility: Prove that each plugin works with core inside the monorepo and that the
        standalone UI still behaves correctly after the move.
      interfaces:
        - "Package-local plugin integration tests using `kanban-lite` as the consumer/core package"
        - "Workspace-level filtered test commands and MySQL service-backed integration path"
        - "Playwright E2E suite targeting the standalone app"
  dependencies:
    - component: Root workspace orchestrator
      relationship: Must land first so package moves, filtered scripts, and shared test infrastructure have a stable home.
    - component: Main product package (`packages/kanban-lite`)
      relationship: Depends on the workspace orchestrator and defines the import/export surface the rest of the monorepo consumes.
    - component: Workspace plugin packages
      relationship: Depend on the workspace layout and on a stable main-package import contract.
    - component: Compatibility shim layer
      relationship: Depends on both the main package move and plugin package locations so old references can be bridged safely.
    - component: Verification harness
      relationship: Depends on final package locations and shimmed resolution semantics to test real migration behavior rather than pre-move assumptions.
  integration_points:
    - The host surfaces currently importing `src/sdk/**` and `src/shared/**` (CLI, MCP, standalone, extension, tests, docs generators) must all switch to the new package-local locations or explicitly use temporary shims.
    - The plugin loader already understands alias maps and sibling fallback; extend that seam instead of inventing a second loading mechanism.
    - Rooted test/build configs must become package-aware without losing current `npm run build` / `npm test` style workflows from the repository root.
    - Standalone is the correct initial Playwright target because it exercises the same UI state with the lowest setup friction.
    - README, CHANGELOG, and generated-doc source metadata must reflect the new monorepo topology and package-specific verification flows.

