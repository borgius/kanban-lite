plan_id: "20260323-agent-orchestration-examples"
objective: |
  Add a new top-level `examples/` folder containing three runnable example applications that demonstrate
  kanban-lite integrations for (1) Chat SDK / Vercel AI ecosystem, (2) LangGraph Python, and (3) Mastra
  agent orchestration, then integrate those examples into the docs site with step-by-step build guides
  while keeping `/docs/examples/` as the stable discovery URL.
created_at: "2026-03-23"
created_by: "gem-planner"
status: completed
research_confidence: high

tldr: |
  Four-wave plan: first lock the top-level examples topology and docs-site route contract, then build the
  three self-contained example apps in parallel, then author step-by-step build guides plus repo-level
  discoverability updates, and finally run review/smoke validation on example run paths and docs navigation.
  The plan deliberately avoids core SDK/API/CLI/MCP feature work unless an example exposes a blocker severe
  enough to justify a separate follow-up plan.

open_questions:
  - "The plan assumes the new `examples/*` apps stay self-contained and outside the root pnpm workspace unless a concrete build blocker requires opt-in workspace wiring."
  - "The plan assumes all example env files use placeholders only and document supported model/provider choices rather than baking in one required vendor secret."

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: "Adding top-level example apps contaminates the root workspace/build flow and makes normal repo installs slower or more fragile."
      likelihood: medium
      impact: high
      mitigation: |
        Keep `examples/*` self-contained by default, change `pnpm-workspace.yaml` and root scripts only if a concrete
        developer-experience payoff outweighs the added maintenance, and verify the existing root `build` contract remains unchanged.
    - scenario: "Docs-site guides drift from the runnable example apps, leaving `/docs/examples/` attractive but inaccurate."
      likelihood: medium
      impact: high
      mitigation: |
        Treat each example README/run contract as the input for its matching docs guide, add watch targets for example-owned content when needed,
        and reserve a final review pass that checks commands, routes, and naming consistency across app folders and docs pages.
    - scenario: "While building the examples, the work expands into off-scope core feature changes across SDK/API/CLI/MCP surfaces."
      likelihood: medium
      impact: critical
      mitigation: |
        Keep the examples on documented/public integration seams only. If a missing seam or bug is discovered, capture it as a blocker and spin a separate
        follow-up plan instead of widening this examples/docs task.
  assumptions:
    - "Examples and docs are the requested deliverables; no core parity work is planned unless a blocker is discovered."
    - "`packages/docs-site/src/docs/examples.njk` remains the stable examples hub entry at `/docs/examples/`."
    - "`packages/docs-site/src/docs/quick-start.njk` is the right reference pattern for step-by-step build-guide structure."
    - "Two TypeScript examples may use app-local `package.json` manifests; the Python example may use `requirements.txt` or equivalent app-local tooling without changing the monorepo build contract."

implementation_specification:
  code_structure: |
    Introduce a new top-level `examples/` directory with three self-contained sub-apps:
    `examples/chat-sdk-vercel-ai/`, `examples/langgraph-python/`, and `examples/mastra-agent-ops/`.
    Each example owns its runtime manifest, minimal source entrypoints, and local run contract. The docs site keeps
    `/docs/examples/` as the stable hub, adds three dedicated build-guide pages, and optionally watches/reads example-owned
    README or metadata content if that improves drift resistance. Root repo changes stay limited to discoverability files
    (`README.md`, `CHANGELOG.md`, and only optional root/workspace wiring if clearly justified).
  affected_areas:
    - "examples/**/*"
    - "packages/docs-site/src/docs/examples.njk"
    - "packages/docs-site/src/docs/quick-start.njk"
    - "packages/docs-site/src/_data/nav.js"
    - "packages/docs-site/eleventy.config.mjs"
    - "README.md"
    - "CHANGELOG.md"
    - "pnpm-workspace.yaml (conditional only if workspace enrollment becomes necessary)"
    - "package.json (conditional only if root scripts materially improve example discoverability)"
  component_details:
    - component: examples folder contract
      responsibility: "Define naming, isolation boundaries, local run/install conventions, and shared expectations for example-owned env/docs files without disturbing the main workspace flows."
      interfaces:
        - "Top-level `examples/README.md` with example index and run expectations"
        - "Per-example local install/run contract documented in each app"
        - "Optional root script/workspace contract only if justified by developer ergonomics"
    - component: Chat SDK / Vercel AI example
      responsibility: "Provide a runnable TypeScript app that demonstrates kanban-lite-backed chat triage flows in the Vercel AI ecosystem."
      interfaces:
        - "App-local package manifest and runnable dev/build commands"
        - "A single user-facing route plus chat/server integration entrypoint"
        - "Documented kanban-lite integration seam (SDK and/or standalone API)"
    - component: LangGraph Python example
      responsibility: "Provide a runnable Python app that demonstrates durable backlog orchestration with interrupts/human approval around kanban-lite tasks."
      interfaces:
        - "Python dependency manifest and runnable entrypoint"
        - "Graph orchestration module with approval/checkpoint flow"
        - "Documented kanban-lite integration seam (SDK/API wrapper)"
    - component: Mastra agent orchestration example
      responsibility: "Provide a runnable TypeScript app that demonstrates supervisor-style project ops orchestration over kanban-lite with approval-aware agent steps."
      interfaces:
        - "App-local package manifest and runnable dev/build commands"
        - "Mastra agent graph/registry entrypoint"
        - "UI or route surface that shows kanban-lite task operations in context"
    - component: docs-site example guides
      responsibility: "Publish one step-by-step guide per example plus hub discoverability updates while preserving `/docs/examples/` as the stable landing page."
      interfaces:
        - "Three guide pages linked from `/docs/examples/`"
        - "Navigation metadata and optional watch targets for example-owned docs"
        - "Quick-start/README/CHANGELOG discoverability references"
  dependencies:
    - component: examples folder contract
      relationship: "Must land before any app-specific implementation so folder names, runtime boundaries, and root-workspace rules are fixed."
    - component: docs-site example routing contract
      relationship: "Should land early so example slugs, guide URLs, and watch targets remain stable while apps are authored."
    - component: example apps
      relationship: "Depend on the folder contract and produce run/build commands consumed by the step-by-step guides."
    - component: docs-site example guides
      relationship: "Depend on each example app's final commands, env placeholders, and story framing."
  integration_points:
    - "`packages/docs-site/src/docs/examples.njk` remains the public examples hub and should link out to guide pages plus repo folders."
    - "`packages/docs-site/src/docs/quick-start.njk` and `README.md` are the primary discoverability surfaces outside the hub itself."
    - "`packages/docs-site/eleventy.config.mjs` may need example-folder watch targets if guides consume example-owned content."
    - "No SDK/API/CLI/MCP interface changes are planned; examples should consume existing supported seams only."

