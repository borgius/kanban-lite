plan_id: "20260323-auth-before-event-refactor"
objective: "Remove auth passthrough from KanbanSDK mutator signatures and before-event payloads, delete _withAuthContext, move deep merge responsibility into _runBeforeEvent while preserving original inputs when listeners return nothing or {}, and normalize _runBeforeEvent/_runAfterEvent usage across action methods."
created_at: "2026-03-23"
created_by: "gem-planner"
status: in_progress
research_confidence: high

tldr: |
  This plan keeps the refactor narrow and SDK-first: first change the event/auth contracts and
  helper pipeline in `packages/kanban-lite/src/sdk`, then normalize the affected mutation methods,
  then update the first-party auth listener, host adapters, regression coverage, and docs.
  The highest-risk seams are the missing replacement for `BeforeEventPayload.auth`, the shift from
  shallow merge in `EventBus.emitAsync()` to deep merge in `KanbanSDK._runBeforeEvent()`, and the
  lack of existing after-event names for several mutation families that currently stop at before-events.
  Two explicit review checkpoints are built in: one after the SDK core lands, and one after host/tests/docs
  are aligned.

open_questions:
  - "What concrete replacement carries request-scoped authorization input once both public mutator `auth?: AuthContext` parameters and `BeforeEventPayload.auth` are removed? The current auth plugin and host adapters all depend on those surfaces."
  - "Should action families that currently lack after-events (`card.transfer`, `card.action.trigger`, `label.*`, `column.cleanup`, `column.reorder`, `column.setMinimized`, `card.purgeDeleted`, `board.setDefault`, `webhook.*`) gain new canonical after-event names, or should normalization stop at consistent helper usage without expanding the public event taxonomy?"
  - "For deep merge in `_runBeforeEvent()`, should arrays always replace, always concatenate, or be field-specific overrides? The current published behavior is shallow replacement."

pre_mortem:
  overall_risk_level: high
  critical_failure_modes:
    - scenario: "The implementation removes `payload.auth` and public auth arguments without first landing a replacement auth carrier, breaking authorization decisions in the first-party auth listener and every host path that currently resolves request identity."
      likelihood: high
      impact: critical
      mitigation: |
        Treat the replacement auth carrier as a gating design decision in the SDK contract task and
        confirm it at the first review checkpoint before any host or plugin updates proceed.
    - scenario: "Deep merge semantics accidentally mutate caller-owned input objects or merge nested structures differently across action families, causing hard-to-see behavioral drift in metadata, label definitions, form data, or webhook config updates."
      likelihood: medium
      impact: critical
      mitigation: |
        Centralize deep merge inside `_runBeforeEvent()`, keep the original input immutable, and add
        helper-level tests for undefined returns, `{}`, nested-object overrides, and array behavior before
        touching the mutation families.
    - scenario: "Normalizing `_runAfterEvent()` across methods introduces duplicate deliveries or a public event taxonomy mismatch because several methods currently have no after-event names at all."
      likelihood: medium
      impact: high
      mitigation: |
        Decide the canonical after-event mapping in the second SDK mutation pass, add focused event-name
        regressions, and use the SDK core review checkpoint to reject inconsistent or ad hoc naming.
    - scenario: "A partial host-surface migration leaves stale trailing auth arguments in CLI, MCP, standalone, or extension callers, causing compile failures or silent misordered arguments at runtime."
      likelihood: medium
      impact: high
      mitigation: |
        Split host updates by surface, keep file scopes small, and pair each surface change with the
        most relevant regression suite before moving on.
    - scenario: "Docs and generated SDK references continue describing `_withAuthContext()` or `payload.auth`, creating a misleading contract for plugin authors after the refactor ships."
      likelihood: medium
      impact: medium
      mitigation: |
        Reserve a dedicated documentation wave that updates source docs and regenerates `docs/sdk.md`
        only after behavior and tests are stable.
  assumptions:
    - "No `docs/prd.yaml` exists in the repository at planning time, so there is no existing PRD contract to reconcile before approval."
    - "This refactor should stay surgical: no new dependencies, no broad architectural rewrite, and no unrelated formatting or API cleanup outside the affected auth/event pipeline."
    - "`EventBus.emitAsync()` should stop owning merge semantics; `_runBeforeEvent()` becomes the single place that clones, merges, and preserves original inputs when listeners return nothing meaningful."
    - "The final public behavior must preserve existing AuthError-based denial handling and token-redaction guarantees."

implementation_specification:
  code_structure: |
    Keep the refactor centered on the existing SDK pipeline. Update the published event/auth contracts
    in `packages/kanban-lite/src/sdk/types.ts` and the async dispatcher in `packages/kanban-lite/src/sdk/eventBus.ts`
    so the event bus only collects ordered before-listener outputs. Move all merge and input-preservation
    logic into `packages/kanban-lite/src/sdk/KanbanSDK.ts`, where `_runBeforeEvent()` becomes the sole owner
    of cloning, deep merge, and fallback-to-original behavior. Then normalize the action methods in `KanbanSDK.ts`
    in two passes: methods that already have after-event vocabulary first, then methods that need after-event
    normalization decisions. After the SDK is stable, update the first-party auth listener and each host surface
    that still passes `AuthContext` into mutators. Finish with regression suites and documentation updates,
    regenerating generated SDK docs from JSDoc instead of hand-editing them.
  affected_areas:
    - "packages/kanban-lite/src/sdk/types.ts"
    - "packages/kanban-lite/src/sdk/eventBus.ts"
    - "packages/kanban-lite/src/sdk/index.ts"
    - "packages/kanban-lite/src/sdk/KanbanSDK.ts"
    - "packages/kanban-lite/src/sdk/plugins/index.ts"
    - "packages/kl-auth-plugin/src/index.ts"
    - "packages/kanban-lite/src/{cli,mcp-server,standalone,extension}/**/*.ts"
    - "packages/kanban-lite/src/sdk/__tests__/*.test.ts"
    - "packages/kl-auth-plugin/src/auth-plugin.integration.test.ts"
    - "packages/kanban-lite/src/standalone/__tests__/server.integration.test.ts"
    - "README.md"
    - "docs/auth.md"
    - "docs/plugins.md"
    - "packages/kl-auth-plugin/README.md"
    - "CHANGELOG.md"
    - "docs/sdk.md"
  component_details:
    - component: "SDK event/auth contract layer"
      responsibility: |
        Remove auth passthrough from the published before-event envelope, define the post-refactor
        before-listener response contract, and document that `_runBeforeEvent()` now owns deep merge
        and original-input preservation instead of `EventBus.emitAsync()`.
      interfaces:
        - "`BeforeEventPayload<TInput>` without `auth`"
        - "`BeforeEventListenerResponse` / related JSDoc describing ordered listener outputs"
        - "SDK barrel exports in `packages/kanban-lite/src/sdk/index.ts`"
    - component: "Event bus async dispatcher"
      responsibility: |
        Await before-event listeners in deterministic order and return enough structured output for the
        SDK helper to perform deep merge itself, while keeping after-event dispatch non-blocking and error-isolated.
      interfaces:
        - "`EventBus.emitAsync(...)` post-refactor return contract"
        - "`onAny` and wildcard behavior that must remain observational only"
    - component: "KanbanSDK helper pipeline"
      responsibility: |
        Delete `_withAuthContext()`, rewrite `_runBeforeEvent()` around immutable deep merge and fallback semantics,
        and keep `_runAfterEvent()` usage uniform enough that action methods follow one predictable pattern.
      interfaces:
        - "`_runBeforeEvent(event, input, actor?, boardId?)` or equivalent post-auth-removal signature"
        - "`_runAfterEvent(event, data, actor?, boardId?, meta?)` helper contract"
    - component: "KanbanSDK action families"
      responsibility: |
        Update each mutation family to consume merged input from the helper, stop passing auth through public
        signatures, and pair before/after helper calls consistently where the event taxonomy allows it.
      interfaces:
        - "Public mutator signatures in `KanbanSDK.ts` without trailing `auth?: AuthContext`"
        - "Canonical before/after event mappings per mutation family"
    - component: "Auth/plugin and host integration layer"
      responsibility: |
        Realign first-party auth listener logic and every CLI/MCP/standalone/extension caller to the new SDK contract
        without regressing denial UX, transport-specific messaging, or token redaction.
      interfaces:
        - "Auth listener access to the replacement auth carrier"
        - "Host mutator call sites without trailing auth arguments"
    - component: "Regression and documentation layer"
      responsibility: |
        Lock in deep-merge semantics, authorization behavior, normalized event usage, and doc accuracy, including
        regenerated SDK docs derived from updated JSDoc.
      interfaces:
        - "Focused Vitest regression suites"
        - "Updated README/auth/plugin docs and changelog entries"
  dependencies:
    - component: "SDK event/auth contract layer"
      relationship: "Must land before helper or host work so all downstream code targets one contract."
    - component: "Event bus async dispatcher"
      relationship: "Depends on the contract layer and feeds ordered listener output into `KanbanSDK._runBeforeEvent()`."
    - component: "KanbanSDK helper pipeline"
      relationship: "Depends on the dispatcher contract and blocks every mutation-family migration."
    - component: "KanbanSDK action families"
      relationship: "Depend on the helper pipeline and determine the final public SDK surface consumed by plugins and hosts."
    - component: "Auth/plugin and host integration layer"
      relationship: "Depends on the finalized SDK signatures and replacement auth carrier."
    - component: "Regression and documentation layer"
      relationship: "Depends on stabilized code paths so tests and docs describe final behavior rather than an intermediate state."
  integration_points:
    - "`packages/kanban-lite/src/sdk/KanbanSDK.ts` remains the single orchestration seam for before/after event timing."
    - "`packages/kanban-lite/src/sdk/eventBus.ts` must stop being the semantic owner of payload merging."
    - "`packages/kl-auth-plugin/src/index.ts` and `packages/kanban-lite/src/sdk/plugins/index.ts` are the first-party canaries for the removed `payload.auth` contract."
    - "CLI, MCP, standalone, and extension entry points are direct consumers of the mutator signatures and must be updated after the SDK surface settles."
    - "`docs/sdk.md` is generated output and should only change via updated JSDoc plus `npm run docs`."

