tasks:
  - id: T1
    title: "Refactor SDK event/auth contracts and remove merge ownership from EventBus"
    description: |
      Update the published SDK contract so before-event payloads no longer expose `auth`, and reshape the
      async EventBus contract so `emitAsync()` stops performing semantic merges itself. This task is the
      contract gate for the entire refactor: it must document the post-refactor listener-response shape,
      preserve deterministic listener ordering, and make `_runBeforeEvent()` the future merge owner.
    wave: 1
    agent: gem-implementer
    priority: high
    status: complete
      - packages/kanban-lite/src/sdk/eventBus.ts: "Async before-event dispatcher that currently owns shallow merge semantics."
      - packages/kanban-lite/src/sdk/index.ts: "Public barrel exports that surface the contract change."
    estimated_effort: medium
    estimated_files: 3
    estimated_lines: 180
    focus_area: sdk_contracts
    verification:
      - "`BeforeEventPayload` no longer publishes `auth`, and the new JSDoc clearly states that deep merge lives in `_runBeforeEvent()`."
      - "`EventBus.emitAsync()` exposes deterministic ordered listener output without mutating payload input itself."
      - "SDK barrel exports compile against the updated contract."
    acceptance_criteria:
      - "The SDK contract no longer advertises auth passthrough in before-event payloads."
      - "The bus contract is narrow enough that merge behavior cannot remain split between EventBus and KanbanSDK."
      - "No unrelated public SDK types are changed."
    failure_modes:
      - scenario: "The contract change leaves listener output ambiguous, and later tasks reintroduce merge logic in multiple places."
        likelihood: medium
        impact: high
        mitigation: "Define the dispatcher return shape precisely in types/JSDoc before touching `KanbanSDK.ts`."
    tech_stack:
      - TypeScript
      - EventEmitter2
    test_coverage: "Type-level validation plus follow-on EventBus/helper tests in T2 and T11"

  - id: T2
    title: "Rewrite the KanbanSDK helper pipeline around immutable deep merge"
    description: |
      Delete `_withAuthContext()` and rework the internal helper layer so `_runBeforeEvent()` clones the original
      input, deep-merges ordered listener results, preserves the caller-owned input when listeners return nothing or `{}`,
      and becomes the only semantic merge step. `_runAfterEvent()` should be adjusted here only as needed to support the
      normalized helper pattern used by the action methods.
    wave: 2
    agent: gem-implementer
    priority: high
    status: complete
    dependencies:
      - T1
    context_files:
      - packages/kanban-lite/src/sdk/KanbanSDK.ts: "Contains `_withAuthContext`, `_runBeforeEvent`, `_runAfterEvent`, and the shared action pipeline."
    estimated_effort: medium
    estimated_files: 1
    estimated_lines: 240
    focus_area: sdk_helper_pipeline
    verification:
      - "`_withAuthContext()` is removed from `KanbanSDK.ts`."
      - "`_runBeforeEvent()` deep-merges listener output without mutating the original caller input."
      - "When listeners return `undefined`, `void`, non-objects, or `{}`, the effective input remains semantically identical to the original input."
    acceptance_criteria:
      - "Merge ownership exists in exactly one place: `_runBeforeEvent()`."
      - "Helper signatures no longer require an auth passthrough argument."
      - "The helper pipeline keeps actor/board metadata handling explicit and testable."
    failure_modes:
      - scenario: "The helper mutates nested caller objects while deep-merging, causing hidden state changes outside the SDK."
        likelihood: medium
        impact: critical
        mitigation: "Use clone-first semantics and helper tests that assert input identity/contents remain unchanged after listener execution."
    tech_stack:
      - TypeScript
    test_coverage: "Direct helper regressions in `action-runner.test.ts` plus downstream method coverage"

