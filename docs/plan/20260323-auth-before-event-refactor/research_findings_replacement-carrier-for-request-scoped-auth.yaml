patterns_found:
  - category: "architecture"
    pattern: "Host surfaces build `AuthContext` at the transport boundary and pass it directly into SDK mutators."
    description: "HTTP, CLI, MCP, extension, and WebSocket code all follow the same pattern: resolve transport metadata + token once, then thread it as the trailing SDK argument."
    examples:
      - file: "packages/kanban-lite/src/standalone/authUtils.ts"
        location: "5-10"
        snippet: "return { token: authorization.slice(7), tokenSource: 'request-header', transport: 'http' }"
      - file: "packages/kanban-lite/src/cli/index.ts"
        location: "13-15"
        snippet: "return token ? { token, tokenSource: 'env', transport: 'cli' } : { transport: 'cli' }"
      - file: "packages/kanban-lite/src/mcp-server/index.ts"
        location: "58-60"
        snippet: "return token ? { token, tokenSource: 'env', transport: 'mcp' } : { transport: 'mcp' }"
    prevalence: "common"

  - category: "structure"
    pattern: "The SDK currently enriches request auth with target hints before emitting before-events."
    description: "`_withAuthContext()` adds board/card/comment/action metadata to the host context, and mutators pass `auth?.actorHint` separately into `_runBeforeEvent()`."
    examples:
      - file: "packages/kanban-lite/src/sdk/KanbanSDK.ts"
        location: "545-555"
        snippet: "_withAuthContext(context?: AuthContext, hints?: Partial<AuthContext>): AuthContext"
      - file: "packages/kanban-lite/src/sdk/KanbanSDK.ts"
        location: "895-896"
        snippet: "const authContext = this._withAuthContext(auth, { boardId: id }); await this._runBeforeEvent('board.create', ..., authContext, auth?.actorHint, id)"
    prevalence: "common"

  - category: "architecture"
    pattern: "Both first-party auth listeners are payload-driven and symmetric."
    description: "The built-in SDK auth listener and the external `kl-auth-plugin` listener perform the same sequence: validate before-event payload, read `payload.auth`, resolve identity, check policy, emit `auth.allowed`/`auth.denied`, and throw `AuthError` on denial."
    examples:
      - file: "packages/kanban-lite/src/sdk/plugins/index.ts"
        location: "1113-1139"
        snippet: "const context = payload.auth ?? {}; const identity = await authIdentity.resolveIdentity(context); const decision = await authPolicy.checkPolicy(identity, action, context)"
      - file: "packages/kl-auth-plugin/src/index.ts"
        location: "412-435"
        snippet: "const context = payload.auth ?? {}; const identity = await this.authIdentity.resolveIdentity(context); const decision = await this.authPolicy.checkPolicy(identity, action, context)"
    prevalence: "common"

  - category: "error_handling"
    pattern: "Denial UX is category-based and token-redaction aware."
    description: "Authorization failure is normalized into `AuthError` categories, then each host maps them to UX-appropriate responses (HTTP status or user-facing CLI/MCP messaging) without including token material."
    examples:
      - file: "packages/kanban-lite/src/standalone/authUtils.ts"
        location: "23-27"
        snippet: "auth.identity.* => 401; auth.policy.* => 403"
      - file: "packages/kanban-lite/src/cli/index.ts"
        location: "29-36"
        snippet: "Authentication required. Set KANBAN_TOKEN environment variable. / Access denied (category)"
      - file: "packages/kanban-lite/src/sdk/__tests__/auth-enforcement.test.ts"
        location: "536-560"
        snippet: "extension host denial path does not leak token material"
    prevalence: "common"

  - category: "testing"
    pattern: "Internal seam tests target helper methods and auth listener behavior directly."
    description: "Tests frequently access internal SDK helpers via type assertions and replace capability bag members to lock behavior around auth context flow."
    examples:
      - file: "packages/kanban-lite/src/sdk/__tests__/action-runner.test.ts"
        location: "16-28"
        snippet: "runBefore(...) casts SDK internals and calls `_runBeforeEvent(...)` directly"
      - file: "packages/kanban-lite/src/sdk/__tests__/auth-enforcement.test.ts"
        location: "491-524"
        snippet: "capture-and-deny policy records enriched `AuthContext` and asserts target hints"
    prevalence: "common"

  - category: "architecture"
    pattern: "No existing request-local carrier or host lifecycle context object is reused for auth."
    description: "Searches found no `AsyncLocalStorage`, request-scoped maps, Fastify request decoration for auth, or plugin registration context that could already supply auth to listeners after `payload.auth` is removed."
    examples:
      - file: "packages/kanban-lite/src/standalone/server.ts"
        location: "71-79"
        snippet: "`onRequest` hook only sets CORS headers and handles OPTIONS"
      - file: "packages/kanban-lite/src/standalone/context.ts"
        location: "1-15"
        snippet: "Shared runtime context contains board/editor/watcher state but no auth field"
    prevalence: "common"

