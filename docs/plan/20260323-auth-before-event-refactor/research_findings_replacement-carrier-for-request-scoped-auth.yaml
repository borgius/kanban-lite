implementation_options_ranked:
  - rank: 1
    option: "SDK-owned mutable current-auth carrier with an explicit scoped wrapper"
    minimal_churn_assessment: "Lowest source churn. Reuses the current single-SDK orchestration model and existing auth listener registration seam."
    carrier_shape: "Introduce an internal SDK getter/setter wrapper (for example, a scoped `withRequestAuth(...)`-style execution path) so hosts stop passing trailing auth args, while auth listeners obtain the active context from the SDK instead of `payload.auth`."
    exact_files_likely_affected:
      - "packages/kanban-lite/src/sdk/KanbanSDK.ts"
      - "packages/kanban-lite/src/sdk/types.ts"
      - "packages/kanban-lite/src/sdk/eventBus.ts"
      - "packages/kanban-lite/src/sdk/plugins/index.ts"
      - "packages/kl-auth-plugin/src/index.ts"
      - "packages/kanban-lite/src/standalone/mutationService.ts"
      - "packages/kanban-lite/src/standalone/messageHandlers.ts"
      - "packages/kanban-lite/src/standalone/internal/routes/boards.ts"
      - "packages/kanban-lite/src/standalone/internal/routes/system.ts"
      - "packages/kanban-lite/src/cli/index.ts"
      - "packages/kanban-lite/src/mcp-server/index.ts"
      - "packages/kanban-lite/src/extension/index.ts"
      - "packages/kanban-lite/src/extension/KanbanPanel.ts"
      - "packages/kanban-lite/src/sdk/__tests__/action-runner.test.ts"
      - "packages/kanban-lite/src/sdk/__tests__/auth-enforcement.test.ts"
      - "packages/kanban-lite/src/sdk/__tests__/plugin-registry.test.ts"
      - "packages/kanban-lite/src/mcp-server/index.test.ts"
      - "packages/kanban-lite/src/cli/index.test.ts"
      - "packages/kl-auth-plugin/src/auth-plugin.integration.test.ts"
    preserved_behaviors: "Can preserve built-in/external auth listener behavior and existing denial UX if the SDK still emits the same auth events and supplies the same enriched hints to identity/policy providers."
    tradeoffs:
      - "Smallest conceptual delta from the current code: the auth listener logic itself barely changes beyond replacing `payload.auth` lookup with an injected getter/provider."
      - "Concurrency risk is material because standalone HTTP and WebSocket paths share one SDK instance; plain mutable instance state can bleed across overlapping async work unless calls are serialized or carefully nested/restored."
      - "Because `SDKEventListenerPlugin.register()` only receives the bus, the built-in and external auth listener factories would still need a new way to access the SDK-owned getter."

  - rank: 2
    option: "SDK-owned async-scoped carrier behind the same wrapper API"
    minimal_churn_assessment: "Slightly more churn than option 1, but still SDK-first and still avoids new dependencies because Node provides `AsyncLocalStorage`."
    carrier_shape: "Keep the host-side wrapper pattern, but back the active request auth with an async-scoped store so auth listeners resolve the current context from the store instead of from payload fields."
    exact_files_likely_affected:
      - "packages/kanban-lite/src/sdk/KanbanSDK.ts"
      - "packages/kanban-lite/src/sdk/types.ts"
      - "packages/kanban-lite/src/sdk/eventBus.ts"
      - "packages/kanban-lite/src/sdk/plugins/index.ts"
      - "packages/kl-auth-plugin/src/index.ts"
      - "packages/kanban-lite/src/standalone/mutationService.ts"
      - "packages/kanban-lite/src/standalone/messageHandlers.ts"
      - "packages/kanban-lite/src/standalone/internal/routes/boards.ts"
      - "packages/kanban-lite/src/standalone/internal/routes/system.ts"
      - "packages/kanban-lite/src/cli/index.ts"
      - "packages/kanban-lite/src/mcp-server/index.ts"
      - "packages/kanban-lite/src/extension/index.ts"
      - "packages/kanban-lite/src/extension/KanbanPanel.ts"
      - "packages/kanban-lite/src/sdk/__tests__/action-runner.test.ts"
      - "packages/kanban-lite/src/sdk/__tests__/auth-enforcement.test.ts"
      - "packages/kanban-lite/src/sdk/__tests__/plugin-registry.test.ts"
      - "packages/kanban-lite/src/mcp-server/index.test.ts"
      - "packages/kanban-lite/src/cli/index.test.ts"
      - "packages/kl-auth-plugin/src/auth-plugin.integration.test.ts"
    preserved_behaviors: "Better aligned with preserving request-scoped semantics across shared SDK instances while retaining the same `AuthError`-based denial path and auth status events."
    tradeoffs:
      - "Handles overlapping standalone HTTP/WebSocket work more safely than plain mutable instance state."
      - "Adds async-scope complexity and more test burden around nested/parallel calls."
      - "Still requires a listener-side provider/getter hook because `BeforeEventPayload.auth` goes away and plugin registration currently exposes only the bus."

open_questions:
  - question: "Should the replacement carrier remain visible to before-event listeners through a new neutral provider/getter API, or is the intent to hide request auth from third-party listeners entirely and reserve it for first-party auth enforcement only?"
    context: "Current public contract exposes `AuthContext` directly via `BeforeEventPayload.auth`, and both built-in and packaged first-party listeners depend on that visibility."
  - question: "Does the refactor need to preserve the exact current target-hint surface (`boardId`, `cardId`, `commentId`, `actionKey`, etc.) on the auth carrier, or may some hints move to non-auth fields on the payload?"
    context: "Tests in `auth-enforcement.test.ts` currently assert that policy providers receive these hints inside `AuthContext`, not merely elsewhere in the payload."
  - question: "Is concurrent standalone request/message isolation a hard requirement for this plan, or is the desired change purely minimal-diff with current hidden assumptions?"
    context: "The shared standalone SDK instance makes this the main tradeoff between plain mutable state and async-scoped state."

