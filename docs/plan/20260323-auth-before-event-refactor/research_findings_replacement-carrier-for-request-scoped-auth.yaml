plan_id: "20260323-auth-before-event-refactor"
objective: "Identify the smallest viable replacement carrier for request-scoped auth after removing mutator `auth?: AuthContext` params, deleting `_withAuthContext`, and removing `BeforeEventPayload.auth`, while preserving first-party auth listener behavior and denial UX."
focus_area: "replacement carrier for request-scoped auth after removing all `auth?: AuthContext` mutator params, deleting `_withAuthContext`, and removing `BeforeEventPayload.auth`"
created_at: "2026-03-23"
created_by: "gem-researcher"
status: "completed"

tldr: |
  - Current source uses a direct per-call auth threading model: each host surface creates an `AuthContext` and passes it into nearly every SDK mutator, while the SDK enriches it with board/card/action hints via `_withAuthContext()` before dispatching before-events.
  - Both the built-in auth listener in `packages/kanban-lite/src/sdk/plugins/index.ts` and the first-party external listener in `packages/kl-auth-plugin/src/index.ts` currently depend on `payload.auth`; there is no existing request-local storage, request decorator, or plugin lifecycle context carrier already in place.
  - The standalone server shares a single `KanbanSDK` instance across HTTP and WebSocket traffic, so a plain mutable instance field would be the least code churn but is concurrency-sensitive; an SDK-owned async-scoped carrier is the next-smallest option and better matches the shared-instance runtime.
  - The refactor blast radius is centered in `packages/kanban-lite/src/sdk/KanbanSDK.ts`, `packages/kanban-lite/src/sdk/types.ts`, `packages/kanban-lite/src/sdk/plugins/index.ts`, and `packages/kl-auth-plugin/src/index.ts`, then fans out into host call sites and auth-related regression tests.

research_metadata:
  methodology: "Hybrid retrieval across the auth/event seam: semantic search for entry points, regex search for exact carrier usage and host call sites, targeted file reads for SDK/contracts/listeners/tests, plus one short terminal pass for exact line counts. Relationship discovery focused on callers of `_runBeforeEvent`, `extractAuthContext`, `resolveCliAuthContext`, `resolveMcpAuthContext`, and auth listener factories."
  scope: "Focused on the SDK auth/event pipeline, first-party auth listener implementations, first-party host adapters (standalone HTTP/WebSocket, CLI, MCP, extension), and the regression tests that lock current auth behavior."
  confidence: "high"
  coverage: 89

