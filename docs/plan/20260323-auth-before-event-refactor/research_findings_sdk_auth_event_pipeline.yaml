	risks_and_edge_cases:
		public_api_breakage:
			- "Removing `auth?: AuthContext` from SDK mutator signatures breaks direct callers in CLI, MCP, standalone, and extension code paths that currently pass auth as the final argument."
			- "Removing `BeforeEventPayload.auth` breaks `kl-auth-plugin` listener runtime code and any third-party listener plugins following the same published contract."
			- "Deleting `_withAuthContext()` is a documented/internal seam removal; tests and docs refer to it directly."
		semantic_edge_cases:
			- "Current merge semantics are shallow and centralized in `EventBus.emitAsync()`; moving merge into `_runBeforeEvent()` while also requiring deep merge changes the effective plugin contract for nested objects such as `definition`, `updates`, `metadata`, `formData`, and webhook payloads."
			- "Several mutators ignore parts of `mergedInput` today: e.g. `createBoard()` only applies merged `id`/`name` but still passes original `options`; `addAttachment()` ignores merged `sourcePath`; comment methods mainly honor content/author overrides, not ID/board overrides."
			- "Some operations currently have no declared after-event type (`label.*`, `webhook.*`, `board.setDefault`, `column.cleanup`, `column.reorder`, `column.setMinimized`, `card.purgeDeleted`, `card.transfer`, `card.action.trigger`), so making after-event usage fully consistent may also require event-type expansion or remapping."
			- "Conditional after-event emission means some successful mutations intentionally produce no after-event if no snapshot/result can be resolved; changing to unconditional emission would alter observable bus/webhook behavior."
		security_and_error_handling:
			- "Auth tests explicitly verify token material is not leaked in `AuthError` messages for MCP and extension-host scenarios."
			- "Current auth listener behavior derives identity/policy input from `payload.auth`; if auth moves elsewhere, redaction and actor resolution behavior will change unless equivalent context survives."

