open_questions:
	- question: "What is the intended replacement source for authorization input if `BeforeEventPayload.auth` and SDK mutator `auth?: AuthContext` parameters are removed?"
		context: "The inspected auth listener plugin, host adapters, and several tests all currently rely on those exact surfaces; no alternate auth carrier was found in the examined files."
	- question: "Which canonical after-event names should represent webhook CRUD, label mutations, default-board changes, column cleanup/reorder/minimized, card purge, transfer, and card action trigger if those methods are made fully after-event-consistent?"
		context: "`SDKAfterEventType` currently declares no event names for those mutation families, yet the objective calls for consistent `_runAfterEvent()` usage."
	- question: "How should deep merge treat nested objects and arrays in before-event overrides?"
		context: "Current published contract and tests are explicitly shallow; moving to deep merge changes semantics for nested fields such as label definitions, metadata, form payloads, and webhook updates."

