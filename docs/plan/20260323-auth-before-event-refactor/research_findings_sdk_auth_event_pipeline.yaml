	sensitive_areas:
		- area: "Before-event auth payload"
			location: "packages/kanban-lite/src/sdk/types.ts:202-217"
			concern: "Carries normalized token-bearing `AuthContext` into listener plugins."
		- area: "Host auth extraction"
			location: "packages/kanban-lite/src/standalone/authUtils.ts and extension/CLI/MCP auth resolvers"
			concern: "Bearer/token material is normalized here before being forwarded into SDK mutators."
		- area: "Auth listener plugin"
			location: "packages/kl-auth-plugin/src/index.ts:416-430"
			concern: "Identity/policy resolution currently depends on `payload.auth`; contract movement changes the authorization data source."
	authentication_patterns_in_domain: "Standalone extracts bearer headers, CLI/MCP resolve environment/host auth context, and extension host resolves auth from VS Code storage; all currently converge on `AuthContext` passed into SDK methods."
	authorization_patterns_in_domain: "Authorization currently happens in before-event listeners for the listener-only runtime, while `docs/auth.md` still documents `_authorizeAction()` as the main seam."
	data_validation_in_domain: "Before-event overrides are only shape-checked as plain objects in `EventBus.emitAsync()`; non-plain returns are ignored silently."

testing_patterns:
	framework: "Vitest"
	coverage_areas:
		- "before-event merge semantics"
		- "after-event emission/isolation"
		- "auth-denial routing and stable action names"
		- "host auth-context forwarding"
		- "auth-plugin listener contract"
	test_organization: "Focused per-domain suites under `packages/kanban-lite/src/sdk/__tests__`, plus host-specific tests in standalone and MCP packages and auth-plugin integration tests in `packages/kl-auth-plugin`."
	mock_patterns:
		- "`vi.spyOn(KanbanSDK.prototype, ...)` for host forwarding assertions"
		- "`sdk.on(event, vi.fn().mockImplementation(...))` for before-event veto tests"
