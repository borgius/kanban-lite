	eventbus_merge_behavior:
		location: "`packages/kanban-lite/src/sdk/eventBus.ts:78-109`"
		current_behavior:
			- "`emitAsync()` starts with `let merged = { ...payload.input }`, so a new top-level object is always returned even with no listeners."
			- "Each matching listener receives `{ ...payload, input: merged }` sequentially in registration order."
			- "Only plain-object listener returns are applied. Arrays, primitives, class instances, and `void` are ignored."
			- "Merge is shallow: `merged = { ...merged, ...result }`. Nested objects are replaced, not deep-merged."
			- "Returning `{}` preserves the current merged payload contents because the spread adds no keys; original top-level fields remain intact."
			- "Errors thrown by specific-event listeners abort immediately; `onAny` listeners run later, non-blocking, and do not affect merge outcome."
		tests_proving_current_behavior:
			- "`packages/kanban-lite/src/sdk/__tests__/eventBus.test.ts:238-369`"
			- "`packages/kanban-lite/src/sdk/__tests__/action-runner.test.ts:48-153`"

	related_tests_likely_to_change:
