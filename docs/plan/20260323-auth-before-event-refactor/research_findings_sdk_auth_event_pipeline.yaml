related_conventions:
	naming_patterns_in_domain: "Before-events use `resource.verb`; after-events use `resource.pastTense`. Auth helper names use leading underscores for internal seams. Host auth resolvers are named `resolve*AuthContext` or `extractAuthContext`."
	structure_of_domain: "Public mutators live in `KanbanSDK.ts`; event contracts in `types.ts`; dispatch mechanics in `eventBus.ts`; runtime auth listener implementation in external package `kl-auth-plugin`; host adapters call SDK directly."
	error_handling_in_domain: "Before-event listener failures propagate and abort mutations; after-event listener failures are isolated/logged; auth denial uses `AuthError` with stable categories and token-redaction tests."
	testing_in_domain: "Helper semantics are covered in SDK unit tests; auth routing and denial are covered in SDK/auth plugin tests; host auth forwarding is covered in MCP and standalone integration tests."
	documentation_in_domain: "README and changelog partially reflect the listener-only runtime; `docs/auth.md` still documents the earlier `_authorizeAction`-centric flow; `docs/sdk.md` is generated from JSDoc."

