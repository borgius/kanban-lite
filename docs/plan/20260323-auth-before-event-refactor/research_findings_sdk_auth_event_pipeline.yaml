plan_id: "20260323-auth-before-event-refactor"
objective: "Remove auth passthrough from KanbanSDK before-events and method signatures, delete _withAuthContext, move input merge responsibility into _runBeforeEvent with original-input preservation when listeners return nothing or {}, and normalize _runBeforeEvent/_runAfterEvent usage across action methods."
focus_area: "sdk_auth_event_pipeline"
created_at: "2026-03-23T00:00:00Z"
created_by: "gem-researcher"
status: "completed"

tldr: |
	- `KanbanSDK` currently centralizes auth/event plumbing in `_withAuthContext()` (`packages/kanban-lite/src/sdk/KanbanSDK.ts:545`) and `_runBeforeEvent()` (`packages/kanban-lite/src/sdk/KanbanSDK.ts:578`), but the actual before-event merge logic still lives in `EventBus.emitAsync()` (`packages/kanban-lite/src/sdk/eventBus.ts:78-109`) and is explicitly shallow, sequential, and listener-order dependent.
	- The current public SDK mutation surface threads `auth?: AuthContext` through 35+ mutator signatures, and host adapters in CLI, MCP, standalone, and extension code pass resolved auth contexts directly into those SDK methods.
	- `BeforeEventPayload.auth` is part of the published SDK contract (`packages/kanban-lite/src/sdk/types.ts:202-217`) and the shipped auth listener plugin resolves identity/policy from `payload.auth` (`packages/kl-auth-plugin/src/index.ts:387-436`), so removing auth passthrough is a direct contract break for plugin runtime code and host callers.
	- Several mutators already use `_runBeforeEvent()` but do not pair it with `_runAfterEvent()` at all (`transferCard`, `triggerAction`, label/webhook/default-board/reorder/minimized/purge/cleanup methods), while others emit after-events only conditionally when snapshots/results exist.
	- Existing tests and docs assume the current contract: internal helper tests target `_runBeforeEvent(auth, actor, boardId)`, auth-enforcement tests assert auth-context hint enrichment, host tests spy on SDK calls receiving `AuthContext`, and `docs/auth.md` still documents `_withAuthContext()` / `_authorizeAction()` as the primary seam.

research_metadata:
	methodology: "Hybrid retrieval with one semantic_search pass, targeted grep_search passes over SDK/tests/docs/host adapters, and narrow read_file inspection of only the helper/mutator/doc slices needed for this domain. One small python pass summarized the KanbanSDK mutator inventory and line counts."
	scope: "Focused on `packages/kanban-lite/src/sdk/*`, auth-listener plugin integration, host adapter call sites that currently pass `AuthContext`, selected regression/integration tests, and user-facing docs/changelog entries describing the current seam. No whole-repo scan was performed."
	confidence: "high"
	coverage: 88

