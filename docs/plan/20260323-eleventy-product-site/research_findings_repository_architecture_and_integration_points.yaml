plan_id: "20260323-eleventy-product-site"
objective: "Investigate how to add an @11ty/eleventy-based marketing + documentation website to the kanban-light repository with minimal disruption."
focus_area: "repository_architecture_and_integration_points"
created_at: "2026-03-23T00:00:00Z"
created_by: "gem-researcher"
status: "completed"

tldr: |
  - The workspace root is a private pnpm orchestrator while product/plugin code lives under `packages/*`; root-level docs, README, CHANGELOG, and generated docs explicitly remain at the repository root.
  - The current documentation corpus that could feed a site already exists in root-owned markdown: `README.md`, `CHANGELOG.md`, `docs/*.md`, generated docs (`docs/api.md`, `docs/sdk.md`, `docs/webhooks.md`), package `README.md` files, `docs/press/*.md`, and `docs/images/*`.
  - Root scripts orchestrate builds/tests/docs via `pnpm --filter ...`, and package-level conventions use local `package.json` scripts for `build`, `test`, `typecheck`, and optional `dev`/`watch`.
  - Adding a website as a new workspace package fits current package-manager conventions best, but the locked topology document does not currently list a docs/site package, so that contract would need acknowledgement if the package layout expands.
  - The lowest-disruption integration path is to keep documentation sources where they are (root and package READMEs) and add a site layer that reads them rather than relocating docs ownership.

research_metadata:
  methodology: "Hybrid retrieval using semantic_search and grep_search, followed by targeted read_file inspection of root/package manifests, topology docs, generated-doc scripts, content sources, and test configs. Relationship discovery focused on root orchestrator -> package scripts -> root docs ownership -> generated docs pipelines."
  scope: "Repository architecture and integration points relevant to introducing an Eleventy marketing/docs site with minimal disruption; excluded unrelated product implementation internals."
  confidence: "high"
  coverage: 82

