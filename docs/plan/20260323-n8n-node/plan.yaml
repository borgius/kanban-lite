      Deliverables:
      - create `packages/n8n-nodes-kanban-lite`
      - add package metadata/build scripts compatible with n8n custom-node loading
      - define the initial credential types/settings for API mode and SDK mode
      - add a package README with install, local development, and private-node usage notes

      Prefer the standard n8n node package layout (credentials, nodes, codex/assets,
      package scripts) and keep new dependencies limited to the n8n packages that
      are actually required to build and load a node package.
    wave: 1
    agent: gem-implementer
    priority: high
    status: completed
    dependencies: []
    context_files:
      package.json: "Workspace scripts and package conventions."
      packages/kl-webhooks-plugin/package.json: "Representative first-party package structure in this monorepo."
      packages/kl-webhooks-plugin/README.md: "Representative first-party package README format."
    estimated_effort: medium
    estimated_files: 3
    estimated_lines: 260
    focus_area: Package and credentials scaffold
    verification:
      - "The new package is discoverable from the workspace and uses a valid n8n-oriented package name/layout."
      - "Credential/settings design covers both SDK-local and API-remote transport modes."
      - "No core kanban-lite dependency is added unless the n8n package truly requires it."
    acceptance_criteria:
      - "`packages/n8n-nodes-kanban-lite` exists with valid package metadata and build entry points."
      - "The package defines settings/credentials for both SDK and API connectivity."
      - "The package README explains installation, configuration, and local/private-node development."
    failure_modes:
      - scenario: Package metadata works in pnpm but not in n8n custom-node installation.
        likelihood: medium
        impact: high
