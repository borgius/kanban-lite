  - from_task: T1
    to_task: T3
    interface: Canonical event and operation metadata
    format: "Typed SDK-exported catalog describing operation groups, event names, categories, and transport availability flags consumed by the n8n package"
  - from_task: T2
    to_task: T4
    interface: n8n package scaffold
    format: "Workspace package with n8n-compatible metadata, credentials folder, nodes folder, package scripts, and test harness ready for implementation"
  - from_task: T3
    to_task: T4
    interface: Shared transport abstraction
    format: "`KanbanLiteTransport` interface plus SDK/API adapter signatures and normalized result helpers used by action execution"
  - from_task: T3
    to_task: T5
    interface: Trigger subscription contract
    format: "Transport-aware subscribe/unsubscribe hooks and event-capability metadata for SDK-local and API-remote trigger registration"
  - from_task: T4
    to_task: T6
    interface: Complete app-node action surface
    format: "Resource/operation matrix with normalized outputs and documented credential requirements across both transports"
  - from_task: T5
    to_task: T6
    interface: Complete trigger-node event surface
    format: "Trigger registration lifecycle and event payload normalization for every supported event source"
  - from_task: T6
    to_task: T7
