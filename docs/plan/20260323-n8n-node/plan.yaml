    format: "Passing parity/smoke tests and a final support matrix for docs, changelog, and release notes"

tasks:
  - id: T1
    title: Define the SDK-first action and trigger metadata seam
    description: |
      Deliverables:
      - add the minimum core export(s) needed to describe supported kanban-lite
        actions and events for first-party integrations
      - explicitly classify which events are available in local SDK mode versus
        remote API/webhook mode
      - update SDK JSDoc/source-of-truth comments if new public exports are added

      This task stays intentionally small: do not redesign core business logic,
      and do not move interface logic into the SDK. The goal is to make the n8n
      package consume one canonical catalog instead of duplicating event names,
      resources, or transport assumptions.
    wave: 1
    agent: gem-implementer
    priority: high
    status: completed
    dependencies: []
    context_files:
      packages/kanban-lite/src/sdk/types.ts: "Canonical SDK event and type definitions."
      packages/kanban-lite/src/sdk/KanbanSDK.ts: "Current before/after event lifecycle and public SDK surface."
      packages/kanban-lite/src/sdk/index.ts: "Public export seam for first-party integrations."
    estimated_effort: medium
    estimated_files: 3
    estimated_lines: 220
    focus_area: SDK-first parity contract
    verification:
      - "New metadata exports compile cleanly and remain derived from current SDK event/action names."
      - "Transport availability rules for trigger events are represented in code, not only in prose."
      - "If JSDoc changes, regenerated `docs/sdk.md` reflects the new public seam."
    acceptance_criteria:
      - "A first-party integration can import one stable catalog for actions and events from kanban-lite core."
      - "The catalog distinguishes SDK-local before-events, SDK-local after-events, and API/webhook after-events."
      - "No unrelated SDK refactor or new nonessential dependency is introduced."
    failure_modes:
      - scenario: Event names or categories are copied manually and drift from actual SDK behavior.
        likelihood: medium
        impact: high
        mitigation: "Derive catalog values from existing SDK event/type sources wherever possible and cover with focused tests."
      - scenario: The export leaks unstable internal-only semantics into the public SDK.
        likelihood: medium
        impact: medium
        mitigation: "Expose only integration-oriented metadata and keep internal helper details private."
    tech_stack:
      - TypeScript
      - kanban-lite SDK
      - existing JSDoc/docs generator pipeline
    test_coverage: "Focused SDK metadata/export tests; docs generation only if public JSDoc changes."

  - id: T2
