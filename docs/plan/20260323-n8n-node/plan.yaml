plan_id: 20260323-n8n-node
objective: |
  Create a first-party n8n node package for kanban-lite that supports the full
  action surface and official event triggers, with node settings allowing either
  local SDK transport or remote API transport.
created_at: "2026-03-23"
created_by: gem-planner
status: pending_approval
research_confidence: high

tldr: |
  Recommend a dedicated workspace package at `packages/n8n-nodes-kanban-lite`
  published as `n8n-nodes-kanban-lite`, which matches n8n's node-package
  conventions while keeping the monorepo's first-party ownership clear. The
  lowest-risk architecture is a programmatic n8n app node (`Kanban Lite`) plus a
  trigger node (`Kanban Lite Trigger`) backed by one shared transport layer that
  normalizes SDK and API behavior into the same operation and event contracts.
  Because kanban-lite's trigger surface is intentionally asymmetric today
  (local SDK can observe before + after events, remote API/webhook delivery can
  observe committed after-events only), the plan adds an SDK-first event catalog
  and transport capability metadata before package implementation so trigger
  parity is explicit, testable, and documented rather than hand-waved into chaos.

open_questions:
  - "Assume package path `packages/n8n-nodes-kanban-lite` and npm package name `n8n-nodes-kanban-lite`; this is the recommended default because it aligns with n8n node-package installation and discovery conventions better than the internal `kl-*` prefix."
  - "Assume remote API auth reuses the existing kanban-lite auth story (for example bearer token or header-based auth exposed by the standalone server) rather than inventing a new n8n-only auth protocol."

pre_mortem:
  overall_risk_level: high
  critical_failure_modes:
    - scenario: SDK and API transports return different shapes, pagination behavior, or mutation side effects for the same n8n operation, so workflows behave differently depending on the selected connection mode.
      likelihood: high
      impact: critical
      mitigation: |
        Define one package-local transport contract and one canonical operation
        manifest before node implementation. Both SDK and API adapters must map
        into the same normalized input/output helpers, and golden parity tests
        must run the same scenarios against both transports.
    - scenario: Trigger coverage drifts because local SDK mode can observe before/after bus events while remote API mode only receives committed after-events through webhook delivery.
      likelihood: high
      impact: high
      mitigation: |
        Add an SDK-first exported event catalog that marks each event with
        transport availability (`sdkBefore`, `sdkAfter`, `apiAfter`). Implement
        the trigger node from this catalog, expose capability-aware UI text, and
        add regression tests that prove unsupported remote-only selections fail
        clearly instead of silently dropping events.
    - scenario: The n8n package compiles in the monorepo but cannot be installed or loaded by n8n because the package layout, exports, or metadata do not follow n8n custom-node expectations.
      likelihood: medium
      impact: high
      mitigation: |
        Follow n8n's node base-file and community-node package conventions,
        keep the node package self-contained under `packages/`, and verify with
        a local private-node install smoke test in addition to workspace build
        and unit tests.
    - scenario: Trying to model every kanban-lite action as a separate node or ad-hoc parameter tree makes the first release too large, brittle, and impossible to verify.
      likelihood: medium
      impact: high
      mitigation: |
        Use one app node with resource/operation groups plus one trigger node,
        generated from a shared operation/event manifest. Keep the first release
        focused on complete surface coverage, normalized outputs, and transport
        parity rather than fancy per-operation UI flourishes.
  assumptions:
    - The existing SDK already exposes enough mutation/query coverage that only small SDK-first metadata/export changes should be needed, not a major business-logic redesign.
    - Remote trigger delivery should reuse existing webhook/event infrastructure instead of introducing a bespoke streaming transport in this task.
    - Necessary n8n-specific package dependencies are allowed inside the new package, but core `kanban-lite` should not gain unrelated dependencies.
    - No `docs/prd.yaml` exists today, so there is no current PRD conflict to reconcile before planning.

implementation_specification:
  code_structure: |
    Keep kanban-lite core as the source of truth for action/event semantics.
    Add only the minimum SDK-first metadata seam needed to export a stable event
    catalog and, if required, operation descriptors that the n8n package can
    consume. Implement the n8n integration as a first-party workspace package
    containing credentials, shared transport adapters, action/node manifests,
    app-node execution code, trigger lifecycle code, tests, and package-local
    documentation. The package should own n8n-specific concerns; core should own
    business logic, event naming, and any public metadata needed for parity.
  affected_areas:
    - packages/kanban-lite/src/sdk/types.ts
    - packages/kanban-lite/src/sdk/index.ts
    - packages/kanban-lite/src/sdk/KanbanSDK.ts
    - scripts/generate-sdk-docs.ts
    - packages/n8n-nodes-kanban-lite/
    - README.md
    - CHANGELOG.md
  component_details:
    - component: SDK event and action metadata seam
      responsibility: Provide a stable exported catalog for the n8n package describing supported actions, event names, transport availability, and any normalization hints without duplicating core business logic.
      interfaces:
        - "Exported event catalog with transport availability markers such as `sdkBefore`, `sdkAfter`, and `apiAfter`"
        - "Optional operation descriptor manifest for grouping boards/cards/comments/attachments/columns/labels/settings/storage/forms/actions/webhooks/workspace/auth"
        - "JSDoc-updated SDK exports if new public metadata is introduced"
    - component: Shared n8n transport layer
      responsibility: Normalize both connection modes into one execution surface for the n8n nodes.
      interfaces:
        - "`KanbanLiteTransport` interface with methods for execute/list/mutate/subscribe flows used by app and trigger nodes"
        - "SDK adapter for local workspace access via `KanbanSDK`"
        - "API adapter for remote standalone-server access via HTTP/webhook registration"
    - component: n8n credentials and package scaffold
      responsibility: Define package metadata, credential types, node base files, codex assets, and build/test scripts compatible with private/community n8n node installation.
      interfaces:
        - "`KanbanLiteApi` credential for base URL + auth settings"
        - "`KanbanLiteSdk` credential or equivalent settings block for local workspace root / board directory access"
        - "Package exports and n8n node metadata for one app node and one trigger node"
    - component: n8n app node
      responsibility: Expose the full kanban-lite action surface through resource/operation groups with normalized outputs and transport-agnostic execution.
      interfaces:
        - "`Kanban Lite` app node with grouped resources/operations spanning boards, cards, comments, attachments, columns, labels, settings, storage, forms, board/card actions, webhooks, workspace, and auth status"
        - "Shared input/output mappers reused across SDK and API transports"
    - component: n8n trigger node
      responsibility: Expose supported kanban-lite events with clear transport-aware semantics and lifecycle management.
      interfaces:
        - "`Kanban Lite Trigger` node built from the exported event catalog"
        - "Local SDK subscriptions via `sdk.eventBus`"
        - "Remote API after-event delivery via webhook registration/handling"
    - component: Verification and release sync
      responsibility: Prove transport parity and keep repo docs aligned with the new first-party integration.
      interfaces:
        - "Transport parity tests and n8n package smoke verification"
        - "README/CHANGELOG/package README updates"
        - "Regenerated SDK docs only if public SDK metadata/JSDoc changes"
  dependencies:
    - component: SDK event and action metadata seam
      relationship: Must land first so the n8n package consumes one canonical source of truth for supported actions and trigger availability.
    - component: Shared n8n transport layer
      relationship: Depends on the metadata seam and feeds both the app node and trigger node.
    - component: n8n credentials and package scaffold
      relationship: Can start early, but final node wiring depends on the transport layer and chosen package contract.
    - component: n8n app node
      relationship: Depends on the transport layer and package scaffold.
    - component: n8n trigger node
      relationship: Depends on the transport layer, package scaffold, and exported event catalog.
    - component: Verification and release sync
      relationship: Depends on the completed app/trigger nodes and any SDK export changes.
  integration_points:
    - "`packages/kanban-lite/src/sdk/index.ts` is the safest export seam for any new metadata consumed by first-party integrations."
    - "`KanbanSDK.eventBus` is the local subscription point for SDK-mode triggers."
    - "Existing standalone webhook delivery and `/api/webhooks` behavior should power remote after-event trigger mode instead of adding a new server transport."
    - "Root `README.md` and `CHANGELOG.md` remain the required user-facing documentation sources; regenerate `docs/sdk.md` only if new public SDK JSDoc/exports are added."

