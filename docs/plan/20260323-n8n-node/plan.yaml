  - id: T3
    title: Build the shared SDK/API transport abstraction
    description: |
      Deliverables:
      - implement one transport contract used by both the app node and trigger node
      - add an SDK adapter for local workspace execution via `KanbanSDK`
      - add an API adapter for remote standalone-server execution and webhook-backed trigger registration
      - normalize outputs/errors so n8n nodes do not need per-transport branching everywhere

      This is the key anti-chaos layer. The app node and trigger node should be
      thin consumers of this abstraction, not transport-switching jungles.
    wave: 2
    agent: gem-implementer
    priority: high
    status: pending
    dependencies:
      - T1
      - T2
    context_files:
      packages/kanban-lite/src/sdk/KanbanSDK.ts: "Local SDK execution surface and event bus access."
      packages/kanban-lite/src/standalone/internal/openapi-spec.ts: "Remote API surface and route semantics."
      packages/kanban-lite/src/standalone/internal/routes/system.ts: "Webhook and auth-related remote endpoints."
    estimated_effort: large
    estimated_files: 3
    estimated_lines: 420
    focus_area: Transport parity layer
    verification:
      - "One contract exists for action execution and trigger subscription behavior across both transports."
      - "Equivalent operations return normalized result/error shapes regardless of transport."
      - "Unsupported event subscriptions in API mode fail explicitly with actionable messages."
    acceptance_criteria:
      - "The n8n package can execute operations through SDK or API mode without duplicating resource logic."
      - "The abstraction includes trigger registration lifecycle hooks, not just one-shot actions."
      - "Transport capability differences are surfaced as typed metadata or clear runtime errors."
    failure_modes:
      - scenario: API adapter bakes in route-specific response handling that diverges from SDK behavior over time.
        likelihood: high
        impact: high
        mitigation: "Normalize all transport responses through shared mappers and add parity tests against the same scenarios."
      - scenario: Remote trigger registration leaks orphan webhooks or duplicate subscriptions.
        likelihood: medium
        impact: high
        mitigation: "Make subscription lifecycle explicit with create/register/unregister cleanup behavior and test teardown paths."
    tech_stack:
      - TypeScript
      - kanban-lite SDK
      - kanban-lite standalone API/webhooks
      - n8n node runtime helpers
    test_coverage: "Unit coverage for shared transport helpers plus parity tests against both adapters."
    status: completed
    completed_at: "2026-03-23"
    files_produced:
      - packages/n8n-nodes-kanban-lite/src/transport/types.ts
      - packages/n8n-nodes-kanban-lite/src/transport/normalize.ts
      - packages/n8n-nodes-kanban-lite/src/transport/sdkAdapter.ts
      - packages/n8n-nodes-kanban-lite/src/transport/apiAdapter.ts
