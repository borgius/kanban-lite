tldr: |
  - Root repository conventions require updating `README.md` and `CHANGELOG.md` for any user-facing feature, behavior change, or new package/integration.
  - Generated reference docs are only regenerated when their source-of-truth inputs change: SDK JSDoc (`docs/sdk.md`), OpenAPI metadata (`docs/api.md`), or structured webhook event metadata (`docs/webhooks.md`).
  - `docs/plugins.md` must stay in sync when plugin contracts, provider behavior, or integration expectations change; first-party package READMEs follow a consistent install/provider-id/config/example structure.
  - The docs site consumes root `README.md`, `CHANGELOG.md`, and `docs/*.md` as read-only sources, so updating those sources automatically changes reference content surfaced by the site.
  - No existing n8n package or docs footprint was found, so exact package naming, placement, and whether the node introduces new core contracts remain open scope questions.

