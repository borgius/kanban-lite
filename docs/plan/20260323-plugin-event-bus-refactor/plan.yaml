plan_id: "20260323-plugin-event-bus-refactor"
objective: |
  Refactor the plugin runtime so auth/webhook-style plugins react to SDK-owned before/after events
  instead of being called through direct runtime seams. The SDK must own before/after emission,
  the event bus must support async before-event dispatch that awaits plugin responses and merges
  the initial payload with all plugin-returned objects, backward compatibility is not required,
  and the resulting behavior must preserve clean auth denials and avoid duplicate side effects.
created_at: "2026-03-23"
created_by: "gem-planner"
status: completed
research_confidence: high

tldr: |
  Seven-wave plan centered on a new SDK-owned action pipeline:
  (1) define before/after event vocabulary and merge/response contracts,
  (2) add async event-bus primitives with deterministic response aggregation,
  (3) move authorization and action orchestration into shared SDK helpers,
  (4) migrate mutating SDK surfaces so modules stop self-emitting,
  (5) convert core and first-party auth/webhook runtime plugins to listener-only behavior,
  (6) lock in host-surface regression coverage, and
  (7) sync docs/changelog and finish with architectural review.
  Storage and attachment provider capabilities remain direct capability adapters in this plan;
  the runtime refactor is scoped to event-driven plugin behavior and SDK mutation orchestration.
  T13 review found one remaining architectural gap: several privileged `KanbanSDK` mutations still
  call legacy `_authorizeAction(...)` directly instead of entering through the SDK-owned listener-only
  before-event pipeline, so this follow-up adds one surgical implementation/test/re-review wave.

open_questions:
  - "Confirm whether webhook registry CRUD remains capability-based while webhook delivery becomes listener-only. This plan assumes yes to avoid conflating runtime event handling with persistence/provider CRUD responsibilities."
  - "Choose one canonical event naming convention for paired mutation events (`before.task.create`/`after.task.create` versus `task.beforeCreate` style). This plan assumes a consistent before/after prefix model."

pre_mortem:
  overall_risk_level: high
  critical_failure_modes:
    - scenario: "A handful of privileged mutation entry points still call legacy `_authorizeAction(...)`, so auth listeners never see their canonical before-events and the refactor ships with split authorization paths."
      likelihood: high
      impact: critical
      mitigation: |
        Treat the T13 finding as a scoped completion wave: migrate only the remaining `KanbanSDK`
        call sites, add targeted denial-path regressions for each affected family, and rerun the
        final architectural review before declaring the refactor complete.
    - scenario: "Before-event response merging is non-deterministic or overly permissive, causing silent payload corruption or conflicting overrides between plugins."
      likelihood: medium
      impact: critical
      mitigation: |
        Limit mergeable responses to plain objects, document deterministic listener order,
        and enforce one merge algorithm in EventBus unit tests. Start with shallow merge
        semantics where later listener responses override earlier keys.
    - scenario: "A partial migration leaves both legacy post-write emits and new after-events active, producing duplicate webhook deliveries or repeated plugin side effects."
      likelihood: medium
      impact: critical
      mitigation: |
        Remove module-owned emit calls as each action family migrates, and keep a dedicated
        single-delivery regression suite that fails if one mutation triggers duplicate after-event work.
    - scenario: "Authorization moves onto before-events but denials stop surfacing as stable AuthError-driven user messages across standalone, CLI, and MCP surfaces."
      likelihood: medium
      impact: critical
      mitigation: |
        Keep AuthError as the blocking denial type, ensure before-listener throws pass through
        the SDK action runner unchanged, and extend host-surface regression tests before docs are updated.
    - scenario: "First-party external plugin packages drift from core contract changes because they duplicate structural interfaces locally."
      likelihood: high
      impact: high
      mitigation: |
        Treat `kl-auth-plugin` and `kl-webhooks-plugin` as explicit migration tasks with workspace
        integration coverage after core runtime changes land.
  assumptions:
    - "Async response aggregation is required for before-events only; after-events remain non-blocking side-effect notifications with listener-level error isolation."
    - "Only plain-object plugin responses participate in payload merging; thrown errors abort the action before mutation occurs."
    - "Backward compatibility for `SDKOptions.onEvent`, legacy `EventListenerPlugin.init(...)`, and direct auth runtime seams is not required."
    - "Storage and attachment plugins stay capability-based in this refactor; they are not reworked into event listeners."
    - "Existing AuthError categories and host-layer status mapping remain the public denial contract."

implementation_specification:
  code_structure: |
    Put the new event vocabulary, listener response types, and action-runner payload contracts in
    `packages/kanban-lite/src/sdk/types.ts` and `src/sdk/modules/context.ts`. Extend
    `src/sdk/eventBus.ts` with awaited before-event emission and deterministic merge behavior.
    Centralize orchestration in `KanbanSDK.ts` via shared before/after helpers so SDK entry points,
    not leaf modules, own emission timing. Mutating module files should become pure domain workers
    that return results without firing events directly. Core plugin loading stays in
    `src/sdk/plugins/index.ts`, but auth/webhook runtime behavior shifts to listener-only contracts.
    First-party external runtime plugins (`kl-auth-plugin`, `kl-webhooks-plugin`) then align to the
    new listener contract and are verified through workspace tests.
    This follow-up must stay narrow: only the remaining privileged mutation entry points in
    `KanbanSDK.ts` and the focused regression suites that prove they no longer bypass the shared
    before-event pipeline should be reopened unless implementation evidence shows a strictly
    necessary helper adjustment.
  affected_areas:
    - "packages/kanban-lite/src/sdk/types.ts"
    - "packages/kanban-lite/src/sdk/modules/context.ts"
    - "packages/kanban-lite/src/sdk/eventBus.ts"
    - "packages/kanban-lite/src/sdk/KanbanSDK.ts"
    - "packages/kanban-lite/src/sdk/modules/*"
    - "packages/kanban-lite/src/sdk/plugins/*"
    - "packages/kanban-lite/src/sdk/__tests__/*"
    - "packages/kl-auth-plugin/src/*"
    - "packages/kl-webhooks-plugin/src/*"
    - "packages/kanban-lite/src/cli/index.test.ts"
    - "packages/kanban-lite/src/mcp-server/index.test.ts"
    - "packages/kanban-lite/src/standalone/__tests__/webhooks.test.ts"
    - "README.md"
    - "CHANGELOG.md"
    - "docs/plugins.md"
  component_details:
    - component: event contract layer
      responsibility: |
        Define the before/after event names, payload envelope, mergeable before-response type,
        and module-facing action context so every mutation path uses one contract.
      interfaces:
        - "Before-event payload type that starts from the SDK input payload and accepts merged plugin overrides"
        - "After-event payload type carrying the committed result and audit metadata"
        - "Listener response type restricted to plain-object overrides or void"
    - component: EventBus async dispatcher
      responsibility: |
        Provide awaited before-event emission with deterministic merge behavior while preserving
        non-blocking after-event dispatch and per-listener error isolation.
      interfaces:
        - "emitAsync(eventName, payload): Promise<mergedPayload>"
        - "emit(eventName, payload): void | Promise<void> for non-blocking notifications"
        - "Listener registration APIs for specific events and catch-all listeners"
    - component: SDK action runner
      responsibility: |
        Own action sequencing: build the before payload, await plugin responses, execute the mutation,
        then publish the after payload exactly once. Translate plugin denials into stable SDK errors.
      interfaces:
        - "runBeforeEvent(...) helper returning merged input/context"
        - "runAfterEvent(...) helper for fire-and-log post-commit notifications"
        - "Shared authorization path that treats veto/deny as blocking before-event failures"
    - component: runtime plugin contract
      responsibility: |
        Replace direct auth runtime calls and webhook listener factories with listener-only plugin hooks.
        Auth listeners can veto or override before payloads; webhook listeners react to after-events only.
      interfaces:
        - "Core listener registration contract used by built-in and external runtime plugins"
        - "Provider loading/validation rules in `src/sdk/plugins/index.ts`"
    - component: regression and docs layer
      responsibility: |
        Prove no duplicate side effects, preserve denial UX, and keep README/CHANGELOG/plugin docs aligned.
      interfaces:
        - "Unit/integration/workspace regression suites"
        - "README, docs/plugins.md, generated SDK docs via JSDoc sources"
  dependencies:
    - component: event contract layer
      relationship: "Must land first so EventBus, SDK orchestration, and plugins share one payload/response vocabulary."
    - component: EventBus async dispatcher
      relationship: "Depends on event contracts and feeds awaited merged payloads into SDK action runners."
    - component: SDK action runner
      relationship: "Depends on the async dispatcher and blocks every mutation-family migration."
    - component: runtime plugin contract
      relationship: "Depends on the action runner and finalized before/after event taxonomy from migrated SDK actions."
    - component: regression and docs layer
      relationship: "Depends on core runtime and plugin migrations so behavior and public docs reflect final semantics."
  integration_points:
    - "`KanbanSDK.ts` is the sole orchestration seam for before/after emission timing."
    - "`src/sdk/modules/*` stop emitting events directly and instead return results to SDK-owned runners."
    - "`src/sdk/plugins/index.ts` becomes the validation seam for listener-only auth/webhook runtime plugins."
    - "`kl-auth-plugin` and `kl-webhooks-plugin` remain first-party contract canaries because they duplicate core interface shapes."
    - "Standalone/CLI/MCP tests verify denial and duplicate-side-effect behavior through public SDK-backed surfaces, not internal helpers."

