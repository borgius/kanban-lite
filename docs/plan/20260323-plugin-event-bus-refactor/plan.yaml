tasks:
  - id: T1
    title: Define before/after event vocabulary and merge contract
    description: |
      Replace the current event types with a contract that explicitly models blocking before-events,
      non-blocking after-events, and mergeable plugin responses. This task should define the payload
      envelope, listener response rules, and module-facing context needed for SDK-owned orchestration.
      It should also remove or retire legacy runtime types that assume init/destroy listener factories
      or direct auth runtime calls.
    wave: 1
    agent: gem-implementer
    priority: high
    status: completed
    dependencies: []
    context_files:
      - packages/kanban-lite/src/sdk/types.ts: "Canonical place for event vocabulary, payload types, and plugin response contracts."
      - packages/kanban-lite/src/sdk/modules/context.ts: "Module-facing context that currently exposes emitEvent and will need a new action-runner-aware contract."
      - packages/kanban-lite/src/sdk/index.ts: "Barrel exports for the public SDK contract."
    estimated_effort: medium
    estimated_files: 3
    estimated_lines: 220
    focus_area: event_contracts
    verification:
      - "TypeScript compiles with one authoritative before/after event and response vocabulary."
      - "The mergeable response type only accepts plain-object overrides or void."
      - "Module context no longer requires leaf modules to decide event timing."
    acceptance_criteria:
      - "A typed before/after event contract exists and is exported from the SDK."
      - "The merge contract documents deterministic override order."
      - "Legacy runtime types that conflict with listener-only behavior are removed or clearly superseded."
    failure_modes:
      - scenario: "The contract leaves merge semantics vague, forcing later tasks to guess override precedence."
        likelihood: medium
        impact: high
        mitigation: "Encode merge order and allowed response shapes directly in types and doc comments before EventBus work begins."
    tech_stack:
      - TypeScript
    test_coverage: "Type-level compile coverage plus follow-on runtime tests in T2/T3"

  - id: T2
    title: Implement async EventBus emission and merge semantics
    description: |
      Extend the shared EventBus so before-events can await async listeners and merge their object
      responses into a single payload, while after-events keep error-isolated notification behavior.
      This task should establish deterministic listener ordering, validate response shapes, and add
      direct unit coverage for awaited emission, merge precedence, wildcard subscriptions, and error isolation.
    wave: 1
    agent: gem-implementer
    priority: high
    status: completed
    dependencies:
      - T1
    context_files:
      - packages/kanban-lite/src/sdk/eventBus.ts: "Core dispatcher that must gain awaited before-event support."
      - packages/kanban-lite/src/sdk/__tests__/eventBus.test.ts: "Primary contract suite for bus semantics."
      - packages/kanban-lite/src/sdk/__tests__/KanbanSDK.test.ts: "SDK-facing proxy coverage that should reflect the new bus behavior."
    estimated_effort: medium
    estimated_files: 3
    estimated_lines: 260
    focus_area: async_dispatch
    verification:
      - "Awaited before-event emission returns one merged payload in listener-registration order."
      - "Non-object listener responses are rejected or ignored according to the contract, not silently merged."
      - "After-event dispatch still isolates listener errors and does not prevent sibling listeners from running."
    acceptance_criteria:
      - "EventBus exposes an awaited emission path for before-events."
      - "Merge behavior is covered by unit tests, including conflicting keys and empty responses."
      - "Wildcard/onAny semantics still work with the new dispatcher."
    failure_modes:
      - scenario: "Async listeners complete out of order and make merge results nondeterministic."
        likelihood: medium
        impact: critical
        mitigation: "Await listeners in a deterministic sequence and encode the order contract in tests."
    tech_stack:
      - TypeScript
      - EventEmitter2
      - Vitest
    test_coverage: "Direct unit coverage for awaited emission, merge precedence, and listener error behavior"

  - id: T3
    title: Introduce SDK-owned action runners and preserve AuthError semantics
    description: |
      Add shared before/after orchestration helpers in `KanbanSDK.ts` so every privileged mutation
      goes through one action runner. This runner must build the before payload, await merged plugin
      responses, execute the write only after the before phase succeeds, and publish exactly one
      after-event afterward. Auth denials must continue surfacing as AuthError-driven failures.
