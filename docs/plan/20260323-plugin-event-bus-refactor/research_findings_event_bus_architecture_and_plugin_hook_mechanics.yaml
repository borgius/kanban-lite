domain_security_considerations:
  sensitive_areas:
    - area: auth event emission
      location: packages/kanban-lite/src/sdk/KanbanSDK.ts
      concern: auth.denied/auth.allowed payloads include action, reason, actor, boardId; plugin hooks must avoid leaking tokens or sensitive context.
    - area: plugin-thrown auth errors
      location: packages/kanban-lite/src/sdk/types.ts and host adapters
      concern: any new before-event authorization failure path should remain compatible with AuthError category mapping.
  authentication_patterns_in_domain: Auth identity/policy resolution occurs before privileged SDK actions in _authorizeAction.
  authorization_patterns_in_domain: Policy denials throw AuthError and also emit auth.denied.
  data_validation_in_domain: Event payloads are ad hoc per emitter call site; there is no central schema validation for listener payloads.

