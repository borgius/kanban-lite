    - temp plugin packages exporting webhookProviderPlugin
    - injected deny-all auth policy plugins

open_questions:
  - question: What exact contract should before-event listeners use for merged responses?
    context: Current EventListenerPlugin returns nothing and SDKEvent payloads are heterogeneous, so merge semantics are undefined by existing code.
  - question: Should auth.allowed/auth.denied remain special-case direct emits or move onto the same before/after helper path?
    context: They currently bypass KanbanSDK.emitEvent and may diverge from any new async dispatch semantics.
  - question: Should legacy onEvent be removed entirely or reimplemented atop after-events only?
    context: Backward compatibility is declared unnecessary, but the constructor still wires onEvent via onAny today.

gaps:
  - area: response merge shape for before-events
    description: No existing listener/plugin API returns data to the caller, so there is no precedent for merge order, conflict resolution, or typing.
    impact: High; this is the core contract the refactor must invent.
  - area: typed event payload schemas
    description: SDKEvent.data is `unknown` and each event family uses ad hoc object shapes from module call sites.
    impact: Medium; adding before/after hooks without stronger typing risks inconsistent plugin expectations.
  - area: problem-details support
    description: Standalone server uses plain `{ ok:false, error }` responses and there is no reusable ProblemDetails class/helper.
    impact: Medium; plugin-thrown authorization errors can reuse AuthError but not a preexisting RFC 7807 abstraction.
