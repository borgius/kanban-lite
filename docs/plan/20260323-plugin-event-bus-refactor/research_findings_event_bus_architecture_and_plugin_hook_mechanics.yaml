patterns_found:
  - category: architecture
    pattern: synchronous event dispatch with error swallowing
    description: Event emission is synchronous and per-listener failures are logged/swallowed.
    examples:
      - file: packages/kanban-lite/src/sdk/eventBus.ts
        location: ':43-61'
        snippet: emit() loops listeners and onAny listeners with try/catch around each callback.
      - file: packages/kanban-lite/src/sdk/KanbanSDK.ts
        location: ':514-537'
        snippet: auth.allowed/auth.denied emits are wrapped in try/catch and ignore listener errors.
    prevalence: common
  - category: architecture
    pattern: post-write event emission from module functions
    description: SDK modules call ctx.emitEvent only after persistence or config write completes.
    examples:
      - file: packages/kanban-lite/src/sdk/modules/cards.ts
        location: ':368, :415, :513, :560, :585'
        snippet: task/form events fire after writeCard/deleteCard.
      - file: packages/kanban-lite/src/sdk/modules/boards.ts
        location: ':75, :101, :133, :192, :258'
        snippet: board/task events fire after config/storage changes.
    prevalence: common
  - category: plugin
    pattern: plugins subscribe by lifecycle init/destroy, not by intercepting method calls
    description: Listener plugins get EventBus in init() and register subscriptions themselves.
    examples:
      - file: packages/kanban-lite/src/sdk/types.ts
        location: ':110-115'
        snippet: EventListenerPlugin has only manifest/init/destroy.
      - file: packages/kanban-lite/src/sdk/plugins/webhookListener.ts
        location: ':34-38'
        snippet: init(bus, workspaceRoot) stores unsubscribe from onAny.
    prevalence: common
  - category: plugin
    pattern: webhook provider owns listener factory
    description: webhook.delivery plugins expose CRUD plus createListener(workspaceRoot).
    examples:
      - file: packages/kanban-lite/src/sdk/plugins/index.ts
        location: ':167-186'
        snippet: WebhookProviderPlugin interface includes createListener.
      - file: packages/kl-webhooks-plugin/src/index.ts
        location: ':242-271'
        snippet: external provider returns lifecycle object whose init subscribes via onAny.
    prevalence: occasional
  - category: error_handling
    pattern: auth denial represented as AuthError plus status mapper, not problem-details object
    description: authorization failures are typed inside SDK and translated per host.
    examples:
      - file: packages/kanban-lite/src/sdk/types.ts
        location: ':204-299'
        snippet: AuthErrorCategory + AuthError class.
      - file: packages/kanban-lite/src/standalone/authUtils.ts
        location: ':25-29'
        snippet: maps categories to 401/403/500.
      - file: packages/kanban-lite/src/standalone/httpUtils.ts
        location: ':78-84'
        snippet: jsonError sends { ok:false, error }.
    prevalence: common

