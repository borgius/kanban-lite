  methodology: hybrid retrieval using semantic_search, grep_search, targeted read_file, plus repo memory cross-check
  scope: SDK event bus core, plugin registry/loader, webhook listener contract, emitting module call sites, auth error plumbing, related tests
  confidence: high
  coverage: 88

