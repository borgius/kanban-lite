plan_id: 20260323-plugin-event-bus-refactor
objective: >-
  Plugins should only listen for events; SDK actions should emit async before/after
  events; emitEvent/emitAsync should merge plugin responses for before-events and
  await them; backward compatibility is not required.
focus_area: event bus architecture and plugin hook mechanics
created_at: 2026-03-23
created_by: GitHub Copilot
status: completed

tldr: |
  - `EventBus` is a thin synchronous wrapper over `EventEmitter2`; it has `emit()` only and no async dispatch API.
  - `KanbanSDK.emitEvent()` is defined once and used by SDK modules only for post-mutation events; auth events bypass it and emit directly on `_eventBus`.
  - Plugin mechanics currently model listeners as side-effect subscribers (`EventListenerPlugin.init/destroy`) with no return channel, no request/response contract, and no response merging.
  - Webhook delivery is implemented as an event-listener plugin (built-in or external provider-created), attached in the SDK constructor via `onAny`.
  - Existing authorization support centers on `AuthError` plus HTTP status mapping; no RFC 7807/problem-details class exists in core.

