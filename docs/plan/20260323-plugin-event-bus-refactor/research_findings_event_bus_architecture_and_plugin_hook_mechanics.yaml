  data_flow_involving_domain: >-
    SDK module mutates storage/config -> module calls ctx.emitEvent(event, data) ->
    KanbanSDK.emitEvent wraps data in SDKEvent envelope -> EventBus.emit synchronously
    invokes matching listeners and onAny subscribers -> built-in or external webhook
    listener forwards payload.data to fireWebhooks. Auth decisions bypass ctx.emitEvent
    and emit directly on _eventBus inside _authorizeAction.
  key_relationships_to_domain:
    - from: packages/kanban-lite/src/sdk/modules/*
      to: packages/kanban-lite/src/sdk/KanbanSDK.ts
      relationship: calls ctx.emitEvent via SDKContext
    - from: packages/kanban-lite/src/sdk/KanbanSDK.ts
      to: packages/kanban-lite/src/sdk/eventBus.ts
      relationship: composes
    - from: packages/kanban-lite/src/sdk/KanbanSDK.ts
      to: packages/kanban-lite/src/sdk/plugins/webhookListener.ts
      relationship: instantiates fallback listener plugin
    - from: packages/kanban-lite/src/sdk/plugins/index.ts
      to: packages/kl-webhooks-plugin/src/index.ts
      relationship: loads external webhook provider by contract

