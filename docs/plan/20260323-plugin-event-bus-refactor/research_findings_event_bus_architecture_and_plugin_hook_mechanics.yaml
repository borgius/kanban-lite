related_conventions:
  naming_patterns_in_domain: >-
    Event names use dotted strings (`task.created`, `auth.denied`, `board.log.added`).
    Mutating SDK action names for auth policy use separate dotted verbs (`card.create`, `column.update`).
  structure_of_domain: >-
    Event bus core lives in `src/sdk/eventBus.ts`; SDK-level orchestration in `KanbanSDK.ts`;
    emitting operations in `src/sdk/modules/*`; plugin contracts/loaders in `src/sdk/plugins/*`.
  error_handling_in_domain: >-
    Listener failures are intentionally swallowed/logged. Auth failures throw `AuthError`.
    Standalone HTTP maps auth categories to status codes then uses plain `jsonError`.
  testing_in_domain: >-
    Tests are colocated in `src/sdk/__tests__` and focus on synchronous emission semantics,
    lifecycle hooks, provider loading, and auth denial coverage.
  documentation_in_domain: >-
    README and docs/sdk.md describe event-bus usage as public SDK surface, including on/once/onAny/waitFor.

