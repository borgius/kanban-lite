  structure_of_domain: "Core SDK tests live under src/sdk/__tests__; host-specific tests live beside each surface; external plugin packages each carry their own workspace/integration tests."
  error_handling_in_domain: "Error mapping is intentionally stable at host surfaces (notably MCP and CLI auth/provider errors). EventBus isolates listener failures and logs to console instead of failing sibling listeners."
