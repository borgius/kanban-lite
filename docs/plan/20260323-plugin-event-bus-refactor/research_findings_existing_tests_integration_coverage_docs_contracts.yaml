open_questions:
  - question: "Whether the refactor will preserve the legacy `SDKOptions.onEvent` callback exactly or re-route it through the new plugin bus semantics"
    context: "README and constructor wiring currently document backward compatibility; several users may rely on side-effect timing."
  - question: "Whether auth event emission (`auth.allowed` / `auth.denied`) is intended to remain on the same public bus and be consumable by external listeners"
    context: "KanbanSDK emits auth events today, but host-surface tests mostly validate denial mapping rather than bus-level auth listeners."
  - question: "Whether standalone websocket fan-out relies on any ordering guarantees relative to event bus/webhook delivery"
    context: "Current standalone coverage proves websocket behavior and auth forwarding, but not interaction ordering against bus listeners."

gaps:
  - area: "CLI event-specific regression coverage"
    description: "CLI tests cover webhook CRUD/error propagation but not direct event subscription semantics, which is appropriate because CLI does not expose the bus."
    impact: "Low for the refactor unless CLI command output or timing changes because of event-side effects."
  - area: "MCP/standalone tests for duplicate delivery prevention"
    description: "Single-delivery prevention is asserted in SDK tests, not repeated at every host surface."
    impact: "Medium if the refactor accidentally reintroduces double listener wiring outside SDK construction."
  - area: "Non-webhook event listener plugins"
    description: "Current evidence centers on webhook listeners; there is little repository evidence of a second real event.listener plugin implementation."
    impact: "Medium because generalized plugin event bus behavior may need broader contract examples than webhook-only coverage provides."
