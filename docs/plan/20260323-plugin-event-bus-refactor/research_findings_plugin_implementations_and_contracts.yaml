open_questions:
  - question: What is the intended replacement for direct webhook CRUD methods under an event-only plugin model?
    context: `WebhookProviderPlugin` currently owns both runtime listening and registry CRUD; the objective mentions plugins only listening to emitted before/after events, which leaves CRUD ownership unspecified.
  - question: Should authorization decisions move entirely to before-events, or should auth remain a distinct pre-action contract outside the generic plugin bus?
    context: Current auth flow is synchronous and blocking, while the current bus implementation is listener-oriented and fire-and-forget.
  - question: Are storage/attachment plugins expected to observe before/after events, or remain pure capability providers?
    context: First-party storage packages currently have no event-bus dependency and no auth/webhook responsibilities.
  - question: Will before/after events require richer payloads than current post-write sanitized snapshots?
    context: Current event emitters often send only the final object; before-events would need intent/context and override semantics.

gaps:
  - area: formal target contract for override semantics
    description: No existing interface or test fixture describes how event listeners would return overrides back into the mutation pipeline.
    impact: Exact files needing signature changes beyond the currently direct auth/webhook contracts cannot be pinned down with full certainty.
  - area: host-layer expectations for synchronous plugin vetoes
    description: Current event bus is sync in implementation but modeled as side-effect delivery rather than request/response interception.
    impact: Unknown whether CLI/API/MCP error mapping needs deeper changes than SDK core and tests.
