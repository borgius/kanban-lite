patterns_found:
  - category: architecture
    pattern: Direct auth provider invocation
    description: Auth plugins are not event listeners. Core resolves providers and calls them directly at `_authorizeAction` before mutations proceed.
    examples:
      - file: packages/kanban-lite/src/sdk/KanbanSDK.ts
        location: line 510
        snippet: const identity = await this._capabilities.authIdentity.resolveIdentity(resolvedContext)
      - file: packages/kanban-lite/src/sdk/KanbanSDK.ts
        location: line 511
        snippet: const decision = await this._capabilities.authPolicy.checkPolicy(identity, action, resolvedContext)
      - file: packages/kl-auth-plugin/src/index.ts
        location: line 36
        snippet: resolveIdentity(context: AuthContext): Promise<AuthIdentity | null>
    prevalence: common
  - category: architecture
    pattern: Hybrid webhook provider contract
    description: Webhook plugins combine direct CRUD methods with an event-listener factory for runtime delivery.
    examples:
      - file: packages/kanban-lite/src/sdk/plugins/index.ts
        location: line 153
        snippet: interface WebhookProviderPlugin { ... createListener(workspaceRoot: string) }
      - file: packages/kanban-lite/src/sdk/KanbanSDK.ts
        location: line 318
        snippet: this._webhookPlugin = webhookProvider.createListener(this.workspaceRoot)
      - file: packages/kanban-lite/src/sdk/KanbanSDK.ts
        location: line 2235
        snippet: return this._capabilities.webhookProvider.createWebhook(this.workspaceRoot, webhookConfig)
    prevalence: common
  - category: architecture
    pattern: Post-operation event emission
    description: SDK modules emit events only after successful writes; there is no existing before/after paired event vocabulary for mutations.
    examples:
      - file: packages/kanban-lite/src/sdk/modules/cards.ts
        location: line 368
        snippet: ctx.emitEvent('task.created', sanitizeCard(card))
      - file: packages/kanban-lite/src/sdk/modules/comments.ts
        location: line 47
        snippet: ctx.emitEvent('comment.created', { ...comment, cardId })
      - file: packages/kanban-lite/src/sdk/modules/migration.ts
        location: line 115
        snippet: ctx.emitEvent('storage.migrated', { from, to: 'sqlite', count })
    prevalence: common
  - category: architecture
    pattern: Event-listener plugins subscribe with catch-all bus listeners
    description: Existing event-driven plugin behavior uses `bus.onAny(...)` rather than per-event registration.
    examples:
      - file: packages/kanban-lite/src/sdk/plugins/webhookListener.ts
        location: line 33
        snippet: this._unsubscribe = bus.onAny((event: string, payload: SDKEvent) => { ... })
      - file: packages/kl-webhooks-plugin/src/index.ts
        location: line 250
        snippet: unsubscribe = bus.onAny((event, payload) => { fireWebhooks(workspaceRoot, event, payload.data) })
    prevalence: occasional
  - category: structure
    pattern: Structural type copies in external packages
    description: First-party external plugin packages duplicate minimal interface shapes instead of importing deep core internals.
    examples:
      - file: packages/kl-webhooks-plugin/src/index.ts
        location: line 31
        snippet: interface EventBus { onAny(listener: ...): () => void }
      - file: packages/kl-auth-plugin/src/index.ts
        location: line 1
        snippet: export interface AuthIdentity { subject: string; roles?: string[] }
      - file: packages/kl-s3-attachment-storage/src/index.ts
        location: line 25
        snippet: interface AttachmentStoragePlugin { ... }
    prevalence: common
  - category: testing
    pattern: Contract-centric integration tests
    description: Tests validate export shapes and runtime behavior against the current plugin loader and direct-call seams.
    examples:
      - file: packages/kl-auth-plugin/src/auth-plugin.integration.test.ts
        location: line 26
        snippet: manifest shape (kanban-lite loader contract)
      - file: packages/kanban-lite/src/sdk/__tests__/webhook-delegation.test.ts
        location: line 229
        snippet: resolves webhookProvider from capability bag when package is installed
    prevalence: common

