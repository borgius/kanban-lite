domain_security_considerations:
  sensitive_areas:
    - area: auth principal and token handling
      location: packages/kanban-lite/src/sdk/plugins/index.ts, packages/kl-auth-plugin/src/index.ts
      concern: Direct auth plugins currently resolve identity from opaque tokens before actions; contract changes must preserve denial semantics and avoid leaking tokens.
    - area: outbound webhook signing and delivery
      location: packages/kl-webhooks-plugin/src/index.ts
      concern: Delivery uses HMAC signing and intentionally swallows transport failures.
  authentication_patterns_in_domain: Token-based identity resolution via `AuthIdentityPlugin.resolveIdentity(context)`.
  authorization_patterns_in_domain: Synchronous per-action decision via `AuthPolicyPlugin.checkPolicy(identity, action, context)` before mutations, with `auth.allowed`/`auth.denied` emitted afterward.
  data_validation_in_domain: Plugin loaders validate manifest ids, provided namespaces, and required method presence before accepting external packages.

