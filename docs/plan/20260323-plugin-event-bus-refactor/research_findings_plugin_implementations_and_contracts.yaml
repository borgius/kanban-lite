related_conventions:
  naming_patterns_in_domain: Capability namespaces use dotted strings (`auth.identity`, `webhook.delivery`, `card.storage`, `attachment.storage`); emitted SDK events also use dotted strings (`task.created`, `auth.denied`).
  structure_of_domain: Core declares canonical interfaces in `kanban-lite/src/sdk/plugins/index.ts` and `kanban-lite/src/sdk/types.ts`; first-party external packages duplicate minimal structural interfaces locally rather than importing deep internals.
  error_handling_in_domain: Auth denies by returning `AuthDecision` that `KanbanSDK` converts to `AuthError`; event-bus listener failures are swallowed/logged; webhook delivery failures are logged and do not block mutations.
  testing_in_domain: Tests focus on manifest shape, runtime loader compatibility, delegation, and lifecycle behavior rather than abstract mock-only unit tests.
  documentation_in_domain: Public docs describe current capability namespaces and provider ids in `README.md` and `docs/plugins.md`; generated SDK/webhook docs derive from JSDoc and generator scripts.

