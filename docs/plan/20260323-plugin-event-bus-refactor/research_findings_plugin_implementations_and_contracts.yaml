plan_id: 20260323-plugin-event-bus-refactor
objective: Refactor all plugins to a model where they only listen for emitted before/after events and may return overrides or throw errors.
focus_area: plugin implementations and contracts across workspace packages
created_at: 2026-03-23
created_by: GitHub Copilot
status: completed

tldr: |
  - Current first-party plugin contracts are split: auth uses direct request/decision interfaces, webhook delivery mixes direct CRUD methods with an event-bus listener factory, and storage/attachment plugins are capability adapters with no event-bus role.
  - The only existing event-driven plugin behavior is webhook delivery via `EventListenerPlugin`/`bus.onAny(...)`; mutation events are emitted after writes, and auth additionally emits `auth.allowed`/`auth.denied` after the authorization decision.
  - A before/after event-only refactor would primarily touch `kanban-lite` core contracts plus `kl-auth-plugin` and `kl-webhooks-plugin`; storage packages (`kl-sqlite-storage`, `kl-mysql-storage`, `kl-s3-attachment-storage`) appear largely unaffected unless the plugin manifest or shared capability vocabulary changes.
  - Core update pressure is concentrated in `KanbanSDK.ts`, `sdk/types.ts`, `sdk/plugins/index.ts`, and every SDK module that currently emits only post-mutation events.
  - Documentation and tests mirror the current direct-call model and would need synchronized updates wherever auth/webhook contracts are described or asserted.

research_metadata:
  methodology: Hybrid retrieval using semantic search, regex search, targeted file reads, and relationship tracing from core contracts to first-party plugin packages and tests.
  scope: Focused on plugin contracts, plugin package implementations, core SDK plugin-loading and event-bus seams, and contract-oriented tests/docs.
  confidence: high
  coverage: 88

