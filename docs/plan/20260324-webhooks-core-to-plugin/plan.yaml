    test_coverage: "Package-local CRUD and runtime tests, including signing, filtering, and listener lifecycle."

  - id: WCTP-03
    title: Remove core runtime ownership and reduce `KanbanSDK` to plugin-backed delegation
    description: |
      Update `KanbanSDK` and legacy webhook modules so core no longer owns webhook runtime delivery
      or CRUD logic. Keep SDK auth/orchestration, but remove built-in runtime ownership and replace
      direct implementations with delegation and temporary compatibility shims where necessary.
    wave: 3
    agent: gem-implementer
    priority: high
    status: completed
