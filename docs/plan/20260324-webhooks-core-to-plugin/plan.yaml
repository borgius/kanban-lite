rollback_notes:
  - "Keep `packages/kanban-lite/src/sdk/webhooks.ts` and `packages/kanban-lite/src/sdk/plugins/webhookListener.ts` as temporary compatibility shims until plugin-owned runtime, standalone, and CLI parity are verified."
  - "Do not remove built-in core webhook route or CLI registration until plugin-owned standalone and CLI surfaces are loading under webhook-only config and passing focused tests."
  - "If standalone route metadata/openapi contribution proves too invasive, revert to SDK-backed core route hosting for this cycle and preserve plugin ownership of runtime plus CLI only."
  - "If MCP extensibility would require a new generalized plugin system, stop at a thin core facade and record the full MCP migration as a follow-up rather than expanding scope mid-stream."
  - "Keep alias/discovery changes isolated so they can be reverted independently from plugin runtime ownership if workspace activation regresses."

tasks:
  - id: WCTP-01
    title: Tighten webhook pack activation and discovery in the SDK layer
    description: |
      Define the minimal core-side activation rules required for webhook plugin ownership: normalize
      webhook-only config, ensure the webhook package is considered active for CLI and standalone
      discovery, and confirm any small contract additions needed for plugin-owned route/command
      surfaces. This task should not move runtime logic yet; it should only make plugin activation
      deterministic and compatible with existing workspace config.
    wave: 1
    agent: gem-implementer
    priority: high
    status: completed
    dependencies: []
    context_files:
      packages/kanban-lite/src/shared/config.ts: "Webhook config normalization and defaulting."
      packages/kanban-lite/src/sdk/plugins/index.ts: "Alias loading, capability resolution, CLI loading, and standalone aggregation."
      packages/kanban-lite/src/sdk/types.ts: "Existing CLI and plugin surface contracts."
    estimated_effort: medium
    estimated_files: 3
    estimated_lines: 260
    focus_area: sdk activation contract
    verification:
      - "A workspace that only configures `webhookPlugin` still activates webhook package discovery for provider, CLI, and standalone surfaces."
      - "No host surface requires a redundant `config.plugins` entry to discover the webhook package."
      - "Any contract changes remain surgical and do not introduce a generic new plugin framework."
    acceptance_criteria:
      - "Webhook pack activation is deterministic under legacy and normalized config paths."
      - "Core owns only discovery/orchestration concerns, not webhook runtime behavior."
      - "Implementation order can proceed SDK-first without blocking later API/CLI migration."
    failure_modes:
      - scenario: Discovery changes accidentally activate unrelated plugins or alter non-webhook plugin resolution.
        likelihood: medium
        impact: high
        mitigation: "Scope activation changes narrowly to webhook capability normalization and webhook pack discovery."
      - scenario: CLI and standalone host seams still miss webhook-only config after the change.
        likelihood: medium
        impact: high
        mitigation: "Add focused tests for webhook-only workspace configs before any host-surface ownership changes."
    tech_stack:
      - TypeScript
      - Existing kanban-lite plugin resolver conventions
      - Node.js createRequire package loading
    test_coverage: "Loader and normalization tests covering webhook-only config activation across provider, CLI, and standalone discovery."

  - id: WCTP-02
    title: Canonicalize webhook CRUD and delivery ownership inside `kl-webhooks-plugin`
    description: |
      Make the plugin package the canonical implementation source for webhook CRUD, signing,
      filtering, delivery, and listener lifecycle. Resolve any ownership drift inside the package
      so later host-surface migrations consume one plugin-owned behavior set rather than duplicated
      core logic.
    wave: 2
    agent: gem-implementer
    priority: high
    status: completed
    dependencies:
      - WCTP-01
    context_files:
      packages/kl-webhooks-plugin/src/index.ts: "Plugin runtime/provider implementation and export surface."
      packages/kl-webhooks-plugin/src/webhooks.test.ts: "Package-level runtime and CRUD parity coverage."
      packages/kl-webhooks-plugin/README.md: "Package-owned behavior and configuration documentation."
    estimated_effort: medium
    estimated_files: 3
    estimated_lines: 320
    focus_area: plugin runtime ownership
    verification:
      - "The plugin package alone can express webhook CRUD and runtime listener behavior with current parity semantics."
      - "Any parity-sensitive drift is explicitly addressed or documented for follow-up."
      - "The package exports stay compatible with the current core loader."
    acceptance_criteria:
      - "`kl-webhooks-plugin` is the canonical owner of webhook runtime semantics."
      - "Package tests cover delivery, filtering, persistence, and secret/signature behavior."
      - "No new dependency or broad refactor is required to host the canonical logic in the plugin."
    failure_modes:
      - scenario: Plugin behavior still drifts from legacy core fallback semantics in observable ways.
        likelihood: medium
        impact: high
        mitigation: "Use parity tests and explicitly decide whether each drift is fixed now or documented as follow-up."
      - scenario: Package export changes break runtime loading or sibling-linked development.
        likelihood: medium
        impact: high
        mitigation: "Preserve the current export shape and validate with loader-focused integration coverage."
    tech_stack:
