  - id: WCTP-06
    title: Re-scope MCP webhook handling to a thin core facade and decide whether plugin ownership is deferred
    description: |
      Review MCP after API and CLI migration, then either (a) keep MCP as a deliberate thin core
      facade backed only by SDK methods, or (b) use a validated low-risk seam discovered in wave 1
      to move MCP webhook tools into the plugin. The default plan is to keep MCP in core because the
      current research did not find a webhook-capable MCP plugin surface.
    wave: 6
    agent: gem-implementer
    priority: medium
    status: completed
    decision: |
      MCP remains a deliberate thin core facade. No existing plugin seam supports MCP webhook tool
      routing, and introducing one would exceed this plan's scope. Two security issues found during
      gem-reviewer pass were resolved in-place:
        1. Secret redaction: `redactWebhook` helper strips the `secret` field before serialising
           webhook objects in `list_webhooks`, `add_webhook`, and `update_webhook` responses.
        2. Auth-wrapping consistency: `list_webhooks` now uses `runWithMcpAuth` + try/catch
           matching the pattern of `add_webhook`, `remove_webhook`, and `update_webhook`.
      Focused regression tests added to `packages/kanban-lite/src/mcp-server/index.test.ts`
      covering secret redaction (3 tests) and auth-error propagation from a throwing provider.
      All 15 MCP tests pass. No new MCP plugin framework was introduced.
