plan_id: 20260324-webhooks-core-to-plugin
objective: |
  Move webhook functionality out of kanban-lite core and into the webhook plugin package,
  including runtime delivery ownership and related user-facing command surfaces wherever the
  current architecture already provides plugin seams. Ensure CLI webhook commands move to the
  plugin, standalone webhook routes move to the plugin if the existing standalone extension seam
  can host them cleanly, and keep MCP as a thin core facade unless a low-risk plugin seam is
  discovered during implementation. Preserve SDK auth/orchestration, update README and CHANGELOG,
  and regenerate generated docs from source metadata only.
created_at: "2026-03-24"
created_by: gem-planner
status: pending_approval
research_confidence: high

tldr: |
  The safest migration is to treat `packages/kl-webhooks-plugin` as the canonical owner of
  webhook runtime behavior and any existing pluggable command surfaces, while shrinking core to
  orchestration, auth, and compatibility glue. The plan starts by tightening webhook-pack
  discovery and activation in the SDK layer, then moves runtime ownership, standalone route
  ownership, and CLI command ownership into the plugin in that order. MCP should be reduced to a
  thin SDK facade unless a minimal plugin seam is found during the first wave; creating a brand-new
  generic MCP plugin architecture is not recommended for this refactor.

open_questions:
  - "Should webhook route documentation be emitted from plugin-provided route metadata/openapi fragments, or should core retain only the aggregation/generation hook while the plugin owns the route definitions?"
  - "If a lightweight MCP extension seam is discovered during wave 1, should webhook MCP tools move fully into the plugin, or should the project keep MCP as a deliberate core facade for now?"
  - "Should the migration also normalize the webhook ID generator drift (`randomBytes(6)` vs `randomBytes(8)`) as part of canonicalizing plugin ownership, or defer that to a follow-up compatibility task?"

pre_mortem:
  overall_risk_level: high
  critical_failure_modes:
    - scenario: Core and plugin both continue registering webhook runtime listeners or command surfaces, causing duplicate deliveries or duplicate CLI/HTTP registrations.
      likelihood: high
      impact: critical
      mitigation: |
        Make plugin activation exclusive for webhook-owned surfaces, remove the built-in fallback
        listener and built-in webhook route/CLI registrations only after plugin-backed parity tests
        pass, and add explicit regression coverage for single delivery and single registration.
    - scenario: Workspaces using only `webhookPlugin` configuration fail to discover plugin-owned CLI or standalone extensions.
      likelihood: high
      impact: high
      mitigation: |
        Tighten SDK/config normalization and plugin discovery first so webhook-only configuration
        activates the webhook package for CLI and standalone hosting before host-surface migration
        begins.
    - scenario: Standalone route ownership moves to the plugin, but generated API/openapi docs drift because the plugin routes are not represented in source metadata.
      likelihood: medium
      impact: high
      mitigation: |
        Define a minimal plugin-owned route metadata/openapi contribution path during the API wave,
        update generator sources in the same change set, and regenerate docs before sign-off.
    - scenario: Core webhook fallback removal exposes hidden dependencies in tests or non-plugin installations.
      likelihood: medium
      impact: high
      mitigation: |
        Convert core webhook modules into temporary compatibility shims first, keep SDK-level
        install/configuration errors deterministic, and only delete fallback ownership after
        provider-backed tests and smoke checks pass.
  assumptions:
    - The existing SDK plugin loader, `KanbanCliPlugin`, and `StandaloneHttpPlugin` seams are sufficient for webhook CLI and standalone migration with only surgical adjustments.
    - SDK auth/orchestration remains in core; plugin ownership is about runtime behavior and host-surface implementations, not authorization policy.
    - No repository-level `docs/prd.yaml` currently exists, so this plan does not need to reconcile against an existing PRD.
    - Adding a brand-new generic MCP plugin system would be larger than this migration and should be avoided unless wave 1 reveals an already-available seam.

implementation_specification:
  code_structure: |
    Keep `KanbanSDK` as the orchestrator and auth boundary, but make the webhook plugin package the
    canonical source for webhook CRUD/runtime behavior and any pluggable host surfaces. Core should
    provide only the minimum capability resolution, lifecycle management, and compatibility shims
    needed to load a webhook package from normalized config. The plugin package should export a
    cohesive webhook pack: `webhook.delivery` provider, runtime listener, standalone HTTP
    contribution, and CLI contribution. MCP should remain in core as a thin facade unless a
    lightweight extension seam is validated early.
  affected_areas:
    - packages/kanban-lite/src/shared/config.ts
    - packages/kanban-lite/src/sdk/plugins/index.ts
    - packages/kanban-lite/src/sdk/types.ts
    - packages/kanban-lite/src/sdk/KanbanSDK.ts
    - packages/kanban-lite/src/sdk/webhooks.ts
    - packages/kanban-lite/src/sdk/plugins/webhookListener.ts
    - packages/kanban-lite/src/standalone/server.ts
    - packages/kanban-lite/src/standalone/internal/routes/system.ts
    - packages/kanban-lite/src/standalone/internal/openapi-spec.ts
    - packages/kanban-lite/src/cli/index.ts
    - packages/kanban-lite/src/mcp-server/index.ts
    - packages/kl-webhooks-plugin/src/index.ts
    - packages/kl-webhooks-plugin/README.md
    - README.md
    - CHANGELOG.md
    - scripts/generate-api-docs.ts
    - scripts/generate-sdk-docs.ts
    - scripts/generate-webhooks-docs.ts
  component_details:
    - component: Webhook pack activation and discovery in core
      responsibility: Normalize webhook-related config and ensure webhook-only configuration activates provider, CLI, and standalone webhook pack contributions without requiring separate `plugins` entries.
      interfaces:
        - "Normalized webhook capability selection in `packages/kanban-lite/src/shared/config.ts`"
        - "Webhook pack resolution and host-surface discovery in `packages/kanban-lite/src/sdk/plugins/index.ts`"
        - "Any small contract additions required in `packages/kanban-lite/src/sdk/types.ts`"
    - component: Plugin-owned canonical webhook runtime
      responsibility: Make `packages/kl-webhooks-plugin` the single implementation source for webhook CRUD and delivery semantics, including listener lifecycle.
      interfaces:
        - "`webhookProviderPlugin` export"
        - "`webhookListenerPlugin` export or class export"
        - "Plugin-local helpers for CRUD persistence, signing, filtering, and delivery"
    - component: Plugin-owned standalone webhook surface
      responsibility: Register `/api/webhooks` behavior through the standalone plugin seam and contribute any needed source metadata for openapi/doc generation.
      interfaces:
        - "`StandaloneHttpPlugin` export from `packages/kl-webhooks-plugin`"
        - "Core standalone host aggregation hook"
        - "Route metadata/openapi contribution path used by doc generators"
    - component: Plugin-owned CLI webhook surface
      responsibility: Provide webhook CLI commands from the webhook package and remove built-in core ownership of those commands.
      interfaces:
        - "`cliPlugin` export from `packages/kl-webhooks-plugin`"
        - "Core CLI plugin registration and command collision guardrails"
    - component: Core thin facades and compatibility shims
      responsibility: Reduce core webhook modules and MCP handlers to SDK-backed orchestration only, with no webhook persistence or delivery logic left in core.
      interfaces:
        - "`KanbanSDK` webhook methods delegating to the resolved plugin provider"
        - "Temporary compatibility shims in legacy core webhook modules"
        - "MCP webhook handlers calling SDK only"
    - component: Documentation and verification
      responsibility: Keep generated docs source-driven and update user-facing docs to explain the new ownership model, install path, and rollback path.
      interfaces:
        - "README and package README updates"
        - "CHANGELOG Unreleased entry"
        - "Generator-source updates for API/SDK/webhook docs"
  dependencies:
    - component: Webhook pack activation and discovery in core
      relationship: Must land first so the plugin-owned CLI and standalone surfaces activate reliably in existing workspaces.
    - component: Plugin-owned canonical webhook runtime
      relationship: Depends on activation/discovery and provides the canonical behavior that all later surfaces will call.
    - component: Plugin-owned standalone webhook surface
      relationship: Depends on canonical runtime ownership and any route metadata contract defined in the first wave.
    - component: Plugin-owned CLI webhook surface
      relationship: Depends on activation/discovery and stable SDK delegation so CLI commands do not duplicate core logic.
    - component: Core thin facades and compatibility shims
      relationship: Depends on plugin-owned runtime and host surfaces so fallback ownership can be safely removed.
    - component: Documentation and verification
      relationship: Depends on final ownership boundaries and verified runtime behavior.
  integration_points:
    - "`packages/kanban-lite/src/shared/config.ts` is the compatibility seam for webhook-only config discovery."
    - "`packages/kanban-lite/src/sdk/plugins/index.ts` already owns alias loading, capability resolution, CLI plugin loading, and standalone plugin aggregation."
    - "`packages/kanban-lite/src/standalone/server.ts` is the host seam for plugin-provided routes and middleware."
    - "`packages/kanban-lite/src/cli/index.ts` already has a CLI plugin contract and should stop owning webhook commands directly."
    - "`packages/kanban-lite/src/mcp-server/index.ts` should remain a thin facade unless wave 1 validates an existing MCP plugin seam."
    - "Generated docs must be updated through source metadata, never by hand-editing generated markdown."

