plan_id: "20260324-webhooks-core-to-plugin"
objective: "Move all functionality related to webhooks from core to plugin, including all related cli commands"
focus_area: "packages/kl-webhooks-plugin and plugin contracts"
created_at: "2026-03-24T00:00:00Z"
created_by: "gem-researcher"
status: "completed"

tldr: |
  - `packages/kl-webhooks-plugin` already implements two webhook-related plugin roles: a `webhook.delivery` CRUD provider (`webhookProviderPlugin`) and an `event.listener` runtime delivery listener (`WebhookListenerPlugin`).
  - Core still retains full compatibility implementations for webhook CRUD and delivery in `packages/kanban-lite/src/sdk/webhooks.ts` plus the built-in fallback listener in `packages/kanban-lite/src/sdk/plugins/webhookListener.ts`.
  - SDK wiring already delegates webhook CRUD to the resolved provider and listener when the package is installed, but CLI, MCP, and standalone HTTP routes remain core-owned entry points that call SDK methods rather than plugin-owned commands/routes.
  - The current plugin contracts cover webhook provider loading, listener registration, standalone HTTP plugins, and CLI plugins, but `kl-webhooks-plugin` exports only provider/listener pieces and does not export CLI or standalone HTTP extensions.
  - Two notable drift/migration concerns are present in current code: webhook IDs differ between plugin and core fallback (`randomBytes(6)` vs `randomBytes(8)`), and CLI plugin discovery only scans `config.plugins`, not `config.webhookPlugin`.

research_metadata:
  methodology: "Hybrid retrieval with semantic_search for domain discovery, grep_search for exact webhook/plugin contract matches, relationship tracing across SDK/CLI/standalone/MCP entry points, and targeted read_file inspection of source, tests, and docs."
  scope: "Focused on `packages/kl-webhooks-plugin`, core webhook compatibility code, plugin loader contracts, capability normalization, and user-facing webhook surfaces (CLI, standalone HTTP, MCP)."
  confidence: "high"
  coverage: 90

