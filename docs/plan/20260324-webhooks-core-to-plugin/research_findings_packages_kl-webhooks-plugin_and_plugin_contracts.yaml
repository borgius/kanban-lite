    description: "The CLI plugin loader inspects `config.plugins` only and does not read `config.webhookPlugin`."
    impact: "A webhook package could export `cliPlugin` yet still not be discovered in workspaces that only use `webhookPlugin` configuration."
  - area: "Behavior parity maintenance"
    description: "Webhook CRUD/delivery logic is duplicated between `kl-webhooks-plugin` and core compatibility files rather than shared from one implementation source."
    impact: "Future changes can diverge between plugin and fallback behavior, as already visible in webhook id generation length."
