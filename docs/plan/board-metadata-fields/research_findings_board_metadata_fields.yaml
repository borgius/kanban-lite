related_conventions:
  naming_patterns_in_domain: >
    Optional fields on interfaces use `?`. BoardConfig fields are camelCase.
    New feature field should be `metadata?: string[]` on both BoardConfig and BoardInfo
    (mirrors the existing `actions?: Record<string,string>` pattern).
  structure_of_domain: >
    SDK → config.ts types → interface layers (extension/server/mcp).
    Feature addition order per AGENTS.md: SDK first, then API, CLI, MCP.
  error_handling_in_domain: sdk.updateBoard throws Error on missing board; caught by server route.
  documentation_in_domain: JSDoc required on all new fields per AGENTS.md.

related_dependencies:
  internal:
    - component: src/shared/config.ts (BoardConfig, getBoardConfig, writeConfig)
      relationship_to_domain: Must add `metadata?: string[]` to BoardConfig interface
      direction: outbound
    - component: src/shared/types.ts (BoardInfo)
      relationship_to_domain: Must add `metadata?: string[]` to BoardInfo interface
      direction: outbound
    - component: src/sdk/modules/boards.ts (listBoards, updateBoard)
      relationship_to_domain: listBoards must include metadata; updateBoard must handle it
      direction: outbound
    - component: src/webview/store/index.ts
      relationship_to_domain: No change needed — stores BoardInfo[] transparently
      direction: inbound
    - component: src/webview/components/CardEditor.tsx
      relationship_to_domain: Reads board metadata from store; renders pinned rows before ADVANCED
      direction: inbound

open_questions:
  - question: Should the new `metadata` label in the pinned row be the raw key name or prettified (e.g., "jobUrl" → "Job Url")?
    context: No existing convention for prettifying board-defined metadata field labels; existing MetadataTree renders raw key names.
  - question: For URL detection, what heuristic? startsWith("http") or a broader regex?
    context: MetadataTree currently checks for file paths (absolute path patterns); URL detection would be a parallel branch.
  - question: Should pinned metadata rows be skipped silently if the key is absent from card.metadata, or show a "—" placeholder?
    context: Affects UX when a board defines metadata=["jobUrl"] but individual cards don't have that key set.

gaps:
  - area: CLI update-board command
    description: Did not fully read src/cli/index.ts for update-board subcommand shape.
    impact: Minor — updateBoard SDK method is the reference; CLI will follow the same pattern.
  - area: Standalone server init message for boards
    description: Standalone server sends boards to webview differently than the extension — not fully verified.
    impact: Low — the standalone App.tsx init path likely mirrors the extension flow but should be confirmed.
