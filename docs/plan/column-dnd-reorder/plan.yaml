plan_id: column-dnd-reorder
objective: Add drag-and-drop column reordering — wire the existing sdk.reorderColumns() to the webview UI (HTML5 DnD), extension message handler, REST API, MCP tool, and CLI subcommand.
created_at: "2026-03-17"
created_by: gem-planner
status: pending_approval
research_confidence: high

tldr: |
  sdk.reorderColumns(columnIds[], boardId?) already exists and is fully functional.
  The sole gap is UI-to-persistence wiring across five layers: WebviewMessage type,
  KanbanPanel handler, REST endpoint, MCP tool, and CLI command — plus native HTML5
  DnD on the column header mirroring the existing card DnD pattern.

open_questions: []

pre_mortem:
  overall_risk_level: low
  critical_failure_modes:
    - scenario: Column DnD interferes with card DnD — dragOver on a column header triggers card drop logic
      likelihood: medium
      impact: medium
      mitigation: |
        Use a dedicated dataTransfer key (e.g. 'application/x-column-id') distinct from the card
        key ('text/plain'). In card drop handlers, guard with dataTransfer.types check so column
        drags are ignored by card handlers and vice versa.
    - scenario: Optimistic column reorder in App.tsx diverges from persisted order on SDK error
      likelihood: low
      impact: low
      mitigation: |
        On postMessage response failure the next _sendCardsToWebview() from KanbanPanel will
        push the authoritative column array back to the webview, self-healing state.
  assumptions:
    - sdk.reorderColumns is synchronous and throws on invalid columnIds — no async handling needed
    - Column order is fully determined by array index in BoardConfig.columns; no separate order field exists
    - Existing card DnD tests and behaviour must remain unchanged
    - No new npm dependencies are permitted (use native HTML5 DnD)

implementation_specification:
  code_structure: |
    Minimal surgical edits across 8 files following the dependency wave order defined in AGENTS.md
    (types → extension/server/mcp/cli → webview). No new files. No new dependencies.
  affected_areas:
    - src/shared/types.ts (WebviewMessage union)
    - src/extension/KanbanPanel.ts (message switch)
    - src/standalone/server.ts (REST routes)
    - src/mcp-server/index.ts (tool definitions)
    - src/cli/index.ts (column subcommand)
    - src/webview/App.tsx (handler + prop threading)
    - src/webview/components/KanbanBoard.tsx (DnD state + handlers)
    - src/webview/components/KanbanColumn.tsx (draggable header + drop indicator)
  component_details:
    - component: WebviewMessage type (types.ts)
      responsibility: Declare the reorderColumns message shape so all layers share one type
      interfaces:
        - "{ type: 'reorderColumns'; columnIds: string[]; boardId?: string }"
    - component: KanbanPanel message handler
      responsibility: Receive reorderColumns message, call sdk.reorderColumns(), push updated state
      interfaces:
        - "case 'reorderColumns': sdk.reorderColumns(columnIds, boardId); _sendCardsToWebview()"
    - component: REST endpoint PUT /api/columns/reorder
      responsibility: Accept columnIds array, delegate to sdk.reorderColumns(), return updated columns
      interfaces:
        - "PUT /api/columns/reorder — body: { columnIds: string[], boardId?: string } → 200 { columns: KanbanColumn[] }"
    - component: MCP tool reorder_columns
      responsibility: Expose column reordering as an MCP tool
      interfaces:
        - "reorder_columns(columnIds: string[], boardId?: string) → KanbanColumn[]"
    - component: CLI column reorder subcommand
      responsibility: Accept ordered column IDs as positional args, call sdk.reorderColumns()
      interfaces:
        - "kl column reorder <id1> <id2> ... [--board <boardId>]"
    - component: App.tsx handleReorderColumns
      responsibility: Optimistically reorder columns in Zustand store, then postMessage
      interfaces:
        - "handleReorderColumns(columnIds: string[]): void"
    - component: KanbanBoard.tsx column DnD
      responsibility: Own draggedColumnId / dropColumnIndex state, compute new order on drop
      interfaces:
        - "onReorderColumns prop: (columnIds: string[]) => void"
    - component: KanbanColumn.tsx draggable header
      responsibility: Make column header draggable, show drop indicator between columns
      interfaces:
        - "onColumnDragStart, onColumnDragOver, onColumnDrop, isDragTarget props"
  dependencies:
    - component: KanbanPanel.ts handler
      relationship: Depends on WebviewMessage type (t1-types must complete first)
    - component: App.tsx handler
      relationship: Depends on WebviewMessage type (t1-types must complete first)
    - component: KanbanBoard.tsx
      relationship: Calls handleReorderColumns from App.tsx; depends on t6-app prop contract
    - component: KanbanColumn.tsx
      relationship: Receives column DnD props from KanbanBoard.tsx; depends on t7-board
  integration_points:
    - KanbanPanel.ts switch handles 'reorderColumns' and calls existing _sendCardsToWebview()
    - server.ts PUT /api/columns/reorder placed before PUT /api/columns/:id to avoid route shadowing
    - KanbanBoard.tsx passes onReorderColumns down to App.tsx the same way onMoveCard is threaded

contracts:
  - from_task: t1-types
    to_task: t2-extension
    interface: "WebviewMessage union includes { type: 'reorderColumns'; columnIds: string[]; boardId?: string }"
    format: TypeScript discriminated union member in src/shared/types.ts
  - from_task: t1-types
    to_task: t6-app
    interface: "Same WebviewMessage type used in vscode.postMessage call"
    format: TypeScript discriminated union member in src/shared/types.ts
  - from_task: t6-app
    to_task: t7-board
    interface: "onReorderColumns: (columnIds: string[]) => void prop passed to KanbanBoard"
    format: React prop / function signature
  - from_task: t7-board
    to_task: t8-column
    interface: "onColumnDragStart, onColumnDragOver, onColumnDrop, isDragTarget props passed to KanbanColumn"
    format: React prop set added to KanbanColumnProps interface

