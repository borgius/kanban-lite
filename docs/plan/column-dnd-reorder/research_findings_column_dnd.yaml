patterns_found:
  - category: architecture
    pattern: Native HTML5 Drag and Drop for card reordering
    description: |
      No external DnD library (no @dnd-kit, no react-dnd, no react-beautiful-dnd).
      Uses React.DragEvent (onDragStart, onDragOver, onDrop, onDragEnd) on DOM elements.
      draggedCard and dropTarget states live in KanbanBoard.tsx.
      Card ID is stored in dataTransfer.setData('text/plain', ...).
      Drop position is calculated from mouse Y vs card midpoint getBoundingClientRect.
    examples:
      - file: src/webview/components/KanbanBoard.tsx
        location: "63-175"
        snippet: |
          const [draggedCard, setDraggedCard] = useState<Card | null>(null)
          const handleDragStart = (e, card) => { setDraggedCard(card); e.dataTransfer.setData(...) }
          const handleDrop = (e, columnId) => { ... onMoveCard(draggedCard.id, columnId, index) }
    prevalence: common

  - category: architecture
    pattern: WebviewMessage -> KanbanPanel -> SDK -> _sendCardsToWebview
    description: |
      All user actions in the webview post a typed WebviewMessage.
      KanbanPanel.ts has a switch over message.type.
      Each case calls a private _method() that invokes the SDK.
      After SDK mutation, _sendCardsToWebview() re-hydrates the webview with the full init payload.
    examples:
      - file: src/extension/KanbanPanel.ts
        location: "273-283"
        snippet: |
          case 'addColumn': await this._addColumn(message.column); break
          case 'editColumn': await this._editColumn(message.columnId, message.updates); break
          case 'removeColumn': await this._removeColumn(message.columnId); break
    prevalence: common

  - category: structure
    pattern: Column ordering via array position
    description: |
      KanbanColumn has no numeric or fractional 'order' field.
      Order is implicit: the index in the BoardConfig.columns array.
      reorderColumns rebuilds the array in the desired order and writes .kanban.json.
    examples:
      - file: src/sdk/modules/columns.ts
        location: "118-138"
        snippet: |
          board.columns = columnIds.map(id => colMap.get(id) as KanbanColumn)
          writeConfig(ctx.workspaceRoot, config)
    prevalence: common

  - category: architecture
    pattern: Optimistic updates for card moves
    description: |
      Card moves in App.tsx update local store state immediately before posting the message.
      Column changes currently rely on _sendCardsToWebview() for round-trip refresh (not optimistic).
    examples:
      - file: src/webview/App.tsx
        location: "644-680"
        snippet: |
          setCards(cards.map(c => c.id === cardId ? { ...c, status: newStatus } : c))
          vscode.postMessage({ type: 'moveCard', ... })
    prevalence: common

