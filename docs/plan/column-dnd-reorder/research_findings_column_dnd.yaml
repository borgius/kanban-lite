plan_id: column-dnd-reorder
objective: Understand how to implement column drag-and-drop reordering in kanban-light
focus_area: src/webview/components, src/sdk, src/shared, src/extension, src/standalone, src/mcp-server, src/cli
created_at: "2026-03-17"
created_by: gem-researcher
status: completed

tldr: |
  - KanbanColumn type (src/shared/types.ts:217) has only 3 fields (id, name, color); column order is implicit array position in .kanban.json boards[id].columns array
  - sdk.reorderColumns(columnIds[], boardId?) ALREADY EXISTS at src/sdk/KanbanSDK.ts:1281 and src/sdk/modules/columns.ts:118
  - Card DnD uses native HTML5 drag-and-drop (no external library) implemented entirely in src/webview/components/KanbanBoard.tsx
  - WebviewMessage union and KanbanPanel.ts message handler do NOT yet have a reorderColumns message type — this is the primary gap
  - REST API, MCP, and CLI are also missing reorder_columns / PUT /api/columns/reorder / kl columns reorder commands

research_metadata:
  methodology: "Hybrid retrieval: targeted grep_search + read_file; relationship discovery via message type tracing (WebviewMessage -> KanbanPanel -> SDK)"
  scope: "All files touched by column operations: types, SDK, extension panel, webview components/store/App, standalone server, MCP server, CLI"
  confidence: high
  coverage: 95

