open_questions:
  - question: Should column DnD use dataTransfer type 'column' or rely purely on local React state?
    context: |
      Card DnD uses dataTransfer.setData('text/plain', cardId). If column drag uses the same
      key, a card drop handler could fire on a column-level drop accidentally. Using a separate
      dataTransfer type ('application/kanban-column') or purely local React state (draggedColumnId)
      avoids this ambiguity. Local state is simpler and already proven by card DnD.

  - question: Should column reorder be optimistic (update store before the round-trip)?
    context: |
      Card moves are optimistic (local state updated immediately). Column reorders could follow
      the same pattern: setColumns(reordered) before postMessage, then let the init refresh confirm.
      This avoids a perceptible flicker when the column snaps back to old order momentarily.

  - question: Should sdk.reorderColumns emit a 'column.reordered' webhook event?
    context: |
      Other SDK column mutations emit events (column.created, column.updated, column.deleted)
      but reorderColumns (src/sdk/modules/columns.ts:118) does not call ctx.emitEvent().
      Consistency would require adding this, though it may not be needed for the initial feature.

  - question: How should horizontal-scroll interaction work during column drag?
    context: |
      KanbanBoard renders columns in a horizontally scrollable container. Dragging a column
      near the left/right edge should ideally auto-scroll. Native HTML5 DnD does not
      auto-scroll horizontal containers without custom logic (mousemove + scrollBy).

