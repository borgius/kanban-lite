    - interface: React.DragEvent
      location: src/webview/components/KanbanBoard.tsx
      usage_pattern: |
        e.dataTransfer.setData('text/plain', ...) on drag start.
        e.preventDefault() on drag over.
        e.dataTransfer.getData('text/plain') or local state on drop.

    - interface: KanbanSDK.reorderColumns
      location: src/sdk/KanbanSDK.ts:1281
      usage_pattern: |
        sdk.reorderColumns(columnIds: string[], boardId?: string): KanbanColumn[]
        Synchronous. Must pass ALL column IDs. Throws on unknown/missing IDs.

  data_flow_involving_domain: |
    Column order is stored as array order in .kanban.json -> read by SDK -> sent in
    'init' message columns[] field -> stored in Zustand columns[] -> rendered in
    KanbanBoard.tsx via columns.map(). Reorder would flow: column header drag gesture ->
    KanbanBoard state update -> optimistic setColumns() -> postMessage reorderColumns ->
    KanbanPanel -> sdk.reorderColumns() -> _sendCardsToWebview() (confirmation refresh).

