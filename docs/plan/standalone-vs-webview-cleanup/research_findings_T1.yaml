# ─── VERIFICATION RESULTS ───────────────────────────────────────────────────

verification:

  safe_to_delete_main_tsx:
    verdict: YES
    reason: |
      src/webview/main.tsx is a 9-line bare React entry point (createRoot → <App />)
      with no shared logic not already in standalone-main.tsx.
      Its ONLY external reference is the <script> tag in src/webview/index.html (also being deleted).
      No src/ file, no CI workflow, and no test file imports or references main.tsx by name
      outside of the two files being deleted (index.html) and vite.config.ts.

  safe_to_delete_index_html:
    verdict: YES
    reason: |
      src/webview/index.html is the HTML shell for the legacy build. Its only <script> references main.tsx.
      No runtime code (KanbanPanel.ts, standalone server, tests) loads it.
      It is only matched in vite.config.ts search results and plan docs.

  safe_to_delete_vite_config_ts:
    verdict: YES
    reason: |
      vite.config.ts exclusively targets src/webview/main.tsx → dist/webview/.
      vitest.config.ts imports from vitest/config (not vite/config), carries its own resolve.alias,
      and has NO extends, mergeConfig, or import of vite.config.ts.
      No src/ file imports it. The only consumers were build:webview (vite build) and
      watch:webview (vite build --watch), both being removed in T4.

  dist_webview_references_in_src:
    count: 0
    note: "grep for 'dist/webview' in src/** returned zero matches. Only matches outside src/ were docs/plan/ YAML artifacts, .vscodeignore (line 31: dist/webview/**), and vite.config.ts itself."

  dist_webview_in_github_ci:
    count: 0
    ci_files_found:
      - .github/workflows_/release.yml
      - .github/workflows_/ci.yml
    note: "Neither CI file references build:webview, watch:webview, dist/webview, main.tsx, or vite.config.ts."

  main_tsx_references_outside_deletion_set:
    count: 0
    note: "main.tsx is referenced in src/webview/index.html (being deleted) and vite.config.ts (being deleted). vite.standalone.config.ts references standalone-main.tsx, not main.tsx."

# ─── EXACT SCRIPT CONTENTS (for T4) ────────────────────────────────────────

package_json_scripts:

