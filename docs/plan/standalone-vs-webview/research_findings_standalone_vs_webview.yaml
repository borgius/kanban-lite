open_questions:
  - question: "Is main.tsx / vite.config.ts / dist/webview/ dead code or is it used in an undocumented workflow?"
    context: "build:webview script exists but is not called by the main build. KanbanPanel.ts loads from dist/standalone-webview/. No test or package.json script references dist/webview/."

  - question: "Does the webview's App.tsx message protocol (ExtensionMessage types) fully match what server.ts sends over WebSocket?"
    context: "The protocol coupling between server.ts WebSocket messages and App.tsx message handlers is implicit — there is no shared schema validated at build time. A type mismatch would only be caught at runtime."

  - question: "Is there a TanStack Router / URL-state feature only available in standalone mode that should also be available in VS Code extension mode?"
    context: "router.tsx is imported in standalone-main.tsx but not main.tsx. Deep-linking and URL state are standalone-only features."

