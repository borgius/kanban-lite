# ---------------------------------------------------------------------------
# CONSOLIDATION ASSESSMENT
# ---------------------------------------------------------------------------
# This section captures factual findings relevant to the consolidation question.
# No recommendations — pure structural analysis.
consolidation_analysis:

  can_be_merged: false

  reason_why_not_merged: |
    1. DIFFERENT RUNTIMES: src/standalone runs in Node.js (uses fs, http, path, os, process, ws).
       src/webview runs in a browser (uses DOM, WebSocket browser API, sessionStorage, fetch).
       These APIs do not overlap and cannot share a bundle.

    2. DIFFERENT BUNDLERS: esbuild (CJS, --platform=node) for standalone; Vite (ESM, browser targets)
       for webview. Switching either would require significant build changes.

    3. NO IMPORT COUPLING: Neither directory imports from the other at the source level.
       Coupling is purely at runtime (served files + WebSocket protocol).

    4. ALREADY CONSOLIDATED AT THE ARTIFACT LEVEL: Both the VS Code extension and the standalone
       server use the SAME built artifact (dist/standalone-webview). The dual-runtime behavior
       is already elegantly solved via standalone-shim.ts's conditional polyfill.
       There is no "split" to close — it is already unified at the output level.

  what_consolidation_would_actually_mean: |
    A merge would mean combining a Node.js HTTP server with a React SPA into one directory.
    This is not a code organisation problem — it would be mixing runtime environments, which
    is architecturally incoherent.

    The actual open question is whether the DEAD PATHS can be cleaned up:
    - main.tsx, index.html, and vite.config.ts produce dist/webview/ which nothing uses.
    - Removing these files would simplify the repo without any functional impact.

  what_they_share:
    - "src/shared/types.ts: shared TypeScript types (Card, Priority, KanbanColumn, Comment, etc.)"
    - "src/shared/config.ts: kanban config schema (used by server.ts; config reading only)"
    - "Protocol contract: the message types sent over postMessage/WebSocket are implicitly typed via ExtensionMessage in shared/types.ts"

  key_risks_to_consolidation:
    - risk: "Runtime incompatibility"
      description: "Node.js fs/http/os modules cannot run in a browser. Browser DOM/sessionStorage/fetch cannot run in Node.js without polyfills. These are hard constraints."
    - risk: "Build tooling mismatch"
      description: "esbuild CJS for server vs Vite ESM for browser. Switching to a monorepo bundler (e.g., Turbopack) would need significant scaffolding for no gain."
    - risk: "CSP breakage"
      description: "VS Code WebviewPanel enforces strict CSP. Any changes to the bundle entry point risk breaking the nonce-based script injection in KanbanPanel._getHtmlForWebview."
    - risk: "Loss of standalone-webview/dist dual-use"
      description: "The current design is that one Vite build output serves BOTH the browser (via HTTP static serving) and VS Code (via webviewUri). Merging directories would break this elegant reuse."

