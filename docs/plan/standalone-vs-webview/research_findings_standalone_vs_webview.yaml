patterns_found:

  - category: architecture
    pattern: "Single UI bundle for dual runtime"
    description: "One Vite bundle (dist/standalone-webview) is loaded in both the VS Code WebviewPanel and the standalone browser. The standalone-shim.ts provides a conditional polyfill that adapts the VS Code API contract to a WebSocket connection when not running inside VS Code."
    examples:
      - file: "src/webview/standalone-shim.ts"
        location: "standalone-shim.ts:5"
        snippet: "if (!('acquireVsCodeApi' in window)) { ... }"
      - file: "src/extension/KanbanPanel.ts"
        location: "KanbanPanel.ts:502"
        snippet: "vscode.Uri.joinPath(this._extensionUri, 'dist', 'standalone-webview', 'index.js')"
    prevalence: common

  - category: architecture
    pattern: "Shim-based API polyfill pattern"
    description: "The webview always uses getVsCodeApi() which calls acquireVsCodeApi(). In VS Code the native function is injected by the WebviewPanel; in the browser the shim provides an equivalent that relays over WebSocket. The React component code is unaware of which runtime it is in."
    examples:
      - file: "src/webview/vsCodeApi.ts"
        location: "vsCodeApi.ts:14"
        snippet: "export function getVsCodeApi() { if (!_api) _api = acquireVsCodeApi(); return _api }"
    prevalence: common

  - category: structure
    pattern: "Runtime boundary enforced by build tooling"
    description: "src/standalone is bundled by esbuild as CJS for Node.js. src/webview is bundled by Vite as ESM for the browser. No TypeScript path alias crosses this boundary; shared types flow through src/shared/ only."
    examples:
      - file: "package.json"
        location: "package.json:114"
        snippet: "\"build:standalone-server\": \"esbuild src/standalone/index.ts ... --format=cjs --platform=node\""
      - file: "package.json"
        location: "package.json:115"
        snippet: "\"build:standalone-webview\": \"vite build --config vite.standalone.config.ts\""
    prevalence: common

  - category: architecture
    pattern: "Dead build path: vite.config.ts / main.tsx / dist/webview"
    description: "main.tsx and vite.config.ts exist and produce dist/webview/, but this script (build:webview) is not called by the main build script and the VS Code extension loads from dist/standalone-webview/. This path appears to be legacy or development-only and can be removed without impact."
    examples:
      - file: "package.json"
        location: "package.json:108"
        snippet: "\"build\": \"npm run build:extension && npm run build:standalone-webview && build:cli && ...\""
      - file: "src/extension/KanbanPanel.ts"
        location: "KanbanPanel.ts:64"
        snippet: "localResourceRoots: [vscode.Uri.joinPath(extensionUri, 'dist', 'standalone-webview')]"
    prevalence: rare

  - category: naming
    pattern: "standalone- prefix for browser-mode overrides"
    description: "Files that exist only for the browser/standalone build use the 'standalone-' prefix: standalone-main.tsx, standalone-shim.ts, standalone.html, standalone-theme.css. The corresponding VS Code-only files lack this prefix."
    examples:
      - file: "src/webview/standalone-main.tsx"
        location: "standalone-main.tsx:1"
        snippet: "import './standalone-shim'"
    prevalence: common

