plan_id: standalone-vs-webview
objective: Understand the purpose and coupling of src/standalone vs src/webview, and assess feasibility of consolidation.
focus_area: src/standalone vs src/webview architectural distinction
created_at: "2026-03-17"
created_by: gem-researcher
status: completed

tldr: |
  - src/standalone is a Node.js HTTP + WebSocket server (server-side, esbuild/CJS); src/webview is a React SPA (browser-side, Vite/ESM). They run in different runtimes and are bundled by different tools — separation is correct and intentional.
  - The VS Code extension and the standalone web server BOTH serve the same built artifact (dist/standalone-webview), built from standalone-main.tsx. The standalone-shim.ts self-disables when native acquireVsCodeApi is detected, making one binary serve both contexts.
  - src/webview has NO imports from src/standalone; src/standalone has NO imports from src/webview. Their only source-level contract is src/shared/types.ts (shared TypeScript types).
  - main.tsx + vite.config.ts (building to dist/webview/) are NOT called by the main build script — this appears to be a dead / legacy entry point. The active UI entry point is standalone-main.tsx → dist/standalone-webview/.
  - Merging is impossible, unnecessary, and would be architecturally harmful. The separation is the feature.

research_metadata:
  methodology: "Parallel file reads (read_file), grep_search for cross-directory import patterns, package.json scripts analysis, build config comparison"
  scope: "All entry points, build configs, shared contracts, extension host loading code; full files for small modules, first 100 lines for large files"
  confidence: high
  coverage: 95

