name = "kanban-lite-worker"
main = "src/worker/index.ts"
compatibility_date = "2026-04-05"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "dist/standalone-webview"
binding = "ASSETS"

# ── Custom domain ─────────────────────────────────────────────────────────────
[[custom_domains]]
hostname = "kanban.tsf.incidentmind.com"
zone_name = "incidentmind.com"

[vars]
# Cloudflare Access team domain (non-secret) — update with your real team name:
CF_ACCESS_TEAM_DOMAIN = "your-team.cloudflareaccess.com"
# CF Access Application ID (AUD) for kanban.tsf.incidentmind.com – set with:
#   wrangler secret put CF_ACCESS_AUD_KANBAN \
#     --config ../kanban-light/packages/kanban-lite/wrangler.toml
