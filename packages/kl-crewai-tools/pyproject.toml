[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kl-crewai-tools"
version = "0.1.0"
description = "CrewAI tool adapters for the kanban-lite REST API"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [{ name = "borgius" }]
keywords = ["kanban", "crewai", "ai-agents", "kanban-lite"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "crewai>=0.80.0",
    "pydantic>=2,<3",
    "requests>=2.31.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "responses>=0.25.0",
]

[project.urls]
Homepage = "https://github.com/borgius/kanban-lite"
Repository = "https://github.com/borgius/kanban-lite/tree/main/packages/kl-crewai-tools"
Documentation = "https://github.com/borgius/kanban-lite/blob/main/packages/kl-crewai-tools/README.md"

[tool.hatch.build.targets.wheel]
packages = ["src/kl_crewai_tools"]

[tool.pytest.ini_options]
testpaths = ["tests"]
